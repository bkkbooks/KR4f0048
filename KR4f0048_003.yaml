body:
  text: 鹿洲初集卷三廣州府知府藍鼎元撰書論南洋事宜書南洋諸畨不能為害宜大開禁網聽民貿易以海外之有餘補内地之不足此豈容緩須臾哉昔閩撫宻陳疑洋商賣船與畨或載米接濟異域恐將來為中國患又慮洋船盜刧請禁艘舶出洋以省盜案迂謭書生坐井觀天之見自謂經國逺猷以嘉謨入告我后左矣聖祖慮患殷深恐萬一或如所言因詢問九卿下及閒散人等葢心疑其説之未必是欲得熟悉海外情形者一言證之也乃當時九卿既未身歴海外無能熟悉閒散人等又不能自達至尊故此事始終莫言而南洋之禁起焉非聖祖意也夫惟知海國情形乃可言弛張利害海外諸畨星羅碁布朝鮮附近神京守禮法東方之國日本最為强大其外皆尾閭無他畨稍降則為琉球大小島嶼斷續二千里外皆萬水朝東亦無他國南洋畨族最多吕宋噶囉吧為大文萊蘇禄麻六甲丁機宜啞齊柔佛馬承吉里問等數十國皆𣺌小不堪罔敢稍萌異念安南占城勢與兩粤相接此外有東埔寨六坤斜仔大泥諸國而暹羅為西南之最極西則紅毛西洋為强悍莫敵之國非諸畨比矣紅毛乃西島畨統名其中有英圭黎干絲蠟佛蘭西荷蘭大西洋小西洋諸國皆兇悍異常其舟堅固不畏颶風砲火軍械精於中土性情隂險叵測到處窺覘圖謀人國統計天下海島諸畨惟紅毛西洋日本三者可慮耳噶囉吧本巫來由地方緣與紅毛交易遂被侵佔為紅毛市舶之所吕宋亦巫來由分族緣習天主一敎亦被西洋佔奪為西洋市舶之所日本明時作亂閩廣江浙皆遭蹂躪至今數省人民言倭冦者尚心痛首疾南洋數十島畨則自開闢以來未嘗侵擾邊境貽中國南顧之患不過貨財貿易通濟有無今日本不禁紅毛不禁西洋天主敎布滿天下且以廣東澳門為彼盤踞聚族之區而獨於柔順寡弱有利無害之南洋必嚴禁而遏絶之是亦不可以已乎閩廣人稠地狹田園不足於耕望海謀生十居五六内地賤菲無足重輕之物載至畨境皆同珍貝是以沿海居民造作小巧技藝以及女紅針黹皆於洋船行銷歳収諸島銀錢貨物百十萬入我中土所關為不細矣南洋未禁之先閩廣家給人足逰手無賴亦為欲富所驅盡入畨島鮮有在家饑寒竊劫為非之患既禁以後百貨不通民生日蹙居者苦藝能之罔用行者嘆致逺之無方故有以四五千金所造之洋艘繫維朽蠧於斷港荒岸之間駕使則大而無當求價則沽而莫售拆造易小如削棟梁以為杙裂錦繡以為縷於心有所不甘又冀日麗雲開或有弛禁復通之候一船之敝廢中人數百家之産其慘目傷心可勝道耶沿海居民蕭索岑寂窮困不聊之狀皆因洋禁其深知水性慣熟船務之舵工水手不能肩擔背負以博一朝之食或走險海中為賊駕船圖目前餬口之計其逰手無賴更靡所之羣趨臺灣或為犯亂辛丑臺冦陳福夀之流其明效大驗也天下利國利民之事雖小必為妨民病國之事雖㣲必去今禁南洋有害而無利但能使沿海居民富者貧貧者困驅工商為㳺手驅㳺手為盜賊耳閩地不生銀礦皆需畨錢日久禁宻無以為繼必將取給於楮幣皮鈔以為泉府權宜之用此其害匪甚㣲也開南洋有利而無害外通貨財内消奸宄百萬生靈仰事俯畜之有資各處鈔關且可多徴税課以足民者裕國其利甚為不小若夫賣船與番載米接濟被盜劫掠之疑則從來無此事者也内地造一洋船大者七八千金小者二三千金能賣價值幾何商家一船造起便為致富之業欲世世傳之子孫即他年厭倦不自出尚歳收無窮之租賃誰肯賣人况畨山材木比内地更堅商人每購而用之如鼎嘛桅一條在畨不過一二百兩至内地則直千金畨人造船比中國更固中國數寸之板彼用全木數寸之釘彼用尺餘即以我船贈彼尚非所樂况令出重價以買耶閩廣産米無多福建不敷尤甚每歳民食半藉臺灣或佐之以江浙南洋未禁之先吕宋米時常至厦畨地出米最饒原不待仰食中國洋商皆有身家誰自甘法網嘗試而洋船所載貨物一擔之位收船租銀四五兩一擔位之米所值幾何舍其利而犯法雖至愚者不為也歴來洋船從無在洋被劫蓋以劫船之盜皆在海邊出沒島澳離㟁百十里極逺止二三百里以外則少舟行逺出無益且苦颶風驟起無停泊安身之處洋船一縱不知其幾千里船身既大可任風波非賊船所能偕行若賊於海濵行劫則上下浙廣商船已可取攜不盡何必洋船即與洋船相遇而賊船低小倚之且若髙樓非梯不能以上一船之賊多不過二三十人洋船人數極少百餘且不俟與賊力戰但挽舵走據上風可壓賊船而溺之何行劫之足慮方今聖主當陽九圍綏静凡有血氣咸同一家而獨於南洋弱小效順之諸畨禁不與通來往内外臣工或知而不言殊非忠君愛國懷逺寜邇惠養黎元之道草莽愚生所旁觀而竊嘆也論北直水利書皇上加意蒼生萬邦樂利念畿輔霖潦沮洳特命親王大臣疏導河渠肇興疆畎此自虞廷治水敎稼以來四千餘年再見之盛事也愚少長海濱躬耕作苦勺水寸地視若竒珍及渡江淮過齊魯抵京師所見萬頃平原枯燥為陸河湖淀蕩水淺沙淤至於夏秋霖雨則又皆成巨浸每歎北方不習水利惟苦水害低徊顧惜恨不得胼手胝足于其間忽聞盛舉懽忻手額試為綜畿輔之大勢而計之東西二淀跨雄霸等十餘州縣子牙永定二河以淀為壑淀治而後河有歸故欲治直𨽻之水必自二淀為始京東之水若白河薊河浭河以及永平之灤河皆經流之最大者自衛汶合流地勢南髙北下每有漲潦決岸之憂滄州之磚河青縣之興濟河皆昔人分減衛水之故道也通州以南之水滙於窩頭夏店之箭桿河玉田之藍泉河泉河豐潤之大泊王家河汉河龍王堂灣泥河永平之龍溪沂河靳家河黃坨河稻河吳家河牤牛桃林湧泉三里等河皆支流之可數者此京東河渠形勝之大槩也西南之水蘆溝發源於桑乾穿西山而出為金口河元郭守敬欲按故迹使山後通流以廣京畿之漕者是也拒馬滹沱二河又經流之最大者拒馬發源于淶山下為白溝河其南為依城河又南為三坌口滹沱發源于泰戲經正定束鹿綿亘千里合深易濡雹沙滋諸水散入各淀又有徐河唐河皆源出山西洨河出于獲鹿白馬河出于任邱百泉河野河出于邢臺洺河出于遼州滏陽河出于磁州凡西南諸河入任縣泊者十入寧晉泊者十二土人謂任為南泊寜晉為北泊皆禹貢大陸澤故地南泊宣洩之路在雞爪河北泊宣洩之路在滏陽河此西南河渠形勝之大槩也今訪求故道疏濬深廣多開引河以緩奔騰之勢修築閘壩以制蓄洩之宜設營田専官經營疆理召募南方老農課導耕種則千里良田嘉禾遍野不特閭閻小民仰事俯畜之有資而東南轉輸且可漸次減省現在溝洫深通田廬不憂其泛濫河漕不患其淺阻其為利難更僕數也昔元虞集欲于京東濵海地築塘捍水以成稻田明邱濬深然其説惓惓乎三致意焉萬厯中給事中徐貞明上水利議又著潞水客談言興水田之利十有四已而進貞明少卿俾歴京東相原隰周覽水泉分合條列事宜以上命兼御史領墾田使先詣永平受事六閲月墾成三萬九千餘畆方遍歴諸河大加疏濬而勲戚之占田者病之為蜚語上聞御史王之棟畿輔人也力言開河不便者十二帝遂罷役天下以貞明之策不終為可惜也夫人情公私不一安保其必無異議惟在鋭意舉行不為浮言搖惑而已矣今所慮者或謂南北異宜水田必不宜于北方此其説甚不然也永平薊州玉田豐潤漠漠春疇深耕易耨者何物乎或謂北地無水雨集則溝澮洪濤雨過則萬壑焦枯雖有河而不能得河之利此可以閘壩蓄洩多建堤防以藴其勢使河中常常有水而因時啓閉使旱潦不能為害者也或謂北方無實土水流沙潰堤岸不能堅固朝成河而暮淤陸此則當費經營耳然黃河兩㟁一槩浮沙以葦承泥亦能捍禦誠不惜工力疏濬加深以治黃之法堆砌兩岸而渠水不類黃强則一勞永逸未嘗不可恃也天下無不可為之事惟心堅力勤仰體皇上愛民利民之至意置身家性命于度外精誠所感可以動天地役鬼神何農田水利之不可成乎禹之行水八年於外三過不入不過忠誠焉而已勤勞焉而已豈如世俗陋見别有神竒怪誕之為哉夫東南轉漕一石至京糜十石之價不止開河墾田根本至計在此日勞費雖多他年節省漕石獲利何啻數倍是不特北直之水利可興而山東河南淮徐上下數千里亦可以次第舉行而無容再計者也論江南應分州縣書江南沿海州縣太大者十有三糧多政煩官民受困極矣若蘇之長洲崑山吳江嘉定常熟五縣太倉一州松之華亭婁上海青浦四縣常之武進無錫宜興三縣歳徴正賦銀米共三百五十五萬有竒大抵一邑錢糧可作邊方數省邑令精神才力既有不周不繼之虞而其民其俗又多以輸納先完為恥竟有數十年積逋不納一錢者幸遇恩赦得豁赦後從新再逋誅之不可勝誅官亦無如之何也官無如何罔不因此詿誤詿誤牽絆終無清楚之期於是有數十舊令羈留一邑摩肩觸額流離于道至其既死之後猶不能以骸骨還故鄉悲夫即有才能出衆之員舍民催科尚不能完十分之七八而日夜廢寢忘食心血焦枯精神耗敝豈暇復及撫字敎化之方於是有寃抑不伸饑寒罔恤疾苦無告凌弱暴寡武斷之患興而民之病不可言也官病民病國賦又虧漠然不為籌畫如之何其可哉今惟有分治之一法可以救積年莫解之病姑妄言之有心世道之君子不妨姑妄聽之地分則大可使小糧分則逋可使完崑山一縣歳徴銀二十七萬五千米十二萬六千有竒應分析為三縣嘉定徴銀二十六萬七千有竒亦應析而三之長洲吳江等十一州縣各分為二每縣既分之後歳徴銀米多者十七八萬少者十餘萬較天下他郡邑尚巍然繁劇大縣也新分縣署就沿海武職汛防舊有城堡之處或村莊市鎭人民衆多之所相度形勝要害因地制宜如上海川沙婁縣金山衛之類現有城垣者即居之武進所分並駐府城作附郭兩邑其餘各縣需城者不過七八設法建築亦非所難聖天子賑賚蠲租動經百萬何愛惜此區區特無以其情入告耳即不然而天下州縣無城者儘多既屬腹裏之地亦何必因畏築城池而不為一舉數善之計耶或慮添設一官則多一官之費俸工衙役須謀所出此亦非甚難事夫不有裁汰冗貟一法乎蘇州一府設同知三員何為也松江同知二員通判二員常州通判三員何為也是三府可裁同知通判六貟長洲崑山吳江華亭婁縣上海青浦七縣各設縣丞二員亦屬無謂每縣止留一丞可裁縣丞七員太倉州既分其半可裁州判一員計三府所裁府州縣佐共一十四貟俸工衙役即以給所分新縣之用新縣止設知縣典史各一員則裁設略足相當况市鎮多有巡檢既設縣治裁巡檢而為典史又甚便也地小易理糧少易清一轉移間中才可奏治安之績催科之餘専心撫字敎化興起俗美風醇官民均受其益國賦由此不虧非今日經理南邦之急務乎或者謂江南地丁雜糧比别省加重恐分晰太清不便于民若然則條其利病入告可也再與友人論江南分縣書江南分縣之説足下未以余言為然也今兩江制府查公入告矣所議析長洲等十三州縣絲毫不差議裁額外同知通判縣丞以俸工衙役為新縣之用亦意見如一止崑山嘉定分析二三之殊太倉州判裁否之别當以查公之論為定駐劄新縣之處鄙人未經親歴止知上海之川沙婁之金山衛及武進並駐府城而查公身在地方多詳數處於常熟則有福山嘉定則吳淞華亭則青村餘亦俟擇境内地方要𦂳人民殷庶之市鎮誠所謂閉户造車出門合轍者也天下必不可易之理明者所見大略相同特多袖手旁觀不肯試為籌畫焉有一邑錢糧可分作小省三四而以為阬𦵏縣令之區聽其累民病國而不為之所耶物極必反數窮必通十三州縣之令長氓庶從此其有瘳乎鄙人閒論於京邸無聊之中制府已行於二三千里之外知查公留意地方實欲興除民閒利弊無愧古封疆大臣也余喜得同心以所閱邸報視吾友蔣越珊蔣君即宜興人其忻快比余更甚因與余論宜興新縣處所有周鐵橋湖㳇漳渚河橋數大鎮皆烟火五六百家而漳渚距縣七十里山險民梗稍阻敎化有巡檢司不能馴服意宜興新縣必在漳渚無疑而漳渚巡檢即可裁為典史此可見地方紳士無不樂為此舉其利國利民可知矣詢謀僉同鬼神其依足下自今以始尚敢昻首攘臂與余論列天下事否如仍欲固守前説請以封章入告力陳其不便不然則下馬降服可也論潮普割地事宜書頃聞憲檄欲割潮陽之洋烏􅚉水兩都以屬普寜裒多益寡此甚盛事但潮陽普寧接壤要害之處在貴山􅚉水不在洋烏地理情形一目可了竊有欲叅末議者敢為執事備陳之普地褊小東西廣二十五里南北袤三十有五里故潮屬黃坑一都耳東至洞仙徑十里為潮陽貴山都界過此為牛血坑鹽梟鼠竊出入之路厚山前洋狗眠樟岡皆潮邑頑抗鄉寨也東南至陳洞徑十三里為潮陽貴山都界過此為麒麟埔匪類出沒私梟私宰往來之路徑子鄉大青洋岡頭寮南隴大隴藍門南洋北嶼青洋山皆潮邑頑抗鄉寨也南至大壩墟十五里為貴山􅚉水兩都界貴山界在其左最頑抗者曰北山白晝攘奪大隊私梟窩頓出沒之所居仁西湖定厝寮埔上寮娘烏陂鄭美村漁庄湖皆潮邑頑抗鄉寨也􅚉水都在大壩之南最頑抗者曰果隴其民莊姓與貴山都之北山許姓皆在大壩集塲中百十為羣橫行攘奪大為普邑患害若垾塘橋柱泥溝赤水浮江寮塘塔埔頑抗諸鄉不可悉數其地去潮陽一百四五十里距普寜僅十五里即寒婆徑極邊亦不過五十里是􅚉水一都盡宜割歸普邑無疑也普邑吏治民生所最患苦者有四􅚉水都之果隴居其一貴山都之北山麒麟埔洞仙徑居其三皆穿窬糾奪窩巢所聚更闌人寂緩步而來盜牛胠篋未至三更已飽所欲而歸卧追之則踰境逺颺捕之則法不越疆今割洋􅚉二都以畀普僅能去果隴之一疾而貴山三路未動分毫是普邑四害尚存留其三也洋烏都在􅚉水之東其尾近南軍埔石港石橋頭山門城大長隴湯坑鹽嶺一帶為洋烏尾距潮陽縣治八九十里素稱頑抗離普寜不過五六十里割歸普邑可也自林八渡而下為洋烏頭華里湄洲諸處為洋烏中皆距潮陽較近非普寜所能管轄矣查普邑至洋烏頭洋烏中計程七八十里必越潮陽之貴山舉練兩都而後能跨林八渡之閾踰鄰以治逺固知其難也而此洋烏頭洋烏中之人民錢糧詞訟至潮陽或四十里或五六十里欲其舍近就逺而聽普寜遙制豈可得乎且洋烏錢糧最多田地肥美人民殷富皆在此間在潮邑官紳所不忍割愛與人而邑内世家大族腴業祭産亦在此間尤畏普邑窵逺有佃户抗租不能制服之勢嘵嘵多口抵死必爭故明萬厯年間其明驗也普寜為縣始于嘉靖四十三年割潮陽之洋烏􅚉水黃坑三都建置普邑萬厯十年潮陽復以洋烏􅚉水歸僅存黃坑一都雖曰履畝丈量一都已贏賦額亦潮邑官紳士庶於心有所不甘故逞其强有力而奪之還也洋烏全割乃潮人腹心之痛若洋烏尾以西民刁地薄則亦非所戀者矣在普人以壤地褊促欲仍索洋􅚉兩都則據故明舊案而爭之將以得地為榮在潮人以金甌無缺可壯觀瞻不忍洋􅚉之去將以失地為辱此皆一片私心非為國為民大公至正之道也故明舊案在今日何足重輕况同一郡之中短長無非臂指何拘此疆彼界之小大惟是綏靖地方必從吏治民生起見則潮普割都分治之舉確不可易而貴山半都之宜割洋烏大半之宜仍舊尤確乎不可易也請割貴山都沿山鄉寨北至赤肚嶺為界自新埔地深洋仙陂子砂塞埔南洋藍門貴嶼北嶼青洋山以西皆歸普寜則北山麒麟埔洞仙徑三途之為普害者胥受羈靮而樟岡狗眠諸鄉之與潮抗者距普邑不過四十里可以朝攝夕至無所施其技矣由貴嶼而南過石港為洋烏尾地方請割洋烏尾一帶鄉寨南至湯坑鹽嶺為界自筆架山以下大長隴石橋頭黃牛寮東浮山附近􅚉水三十餘寨亦歸普寜其洋烏頭洋烏中八十餘寨仍還潮陽則逺近適宜潮普兩縣皆無難于撫馭矣統計所劃地方北自貴山都赤肚嶺起南至洋烏都湯坑鹽嶺止中間以貴嶼為界在西者皆畀普寜在東者皆屬潮陽則􅚉水一都在普疆内已不待言潮陽地方十三都今去􅚉水一都貴山半都洋烏都三分之一尚存有十一都巍然大縣不見其小普寜僅黄坑一都寥寥四百鄉寨今得􅚉水全都鄉寨一百三十餘貴山半都鄉寨八十六洋烏尾鄉寨三十二雖曰一邑三都不見其大亦居然上躋于中縣之列要害窟窩皆入版圖更化善俗指掌易易是在潮無長鞭馬腹之憂在普無卧榻他鼾之患一舉兩美皆憲臺髙厚之賜也某不才謭劣不應為局外越爼之謀苐兩邑地方民情素所關切於心覩茲盛舉不自覺歡忻踴躍惟恐其成之稍緩復以普令少年未經身歴地方按圖索驥舍目前之貴山留三害于肘腋越隔逺之洋烏開將來以梗化潮人藉口終起爭端即使洋烏不再奪還亦為兩邑無窮之累而况貴山偪廹臟腑被創每夜岌岌不能安枕亦何用此更張為也伏惟憲臺留意垂察將情形利害上逹院司列憲急為轉圜改定區畫使兩邑皆受奠安之慶則憲臺豐功大徳直與鐵山爭髙練水同流千百世而未有艾矣不揣冒昧惶悚殊深倘蒙採納地方幸甚上鄂制府書不才疎拙弗合時宜身在流離顛沛名節沮喪之秋固應不齒人數矣大人開府南邦位尊勢重相去懸隔豈但雲泥而况未識荆州將還鄉井物色埃塵之中加以國士之目陳榻遽下解推慇懃雖在骨肉至親亦何以過於是寸心耿耿何日忘之五嶺蔽天風尚迥殊大人節鉞來茲瘴海始為一變近者風清日朗大法小廉盜息民安共知大人公忠為國無私無欲而濟之以勤勞是以賢能競奮魑魅潛消今大人新膺簡命總制百粤將士吏民五省鹺户莫不欣欣色喜幸得大澤均沾雖將去廢員如鼎元亦願暫停行邁翹首以觀徳化之成也茲承制府郝公不以廢員為不肖盼睞寵召令偕赴閩閩為桑梓父母之邦復值廢員言歸之會得附後車光榮已極重以大人諄諄慰諭謂郝公面懇者三致書者二託撫軍藩臬來言者數有不得復辭之勢竊自思維患難餘生何修得此迴憶三年以來囹圄道路客署凄清求大憲一面弗可得於今豈忍當前錯過自外輪轅况在官之日寒酸見淺獲戾上司禍由已召郝公庭訊之時亦已洞察其寃札商撫軍欲為伸雪仇人當令掣肘弗終行路之人皆知之此自廢員厄運當然郝公戀戀之情寜可忘耶惟是數載落魄不可告人家累縈心亦非筆墨所能言盡雖郝公有慷慨投贈不吝千金之雅廢員自顧何以克當無故而獲千金恐犯暴富不祥之戒即使鬼神弗忌於義亦無所取祇是為利而動在郝公何取此利欲薰心之人而廢員方脱泥淖荷大人知已之恩未有絲毫補報忽又貪得多金作又顧而之他所為恐大人亦難免于不知人之誚此揆之於義而斷斷不可亦返之於心而萬萬不安者也昨見郝公曾薦原任漳浦汪先生名紳文者十七載賢能浦令諸事練逹兼以經濟素優曾調隨大軍安輯臺灣委署諸羅縣令將及一載北路民番情形尤為熟悉此時尚客同安可以聘召立至幕府贊襄綽綽有餘廢員之行實可不必書生性習猶在世路全然未諳戅拙倔強動攖諱忌恐與左右綱紀不能相合而况内歉者疑多有瑕者易裂驚弓之鳥弗處樊籠垢戾方除惡聲難受萬一隙末凶終反辜郝公此日知己之厚意何如慎之於始得彼此兩全之為善乎貧窮有命非人力所可轉移郝公有此盛情即如已受千金之惠倘天假之縁尚有經營四方之日自當力報大徳不敢有負郝公以負大人也不揣冒昧披瀝肝膈伏惟垂諒苦衷婉轉代辭無使回籍廢員得罪本省大憲為他日門庭之禍則感沐鴻慈非淺尠矣上郝制府論臺灣事宜書臺灣海外巖疆幅隕遼濶髙山大谷踞其中平原廣野敷其外四面汪洋萬里金湯之固也民番雜處奸宄孔多喜亂樂禍習與性成雖時際隆平亦難保百年無事今北路土番狡焉梗法公行拒敵傷害官兵當局不能撲除反議招撫損威示弱殊為非計大人躬膺簡命總制閩疆旌節所臨邪氛自靖乃蒙不棄疎拙念及廢員既倍三請之慇欲為後車之載弗能如命實切悚惶大人不以為罪俾效蠡測條列此行事宜及海外番民情狀雖紙上談兵未必有當髙明之採擇而一日知已山岳情重始終黙無一言於心亦覺不安姑就昔時馬跡所經揆度情勢以當芻蕘之一助是否能合機宜略有補益則非廢員之所敢知也臺灣機括全在厦門不但咽喉控扼且信息易通一切呼應便捷宜兼程赴厦駐劄彈壓先飛差星夜至閩知會將軍撫提併檄中軍副將賫捧印信率領辦事書役迅到厦門伺候一面奏聞俟土番平定然後往駐省城則可以安海外之人心亦可使軍前將弁震悚用命庶合大臣綏靖封疆之體不負聖主倚賴之心土番頑蠢雖惡有限所慮客民附和敎誘或乘機攘奪我師難於兼顧便恐滋蔓今幸民人安静然亦不可以安静而忽之宜大張文告慰諭臺中善良各安生業軍士經行地方不許妄動民間一草一木無騷擾驚惶之患併令有司宻為防閑稍有萌蘖立即除去倘一二無知與番同謀往來接濟許所親首報免其株連酌量酬賞則民人不敢有邪心番孽可勦殄也土番穿林飛箐是其長技所慮深藏内山無踪無影得茍延旦夕之命茲作亂者聞係大甲西大甲東牛罵沙轆水裏猫霧捒阿里史朴仔籬等社通共逆番不過二千人查猫霧捒至彰化縣僅三十里水裏牛罵沙轆四五十里大甲西大甲東二社止隔一溪亦與諸社相連皆在孔道平坦之中惟岸裏山介在牛罵沙轆二山間中有阿里史烏牛欄埽捒岸裏朴仔籬五社號為山深險峻今官兵已到阿里史朴仔籬而岸裏掃捒烏牛欄三社尚無作亂是以臺鎮吕某遣令岸裏後壠土官前往招撫則野心未齊勢尚渙散可以嚴飭將弁奮勇撲滅尅限一月為期務必蕩平清廓倘日久滋蔓將漸猖獗難制則軍法不可不肅也山中草茂箐宻土番得以蔽體所至焚烈最為機宜但今發榮盛長有火難用其實夏日酷熱午後風發可用乾薪草引然長風鼓煽雖濕亦燒不可忽也林箐路雜險阻難行宜用近社番為前導重懸賞格以番攻番查康熙三十八年吞霄土官卓个卓霧等作亂北路叅將常太多致糖煙銀布以啖岸裏番使擊吞霄遂平个霧即今之岸裏社番不與作亂者是也諸番惟岸裏最强埽捒烏牛欄亦在其内重賞之下何求不獲况所需不過紅綠色布糖煙食鹽木屐等類未為大費即左右稍逺之番無不可以智計驅遣在臺帥之善馭之耳番箭鏃如利刃鋒長五六寸或蘸毒藥百發無虚宜用木盾禦之盾式髙與人齊用兩板凑合如屋脊然内結繩紐可擕可佩中藏棍柱一條釘以鈎連活鐵使可撐持植立左右酌開鋴眼以便施發鎗砲兩盾並行見敵則合一人執盾止持短刀兩砲手鈎鐮鎗隨之而行若遇番多則諸盾皆合如木馬營壘之勢左右藤牌輔翼鎗砲連環勢不可當凡番箭皆著盾上則彼技已窮可一舉殱滅也山深番野全賴砲火震疊弓矢之威非所畏也宜多用砲手併於厦門製備火藥鉛彈遣官運赴軍前多多益善有餘則存貯臺庫為鎮營他日之需不可限定某時已發千斤某時發幾百斤惜小費而悞大事在操家者且不可况海外軍機乎時人通病所宜切戒大兵勦逆逆番不得耕種則絶糧甚易接濟宜防而鹽鐵二件尤為山中所少番不能淡食又不能不用箭鏃二者急需比糧更甚向皆漢民及外社狡番私藏鹽鐵隂售重價今既作亂則此等亟宜杜絶留心訪察厲禁而痛懲之無接濟之人則不能持久此亦一切務也旌節到厦宜遣官赴臺宣示威信條敎號令煥然一新併賫捧令箭督催進勦以熟悉風土有膽畧者充之即留軍前聽用如詔安營守備林君卿水師提標中營千總楊瑞皆前此征臺出力之人而林君卿汛守半線即今彰化縣地逆番情形尤所習諳二弁皆頗有忠赤幹練可用若令赴臺隨師當有裨益併軍前一切行徑機宜許其不時宻禀亦可以防壅蔽某官素稱勇敢臨陣肯前辛丑征臺甚為出力今屢次損威似見小敵則怯殊不可解大抵官怠於宦成身家念重之故也此公才技可用止待士卒少恩及傲上二字是其一生病痛人才難得不可遽行糾叅但留心駕馭之到厦即作手札極稱其前此功能併以見在責成危詞悚動使之激厲奮發有善必奬有過必規推誠置腹以示栽培俾其芒刺常常在背而又心感寛大玉成之恩則尅日奏功不難矣山谷最利土兵召募壯丁隨師殺賊亦良䇿也聞臺鎮募得三百人人日給米一升小錢二十不數日散去二百餘人此必然之勢耳一月六百小錢週年不過四兩未及伙兵半餉何能得人死力且曩歳壯丁征臺臺平之後制府盡檄裁去求一名糧不可得齗齗怨恨賴臺鎮沉檄不行力為詳請衆心始安迨允給名糧又分發八郡離家或數十日不願就餉者多矣嗣是衆心灰冷莫肯復蹈前轍今若欲用壯丁宜稍加之情意日給畧為寛裕開誠布公如手足骨肉之親切事平之後計功擢用下者亦安頓名糧無俾失所使有依戀之心則人人皆可用也謝郝制府兼論臺灣番變書得潮州家報具知憲駕臨潮存問鼎元之家賜米盈倉嘉殽旨酒羅列滿庭重以手書慇懃稱許逾量捧讀之下惶恐殊深自念窮阨廢員饑寒乃其分内兩載士民供給已覺赧顔繼以全郡同寅上官周恤又逾一載正在慚恧無地欲為還鄉之謀何期西江之流激自天外憲恩廣厚一至於斯夙夜思維不知將來何以為報也東望三山再拜稽首匪敢言謝用誌隆情近聞臺北土番復有崩山等社猝至彰化縣治騷擾作孽此曹不知寛大之恩欲以毛髪試洪爐之焰自速其死無足矜憐冬春沙轆之變兵威未振招撫遽行竊已疑為非計謂當消釁未萌免動兵戈則可既已勞師兩月弗能取勝然後招之使來似示怯弱養成驕恣固知不能無復起之患也為今之計宜大震軍威連根撲滅使他社番彛知國法萬不可犯然後一勞永逸臺鎮請兵三千之意想亦如此似當稍假便宜使之奮勵立功多繼砲火以足其用更製木盾以禦藥箭焚山烈澤直搗幽深廓清亦易易耳但飛咨内地調兵三千似覺招摇耳目或滋宵小之疑不如在臺招募土兵倣戚繼光分號編伍一日成軍之法召集易而成功速葢山谷﨑嶇官兵不如民兵之利選擇精壯雷厲風行隔海千里不如就地取材之捷也或以事平之後有易集難散之虞則北路地方千里兵力本弱安居無事尚且宜議增防况今逆番出擾已有明徴亡羊補牢寜能稍緩彰化上下四五百里僅委之守備一營四五百之兵此當改設遊擊增兵五百無疑也去歳閱邸抄有淡水同知移駐竹塹之議不知張𢎞昌失事何以乃在沙轆必竹塹未墾無村落民居之故耳竹塹居彰化淡水之中距彰化縣治二百四十里一路空虚上下兵力俱皆不及宜移同知駐此以扼彰淡之要聨絡數百里聲援然後臺北上下血脈相通似應請㫖特設叅將一營兵一千同駐其地碁置村落招民開墾計竹塹埔至鳳山﨑寛平百餘里可闢千頃良田向以無民棄置致野番出沒為行人患若安設官兵則民不待招而自聚土不待勸而自闢歳多産榖十餘萬為内地民食之資而野番不能為害矣二處添設之兵皆當另募然後内地防汛不至空虚宜一面奏聞一面募用先得新兵一千五百名協剿番逆廓清更易古人搏䑕亦用全力不肯以其小而忽之部覆准行之後即以分防兩營照在臺各營例年滿内地撥換或將竹塹一營屯田俾立室家作土著與各營班兵為主客相維之勢尤防範之最宻者也方今西陲用兵宵旰厪念東方海外㣲茫疥癬以大舉速滅為要不可欲圖省事反致蔓延大人妙算神威必有出人意外非廢員所能窺測但感佩盛情不覺自忘其固陋欲妄抒千慮一得之愚惟大人諒其心而恕其罪則幸甚復蔡宗伯書去歳吳川蔡逰戎潮陽趙明經先後賫到琅函慇慇慰藉風塵勞攘久未札復未審閣下近來起居何似數百載正學之傳十餘年師傅之席道明徳立自足千古他浮雲不足道也某迂拙書生未知居官之道輕革陋規一切公務捐輸皆稱貸之親朋以致上官罅漏不能代為彌補又妄意公忠為國弗思投䑕忌器禍及身家亦固其所若非潮民情重米肉薪蔬供給兩載則已不免溝中之瘠况又平空飛贓壓使沉淵若非士庶齊聲樂輸投匭上官同僚傾囊集腋則亦難為負山之䖟邀天之幸得以了此此實鄙人夢想所不到者然自以不能見幾逺害致累人憐日扃柴扉不欲與時酬應冬間閒逰至省逺近聞風咸來識面二千里外名姓未聞亦有相思廹切遙致慇懃之意分俸饋遺必先以正人道逹誠懇聲明其金來歴出自國家飬廉非從暮夜所得亦非因仍陋規敲撲而致是謂必伯夷之粟乃可以食陳仲相待固甚不薄也今春以部檄既下復至羊城請咨回籍甫登江岸已有良朋預設館餐門前車馬大不冷落念非罪廢所宜恐招時忌將往香山以避之紛纒五六日不得出門已為中丞聞知懃懃款款召致幕下因思虚名為取禍之根曩歳居官受禄廉能是其分内名譽太盛遂罹凶災况今虎口殘生流離顛沛之餘所至傾動逹官奔走士庶無因而受人財物若以其身為溝壑又加以不肯輕受之美名若以其納卻為褒譏羞慚惶懼將來禍患不知何所底止乗茲幕府深沈可以一人不見遁跡藏名他日宻行言歸亦善全之一道也是以深領中丞公之誠不復辭讓二月望後來茲晨夕讀書不廢并長兒雲錦亦呼以來新舊文集俱付梨棗知已之感何日忘之暮春月杪制府郝公有移督閩疆之命過聽羣言欲為後車之載再拜固辭郝公真誠懇切聘以千金請至八次極道前年審案乃因初到未諳為藩臬二司所悞曾察其誣作札傅撫軍商謀昭雪撫軍受人掣肘復札見在鄙人不勝惶恐感佩隆情但閩省父母之邦嫌疑所在不得不辭邇日静坐清齋催促剞匠期於六月竣編七月杖策言旋將為深山老農圃從事宋史之役矣出處聽之當途是非俟之百世雖不敢矯語髙蹈負為國為民之素心亦豈能仰首鳴號邀嘑蹴嗟來之遇合樂天安命不存一願外之見而已山林草野隨在可報君恩率一鄉之人而尊君親上奉公守法則報在一鄉使百十世後之人皆知孝弟忠信隂消其犯上作亂之芽蘖則報在百十世夫安所往而不可哉棉陽學凖公案偶紀二書遵命寄請台敎鹿洲初集未成亦附八巻奉閲所不以就正他賢非慢也以其類於自炫乞哀恐貽𤓰李之口實故不敢也難後著述皆為石室藏深之謀無心與前逹巨公相質証濃圏宻㸃槩不删除望閣下代為藏拙焉復顧太史書趙子自京師來某已出門數日矣歳臘旋潮始接翰敎兼讀佳章自愧不才蠖屈天末執事髙居廟廊奚啻雲泥之隔七千里外垂注慇懃風何古也既又聞執事忠愛熱腸近今罕覯深為國家以手加額丈夫遭時遇主不竭忠貞以圖報豈有人心者所為而世俗迂之反謂僭妄不必此某今日所不能忘情於執事也黼扆求賢若渴原欲擔當世道非僅全軀保妻子之臣安有乗人之車食人之禄尚視公家休戚若秦越瘠肥之理哉不才寒賤幸荷聖明特起畎畆知遇恩深雖木石亦思圖報而謂能恝然乎一圖報國禍及身家蔬水蘗冰之操持幾與九江戴子同作千秋之贓吏痛心疾首此恨何極雖五嶺以南童孺亦知見諒而京師萬里僅傳封章衆口鑠金誰信此中尚有寃抑是以每有感觸不覺叨叨難窮既又静思已過報國之心太切未知事上之方亦有許多不是自招其禍者磨鍊挫折之後始知涉世多艱而愚戅之不可為執事不厭煩凟請端坐而聽之不才蒞官之日核計潮邑陋規有漁船換照一千八九百兩保正鄉約給照一千六七百兩概為革除在當時口碑載道幟碣髙標自以為得之矣不知禍根已肇於此一則地方公事難為無米之炊一則縣令冰清誰甘饕餮之目大不是者一也惠潮觀察樓公買運西榖一萬四千餘石積貯潮陽運官船户沿途盜賣復買粃榖攙和應為賠補三千餘石此亦屬僚事上交際芹曝之常悞逞聰明擿出侵盜賍証置盜賣船户于獄請追不思投䑕忌器大不是者二也樓公相待有禮已召運官范仕化當前切責又和顔勸釋監追諸人止令虚出倉收流交後來新令即使新令不受自有樓公制壓無端援引上諭聲聲朝廷倉榖不敢以有名無實自蹈欺誑縣令知有朝廷觀察寜獨不知大不是者三也縣令有法上司有權通詳監追究竟何濟迨碾發五營餉米弗能尅少兵糧則代賠一千二百石解組交代署令弗接則潮陽海門逹濠三營兵丁憫某受累願于月餉三七搭支一年配訖尚有水泡爛榖碾米成灰署令陳君與某分賠八百石陳君再交新令閔君弗接陳閔二君又分賠四百石是某前日不賠至此亦賠一千六百石無故而累陳閔二君分賠八百石又累三營兵丁搭支虚數八百石何如慷慨獨賠之為愈既可結上司歡心且免窮兵受不飽之累大不是者四也被叅之後當悔罪投降托人排解奈何忿忿不服遣家人赴京告愬非惟無益且反觸怒撫藩必欲置之死地而樓公既晉臬司事權在已兼倚多助可以造無為有盡翻府縣審案會鞫堂上厲聲切責京愬之非亦有明明直告要罰認贓者云汝自不承我曹止管寫上汝到制臺反供若駁下來則以三木斃汝矣迨督審全誣郝公因此不行駁訊作書撫軍商謀昭雪諸公把持不可是某一舉之干衆怒雖制府燭寃亦不能救大不是者五也在官欲擅清名人必加之惡名到任即革陋規反為去任罪案向使陋規不革則罪案無自而生乃自革除之後諸事襟肘戰船砲臺營房西榖脚費以及上司新春執事鋪設修理衙署種種捐輸不得不借支平耗答辦比及交代將成虧空不得不告貸親朋支吾還項積逋一千五百餘金將來作何清償而且離任以後嗷嗷懸釜受士民供給者兩載兼之樓公飛贓一千六百餘金若非潮普士庶倡義樂輸上官同寮傾囊集腋則削骨不能完百分之一早已投荒去矣博一日之清名累民累官累及親友大不是者六也諸累皆屬尋常不過目前之害惟漁船一定換照必令漁民增課以實之而潮陽一縣歳增一千五百餘兩矣又累及鄰邑惠來歳增五百餘兩海豐歸善共增四五千兩在歸善原有換照乃奉藩司批行公用欲加之罪不得不重累漁家某在潮陽一照不換已經承審府縣召集數百船户驗照訊供並無在某任内換給一紙此等案情如何累及船户且海豐惠來有換照耶何以不行叅追無換照耶何以亦令增課通省漁船不增何以獨增二邑公耶忠耶二者何居焉是某革除陋規之一失致為上司盛徳之大累大不是者七也昔人行年五十而知四十九之非某今者亦有類于是人謂樓公害我某獨謂樓公成我何則樓公於我有活命之恩有敎誨之益助我多矣潮陽當饑歉之後五營軍士乏糧半載民間逋賦甲於粤東盜賊遍野水陸道梗日收民詞一千七八百紙黎明視事漏下未遑晨餐則終日不食也秉筆連宵雞六鳴而後就寢則終夜不寐也如是者十四越月無一日一時之間斷心血耗枯倘再半年不去則勞死矣因茲患難乃得全生此樓公之賜也當時欲靖地方治賊過嚴則有之將加以酷亦不敢辭若以一塵不染之愚清而欲汚之以贓已為衆人所弗信乃樓公即舉最不信者以加之所叅六款一為漁船換照以一照不換涖任即革之陋規被叅于一年兩月之後不知其誣者誰乎一為勒詐鹽規潮商歳例二百八十兩某原無意裁革因每歳八月為期預收次年規例某以十月蒞任已為前令魏君收去六年秋冬公出新例未及催收並非矯情不受當時縣令未給養亷應留此項辦公至雍正七年院司增民火耗每兩一錢七分各縣始有養廉上憲愛惜鹽商歳為節省二百八十兩何以不惜邑民歳增耗外之耗二千兩竊所未解即為前官受過亦可不辭然而張冠李戴不知其誣者誰乎一為勒詐銀匠二百八十兩各縣解糧到司每銀一千藩司庫官二兩庫吏二兩貼平二兩門役執事水火轎傘夫二兩潮陽係銀匠自行料理縣官不得而知此項是否貪贓當問藩司官吏及經手餽送之人而亦借此以為縣令之罪案不知其誣者誰乎三款命案詐賍審皆全誣又額外造出劉公喜三十金罸使招承劉公喜乃因貧無食妻嫁三兩女賣二百銅錢之案豈是有三十金可以無故行賄之人不知其誣者誰乎諸誣皆顯然易見不待一語辯白而樓公將審之日先集款証内堂敎供庭鞫之時証人皆已忘記嚴刑疊夾不能造無為有畫招定案之次日又宻致款証許錫萬于内室刑威酒殽誘廹兩日勸飲盡醉㸃頭報効樓公安心結撰同事大喜其能及制府堂上問及贓數誰供則向之貪酒㸃頭者亦稱無有郝公再三嘆惜但以同寅協恭不便為一縣令而傷撫藩臬三人亦無如何是以全潮士民通省守令皆不以某為不肖聞風渴想欲識一面分俸饋遺必聲明其金來歴惟恐不受此皆樓公一片苦心不惜自汚其身以成某之名乃能至此觀其羅織罪案時揭陽令陳君㣲言樓公笑曰藍某居官何嘗不好但不宜待我太無禮我怕他殺我由其言思之則某平日性情舉動必有甚可憎嫉者此樓公之敎我深也少孤學陋長為飢驅望先哲之門牆而却步所最皇然抱愧者一行作吏學殖日落使安常處順終老簿書錢榖中後雖悔之其何及乎解組之日一夜酣睡明朝即理故業寒忩土室讀書撰述于今三年所著棉陽學準五巻公案偶紀二巻鹿洲初集二十巻雖未必可藏之名山庶幾聊存髙叟洞内俟百十年後之覆瓿倘後此學問稍進則樓公之助我大矣自笑從前凡事迫狹居官以廉為絶頂全不知人情世故獲戾親友豈可勝言不知原思辭粟聖人尚有鄰里鄉黨之諭范文正公亦以不恤宗族無顔入家廟為戒既已厠身仕籍不能營半畆祭田且併住屋而寄之其於祖宗已不可言宗族親戚無不怨望宦逰過客待若春冰使親朋亦皆如此則一千五百兩之債向誰稱貸使官塲盡皆如此則數年奔走安所得食一千六七百兩之贓作何清完此等之類剌謬甚多倘一官不得下塲則狹隘到底不悟將胥天下而為食壤飲泉之蚯蚓怨詈遍于家鄉望門無投宿之處非樓公教誨寜有瘳乎鄙人不徳累及上官橫示教戒以玉于成孟子所謂生於憂患增益其所不能者流離顛沛之中無非君子進徳修業之地寜敢稍有怨尤哉從茲入憩山阿躬耕自樂存吾素位而行不願乎外之心服膺夫子隱居求志用行舍藏之學茂樹清泉亦可以不孤矣執事遭際方隆將大行所學以擔當世道為已責上不負吾君下不負吾民則鄙人在髙叟洞中所聞而抵掌大快者也勉之再復蔡宗伯書六月望日連接閣下手書如薰道徳不勝厚幸繼聞賢夫人仙逰挈子女二幼與偕為嗟悼者久之中年喪偶昔人所悲況有賢徳又嘗同貧賤前後兩月牽連二幼宜閣下之難為情也時運當阨末如之何君子達觀不追既往安知非造物眷徳擇其輕者以相畀而凶咎之來反為後福之地乎凡事作退一步想便覺海濶天空於心無所凝滯閣下識見高明固無俟淺人饒舌耳不肖曩年飛禍在人刀俎之中羣虎齊虓欲殺欲割彼時豈敢復望生全亦惟修身俟命以靜安之學處之圜扉土室危急存亡之秋視為大塊假我進徳修業之地遂覺增益不能無入而不自得假使怨天尤人悲傷哭泣其不死者寡矣今雖云事久論定公道具在人心然事不伸於廟廊之上而論私定於草野之間眈眈不遂安知弗反為禍之伏是以戒謹恐懼暫依制府幕中遁跡藏名急急圖入山之計閣下摯情闗切不忍其終老蓬蒿加以少保鄂公尚望白駒之賁賢相吐握千載難逢理宜遵命束裝急圖報國但某中夜以思形迹有所不便奉㫖得歸當安農畆不應潛入京師有違禁例况人言可畏將加以鑽刺之名萬一賢相汲引同升諸公則其鑽刺二字一生無以自白如其依然故我仍歸林臯進退兩無所據又將加以鑽刺不入徒勞往返僕僕之誚此揆之已而有不可也少保公忠為國汲汲薦賢此今日景星慶雲為國家隆平之瑞然不可授人以求則得之之名不肖既蒙知已豈可躬自求之以為知已疵累君子愛人以徳亦有所不可也不肖草茅下士受聖主非常之恩未能有毫髪圖報夢魂耿耿寜忍須叟忘之乃至忌者指為螙國無故而墮之於淵豈不欲攀閶闔而望見天日但遇合有數非人力所可强為仰首鳴號冀有力者哀其窮而轉之清波又似非君子之道是以寧入深山聽天由命躬耕食力以待遭逢用之則為國馳驅不辭勞瘁舍之則讀書著述終老不見知而不悔後世尚論者曰其不用也天下惜之則光榮已多諸凡可以藏拙矣閣下以武鄉為擬以緼袍不恥為髙某不肖何敢妄希古人但武鄉澹泊明志寜静致逺可為百世之師某平日所服膺者莅官以來未嘗製一衣一絲自奉妻妾竹釵布裙未嘗以一分金銀為簪珥被帳百補百爛至今未嘗更易幼小諸兒俱皆衣不蔽體安所得緼袍而衣之然捉衿見肘聲出金石實不知世人文繡之為榮雖日逰餓鄉入室陶陶未聞交讁所謂澹泊寜静家人婦子皆能之庶幾於先哲無愧然不忮不求之詩子路終身誦之夫子曰是道也何足以臧可知學問無窮又當勉其未逮者不肖將及時努力以無忘良友之期望惟閣下勿吝敎誨焉鹿洲初集巻三
