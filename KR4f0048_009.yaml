body:
  text: 鹿洲初集卷九廣州府知府藍鼎元撰傳郭賢婦傳媳莊氏附郭氏字真順潮陽周伯玉妻也伯玉名瑶以字行少負志節好讀書元至正中舉荗才異等不就隱居自樂與郭氏相敬如賓時稱海濱冀子郭幼聰慧父教諭授以書輒不忘通經學旁及子史百家能為詩尤長於古為人有智識善談論當世是非得失事了了胸中片言斷決雖老於謀者無以過也元末大亂盜賊蜂起從伯玉避居村寨寨衆方潛思嘯聚以聨絡守望保鄉村為名聞伯玉故長者羣推領袖將奉以主寨事伯玉許之歸以告郭氏郭曰不可寨中諸少年方驍桀自用其氣不可下勢皆不能為人下而公為禍首不亦愚乎夫矜能衒智者敗輕敵寡謀者亡不度德量力而先於衆者禍外負智勇之名內收敗亡之實公何為一至於此伯玉曰吾已許之矣奈何郭曰第稱疾勿往請得為公謝之居數日衆果詣伯玉所伯玉佯卧不起以病報衆頗失所望猶以為稍瘥即視事也郭氏因斂袵再拜辭曰公等不知伯玉無能謬推重寄光榮已極雖駑劣不堪猶思矯首自奮勉慰衆望不幸福薄災生當幾疾作此天所以限伯玉也願公等熟計更立賢者無為伯玉猶豫致失事機衆然其言遂引去别求主立之未幾以意見不協殺所立者自相雄長寨中大亂為鄰賊所陷伯玉幸不罹於難人咸服郭氏先見云初寨中多農賈儔相尚積粟郭獨勸伯玉分散之無餘藏日暮索綯人莫喻其意至是賊入盡燔所積聚伯玉引繩繫妻子併自縛如被掠者賊不以為意也乘間得脫至溪頭寨居焉明太祖定天下命指揮俞良輔帥衆南征時寨人尚未歸附俞以兵至將勦之郭氏乃作頌俞將軍引一篇遮道上之其辭曰將軍開國之武臣早攀鳯翼附龍鱗煙雲慘淡蔽九野半夜捧出扶桑輪前年領兵下南粵眼底羣雄盡流血馬蹄帶得淮河氷灑向江南作晴雪潮陽僻在南海瀕十載不斷干戈塵客星移處萬里外天子亦念遐方民將軍高名邁前古五千健兒猛如虎輕裘緩帶踏地來不減襄陽晉羊祜此時特奉聖主恩金印斗大龜龍紋大開藩衛制方面期以忠義酬明君宣威布德民大恱把菜一粒誰敢奪黃犢春耕萬隴雲氂尨夜卧千秋月去歲壺陽戍卒時下車愛民如愛兒壺山蒼蒼壺水碧父老至今歌詠之欲為將軍紀勳績天家自有麒麟筆願續壺民歌太平磨崖勒盡韓山石良輔得其詩大喜郭因力言寨人無反狀良輔曰此賢女所居其民必馴麾兵去溪頭寨得免誅夷郭氏修辭之力也洪武中舉伯玉賢良方正徴書至郭氏又止之於是伯玉辭不就以山林終有子三碏礪礦皆以儒術顯祿於朝少子彥器即礦也以字行舉名儒第一歷官河南布政司參議終朝列大夫郭氏百二十餘歲時伯玉與礦俱先卒里人高其行崇祀鄉賢而郭以年老一省母家作歸寧自敘其辭曰天甲年來度二周暮桑榆景雪盈頭五經立業儒家雅三子成名壯志售橋梓有光聨爼豆柏舟無憾泛橫流階前蘭玉森森秀斑綵扶來到首丘又數載卒年一百二十五歲長子碏字彥敬為棲霞縣令其妻莊氏亦讀書知大義居常以禮自間元末盜起鄉民多依山谷間賊至挈妻孥入巖穴避之一穴多至百十人男女無别莊氏獨不入彥敬促之莊氏曰男女授受不親行則異途居不雜坐禮也今以亂離之故混處巖穴之中雜然無辨廢禮甚矣妾不敢也彥敬曰然其如賊至且虜何莊正色曰無禮而生不如死即不幸見掠君謂妾不能死耶請先試之引刀自刎而死後三日賊大舉破其鄉無保全者君子謂莊氏賢而且智云彥敬感其義終身不娶論曰郭真順閨中豪傑也其賢智則合陳嬰母辛憲英為一人文學禮法曹大家之流亞也其志行清高則老萊陳定王霸之妻差堪上下其享大年一百二十五歲則古今未聞有此不得不推貞壽獨絶矣二子皆賢流芳奕世得天之厚至於此乎婦莊氏有賢德以禮自間殺身明信在當日良人與偕即入穴不畏無别遽爾捐軀以為賢智之過由三日後觀之則後先均屬一死莊氏之智為不可及矣是姑是婦可為禮宗誰謂巾幗場中遂無蓋世豪傑哉洪烈婦傳烈婦洪氏漳浦杜潯農民薛燕妻也父洪仁母吳氏禱北帝廟神而生氏氏生顔色有光因名艷娘性警敏寡言笑數歲習女紅工絶年十八歸燕燕故族微又以大父父避亂江西往來遷播家産零落饘粥或時不充洪氏處之宴如也姑早故事翁以孝聞及居翁喪哀毁如禮營墳奠祭必與燕偕遇家中妯娌大小和睦無間言二十八歲不宜子抱養又不育朝夕慘然勸燕置側室曰但得有宜子者吾以身下之燕以貧辭而薛門祚衰替燕兄弟相繼淪亡燕亦染血症臥牀褥洪日夜扶持湯藥不離側燕不食則與俱不食及病篤絶粒亦如之舉家惶懼勸之餐進粥數口而止蓋度燕疾必不起有殉亡之志矣先是洪事母孝母吳最鍾愛之家既相近時來往饋遺每見母及門欣然竟日至是聞壻病劇來視女與處六十日洪獨不喜辭令去母微叩之答曰生為薛人死薛鬼耳吾上無舅姑下無嗣續從夫而死義也母為好言勸慰之則曰我死正也母母戀我母一日携菜乾來遺洪棄諸地曰我與壻食不盡矣姒吳氏在旁私謂曰嬸素孝何遽如此垂淚答曰母極鍾愛我曩者嘗云女若死則我與俱我果死母必哀痛成疾是重我不孝也今故拂逆令異時不我戀也母終不忍去因勸立嗣姒吳氏有男三願以手抱者為繼洪懇之曰幸次者與我稍長易成立也燕疾篤湯藥多不能盡輒自飲之母遽阻曰藥豈可苟飲曰生死與共藥何有焉且夫所食也不可棄地一日呼小姑綾曰汝喚嫂來為我計世間曾有大棺可兩人同殮者否嫂曰我與汝繼汝當撫兒子成立安得死則陽笑曰謝姒繼我我戲耳焉有許大棺可舁出門者乎時掌生蛇頭瘡腫及於臂日夜抱持其夫略不覺痛楚逮燕疾已革難久留反陽言夫症漸回且瘳因強食言笑以慰家人日紿母令去母憂亦稍釋乘間謂母曰母離家久宜往視明晨北帝誕祭訖再視余是晚母去洪氏盥櫛沐浴家人未喻也夜二鼓燕氣絶洪獨抱坐牀哭聲起家人奔救移時復蘇比雞唱衆皆倦因放令穩臥辭家人回息獨小姑綾侍留不去紿之曰汝兄睡矣我亦將息片時無留此綾出少頃燕沒洪氏為燕揭寢帳端蓋衾自著新履緊束內衣服嫁時裳服取繒帛交頸懸牀楣端坐而死天欲明綾叩問無聲擠户入見嫂頭頸低向殘燈未滅呼之不語方知與兄俱逝時康熙壬辰莫春三日也夫婦年俱三十歲鄉人哀之浦紳士言於汪令君以其事上聞請旌焉論曰杜潯薛氏世未有通顯者至明孝子薛大義垂邑志族始有聞燕故農家祖父四世同爨代有令德又得洪氏為之婦亦足榮矣洪少不習詩書乃能勇於取義如此孟夫子所謂性善不其然乎人苟能自樹立巾幗猶堪不朽為丈夫者鑒諸賴烈婦傳賴烈婦名媧娘平和士人張習妻鄉飲賓賴天向女幼端莊不苟言笑年二八歸習夫婦歡相得也事舅姑極誠敬居處肅嚴動有禮法己亥秋習病服事惟勤多竟夜不就寢庚子夏四月習卒賴氏哭且號曰我事君曾未幾日胡遽舍我去耶屏水漿絶粒朝夕哀奠家人慮其有引決意頗防之時以習父母在堂靈座置內室賴嫌几案狹小涕泣請舅姑大之從焉檢習所讀書整齊卷帙供座右一日抱二歲女至姑前情詞悽惋若寄託狀亟請為夫立嗣五月之四日嗣定設祭畢拜謝舅姑遂怡然加餐飯姑與之桃劈其半嘗之以美者奉姑家人謂其哀稍節也不知賴已先期令婢子向鄰人假剃髮寸刃為自裁計矣和顔入內引凳坐靈座旁從容自刎將刀置几上姑聞房闥內有哽咽聲亟趨視死矣血淋漓注衣端坐不仆時年方十有九也姑為理髮盥洗則見刃䀶已聨合無間止一線微紅翼日殯殮顔色如生邑人士竒之以告於大尹談君請旌奬以勵風俗論曰賴氏不待終喪急於死者也然不死絶粒屏水漿之日而死怡然加餐飯之時殆明於死易立孤難者耶宗祀有傳從容就義不造次矣若夫端坐不仆刀䀶自合則正氣精誠團結鬼神隂呵護之非人力矯強所能然也乾坤柱礎得之蛾睂嗚呼偉哉林烈女傳林烈女名菶娘漳浦烏石人也幼頴異從女師李氏授曹大家女誡通達大義稍長好筆墨晨夜不輟其父呵之曰汝欲作女博士耶婦人勤織紝宜酒食足矣於是學女紅亦軼儕輩性孝順無疾言戾色足不踰閾羣從兄弟有終歲未嘗覿面者蓋其貞靜然也年及笄許配雲霄人吳鶴鶴為邑學生珩三子二昆相繼夭沒未幾鶴又病女聞以為憂多托故不食夜則焚香禱於天乞減已齡益之庚寅某月日鶴竟死女聞訃哀慟請命父母乞奔喪父以女未見舅姑行婦禮且烏石去雲霄百里餘弗許因悲甚中夜自經母呼家人破户救之良久乃蘇自是寬慰百端許以不再適人而女亦若有所待者布衣蔬食屏黜鉛華凡親族婦女喜慶宴遊諸務概不與聞矣在父母前或勉強笑語每當風朝雨夜嘗以吳事為憂流涕哽咽枕畔淚䀶至透牀褥不敢令父母知也其意在吳家立嗣歸而撫之而吳之二昆既沒繼母所出者尚幼久之寂然女度吳家終無立嗣意乃決計完貞與女伴訣曰吾命薄不如人而諸姊遇我厚不忍遽别吾今無他望矣吳嗣不立吾其死也衆駭愕未信女曰若苐視之室中有井吾畢命之區焉女伴多方勸解不可回因相對欷歔澘然淚下一日母語其父以女終身事為謀父應之曰吾已召媒妁有成議女默然歸房中衣吳家納幣裳服投井以死時辛卯仲冬十有八日也年二十歲出其尸笑容可掬衣帶中有尸歸吳三字乃聞於吳合葬焉邑大尹汪公白其事於上憲褒之論曰余觀林女奔喪不得立嗣不能其志誠可悲也彼與吳鶴初未謀面乃能引決自完可不謂知大義者乎心同皎日骨泠寒泉雖其德性固良亦得力於班氏女誡者世俗動言教女不令識字何其謬哉貞節汪太君傳汪太君八旗名媛也年及笄歸覺羅為宮詹某公繼室撫丈夫子三慈愛篤至持家有禮法戚族欽閫範焉覺羅天潢懿親宮詹弱冠授職纍遷詹事府少詹事以剛獲戾遭籍産蕩析流離至無立錐地汪左右支撑佐宮詹敦睦宗黨晏然若素歲丁卯宮詹卒汪矢志殉亡哀毁絶飲食已復念死易立孤難恐藐諸無所倚賴有負亡人臨終丁寧之托因強起襄葬事含痛撫孤時年二十有二也家既中落茹荼集蓼甚艱辛惟望三子學業有成勉強延名師截所居斗室之半為家孰鬻衣飾市經書楮墨饔飱修脯傋極誠敬已而貧益甚漸不能支命負笈就外傅又不能乃躬自課督風雨篝燈聲淚俱下其後并無賃屋資棲身靡所因賃地結篷編籬為屋以居或晨炊不繼朝夕教諸孤感動奮發讀書立志無替祖父家聲諸子偶息學嬉遊則號泣搶地痛刻責如不欲生皆哀懼長跪請改然後已由是大加愧勵癸酉秋闈伯子逢泰季滿保同舉於鄉甲戍庚辰先後成進士官翰林丙子仲子元旦亦舉於鄉三孤皆成名辛卯冬滿保授福建巡撫乙未總制浙閩汪就養官舍凡地方大事民生休戚惓惓詢問或拯溺救焚減餐分食冬則命僕婦製綿衣數百給繫獄者戊戌逢泰督學西秦汪逺賜手書訓以公明二字克遵母教赫然聲名庚子秋朝命博訪八旗貞節以汪氏青年守志懿行可嘉更從艱苦勞悴中閲厯年歲者甚久不可泯沒特加旌表海內榮之辛丑夏疾作聞報臺灣土賊朱一貴倡亂急命滿保星馳厦門調水陸諸師征剿復時時寄語勉以竭力王事且常作手札示老人康強無為湯藥分心六月捷書至喜動顔色焚香告家廟謝神庥謂人曰臺灣平地方寧社稷無疆之慶兒能了此吾無憾矣閏六月十三日卒享年五十有六論曰乾坤不敝賴有為之柱礎者匪獨丈夫然節婦亦其一也顧立節各别烈易而貞難守貞者富易而貧難若汪太君生長富貴猝處窮約則其難為更甚矣鐵骨凌霜丹心貫石雖有偉然大丈夫未足方兹梗概也重陰雨雪而後復見麗日和風景星卿雲之美又三子皆成名能建非常之事業造物者亦以其難報之矣當寧褒旌流芳百世人顧可不立節哉薛節婦傳節婦薛氏河南懷慶府修武縣民薛道生女也年七歲許配邑人傅文鳯文鳯能讀書遊泮水康熙辛卯薛年十九歲議以臘月二十六日于歸將及期文鳯病篤父母舅姑咸議且遲之薛勵志已定詢其母曰病何如母曰危甚恐不起故欲改吉期也曰期改而病可痊改可也改而不痊置我何地父母哀其志如期遣之入門趨視疾文鳯家素貧卧病土榻已大劇手足不能動移湯藥須灌乃入口薛晝衣侍側終不寐舅姑諭令少息垂淚對曰夫一息尚存婦尚為有夫病勢如此欲長在榻前能乎如是者十有四日而文鳯卒矢志殉之舅姑哭曰兒死次子幼風燭何所依幸留養我二人婦曰諾頃之所親或勸他適得聘金以為養正色曰是玷傅門辱舅姑也躬紡績織紝粗糲自安市甘旨以奉又三年舅沒拮據衾斂哀毁盡禮夫弟年稍長為納婦每以儉勤孝養訓誨之居數月見叔與娣可以事姑也慨然曰吾無身後憂可從夫地下矣遂絶食八日而死臨死謂姑曰婦不能終養與不孝同姑年老無悼傷且家貧糊口維艱幸勿以新衣斂遺婦以不安也姑從之時丙巾夏四月二十有二日婦年二十有四歲論曰薛氏之志可哀也十四日湯藥夫妻五年中荼蓼子婦義盡仁至吾無間然矣世道昌隆風化盛美貞孝節烈所在多著未有如薛氏者見之定守之固出之以從容成之以果決雖聖賢處此不過如是誰敢以巾幗目之朱貞女傳朱貞女江西人高安朱氏女建昌李家駒未婚妻也幼絶異不喜華綵服或衣之輒啼脫去乃已束其髮以綘絲亦捫起擲地比長好讀書通四書小學周易毛詩小戴禮歷舉傳疏悉能窮奧義旁及史漢唐宋八家姊妹篝燈唔咿弗輟諸妹喜為時文貞女獨不曰非間內事也性至孝事王父母父母咸得歡心每膳必躬進食必立侍暮必手整衾席出立户外俟卧乃去晨則立户外問安否起乃入庶母諸母胥敬愛之凡家庭事惟貞女是聽女亦善事庶母諸母調和雍睦內外無間言貞女父奉命督秦學遣家屬自京師還母陳夫人卒於道貞女扶櫬抵里治喪極哀毁嗣後每日必哭哭餘操家撫弟妹親授課業少間復哭如初喪者三年奄奄骨立見者莫不哀之所許字李氏子家駒以康熙辛卯舉鄉闈無何遽疾卒訃至家人祕弗告也貞女覺泣三日不食謀奔喪王母諭之曰若知禮者俟若父來也及父歸自秦恐傷父心承歡如平日居久之乃因王母語父請之李終喪父以常理勸慰貞女流涕哽咽志堅決不可回絶食三日乃許之將行問何服父曰於禮無之汝裁之以義勿問我遂行登舟乃喪服比至李氏舉家白衣冠號慟出迎鄰里皆雪涕貞女從容謁祖姑舅姑如禮然後適喪次慟幾絶廟見後克盡婦道奉養畢周暇則手一卷自娛脫粟飲水宴如也家遣人視之則謂曰歸語大人兒無苦也百年瞬息未亡人待盡耳母以為念久之薦紳士大夫高其行喧傳當道議表閭貞女力請舅姑峻拒之且書告父曰兒事非中道自行所志而已庸求名乎脫以名加之死矣事得寢已而素食不茹葷父曰何苦對曰偶不喜耳行且復矣其實權詞也父丁王父艱詔奪情再疏辭不獲日夜卧地哭嘔血復草疏賔朋皆諌阻貞女泣曰大人不得歸雖官柱國年上壽猶無與耳彼諌阻者非所以活我父也誠無不格當邀聖鑒既纍疏請卒得歸甲辰元日京邸鄰舍火延燒數十家勢甚烈闔室倉皇遷避貞女獨不出曰死吾分也宋共姬何人哉反閉户坐室中姑熊夫人破户入持出之火遽熄得免是夏仲父西鄉令君卒父聞訃悼傷過甚復嘔血貞女歸寧驚痛不能寢食每夕伺安否或流涕坐達旦以是嬰寒疾不令父及翁姑知及知為醫藥弗肯曰吾女子何可令醫人診視父強之固以無疾辭弟員外郎必階孝亷璂泣請貞女笑曰吾豈畏死者寧死必不於醫人腕下生也臨終謂兩弟曰死無恨矣但吾父吾舅姑勿以我死為痛則瞑目耳又曰我一生未嘗以寸金尺帛加於身死母負我遂卒時雍正甲辰冬十月六日也年三十有四歲論曰朱貞女壼內完人也少惡紛華知奉養德性固已殊矣凛凛節義從容乎以禮出之則亦由於學哉貞女為今相國高安朱公長女少司空建昌李公子婦余恐以貴盛掩其賢故於傳中不敘父翁之名位非闕也盧烈姬傳盧氏潮州鎮總兵薛受益妾也先是受益仕閩為建寧副將清明日出遊於郊遇婦女結羣祭掃先墓有女郎衣黑衣跨驢巾帨裙履皆如墨飄飄不類人間媛也受益以為異縱馬觀之風來帨起竒麗非常詢從者知為府小吏之女年及笄未許人受益屬郡守求為二室強委禽焉入門受益遷潮帥盧隨任之潮旦夕事主君甚謹動止皆有禮法受益及嫡妻屠氏皆愛之受益多內寵好交遊客多拜受益為義父者於是諸姬皆有義男年節帨辰稱觴上壽甚噪盧獨拒不納曰焉有二十歲之母得三四十歲兒乎時仲坑山開銀礦鎮轅月有陋規每至盈千百諸姬攘臂競攫之受益以為笑盧凝立不動即與之亦不受曰無所用此居久之受益以疾卒諸姬慟甚盧從容如禮舉哀數聲而已見嫡氏哀毁反勸慰謂死者不可復生夫人幸為兒曹強自愛勿過悲傷恐生疾妾當從地下侍巾櫛耳諸姬掩口揶揄之越翼日盧櫛縰笄總衣紳綦屨內衣縫紉相連極緊密上堂向嫡再拜曰妾不才事夫人不克終今將隨先君入泉臺矣屠夫人泣曰若年少母自苦若未有子女虛負一生吾當為若善處之盧謝曰妾志決矣諸姬猶竊笑且恚曰撒嬌耳哭且不盡哀何有於死盧悉出平生所蓄積簪珥衣服朱提玩好針薾雜物遍遺室人然後及其母其父其兄皆拜辭道别衆以好言慰諭亦未敢遽信也還入室取繒帛為繯挂椸架上投而逝家人大驚喧傳潮郡守梁文煊間之遽往視曰烈哉風化所關不當置尸側室命舁出中堂視含斂拜而奠之司馬别駕海陽令丞尉各營將辨及鄉士大夫皆往拜厝其棺于受益之旁時康熙四十一年秋八月二十七日也受益山東人事母孝時稱薛孝子盧氏閩之建寧人殉節時年二十有八歲論曰婦人以立節為尊分位非所計也使盧不死不過尋常一麗姬天下豈少美人哉從容就義骨有餘香雖泰山之重褕翟之榮無以加於此矣世有身為大臣高談殉國而或呼家人飼豬或遍辭墳墓親戚終不克死者對此方知盧氏之貴也盧非土著海陽邑志逸其傳余聞之山人陳瓊特表而出之許門節婦列傳吳氏南靖﨑溪儒家女許逢桂妻也逢桂明進士冏卿公祚昌從孫世居漳浦之西郊景文里兄弟四人長逢春桂其次也三逢龍四濤餼於庠皆醇謹力學能承祖父教在舊閥中最號有家法桂年十八娶吳年十四春結褵冬舉子時泰未幾桂沒吳年十七自矢守孤親戚哀之而懼其難也吳從容鎮定喪次外罕聞哭泣聲惟孤兒飢飽寒暖飲飼衣服是節家中資産出入大小諸務悉聽翁姑及伯叔處分不參一毫已意時泰既就外傅猶躬為執巾沐垢撫若嬰孩泰性孝能自立悲母之苦節也念非讀書莫可以成名報母者稍長善屬文娶婦蔡氏西林士人女與泰生同年亦純孝相得甚歡周年而有子一堂之上三代怡怡衆謂節婦功成矣亡何而泰卒年二十有一蔡晝夜號哭不欲生人勸之不止每哭輒嘔血謂姑曰母年甫三十四可撫孤孫成人兒夫婦不孝負罪相從地下耳血淚俱盡後泰一年而卒遺孤能振方三歲吳撫之衣食浣濯教誨視撫兒時加謹能振舞勺象每言及父泪涔涔事祖母奉命惟謹所親皆為歡慰吳亦竊復自慰謂此子之庶幾有成立也年十九將授室矣忽病沒吳拊膺呼天大慟曰吾年十七哭夫守子三十四哭子守孫謂孫在子與夫俱在耳今孫又亡三世拮據惟我一身我更何守哉絶而復蘇自是哭不輟時輒昏暈與語多不省夫弟濤擕其子時彰告以為嫂立繼頷之而已遂不復起以雍正癸卯夏卒年五十四行道聞者莫不隕涕欽其節而哀其遇云時彰入繼時方十齡今成立矣吳氏性娘逢桂妻族妹也年十六歸逢龍性和而能敬動止言笑事事有禮法似承理學家閨訓者逢龍沒氏年二十四遺孤時夏方五齡次時旭未及二歲自以孤幼舅姑在堂不可頃刻離凡十餘年不歸父母家雖父母強之不往也姑有疾氏籲天願以身代視湯藥卧起扶持疴癢抑搔徹晝宵衣不解帶者五閲月或夫弟從子侍間歸已室然漏下三四鼓輒起有呻吟聲即立至姑喪數日不食乃啜糜粥過時而哀漸成疾久益病見者皆知其不永也時夏長授室既彌月吳扶病喟然發嘆吾今日可歸寧父母矣亟命駕之母家比還病益甚召二子曰昔不從汝父死者為汝兄弟幼代汝父奉二老餘年耳今吾事已畢有婦可理中饋沒吾寧也汝兄弟事叔父母宜如父母愛諸兄弟宜如同胞敬守先訓勿替家聲吾與汝父含笑九原矣時惟季娣林氏齊眉多子而長姒林氏仲姒吳氏皆青年撫孤氏將與之永訣也命兒婦皆肅以來談竟日悉處家格言可為兒孫世世法又言我等妯娌同事數十載未嘗聞一間言不知後來人肯如此否灑淚握别家人旁觀無不泣下者以康熙丙申冬卒年四十二長姒林即逢春妻也逢春沒撫其四子少子時盛又夭林併撫孤孫今年近七十矣孫支蕃衍傳姑闕之以待來者鍾氏邑文學鍾重華女年二十歸時盛有賢德內外井井時盛力學有聲年二十八而夭鍾矢志柏舟撫二孤八載以哀毁成疾而沒論曰兩吳立節皆足撑持宇宙大吳之事自古鮮聞哭夫哭子哭孫五十一年之間三歷竒慘孫亡何守聞其語而不墜淚者非人也小吳純粹可為禮宗功成瞑目鹿水梁山此二氏大足增色矣蔡與鍾皆之死靡他以哀毁孀年不永合未亡人觀之何許門之多苦節也余聞大雪之後必有陽春苦節之家當有達者能無望於其後之子孫乎海陽陳烈女傳陳烈女名寶娘廣東海陽人府小吏陳子頴女也幼聰敏有弟讀書旁觀輒成誦通孝經內則以古賢女自期代母操井臼食貧作苦循循乎大家風範焉年十二許字邑人黃士振士振父開春太學生也辛巳捐館舍女聞撤簪珥疏衣粥食越期未嘗一華飾里人方嘖嘖孝行以為賢且知禮未幾而士振訃至矣時在機失梭昏仆坐地拊膺慟哭少間請奔喪父母不許女嘆曰夫者天也既失所天有死無二然必親治三年之喪始盡未亡人之禮今二親既不我行死且留餘憾矣母劉氏勸慰之泣曰兒非不念父母自甘不孝顧婦人以貞信為節虧節辱親不孝尤大伯母侯氏孀守者教以在家守義可慰父母心完貞志節孝兩得女曰伯母苦節乃為孤弟在懷宗祀為重兒所處不同各行其是而已遂絶飲食三日水漿不入口出笥中手迹少時珍玩雜物悉焚之書籍筆墨付諸弟勉以讀書泣數行下父母防之密不得死佯改容機聲軋軋若無事者舅氏劉亮夫至多方寬喻慨然許諾父母以為信防稍疏治觴欵舅忽而雷雨大作家人晒衣服者急走收之則見女已自經瓜架間疾呼不應急解下死矣雖甚雨而衣裾無沾翼日形神不改於篋內得遺詩一首有奔喪違妾願迅步逐郎蹤之句時康熙壬午六月草有二日也年十八署海陽令安定枚潮守梁文煊白其事上憲以格于例未題旌檄遣致祭給匾褒之夫家迎其喪合葬于百丈埔之原論曰陳女幼知書通孝經內則以古賢女自期立志固已不薄矣泮氷未逮鵠偶分飛使其長侍膝下未嘗不可扶植綱常增鳯城山川之重然曠日遲久事更艱難不如一時烈烈舍生取義之為快也人生百年總有一死患不得其所耳陳女雖死猶賢於生嗚呼可謂明哲也已潮陽陳烈女傳陳烈女名菊娘廣東潮陽人農民陳錫謙女也幼端重不妄笑語孜孜以紡績為事鄉間俗朴無紛華惟春社蠟臘梨園歌舞婦女羣趨視為遊樂女終日靜坐不出房闥固強之亦弗赴衆謂陳氏女不好遊云年及笄許配鄰鄉萬阿一一故農家者流敦本尚實孝弟力穡兩家門户既相當情性亦頗相宜雖男女未逮氷父母往來固歡然周洽也俄而阿一病女聞之憂形於色少飲食及病篤益憂甚竟日無一語寢食俱廢一日晨起忽訃至其母以壻家相距不逺且平昔過從習熟倉皇走視之女沐浴更衣正襟坐牀上取素帶為繯挂牀楣間以頸投之凝然不動聲色比母歸則見其端坐弗起呼之不應頗詑異就視之死矣時康熙辛丑秋七月五日也女年十有七歲夫家求其尸合葬焉鄉人義之醵金為立嗣且共磨石表其墓藍子曰往余攝篆潮陽陳女事已越七載矣寂寂未有聞於余耳者蓋當時頻年荒歉後軍士方脫巾而呼雈苻遍野獄訟充斥未暇一為求訪而邑士大夫亦弗遑以此見示事機錯過旌典未膺深可惜也庚戌秋有預修郡志之役邑孝亷陳君能夏共相晨夕始為余言之因屬君確訪事實列入郡乘併潮陽邑志亦令載筆者修補陳烈女所以得傳於世孝亷君力也余既重自愧且更為烈女幸焉鄭烈婦傳烈婦鄭氏廣東澄海縣儒家女海陽縣民梁至良妻也至良繼母所出有前母兄曰梁某為諸生繼母亦鄭姓孀守撫孤視前子如已子生與至良兄弟怡怡如也婦年十八歸良良性孝友任勞勩藝圃力田以衣食其兄使專儒業婦事姑尤謹睦娣姒井臼操作浣濯掃除之役皆獨力為之姑喜良夫婦之能承歡又生得采芹列於士類儼然詩禮人家可以娛老矣雍正三年乙巳至良卒遺孤女三歲姑痛子傷心慮婦年少家貧必不留哭之慟婦矢志養姑且云有五月娠倘得男可延夫祀姑曰如窮餓何對曰婦自為之所即餓死亦甘心耳居無何而梁生有不可問之意婦堅貞自持俯首飲泣生不能容迫改醮婦不可生故促之雪涕哀求請俟腹中兒誕育生不得已暫聽既産男不數月復迫益力以為必將纍已婦曰我自求食一絲一粒不以相纍也家有田八畝生悉據之婦分得圃畝許襁子牽女荷鋤種溉於羣從娣姒間為針黹為磨舂易籥米以奉姑養子而自食粳粃時潮中歲歉米斗至數百錢丙午丁未洊飢流亡載道婦拮據幸延殘喘姑及子女皆無恙人咸重焉生憾其無去志百計窘之值族女與生之女鬬族女走依婦生女逐而行凶婦阻之遂訴於父母皆鬨擒婦出撻婦曰我知罪矣無以寡弟婦軀體辱尊拳也生猶不肯已擢婦鬢毛用猛力連拔之婦既歸房中念所親毒虐無已勢不可以復留澘然默坐夜出平日所績麻及敝衣裳投之火恐火光為所覺手持小釜火起即覆之又以衣裳各一付女曰此猶可蔽體若留之明晨母將去若善視幼弟早起跪姑前泣曰婦不能復事姑矣姑哽咽不能語又遍辭羣從娣姒皆欷歔歎息而别家命一原媒偕之去媒即姑鄭族子也婦行至廣濟橋仰天一慟呼其夫者三遂躍入韓江死時雍正六年戊申六月朔日也婦家無父母昆弟生囑原媒以失水欺鄭族而泯其迹焉雍正九年辛亥海陽尹張君修邑志憐婦節烈為次其事於遭賊完貞與諸難婦合傳曰雖非遇盜也情與相類傷哉論曰余讀海陽縣志至鄭烈婦事不禁三太息也其旨逺其詞嚴蓋尚有春秋書法焉婦女守貞綱常底柱奈何強使易志全無惻隱之心天地間有此毛角人乎余悲鄭氏之志哀其遇欲詳其事迹博問諸正人君子久且確而後論定秉彛好德人心同然貞魂能終寂寂哉將直書生名則生不可以立於人世余職在彰善不在疸惡姑為諱之即鄭也亦志為夫立節耳之貞之烈皆足為綱常底柱且烈較烜赫則逼之乃所以成之何必復留遺恨於毛角之親含笑九泉可也陳烈婦傳烈婦陳氏名貞娘海豐縣民陳英芝女同邑黃允卿妻也年十九于歸甫一載而允卿卒氏號天慟哭絶而復蘇者數次決意殉之有遺腹娠數月矣舅姑勸之延夫祀婦矍然輟泣曰諾及月辰産得男家以為慰婦抱男拜舅姑哭而納諸姑懷中曰婦不孝不能事母反以藐孤纍老人婦死有餘辜也即絶粒不食所親皆泣涕多方勸解婦且哭且拜曰夫已死義不能獨生所不早從地下者以身有數月之娠耳兹幸得男吾願畢矣絶食七日而死時年二十歲與夫合葬于大安之原論曰陳氏之死何其急也舍生取義若恐人之奪已而過此即已無及也近世丈夫作事多遲疑能如斯之堅定果決者有幾哉海豐詩禮之邦士敦品行女尚貞烈沐浴國家化行俗美非偶然也邑有節婦許氏為黃元輔之妻年二十一而寡遺孤周歲矢志柏舟事姑盡孝教子成立今年八十有一六十載凌霜苦節亦壼內之完人乎諸節烈皆以家貧弗聞於逺今辛亥冬舊令尹天長王公臚厥事迹以言于郡守吳公吳公欣然為請旌表余是以知之王公在豐日淺適丁飢饉盜賊之秋邑人士未遑語及今去邑四年猶留心風化惓惓不忘若是則君子之所為可知矣許氏尚稱未亡人應俟後之載筆者貞烈張女傳貞烈張女名愼娘廣東海豐人諸生張有惠女也許字謝復開之三子曰錫川復開與有惠同庠兩家皆詩禮門户相當意氣相投合錫川年少能讀書衆謂東牀不偶矣年十八未于歸而錫川病沒女聞訃悲慟慨然有殉亡志哀告父母請奔喪許之蓬頭易服涕泣詣夫家執喪禮舅姑妯娌皆憐之念夫嗣未立未可死且父嬰痼疾恐以女故傷父心強啜粥朝夕哭奠久之無所言人莫能知其意也逮百日泣拜舅姑請為夫立後復開以次子之子繼之仍歸母家侍父湯藥孝養周至及期年有惠疾已愈女復泣告父母請舅姑為夫求葬地地既得女聞之欣然曰夫有後而葬有地吾事畢矣是夜投繯死時康熙五十有六年仲冬朔日也女年十有九歲兩家父母義之與鍚川合葬焉論曰巾幗為名教之干城吾於張女見之為夫立節貞也不忍傷父心孝也汲汲求為夫立後為夫擇葬地仁也夫有後而葬有地慷慨赴死烈也女沒後之十五年海豐舊令尹王公亷其事惠陽太守為請旌表余始得聞其詳嗚呼如此人者豈可以不膺旌典哉程節婦傳程節婦福建漳浦人儒童許琫妻諸生程憲淳次女也年十九歸琫克盡婦道事舅姑祖姑甚敬謹逾年琫卒婦哀毁欲以身殉姑及祖姑弗忍也苦勸之婢清勤有遺腹娠請俟其産得男可延夫祀若女也别立嗣婦曰諾已而果得男婦喜曰夫有祀矣潛製新履及衣飾送終之具人問何為答曰自備耳不孝不能終子職不以身後事纍親也夫既小祥婦經營家事從容整楚人莫知其意尋自經死時康熙六十有一年秋七月也邑人士以告于蕭令君給匾旌之論曰程氏之死不激烈不濡遲抑何其和平中節也良人有祀自足含笑九原喪至小祥雖於禮未終於殉夫則已可矣從容慷慨兼而有之巾幗偉人名教柱礎特兩家門户之光云乎哉鹿州初集卷九
