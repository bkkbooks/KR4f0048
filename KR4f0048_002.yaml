body:
  text: 鹿洲初集巻二廣州府知府藍鼎元撰書與荆璞家兄論鎮守南澚事宜書南澚為閩廣要衝賊艘上下所必經之地三四月東南風盛粤中奸民哨聚駕駛從南澚入閩縱橫洋面截刦商船由外浯嶼料羅烏紗而上出烽火流江而入於浙八九月西北風起則捲帆順溜剽掠而下由南澚入粤刦獲金錢貨物多者各回家營運卒歳謂之散斗刦少無所利者則汎舟順流避風于髙州海南等處來歳二三月土婆湧起南方不能容則仍駕駛北上由南澚入閩所以南澚一鎮為天南第一重地是閩粤兩省門户也鎮南之法以搜捕賊艘為先今承平日久將卒疲玩大帥養尊處優不肯輕身出海將弁奉命巡哨泊船近岸沈湎樗蒱以為娛樂遷延期滿揚帆回汛賊夥連䑸刦掠莫過而問或上命督責不得已稍稍出洋則大張聲勢揚斾徐行又于舟中旦暮鼓樂舉砲作威惟恐賊船不知逺避賊亦若相體諒不來衝哭自於他處行刦俄而失事之處偶屬他鎮地方則此鎮自相慶賀以為賊不敢犯吾境是則今日沿海水師之通病也吾兄前在温州威望素著搜捕賊船如探囊取物海島亡命之徒望風逺遁浙江提督吳公總制覺羅滿公僉謂兩省將才無出兄右皇上眷兄勞績一年之中超遷大鎮又使官於家鄉晝錦殊榮則所以上報國恩下酬知已增宗族鄉黨之光必有其道矣凡人困抑下位每不憚艱難險阻思建功名及功名既成身家為重無論追風逐濤出入水天茫淼之中非其所肯即求一二留心海務督責將弁亦難言之葢富貴之氣移人最深養尊處優盡改前轍固其宜也上偷安則下怠惰營伍廢弛則士卒弱將帥素尸則盜賊恣自古及今必然之理前人有言曰官怠于宦成詩曰靡不有初鮮克有終願兄無以開府滿盈常如新進之日抖擻精神勤勞哨緝一洗向來鎮弁積玩逡巡畏縮之習夫昇平小醜有何難治海洋雖寛得其要如一室耳去接賊之人賊勢自然窮蹙練兵丁選死士精器械慎機宻搜醜類而殱之治其標也平日恩威並濟必有大服軍士之心雖使赴湯蹈火亦無所避又當知弭盜之源在乎民風士習課農桑修學校以養以敎自然不為盜賊治其本也鼎元不敏敢抒管見略陳數事先民有言詢于芻蕘惟吾兄察之一哨船之接濟宜察也匪類逃躱外洋非能不食而操舟徒手而行刦由内地奸人接濟之也濟以糧米物食然後能久延濟以火藥軍器然後敢敵殺論者多歸咎漁船不知漁船所帶糧米斗石能濟幾何火藥軍器犯禁之物惟哨船可以攜之向來南澚地方皆守港哨船接濟如東隴港南洋港樟林港澄海港沙汕頭海山柘林井洲各處哨船無一不接濟者而東隴海山南洋三處為尤甚每猪十隻價近百金米十石價五六十金火藥鳥鎗藤牌軍器價皆十倍潮人謂坐港之利勝於通番此之謂也夫民船犯禁官兵可緝官船作弊孰敢攖鋒是在鎮主留心稽察無使復蹈前轍海孽之肅清思過半矣一兵丁之老弱宜換也國家糜費金錢養一兵必得一兵之用而將官䕃空糧老弱充軍數可用者幾何南澚之兵老弱參半膏粱子弟厠身行伍生事賭博逃避差徭此之不可不汰也然沿襲既久驟行裁革未免怨聲沸騰有苛刻之議鄙意老弱之兵及病船不能衝風破浪者皆另造名冊准舉餘丁自代併不必問其為真餘丁假餘丁但人材精壯武藝髙强則補之一舉不佳則再再舉不佳則三三舉而不中用則除之官自招募勇敢强力之人以補其缺勿于此中取利焉則兵皆精兵無虚冒名糧之弊而又于每月三六九期勤行操演考其技能工拙而賞罰之使兵識將意將識兵情屹然為一方雄鎮知所向之無敵也一親隨之精鋭宜選也雖有猛虎無爪牙不威雖有名將無左右不雄况殺敵重事可無心腹親軍死生不離者哉鄙意鎮兵既選練精壯又於精壯中拔其武勇超羣才能出衆者約三百人為巡哨親軍特加優䘏每出洋則與之俱又於三百人中擇其武藝尤精敢死不二心之士約五六十人為親隨待以心腹休戚相關遇有把總缺出量才拔補以鼓勵之擒獲賊船有金銀貨物按其多寡均分之凡隨行出哨之人共沾其惠切不可自私自利有臨陣盡力功在衆上者倍加優賞遇缺先補則敢死之軍勇氣無敵一遇賊船如鷹攫兔功名財利悉在此中皆將翹首跂足惟恐鎮主之不出哨也一哨船之軍器宜審也北人乘馬専以弓矢見長南人乘舟角逐于煙波浩蕩之際當其相距遼闊則弓矢無所用之及兩船既交一人能發幾矢一矢能傷幾何則莫若砲火之為功大也鄙意哨船軍器専用鳥鎗鹿銃連環子母西𤓰等砲噴天筒火罐火箭佐以單刀藤牌長鎗大鈎而其餘可一槩不用約略一船中為砲火者十之七為刀鎗者十之三賊雖有艨艟巨艦不能當官軍砲火重疊惟俛首就擒耳倘欲用箭必取諸弩而尋常之弩又不堪用必依諸葛武侯遺法作連環弩上有方筩筩分十道中藏百箭二人挽之觸機自發一發十矢隨發隨挽矢復自出每船安置十弩則瞬息間發矢千計一飯之頃萬矢連環雖有劇賊無所逃避此亦舟中之長技也一巡哨之踪跡宜宻也兵法有竒正賊勢有大小出其不意敵乃可致往者逰魂猖獗賊首三十二等百十連䑸聚泊大萊蕪小萊蕪等處明目張膽受千把總饋獻而不辭哨船之出非所畏也今所謂賊不過無賴之輩饑寒偪身三五成羣踏斗而出遇船小人弱則奪而駕之因其舵水糧食凑集匪類所奪船漸大然後敢公然行刦其為賊也有限其窺伺在商船貨貝財帛衣糧又必孤行離援乃肆其侮非立意與官兵哨船為敵者也見商船則趨見哨船則避哨船輕而浮其行速商船重而滯其行遲哨船旗幟飛揚牌刀髙掛商船無之此賊所能辨也鄙意哨船之出當如商船行徑勿張旗幟勿掛牌刀多運小石壓載以疑貨物有急可當軍器行莫連䑸但度策應所可及若斷若續遇賊船對敵然後舉大砲為號衆哨齊集堵截環攻擒賊獲船百不失一若夫粧㸃軍容張揚聲勢是呼賊船使之避耳非真心捉賊者也一馭下之恩威宜兼濟也體恤不周則軍心怨望號令不嚴則將權不振今之為帥者意在立威則巍然自尊大視士卒死生若秦越之肥瘠㣲疵細過鞭撻無常左右惴惴心悸膽裂此刻薄寡恩衆心離散不可以見敵者也其矯為大度包荒則廢弛營伍兵驕而不能戢將悍而不能制法令不行朝三暮四此又當塲木偶徒有人形而無生氣者也御兵之法莫大乎體貼人情為之設身處地饑寒疾苦痛癢相關婚姻死喪酌量周䘏上下相親如手足腹心之不可離至於法令一出泰山不移敢有犯者雖親無赦若穰苴違命而斬莊賈孔明揮淚而誅馬謖使軍士凛然知軍法之不可犯故令無不行禁無不止三軍之士懷徳畏威此服心之上計也一島嶼之蒼黎宜恤也用兵之道安民為先弭盜之源撫民為本南澚僻處海中居民鮮少兼地界兩省有司政敎之所不及則鎮主營弁實民父母也兵丁恃黨驕恣未免欺制小民民愬鎮主而不伸則無能伸之地攖怒積怨為毒無已故約兵貴嚴待民貴寛不使强凌弱衆暴寡是則兵民一體之意也凡舉動必順民情不則去之有竊盜則為嚴緝重懲有奸棍則為革逐出境米價騰貴運載平糶雨暘不節齋戒禱祈又以春秋巡行阡陌課農桑擇其勤者奬勵之悦色和顔如家人婦子之相親切又于每月朔望集諸生郷耆公所宣講聖諭十六條使兵民共聽咸知為善之樂且曉然於聖天子軫念民生諄諄敎誨之意而相戒相勉不敢作奸犯科亦經理海疆之要務使民無盜之原也一澚城之學校宜興也雖在海外不廢詩書雖有戈矛必興禮樂孟子曰壯者以暇日修其孝弟忠信則知敎化之興亦武備根本也南澚海島荒陬無郡縣官司古未立學邇日人文駸駸乎起矣前鎮周公特於澚城建立義學文廟祀至聖先師捐衙門舊規水利每嵗百金之入為春秋丁祭延師脩脯之費既已勒碑刻石昭垂来禩未竟厥施中途奄没此南澚士民所深惜也署鎮弗紹前修仍将祀業入已輿論嗤之鄙意以為義學宜興學舍宜擴祭祀之費膏火之資宜續捐増益春秋丁祭宜親臨釋奠萃闔澚諸生及兵民子弟之秀者咸令入學延漳潮間名士之學行兼優才品出衆者一人為師表以教育之月課生童第其髙下以鼓舞之朔望行香謁拜已畢進諸生而親切慰勞之開府忘其尊庶民興於學甚盛事也南澚舊有澚生二名一閩一廣今在廣者存而在閩者廢殊非公道捐一紙之文書請當事以開復之宏功盛業千載不朽尚於暇日加之意乎與荆璞家兄論舟中起雷書讀來札知吾兄巡哨南洋舟中起雷從大桅焚燒而上斃兵一人傷一人心甚不懌疑以為非吉兆具見吾兄謹天災重民命至意舟中起雷本非災異乃此舟竪桅時桅井不净所致耳凡造成戰艦諏日竪桅桅井須拂拭乾浄不容毫髪他物若其中有竹頭木屑蚊蠅蟲蟻之類皆主起雷此常事也但君子遇災而懼百凡修省無事常如有事之防不可以為常也而忽之鄙意雷者震也震東方也震動震疊皆非安静恐東方有兵事將勞吾兄是故舟中起雷乃威震東方聲聞四海之象兄其建勲業於臺灣乎臺帥獨當一面専制水陸數千里必于内地愼選威望鎮臣彈壓海疆或兄今歳調臺即此是矣臺地承平日久在位懈散風俗奢囂兼之山深海闊狼子野心恐不能百年無事吾兄到彼須整飭武備未雨綢繆以防亂遏孽慎固苞桑為海疆第一急務倘有宵匪嘯聚不妨稍示兵威立時清廓海外鬼蜮離竒不可以常法處之但得有益地方可以一勞永逸免九重南顧之憂即太平將帥勲業也拘牽文義姑息養奸諒吾兄斷不出此弟意想所及憑臆妄談兄且秘而勿宣恐言之不驗為世揶揄匪小云與荆璞家兄論臺變書晨興出門聞市人偶語臺灣有變賊首姓朱名一貴已戕命官踞臺郡此異事也早料海疆宜急綢繆兄前月舟中起雷弟已閒談及之曾幾何時東方果有兵事不幸言之偶中實兄建功立業之秋也屈指浙閩諸將帥可屬大事無如兄者羽書徴調當在旦晩宜亟整甲帳具脯糒鍜戈矛選兵配艦以待出師大丈夫得提三尺為國家誅亂討賊奠安桑梓何其壯也制府滿公智深勇沈可與共事但省會隔逺鞭長不及兄宜指陳事勢請其移駐厦門就近督師面商調度内有制府彈壓指揮兄可一意前驅無呼應不靈之患外有吾兄統兵殺賊制府可髙枕無憂繕飛報大捷之疏矣弟雖不才將鼓棹而觀之與吳觀察論治臺灣事宜書臺灣當朱一貴作亂之後干戈蹂躪哀鴻遍野繼以風災埽蕩癘疫連綿民之憔悴極矣二三年來文武和𠂻餘孽拔根地方寜静撫摩噢咻瘡痍漸起然元氣猶未復也繼凋敝之餘則培養維艱消囂陵之習則敎化宜急官斯土者可不百倍留心以訓民型俗久安長治為已任今天子眷念海疆慎簡賢能以明公才髙行卓特命觀察是邦臺之民其有厚幸乎經濟内優納溝念切因其勢而利導之如王良使馬庖丁解牛無足煩措置也鼎元閩嶠書生識見淺尠明公以其曾贊戎行略悉臺地人情風土不棄固陋採及芻蕘敢不具陳所知以副公慇勤至意雖未必其言之當否而區區之心頗有與臺地人民相關切者苟千慮而一得亦聊補夫涓埃惟髙明察之臺民積玩成習每故撓法令以試官長淺深立法之初必誠必信凡文告號令必實在可行者方出之無朝三而暮四言必踐禁必伸萬萬不可移易則民知在上之不可犯而敎易從臺地訟師最多故民皆健訟宜嚴反坐之法聽訟時平心霽色使村啞期艾咸得自逹其情得情時鐵面霜威使狡猾財勢俱無所施其巧凡平空架害審係虛誣不可姑息務必將原告反坐登時研究訟師姓名飛拿嚴訊責逐過水遞回原籍取本縣收管回文存案臺俗好動公呈多武舉武進士主之皆因以為利非義舉也每有爭訟動輙盈庭宜遏絶臺中逆孽雖平惡棍䑕竊不乏寛之則行劫又寛之則嘯聚星星之火將致燎原不可以其細而忽之也宜留心訪察凡白撞竊劫輕者黥面逐水重者會同臺鎮分别杖斃馘耳逐水嘯聚者便宜行事與臺鎮合禀報知制臺分報撫臺提臺勿用公文勿詳解内地詳解則波累多人且文移駁詰往返經年雖殺而民不畏臺俗豪奢平民宴會酒席每筵必二兩五六錢以上或三兩四兩不等每設十筵八筵則費中人一二家之産矣逰手無賴綾襖錦襪搖曳街衢負販菜傭不能具體亦必以綾羅為下衣寛長曳地輿夫多袒裸而繭綢綿綢褲不可易也家無斗米服值千緡饘粥弗充檳榔不離于口習俗相沿餓死不變則夫崇奬節儉稍示等威實轉移風俗之急務也鴉片烟不知始自何來煑以銅鍋烟筒如短棍無賴惡少羣聚夜飲遂成風俗飲時以蜜糖諸品及鮮果十數碟佐之誘後來者初赴飲不用錢久則不能自已傾家赴之矣能通宵不寐助淫慾始以為樂後遂不可復救一日輟飲則面皮頓縮唇齒齞露脱神欲斃復飲乃愈然三年之後無不死矣聞此為狡黠島夷誑傾唐人財命者南洋諸畨稱中國為唐猶言漢云今臺灣人稱内地亦曰唐山愚夫不悟傳入中國已十餘年厦門多有而臺灣特甚殊可哀也臺灣賭風最盛兵民皆然廢事失業損財召禍爭鬬作非胥由於此宜知會臺鎮實心實力共禁之然表正者影直上行則下效未亂之先皆鳴鑼張葢呵道而聚賭無怪乎禁令不從也前人覆轍可為車鑒臺中胥役比内地更熾一名皂快數十幇丁一票之差索錢六七十貫或百餘貫不等吏胥權勢甚於鄉紳皂快烜赫甚於風憲由來久矣近或稍為歛戢亦未可知宜留心訪察懲創一二以儆其餘至本衙門胥役善窺伺本官意旨招搖撞歳見事風生尤不可不防也商船出入臺灣俱有掛驗陋規此弊宜剔除之在府則同知家人書辦掛號例錢六百在鹿耳門則巡檢掛號例錢六百而驗船之禮不在此數若舟中載有禁物則需索數十金不等查六百錢之弊屢經上憲禁革陽奉隂違葢船户畏其留難不敢不從故也重洋駕駛全乘天時若霽静不行恐越日即不可行或半途遭風至於失事差之毫釐謬以千里敢愛六百錢乎六百雖㣲而六百非止一處船户履險涉逺以性命易錙銖似宜加之體恤臺船每歳出入數千統而計之金以數千兩矣一念留心為民閒舒省數千兩非小事也商船水手多空缺數名所以私載無照客民而獲其利者也牌照内大船水手二十五六名實在止有十七八人中船水手十七八名止有十一二人或遇颶風不能駕駛閒有悞事出口入口文武弁貟因以為利如鹿耳門查驗每空名例銀五錢惟恐其不多耳無照客民或為盗賊風大人少或至覆舟通同作弊可為浩歎民生各遂家室則無輕棄走險之思臺俗婚娶論財三十老女尚有待年不嫁者此等怨曠最足傷天地之和召水旱之災所當急為嚴禁凡民間室女年二十四五以上者限三月之内逐一嫁完違者拿其父兄治罪廣東饒平程鄉大埔平逺等縣之人赴臺傭雇佃田者謂之客子每村落聚居千人或數百人謂之客庄客庄居民朋比為黨睚眦小故輒譁然起爭或毆殺人匿滅其屍健訟多盜竊白晝掠人牛鑄鐵印重烙以亂其號臺牛皆烙號以防盜竊買賣有牛契將號様註明凡牛入客庄莫敢向問問則縛牛主為盜易已牛赴官以實之官莫能辨多墮其計此不可不知也客庄居民從無眷屬合各府各縣數十萬之傾側無賴逰手羣萃其中無室家宗族之係累欲其無不逞也難矣婦女渡臺之禁既嚴又不能驅之使去可為隱憂鄙意以為宜移文内地凡民人欲赴臺耕種者必帶有眷口方許給照載渡編甲安插臺民有家屬在内地願搬取渡臺完聚者許具呈給照赴内地搬取文武汛口不得留難凡客民無家眷者在内地則不許渡臺在臺有犯務必革逐過水遞回原籍有家屬者雖犯勿輕易逐水則數年之内皆立室家可消亂萌臺人未知問學應試多内地生童然文藝亦鮮佳者宜廣設義學振興文敎於府城設書院一所選取品格端正文理優通有志向上者為上舍生徒延内地名宿文行素著者為之師講明父子君臣長幼之道身心性命之理使知孝弟忠信即可以造於聖賢為文章必本經史古文先輩大家無取平庸軟靡之習每月有課第其髙下而奬賞之朔望親臨進諸生而諄切敎誨之臺邑鳳山諸羅彰化淡水各設義學凡有志讀書者皆入馬學行進益者升之書院為上舍生則觀感奮興人文自必日盛臺民未知敎化口不道忠信之言耳不聞孝弟之行宜設立講約朔望集紳衿耆庶於公所宣講聖諭廣訓萬言書及古今善惡故事以警動顓蒙之知覺臺屬四縣及淡水等市鎮莊村多人之處多設講約著實開導無徒視為具文使愚夫愚婦皆知為善之樂則風俗自化矣講生就本地選取貢監生員或村莊無有則就其鄉之秀者聲音洪亮善能講説便使為之官待以優禮察其勤惰分别奬勵臺灣地方寥闊兵防未增民俗悍驁好為傾側雖太平無事不可忘有事之備也若收納拳勇免其差徭練為鄉壯敎之步伐止齊豈出官兵下哉道府四縣及淡水同知各設鄉壯三百名無事則散之農賈有役則供我指臂此古者民兵之法也民兵不能給糧在用權術駕馭之臺民好近官長以為榮耀但時召至衙齋與之談吐如家人父子之相親切課其武藝敎之戰法則人人自以為官長腹心無不踴躍從事但須約束有方無使藉勢陵民則多多益善不必限定三百數矣鄙見如此恐或畏其煩難則不如實心舉行保甲聨守望相助之規嚴窩隱匪類之禁亦救時急務也臺地未有城池緩急無以自固磚石圍築費重事繁錢糧無從出辦惟有種植䓶竹為城而竹城亦需工本欲以白手空拳為國家設險守禦不勞民不傷財此大難事然肯以實心行之亦無難也先定其規模量明丈數不動聲色凡庭審輕罪應責者每一板准種竹五株自贖廿板則百株矣應枷者種二百株亦准免但必於臨刑時親詢其有力情願然後罰之不願勿强也無求速成無立意要罰只是常存此心順其自然守令俱皆如此不半年城可成也城門各築敵樓如力有未及植木柵暫蔽内外亦可守禦若有餘力更於竹外留夾道三五丈另植䓶桐一週廣尺宻布又當一重木城外挖一濠限之濠外採山蘇木子撒種當春發生枝堅䓶宻又當一層保障再於䓶桐城邊量築窩舗數十座以當砲臺為登陴守禦之所砲臺相離以左右砲力管到之處為凖接連建築使敵不得近城西面人家臨海無地可容竹桐築灰牆為雉堞便施鎗砲不啻金湯之固也臺竹之性與内地不同内地竹無根不活臺竹一根可截三段植之雖罰多種不以為病也䓶桐一樹可斫作百十株插地皆活尤易易者惟敵樓土牆頗費人力由此擴充以漸致之可耳天下事成於有心人無難為也臺地不蠶桑不種綿苧故其民多㳺惰婦女衣綺羅粧珠翠好逰成俗則桑麻之政不可緩也制府滿公保撫閩時嘗著蠶桑要法繪十二圖頒行郡縣臺土寛曠最宜樹桑可倣而行之漳泉多木綿俗謂之吉貝可令民於内地收其核赴臺種之并令廣種麻苧織紝為冬夏布婦女有蠶桑紡績之務則勤儉成風民可富而俗可美也臺灣田糧與内地不同内地計弓論畆臺灣計戈論甲每戈長一丈二尺五寸東西南北各二十五戈為一甲每甲約比内地十一畆三分有竒上則每年徴粟八石八斗榖價賤時每石三錢是每甲徴本色銀二兩六錢四分較内地加倍若榖貴則不堪矣或有虐令折色每石七錢則又倍之倍矣但新闢土肥丈報未必皆實又或荒埔磽瘠溪谷衝淹乍墾乍棄不登版籍之地可以截長補短故其民亦不甚病然臺邑地方窄狹不比鳳諸臺邑民亦將不堪重賦矣切不可輕議丈量為清畆加賦之舉海外地土肥磽無常地震水衝滄桑倐變恐其後有額無田為官民之累不少若有意丈量則須合臺鳳諸三邑酌量匀配勿致偏枯方為盡善萬萬不可加賦惟募民墾闢使地無遺利則賦不期加而自加矣臺北彰化縣地多荒蕪宜令民開墾為田勿致閒曠前此皆以畨地禁民侵耕今已設縣治無仍棄抛荒之理若云畨地則全臺皆取之畨欲還不勝還也宜先出示令各土畨自行墾闢限一年之内盡成田園不墾者聽民墾耕照依部例即為業主或令民貼畨納餉易地開墾亦兩便之道也臺灣舊有官庄為文武養廉之具今歸入公家各官救口不贍矣夫忠信重禄所以勸士况官人於遐荒絶域欲用其身心而凍餒其妻子使枵腹為國家辦事非情之平也既不許挈眷之官而三載任滿又令以陞銜再任三載六年海外抛棄室家誰能無憂内顧又賞賚捐輸百無所出不能得人死力未有不怠乃公事上焉者閉户茹蔬為僧為佛下焉者取償於百姓之脂膏為鷹為虎孰與撫綏吾民哉朝廷蠲租賑恤動以百千萬計何愛此㣲末之刀錐謂官佃多不法能為盜賊則不法豈獨官佃治得其道盜賊可化為良况佃乎陷臺諸賊半屬㳺手半係衙蠧豈皆官佃為之與鄙意以為官庄猶古公田古藉民力助耕今官自養佃較公田更不病民舊庄雖沒新地可再墾也查臺北有竹塹埔沃衍百餘里可闢千頃良田又當孔道衝要曩以棄置荆榛故野畨敢於出沒截殺行人墾為田園畨患自息但地大需人非民力所能開墾莫若合全臺文武各官就此分地墾闢各捐貲本自備牛種田器結廬招佃永為本衙門恒産此不獨一時之利千萬世之利也臺地素腴隨墾隨收一年稻榖可足本錢二年三年食用不竭以天地自然之利為臣子養廉之資又可袪畨害益國賦足民食此一舉而数善備者也澎湖孤立海中無田地不生五榖全賴臺米接濟而澎民貧乏不能預備一二月之糧載米太多亦無售處必須食盡乃復再糴若颶風連綿一二月米船不至則闔島嗷嗷待斃矣切須於澎湖建倉積榖或行社倉捐輸之法或就臺鳳諸三縣食粟估定價值撥載萬餘石積貯澎倉遇米船不接之時副將巡檢發糶濟急將價再買補倉使澎民無餓莩之患此舉確不可易土畨頑蠢無知近亦習為狡偽新港目加溜灣蕭壠麻豆四社近府刁猾健訟哆囉嘓諸羅山次之鳳山以下諸羅以上多愚昧渾噩有上古遺意然俱皆供辦車輛策應兵役以及差徭絡繹走遞公文勞苦較臺民十倍向有社商頭家包攬貨物代畨納餉名曰贌社畨終歳所捕之鹿與畜産布縷皆為社商所有朘削不堪今社商已行禁革而傳譯輸納非通事不辦縣官每歳僉立通事換牌之時有花紅規禮自數十金至六七百金不等重利稱貸夤緣必得而取償於番酷虐較社商更甚經諸羅令周鍾瑄通詳禁革署令汪紳文再行申禁令各畨自舉通事稍予辛勞而惡棍訟師或夤縁道府衙門給牌奪充又有謀奪不遂唆畨生事焚劫良民重賂土官謀革現在通事此社棍之害也通事之剋剥社棍之唆謀均當懲創無虐無縱使番黎安居循法樂役趨公乃大中至正之道而近時制撫禁飭畨車不許供應兵役甚至出軍搜捕亦令兵丁自負戴帳房糧草此法萬不可行使土畨漸不安分莫肯服役事事與漢人角較亦欲如中國所為害將有不可言者矣内山生畨好出殺人然必深林宻箐可以藏身乃能為害若田園平埔無藏身之所則萬萬不敢出也荆棘日闢畨患自消是莫如聽民開墾矣畨聞鎗砲之聲則驚逃數日不敢復至此可以畨和番招徠歸順招徠既久漸化漸多將生畨皆熟是又為朝廷擴土疆增户口貢賦也若畫地禁民無入畨界是亦一道然但能使民不入不能使畨不出畫去一尺則出來一尺勢必舉全臺而盡畫之乃不能浮海入内地而日本荷蘭能浮海入内地者又將鵲巢鳩居為邊疆之患害恐生畨亦不能保其有也鹿洲初集巻二
