body:
  text: 鹿洲初集卷十九廣州府知府藍鼎元撰哀辭閣部沈公哀辭有序康熙五十八年二月朔日皇清通議大夫內閣學士兼禮部右侍郎前提督福建學政心齋沈公以疾卒于歸安之竹墩里第嗚呼哀哉閩中紳士先後聞訃各就其郡所建立為公生祠者發喪鼎元因得從諸君子後哭公于漳之苕南書院臨三日成禮而退退而餘哀弗忘不自知涕泗之涔涔然霣也憶公癸未嵗由掌坊侍講來閩視學甄拔俊乂以千數獨于小子鼎元謬加國士之知且命隨軺車校八郡三載從遊情同父子巳丑以宫詹乞假重來三山鼎元星夜馳謁鼓棹送之武夷拜别于崇安郭外自是以後燕閩迥隔赫蹄之上時惠德音而顔色不可復見矣人生知巳難之又難鼎元正在稚騃性狂學陋公遽以逺大相期許殷勤教誨皆不止為一身一世之業每中夜激昂思欲有所樹立以慰公望迍邅草萊有懷莫展何望經世逺猷以能如公之志不自度量思垂空文就正白蘋紅蓼問釐訛定舛亦足表見一二揚公教澤于將來不謂公之見背如此其速也嗚呼哀哉道路阻修奔喪無力生不能副其望沒不能送其終視豫猶子不得猶父悠悠蒼天抱恨曷有極乎素旗述德泣下泉流土壤無益于泰山知不足闡揚萬一亦聊陳其大槩寫余小子哀思云爾乃再拜稽首而為辭曰嗚呼夫子一代偉人生榮死哀名播乾坤家聲源逺吳越所尊侈談世系恐掩其真先皇辛卯降嶽生申弱冠偕兄同捷丙辰聨鑣金馬分搜鳳麟巳未人才萃于弟昆春坊厯掌啓沃儀宸天子曰咨惟乃馨聞汝學既茂汝行更醇汝持玉尺視學八閩惟清惟慎如朕詩云上御製考試嘆詩分賜各省學臣公拜稽首星馳日奔甫入閩關盟天告神一錢不取愛才如珍鴻篇傑搆翻閲夜分有劣在擯把卷酸辛冀野羣空幽谷生春公之待士若子若孫欲加諸膝教誨諄諄士之視公若萱若椿既喜舞蹈亦淚沾巾有閩以來無此學臣清操第一巨眼殊倫還朝報政僉曰忠純宫詹內閣晉秩承綸恩科禮闈掌試衡文甲午三秋楚才復掄英雄入彀朝野歡欣泰山北斗譽望日新佇宣白麻用秉國鈞忽焉勇退于苕之濵林泉詩酒娛老忘貧坐席未暖召起密雲築城浚湟保我黎民三載役休歸家十旬天不憖遺大命遄臻嗚呼哀哉公昔離閩九郡謳思各建書院設位立碑漳曰苕南舊在西池近嫌簡陋龍門是移小山嵂崒危石爭奇名花古樹蔽芾紛披輪焉奐焉佳景四時諸生每嵗上夀于斯何期今日聚哭生祠為公喪次易主當輀嗚呼哀哉憶公巳丑乞假歸里眷念閩人笷遊建水山川增色童叟有喜僚史闐迎車騎成市諸生雀躍親愛鮮比日尋名勝擁公授几浩歌浮白談文舍矢欲去牽衣彌月不止解珮獻芹亦薪亦米千人一心古未有此而今而後不可得矣號慟天涯奉公拍紙嗚呼哀哉庚寅之嵗花甲初周公時在籍覽揆于秋閩中多士踰山涉流持幣張軸為公添籌庶常蔡子自燕馳郵如期恰至公樂油油天南地北一室朋儔賦詩百首搖嶽凌洲期公七十勝會重遊彼蒼吝嗇六九彌留失聲相嚮慘淡林丘嗚呼哀哉公之密雲人思助役謂兹重任匪亷能克九郡齊聲樹幟共白設匭醵金日投千百紳士傾囊工商集腋樵子菜傭錙銖表赤羣萃會城環呼棨戟乞疏代陳輸公土石中丞不可衆淚泉滴雲集轅門跪朝而夕因兹入告克底乃績方欣公還俄聞易簀典型遽謝摧肝裂膈嗚呼哀哉公有二子聨翩登第文孫奮翼青雲自勵猶子彚征茅茹並轡德聚一門業隆一世夀考令終諸福畢備遺愛在人千秋弗替含笑九京何歉何恚惟豫小子有懷未遂平日思公恨無兩翅滿腔抑鬱彌天塞地今日思公幽明路異望北拊膺心焉如刺追惟教澤宵不能寐終當努力以成公志握管述芳垂之來裔嗚呼哀哉黃越甫哀辭有序康熙五十九年春王正月元日戊辰漳浦處士越甫黃先生卒嗚呼哀哉先生諱元美字越甫居浦邑之髙岑先世以詩禮傳家有令望厥考長民先生學行冠一時為薦紳名士所宗仰與先君交特厚先生生而卓犖長有文名受業先君為師徒中知巳立身行事不謀而合先君最愛重之其性情品格在太丘叔度之間其文章韶令俊逸可行于世而名心早淡在蠱之上九其為詩工絶古體尤長有六朝風味韜光隱曜不輕以示人其持家有禮法門內雍雍穆穆罔越矩矱教子博通經籍先行誼而後科名其家雖甚貧胸懷浩蕩無寒猥局促之態見利不苟得而為人謀必極周視親朋憂患坎坷怡愈歡樂不啻以身共之其識趣髙朗臨事燭照舉天下紛攘糾錯鬼蜮離奇可驚可愕之變態無不了了胸中辨義利觀人品邪正決事機成敗指揮論列百不失一使先生幡然用世必有可觀乃蹈河檀之遺迹追衡泌之髙風皮裏春秋汝南管籥羣賢影附若毛羽之宗鳳麟不亦休哉正月元旦賀者在門先生正襟危坐瞑然告終賔客衣冠須臾盡白自名公貴人市兒賤𨽻莫不咨嗟痛惻揮涕失聲工匠趨蹌勞不受直斯可謂存榮沒哀匹夫為善分量至此而極者也鼎元與先生既屬兩世昆弟之交又最知心莫逆忽覩此痛肝腸如割不揣荒陋抆淚稽首而為之辭曰麟士織簾君平賣卜槃阿碩人永矢弗告嗚呼先生髙岑蟄伏泥塗勢利遐心金玉昔自妙年孝友姻睦營葬祖墳千山繭足喪致乎哀養誠且肅文秀春華名淡蕉鹿作為詩歌駕潘追陸韜晦自珍如蘭在谷人中之龍雲中之鵠樂天知命歸真反璞宜躋遐齡皤皤名宿百年方半物化迅速嗚呼哀哉先生有母白首在堂敬薑晝夜涕泗汪汪父塋則備而柩未康幼男弱女繞膝倣徨婚嫁未了遽往何方嗚呼哀哉先生有子既賢且孝讀書立品無忝而教伯也才能繼述有耀仲也醇謹克家之肖叔子冠軍蜚聲學校四郎五郎資皆可造又有賢孫濟濟佳妙加爾數年其興可料如何昊天弗俾瞻眺嗚呼哀哉先生之存巨公盈門唾咳珠璣舒嘯風雲品題佳士口頰生春論事龜燭大惑解紛先生之沒閭里酸辛元旦臨喪車馳馬奔貴者賵賻賤者服勤感及工匠拭淚沾巾倣佛太丘芳躅未泯匹夫為善至此極尊嗚呼哀哉元與先生通家昆弟兩世交情骨肉不啻念我厄窮憂我家計勗我勳名規我經濟痛癢相關心血相繫我愧不才蓬蒿困滯恐負所期中宵不寐豈虞先生忽焉長逝月犯少微摧肝裂肺緬想芳型厯厯可志憒亂不文執筆隕涕素旗誄德悲傷無既嗚呼哀哉林元白先生哀辭南詔詩人林元白先生以辛丑王春九日考終于教忠第姻家猶子藍鼎元趨而哭之曰嗚呼先生死矣老成遽凋典型長謝風雅道喪廣陵響絶宇宙間黯然可恨事豈不痛哉先生忠烈子孫詞壇名宿以煙霞詩酒束一生忠孝鬱勃雄浩峻嶒之氣投之所向隨境而安其發為文章超宕俊逸有霽月光風入其胸次余嘗序其詩以為得微之之神而兼樂天之致字曰元白實稱其名先生亦以余文為有當於道凡所著述輒擊節玩味歷久不忍置嗚呼可不謂知己與先生殁年八十有一箕疇次九五者皆備所痛後生小子失所瞻依而余又忝附姻婭之末兼有知巳之感將從長君彥伯朝夕受教言忽焉覯此傷心特甚乃刑牲設醴再拜陳詞匪忘荒陋用寫余哀云爾為誄曰自昔澳川地連東粵明割南鄉詔安是設詔安著姓惟林最傑五都康美如瓜似瓞先生曽祖髙第煥發祖忠簡公西陲節鉞罵賊不屈剔膚剮舌有死無降氷天淚血厥考錦衣有父風烈誕育先生明聰俊哲學富縹緗心操氷雪不騖時名不趨炎熱不入江湖不登魏闕浩然存真敝屣若脫孝友亷讓至性肫結穆穆雍雍夷險一節如松之蒼如蓮之潔一鄉善士欽兹大耋宜夀彭𣆀兒撫莊列胡急修文與世遽别嗚呼哀哉先生少年遭時變亂挈家避賊東奔西竄所至皆安寇不能犯數居天城異景特擅清泉怪石詩酒留戀晚嵗重遊謳吟感嘆彼巳荒煙此亦閃電嗚呼哀哉先生于詩直窮奧妙聲情曠朗詞旨幽峭屈宋衙官鮑庾同調騷壇主盟牛耳有耀將俾風雅盛行海嶠其集則存胡天不弔後生小子將安則效嗚呼哀哉先生于酒獨得豪致負抱奇磊藉斯寫意日營糟邱呼朋共醉坐花對月浩歌揚觶庶幾淵明與江咨議劉伶畢卓呼為兄弟昔醉竟日今醉竟世大夢不醒破笑為涕嗚呼哀哉先生室人實賢且淑詩砭傷時先生示內詩云句不驚人語不奇山妻但恐我傷時使歸渾穆客嵗先驅夜臺獨宿顒望駕臨惟恐不速兼有好友九原馳逐李君踐約蔡君酒熟先生祭李丕躬文云九原若遇蔡習孚為我告曰十年後幸酌酒相待先生此去朝朝宴樂惟憐孝子終天慟哭濟濟蘭孫號呼躑躅余忝姻親方資追琢忽焉聞訃心傷淚落濁醪一樽生芻一束珥筆傳芳素旗方幅嗚呼哀哉林母李太君哀辭康熙五十八年五月二十六日戊戌太姻母文懿李太君卒嗚呼哀哉太君吾邑侍御寶弓先生女也幼聰慧能讀古詩樂府兩漢六朝三唐諸家耽筆墨有淡泊寧靜之致年十五歸林元白先生先生南詔世家曽祖莫凡公故明萬厯進士列官於朝祖忠簡公崇禎間以大中丞建節西陲遭李闖之亂罵賊不屈而死父錦衣公持喪還閩完葬事亦死于賊先生八嵗而孤母楊夫人撫之居長泰之天城依舅氏也年二十入贅漳浦太君以天城隔逺不得奉侍姑嫜為憾迎楊夫人來家于浦竭誠孝養鄉里稱之甲寅閩變先生獲戾守將避而他之太君百計脫浦邑奉姑復入天城同時避亂者多不得謀生鶉結甑塵飢寒疾苦太君極力周恤賴以全活者甚衆天城髙踞山巔奇峯嵂崒為武安第一名勝楊夫人大父方伯鵬遙公所經營怪石清泉名花異木參錯布置于崇臺危閣天梯窈洞之間當春桃紅栁緑好鳥送音同時婦女如入天台武陵不復知有亂離慨嘆每聨袂遊觀以為娛樂太君獨齋居小樓足不踰閫閾而是時侍御公為賊帥羈縻海澄督餉慘毒母氏在浦未知安危太君涕泗交頤日夜焚香祝天願父母晏然無恙未幾得釋越三年丁巳夢乃翁告曰冦且劇亟去天城未幾天城陷殺掠鮮遺獨太君以先期奉姑還浦不與其難人以為孝感所致云先生年近四十猶艱子嗣太君為置側室未幾嫡庶皆舉子楊夫人晚得風疾坐卧不離床太君日夕奉養恭敬益篤厯久無倦容辛巳喪姑哀毁盡禮與先生拮據經營極力襄葬事先生早嵗學成名立以父祖忠貞隕難悲傷慘怛磈礧填胸兼時際變遷荆榛塞路奔馳兵火之中靡有寧宇功名世故視若浮雲日與二三知友賦詩酌酒一切牢騷慨慷忠孝鬱勃感憤不平之氣皆于詩焉發之每客至則太君潔壺觴腆殽饌先意承志隨其所宜惟慮先生詩詞有傷時嫉俗之意婉轉勸導使歸和平憶先生示內詩云句不驚人語不奇山妻但恐我傷時可知識得詩中否細步偷來檢我詩則先生閨房之樂相得之歡于此可想見矣今先生年方八十康寧未艾而太君尚少五嵗溘然長征嗚呼哀哉某與冡君彥伯締為婚姻犬子雲龍太君之孫壻也今嵗登潭府從蒙師受學太君愛之如孫子方幸兒曹得承教誨忽焉遭此何能為情不揣固陋再拜稽首而為之誄曰猗歟太君澚川鍾秀延平裔孫隴西華胄乃祖孝亷家傳忠厚父寶弓公持斧衣繡嘉濟廟中禋祀弗子誕育掌珠聰明誰似既勤女紅亦習詩史四行兼全芳規備美曰嬪于林增光南詔忠簡之穆錦衣之肖元白先生詩名有耀案則齊眉吟則賡調吁嗟太君事姑純孝妯娌和諧親鄰則效周窮恤乏感者歡叫賔至如歸酒旨殽妙吁嗟太君大亂弗傷七嵗隨父被圍清漳易子炊骸十人九僵獨能不死餓以徜徉甲寅逃浦載道劍鋩叉鈿可賂賊不能戕天城避兵四載安康一朝棄去冦墜巖疆天之所佑德實克當廣嗣重祖側室是將趙姬女宗真堪頡頏佳兒成立嫡庶相忘伯也才茂芹藻生香仲也學篤辟雍上庠蘭孫濟濟出地新篁胡為太君寶婺埋光驂鸞上漢散魄泉鄉嗚呼哀哉緬惟太君婦道無闕奉養竭誠送終淚血斂憑其棺窆臨其穴馬鬛雙封松楸揭揭從兹一去翁姑則悅承歡地下與世永訣嗚呼哀哉吁嗟太君而今巳矣其奈先生空房靜几興來吟咏孰為伸紙語即驚人孰規孰喜入既傷心出亦隕涕嗚呼哀哉昔栁下妻諡夫曰惠黔婁之妻以康為諡易名雖私于傳有志先生效之諡曰文懿匪學無文太君書笥令淑孔彰純懿無纍斯名稱情太君罔愧吁嗟太君亦復何悲某忝戚末猶子比兒繐帷瞻拜泣下漣洏何以誄德表之素旗嗚呼哀哉黎母魏太君哀辭皇清誥封淑人黎太姻母魏太君以雍正六年戊申秋八月三日卒于京邸官舍之內寢嗚呼哀哉令子使君致逺方以光祿卿持節巡察河工事竣言旋遷大廷尉忽遭斯變慘痛異常上眷戀孝子方深不忍聽其逺離又重違孝思特體下情得自都門奉太君靈櫬旋歸故里由張家灣泛運河過青齊經魯國踰淮泝江越吳楚豫章以明年巳酉之春至長汀為程百有餘日道旁觀者咸欷歔歎羡謂賢母孝子其榮其哀非尋常所能及也同鄉親朋多不逺百千里重趼弔奠元與令子使君為忘分之交二十餘年四載京邸蒙太君飲食教誨有逾骨肉復蒙不棄寒賤締為婚姻自應躬赴靈帷舉觴一慟而元以粵東下吏孤忠為國不合時宜慚無見幾之明致投媢嫉之網羈縻于兹不能一造汀郡趨蹌執紖少盡猶子之情臨風想望涕零如雨鬱此哀思何能默默四兒雲翼太君之孫壻也敬遣一行代進三爵乃刑牲設饌陳帛獻楮于庭哀而奠之曰嗚呼太君生長西秦代有令德育是掌珍四行備美芳規絶塵父母鍾愛弗輕薦蘋大參黎公為世偉人適宦邉疆名動四鄰英豪物色願事櫛巾荆苕箕帚夙夜惟寅伊時逆藩相率倡亂閩粵滇黔羽書飛箭岌岌關中鎮臣復叛公時觀察手檠秦甸偕張將軍同心靖變夕理軍糈朝籌守戰太君佐之罄撤環瑱紉縫征衣三軍袨絢既平逆賊復軫哀鴻勞來安集中閨更恫賙飢恤寒疾痛相通民忘兵燹萬井融融感公功德望報羆熊果邀天眷誕育夔龍少而穎異長則亢宗太君之福與德偕隆公淡于名急流勇退惟耽詩文林泉不廢濡毫伸紙太君意會井臼親操辛勞罔懈上事尊長下和儕輩各得歡心馨聞中外令子成名文驚海內望重木天猶勤教誨遂操玉尺出掌文衡太君教之惟公惟明三年楚澤兩袖風清海珠靡遺連茹彚征還朝復命司諌彤庭太君教之惟忠惟誠毋傷刻薄毋涉沽名丰裁凜凜為國典型帝念楚邦澤弗下究特簡巡行持斧衣繡太君教之民依在宥雈苻迹絶風淳俗厚帝念黃河數省馳驟大利大害往巡弊竇太君教之稽工察漏兩載安瀾厥功殊懋天子曰都晉卿光祿治裝未行奉天推轂甫及脂車廷尉掌軸一嵗九遷幾將枚卜何期太君遽登仙籙弗念令子拊膺躑躅泣血呼天百身莫贖山川墮淚歸怨亭毒嗚呼哀哉帝謂孝子國家柱石體爾孝思假爾休息扶櫬還鄉治喪祖祏六千里路哀榮嘖嘖大開弔堂兼營窀穸親友趨蹌悲傷痛惻元也不才備官海僻主恩深重圖報涓滴一念不欺一介不忒蹇逢監司狼貪虎嚇侵欺天庾命豫補塞賠穀三千寒儒何力況復捐金二千一百毒虐百端如鬼如蜮止合挂冠難堪虺蜴大吏憐豫孤忠拙直調我番禺避兹仇敵謂受憲恩得伸報國其如怨深橫加霹靂欲快雄心昧良羅織上官有權下吏當厄幽獨無慚任施鋒鏑可對帝天詎終屈抑悵望靈幃趨拜未得以斯耿耿涕泗沾臆太君何憾泥金鳳翟五福備膺恩綸洊錫濟濟孫支邦家圭璧含笑九京榮華曷極敬遣豚兒千里匍匐奠獻一觴用將悃愊靈其有知歆然來格嗚呼哀哉鹿洲初集卷十九
