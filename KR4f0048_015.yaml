body:
  text: 鹿洲初集卷十五廣州府知府藍鼎元撰賦檄銘箴贊節略事録臨漳臺賦試登漳城萬象縱橫停驂四望百慮環生地轄揚州之域野分牛女之星羣峯繞翠一水澄清雉堞崒矗烟井喧轟門因貢珠著堂以尊道名樓有喜雨之頌閣有齊雲之稱郡判曾為留珮君子於焉建亭凡皆錯落蔀屋之間共藏風而聴月未如雄踞高山之頂獨結瑤而搆瓊繄惟臨漳之臺實擅丹霞之勝基跨龍首形開鶴顁規天矩地竦峙方正嵬峩岌嶫莫之與競遂偃蹇而上躋過雲霞於膝脛可以望氛祲察災祥順時敷政時觀遊節勞逸省風布令覩兹下土之有幹有年何妨耽樂而以觴以咏爾乃東望岐山竹節清泉萬松鳴鶴嶄巖蜿蜒鐵甲之崖方陗壁鴛鴦之樹欲參天赤嶼流丹來海嶠白雲舞練於日邊至如南望郊闗清溪橫帶雙橋卧波似龍兩大霞山環水雲之館洲荷張刺史之蓋綠楊埀栁恍忽章臺虎洞獅巖備極一方勝槩又如眺望西北岡巒騰複湖光瀲灧山際流瀑天寶珠飛龍江漁匵圓山康叟之祠北溪安卿之屋瞻天柱如培塿俯歐寮若寸木皆迴環於臺下使我臨風而躑躅於是思今弔古設想噫嘻紫陽涖漳之日吾道南來之期則斯臺也為講學明禮之區固與靈臺重壁互相等夷而非一柱九層敢共驅馳若夫登斯臺而恤民隱則有柯判感鵲之精誠登斯臺而談兵事則有姚侯平海之戰征劉表呼鷹未足方其意趣項王戲馬詎足比其英聲亦有倒懸之士羡黄金於易水愛花之客慕避風以徙倚歲時士女遙逍容與管絃嘯歌雜沓羅綺汝酒既清汝殽既美我呼得盧子呼得雉絶類桂宫走狗之風依稀廣陽鬬雞之鄙余獨立臺上兮忽超然而徜徉視千峯之俯伏兮神欣欣而樂康疑日月之可接兮羗舉首以昂藏望鵬鯤於北海兮振鳯凰於高岡覩萬家之烟火兮喜桑麻之青蒼但覺耕食鑿飲羣黎之皥皥兮孰辨夫堯臺與臨漳擬諸葛武侯伐魏檄建興五年蓋聞君臣大義萬古為昭不臣當誅千秋常典是以蚩尤作亂軒轅有涿鹿之兵防風弗懷文命有㑹稽之戮少康一成一旅亦滅過戈召虎來旬來宣遂平江漢趙盾縱賊董狐筆曰弑君陳恒作奸孔子聞而請討誠以天冠地履分位截然見無禮於其君如鷹鸇之逐鳥雀不容亂臣賊子横行於光天化日之下也曹操以譙東梟雄逞穿窬之智假倡義兵暴寡脅弱逼遷乘輿覬覦神器䟦扈專權隂鷙浮於董卓憑陵造孽跳梁等之黃巾乃自為將軍改丞相封魏公進魏王目中全無君父矣復自加九錫僭車服建宗廟立社稷天下有此人臣哉桀驁之形日甚一日簒奪之勢夕不俟朝滿布爪牙摧排善類中外惶惶若挾蛇虺雖齊田魯季晉室六卿未有若斯之橫也於是孝愍先皇帝切齒痛心密傳衣帶之詔百官裂眥怒髮共議市朝之誅方謂刺趙高於秦廷殱少卯於魯觀殄除逆黨肅整朝綱詎意偶洩機謀頻遭反噬董承死節耿韋竭忠甚至操戈犯闕弑后妃於天子之前仗劍入宫戕皇嗣於朝廷之上罪逆滔天古今無比猶且妄擬文王汚衊先聖哀哉無忌憚也㧞舌有餘辜焉雖賣履分香如鬼如蜮豈天下後世可堪欺罔賊子丕世濟兇虐繼操之志行莽之事攘奪玉璽傾覆金甌華歆王朗之徒䑛糠齅餌賈詡陳羣等輩澤吻磨牙遂使巍巍御座上據野狐濟濟王官下拜閹孽二十四帝沐雨櫛風之社稷一朝頓移四百餘年尊賢養士之國家萬死莫贖嗚呼痛哉猶幸天眷未絶民思舊德我昭烈皇帝繼統西川存復祖業即欲捲斾北征誅夷叛亂而國家多故匪遑離局大志未遂中道崩殂是以吞舟漏網未正司敗之刑負嵎稽誅致效夜郎之大亮受先帝托孤之重夙夜氷兢誓討國賊而老奸天殛小猾數終無由馘操禽丕傳首以謝天下惟當滅曹興漢鞠躬以報聖朝曹叡黄口乳臭𡨕頑無知襲父祖之餘兇孽非已作忘宇宙之名器情亦可原但文繡雖華非彘盧所應婁曳八珍雖美非蛙蚓所得㘕酣自有開闢以迄今兹未聞跖蹻終奸天位誅寒浞於窮門非得已也臠新莽於長安此其時矣亮奉列聖威靈嗣王顯命大舉貔貅以除螻螘鼓鼙動地雷厲而風飛刀㦸連天日臨而月照將以忠義勝吞強寇如屠匹雛兵以節制強靖邪氛若掃秋蘀逆不敵順暴豈當仁震叠無前蕩平有日為此特申大義布告中原凡汝從賊官民孰非本朝臣子或膺累朝之寵命或受先帝之厚恩因迫脅而事仇知非本願相事機而報主寧罔懷忠倘能殺賊來歸即膺上賞若將全城獻納且録崇勲前徒倒戈血流何須於漂杵首稽崩角迎師無藉乎簞壺苟曹叡能蓋前愆自知罪戾乘天兵之未至去僭號而乞降則解縛焚櫬貸厥餘生畀之侯封以存先祀亦非大漢之所吝嗇也司馬懿父子及諸夏侯等吠堯非主皆忠所事本朝寛大咸與維新並虚上卿之位待以家人之禮幸即幡然悔悟叩我軍門無以曹氏親暱自生疑畏烈崑岡之炎火予亦何敢為此心逞螳臂以當車汝甘自罹于死地哉其師旅所過地方秋毫無犯農安隴畝賈安市廛如舊營生不必驚悸凱旋之後復爾征徭第殱渠魁以洩九廟祖宗之憤式除逆醜用慰萬方億兆之情俾遠邇州郡悉知此意早圖革面免致噬臍此檄巨硯銘鐵面石骨磨礲一世吐納煙雲揮灑天地既以重而威者固吾學復縝密以栗而潤澤之光被禮樂刑政藴諸中而裕如仁義道德取之懷而咸備遇堯舜則安安以陳謨逢湯武則戛戛而作誓在杏壇删述六籍磨而不磷實居弟子之班及考亭註疏經書沈浸醲郁若好友之不可須臾離胡為乎入塵坱之羣任童兒以磨涅猝焉擲地作雷聲保無瓦全之是悸吾將借羲之之池濯爾顔之俗氣爾其息交絶遊與吾偕隠於深山茂林之際理杏壇之故業追考亭之高志唾珠噴玉垂華衮鈇鉞於千秋將使龍尾馬肝若夏瑚商璉彝鼎球圖之重器墨海銘壬子夏仲余之端州長兒雲錦從將遊七星巖而不果購得一墨海以歸甚樂之乃為銘銘曰端溪石出巖嶰雕為圓硯名墨海潤澤起烟雲觀者疑鼎鼐形似太極分隂陽又若中原環四澥雅量要寛深可為世模楷容墨數斗筆如椽大書特書生光彩何羨乎崧臺室七星巖對兹片石足千載古琴銘童年有志琴學苦無師長欲聞聖人之道覺日夜孳孳不遑復他及矣己酉夏日獨坐土室鄉人寄古琴贈余梅花斷紋遍滿腹背中間有文曰碧泉不知為何代法物俾余學之以解慍余曰噫何慍吾自樂其樂非人所能使之憂造次顚沛心常自得不啻太和洋溢宇宙也雖然古琴難得不可以虚人之賜命兒曹學之既成而鼔我心益陶陶然乃銘曰我自賞音不問鍾期高叟洞中白石澗湄焚香靜坐結想黃羲一彈再鼓我心則怡劍銘少時好劍弗可得命工鑄青萍尺許佩之友人嗤焉旋亦棄去己酉遭難誦古人欲請尚方斬馬劍之語甚壯之適有以紅夷劍見惠者名曰秋霜光閃閃如掣電喜不自勝遂㧞起舞覺胸中浩然為之一快乃銘曰心有懷請尚方誅奸黨掃欃槍美人贈我紅夷劍極目閃電名秋霜但把太阿持在手僉壬膽落民庶康千秋太平如此日挂之壁間好善藏持敬圖自箴夫夫也少不自量䕫卨為徒先人教之誦法程朱循分盡性匪躐匪拘從容深造為君子儒長遭坎壈牛馬馳驅學殖荒陋浪擲居諸繫心民物罔顧揶揄流離顚沛謬學著書兢兢寡過惴惴昏愚立誠持敬寢食與俱試思天地之廣大載籍之紛如至道之𢎞遠聖學之菑畬雖假汝彭耼之歲尚孶矻不見其有餘何半生之碌碌至此始愧汗於勤劬雖然猶未也古人寸隂是惜既耄而好學不渝尚及今夙夜黽勉庶幾乎不自暴棄以明善而復初訪道圖箴陳雙山海陽詩人也年七十六矣篤於學為潮中老名士鄉人多宗之然好浮屠自以為得其秘私謂余同年友蔡世厚曰藍公惜不信佛我當攜佛書示之世厚曰先生欲焚佛書則可不然不可令藍公見也雙山乃止然猶有援入意一日出訪道圖小像命書數語余曰善遂為之箴云此老不聊圖新面目遊心浩渺崆峒之麓文繡弗華曳彼道服杖頭錢盡葫蘆繩束駕言訪道徘徊躑躅道不遠人當身自足日用倫常放則彌六至誠盡性其次致曲用舍行藏與時伸縮胡為遑遑誰訪誰逐此老聰明有書滿腹長吟短章稿幾盈屋豈厭盛名將趨靜穆抑昔詩人逃禪成俗彼學虚空如入幽谷人人火書惟恐不速此老大賢詎為所梏寫意適情不拘方幅左無黃冠右無緇秃固知二氏非其所欲春風沂水亦翻新局觀者無誤謂求天竺畫鷹欺熊箴余所見古今名手畫鷹者衆矣大抵類正鵠繡羽毛鮮可觀也玉山佈置超脫有勢有神鐵榦梅花踞棲得意又作一熊趨樹下彼此相照似極惶急余頓怪此鷹强梁不覺動抑强扶弱之興援筆袒熊主反為客此則玉山之能移我情也筆墨之妙一至于此可愛也夫為箴曰鷹犬之才眈眈熊羆之彥得無有妬心乎汝既居高臨下可肆搏擊彼亦自忘雄健靡然而趨豈其智不足力不敵哉高卑之勢懸也試思如熊如羆則折衝禦侮非熊非羆則帝王之輔豈汝輕薄羽毛所能攫挐而吞噬况彼多力趫捷肯困草莽泥塗間誠恥夫饑附飽颺如汝輩饞口惟利是視耳梅花初放春色方來且各息爭機從容相睇各自樹立何如曾叔祖侍御紫濤公像贊於戲此吾族祖紫濤公遺像也公弱冠遊學粤東入海豐庠登賢書粤人訐而削籍崇禎元年詔改還閩籍成進士以家于粤不忍去卜居潮州之普寧子孫遂為普人矣雍正五年鼎元奉簡命出宰普邑普中父兄子弟皆體諒遠嫌鼎元亦未遑敦一本之誼幸各守禮法興仁讓無獲戾於普邑士庶然此心缺然亦足見俗吏之不可為也罷官之後乃步入祠堂啓公像瞻拜焉歲久蠧蝕命工人整而新之為贊曰赫赫直指蹇蹇王臣公忠為國康濟生民觸邪排佞不憚批鱗明末宦寺勢傾紫宸公䟽搏擊大璫王坤羣閹屏息朝廷始尊薦黃救魏薦起黃道周論救魏呈潤威鳳祥麟海内拭目治平可臻法行自近戚里元勲蹻蹻權貴望風而奔三邊驄馬九野懽訢大同宣化遺澤今存梁督廷棟失馭辱軍公糾其罪將士氣伸出按三楚時事棼棼雈苻遍野藩封腥聞民生其間如溺如焚公心憂傷不寐忘飱日撫流寇夜籌脫巾王不可治治其私人他藩猶可貪虐惟岷岷藩長史聴者驚魂吳氏從哲其惡無垠擢髮難數天日為昏請誅諸市以快羣倫遭王反噬禍幾及身民懸可解身家遑論逆賊獻忠妄肆邪氛禽斬未能權施撫循既撫復叛叛後更馴極知養虎非可相親冀獲掩捕如縛雞豚殫心竭血兎爰頻頻天不祚明人謀空慇鞠躬盡瘁可告蒼旻公之忠誠衝霄貫雲敬瞻遺像嚴厲直溫子孫珍重千秋不泯叔祖司馬時山公像贊時山公富於學博通今古典故尤以詩名仕明為職方主政見時事日非急歸田絶仕進念順治八年詔起復原官以母老辭不赴逍遥山水年八十餘猶飲酒賦詩自樂鄉人以為有陶靖節先生遺意云贊曰聖人之學時中而已可仕則仕可止則止公在勝朝宦情如水甫入中樞投簪還里急流勇退見幾知委盛世蒲輪翹翹趣起有母年髙難堪陟屺陳情終養人稱孝子從兹息遊談經論史寄傲東郊閒觀耘耔崑山片石坐卧徙倚有酒則醉登舟則艤隨興賦詩以蕉代紙遇景盤桓不知遠邇八十餘年靖節相似與時偕行江流嶽峙懷遠將軍劉輯侯圖贊將軍楚人也分節潮陽潮之人安樂之余以丁未冬兼攝潮令篆與將軍同城值頻年荒歉之後軍士乏糧者半載懸釡嗷嗷民間岌焉賴將軍威德深入人心約束至善是以軍士雖枵腹而罔敢越思得以待余之來也雈苻遍野水陸道梗將軍與余同心協力晝宵擒鋤二三十年漏網之盜靡不搜治廓清共事歲餘未嘗以私干瀆惟地方利害侃侃商謀佐余不逮者甚多今潮人夜扉弗闔商旅晏然兵民相親如同昆弟皆將軍力也余以狂愚致觸權鋒遭吏議軍士憫西來粃穀累余身家願于月餉搭支免余賠墊道憲樓公運來西榖一萬四千石積貯潮陽運官船户沿途盜賣買粃穀攙和應為賠補三千餘石佘查出奸弊拿獲賍穀併盜買犯證繩船户等以法致䝉憲怒捏欵揭㕘時方賠過一千二百石尚有粃穀二千餘石弗能代賠潮陽海門達濠三營目兵憫余受累願于月餉搭支於是署事接任陳閔二同寅亦與余分賠一千二百石其餘分配營兵支完方得免累古道之風猶存行伍知將軍之德教深矣今當宁留意人材將軍一舉一動皆超羣類之表旦夕遷大鎮節鉞封疆自其分内事耳余既愛將軍材武重將軍之行誼喜將軍惓惓民生為余綏靖地方之知己也於其圖而為之贊曰偉哉將軍孔武且仁威鳯丰姿龍馬精神強弓大㦸絶類離羣出入行陣虎吼雷奔五羊勞勩黃岡忠勤自來潮邑山岳生春伏莽革面夜吠無聞兵曰師保靡梗弗馴民曰父兄藹然以親惠澤公溥投醪飲醇帶牛佩犢沐德維殷樸誠直爽不事虚文言言要道步步率真胸有血性手無汚塵瘴江蜃蜮變幻烟雲風清日朗僅見斯人他年績茂追古大臣將移此圖繪之麒麟壬午忠節略建文壬午燕王棣陷京師羣臣不從逆而死者百餘人文學博士方孝孺斬衰哭罵不肯草詔抉口錮獄燔削先墓戮其九族皆不從乃并坐其朋友門生廖鏞林嘉猷等為十族然後磔於市坐死者八百七十三人謫戍死者不可勝數二少女被逮過淮連袂投水弟孝友亦慷慨就戮有取義成仁在此間之句兵部尚書鐵鉉背立庭中割耳鼻爇肉令啖不肯一顧寸磔至死罵不絶口以油熬其屍令内侍以鐵棒夾使北面油沸丈餘内侍手糜爛走屍仍反背老父母安置海南二子編伍充匠尋皆見殺妻楊氏并二女發教坊楊死二女終不辱後赦出適士人左都御史景清植立嫚罵抉具齒血噀王袍剝其皮實以草繫長安門碎磔其骨肉燕王過長安門索忽斷所械皮趨前搏王王驚命燒之已而夢清仗劍追繞王座赤其族籍其鄉村里為墟禮部侍郎黃觀聞變投水死亦束芻冠帽剉於市籍其家連姻黨百餘人皆謫戍妻翁氏并二女配象奴翁及二女家屬十餘人俱投淮清橋下死監察御史高翔喪服不屈沒産夷族諸給高氏産者悉加稅令世世罵翔親戚悉戍邊又發其先墓雜犬馬骨焚灰揚之以其地為漏澤園右副都御史練子寧斷舌不屈血書成王安在宗族棄市者百五十一人九族抄戍者三百七十一人大理寺丞鄒瑾京師陷自殺亦夷其族四百四十八人僉都御史司中召見不屈以鐵帚刷其膚肉至盡姻婭同死者八十餘人大理少卿胡閏衰絰不更夷族不屈命力士以爪落其齒齒盡而罵聲不絶剝皮實草殺其家二百十七人監察御史董鏞姻族死戍者二百三十人禮部尚書陳迪抗聲指斥與六子同磔於市宗戚被戍者百八十餘人千秋公論明于日照徹區區不二心其衣帶中之句也袁州太守楊任籍產族誅親戚百餘家皆遠戍户部侍郎卓敬以不為管仲魏徵夷三族太常卿黃子澄少卿盧原質監察御史魏冕王度巨敬盧振宗人府經歴宋徵皆以不屈夷其族御史鄭公智以不屈故戍其族左拾遺戴徳彝不屈將赤族嫂項氏聞變令盡室逃獨身留被械焚炙遍體無一言戴族乃全其不及宗族親戚而被殺戮磔械棄市者刑部尚書暴昭去齒斷手足斷頸而不悔郎中王高大理丞劉端俱滅鼻捶殺而猶謂有面目可見皇祖侍郎盧迥長謳受刑御史甘霖從容就戮連楹引頸受刃白氣冲天而僵立不仆張彦方暴屍譙樓暑月經旬而顔色如生户部侍郎郭任父子俱死兵部尚書齊泰駙馬都尉耿璿兄弟俱死副都御史茅大方父子祖孫俱死青州教諭劉固父子兄弟老母俱死漳州教授陳思賢率六生哭於明倫堂亦俱坐死六生者伍性原陳應宗林珏鄒君黙曾廷瑞吕賢也又有尚書侯泰侍郎黃魁胡子昭給事中葉福陳繼之韓永御史丁志駙馬梅殷長史程通龍鐔博士黃彦清按察僉事湯宗知府姚善葉仲惠陳彦回黃希范同知周繼瑜知州蔡運神策經歷周璿皆被殺戮磔械棄市以死其不屈而自殺者吏部尚書張紞侍郎毛太太常卿廖昇僉都御史程本立衡府紀善周是脩谷府長史劉璟御史林英夫婦孝子高巍自經死給事中黃鉞赴水死龔泰投城死翰林王艮伏鴆死郎中譚翼赴火妻子自縊死浙江按使王良自焚死其妻先投水死中書舍人何申慟哭吐血死都司斷事方法投安慶江死樵隱指揮張安棄柴投水死工部侍郎張安國及其妻鑿舟自沈死寺丞周宗起及其子俱投琴川死永豐鄒朴教授劉政吏目鄭華不食死浮梁教諭王省觸柱死含笑於地下不愧文天祥而御史曾鳯韶夫婦死矣翹首謝京國飛魂還故鄉而刑部主事徐子權死矣周粟豈不佳所見良獨偏而修撰王叔英及其妻二女死矣至於燕山衞卒東湖樵夫或日夜涕泣不食而斃或仰天大哭投湖中皆死者也其最可恨者身死而妻女分𨽻教坊配象奴若鐵鉉黃觀齊泰茅大方胡閏陳繼之姚善侯泰董鏞郭任謝昇胡子昭陳彦回牛景先等十數人皆遭此虐焉論曰嗟乎此豈有仁心者哉毁體磔身熬屍剝皮慘於炮烙𨽻教坊配象奴辱於刳剔殺戮之慘何若是之甚也嬴秦雖暴族不過三不聞其以十也發人之墓辱人之妻女酷烈之行也甲申之變完節者六十餘人不聞李自成以此施之也忠臣義士何代無之未有若斯之慘且衆者也開天闢地以來殉主報國之臣夷滅菹醢至永樂時極矣因誌其大略以為萬古之戒臺將劉得紫陷賊不屈事錄劉得紫字樹公其先直𨽻文安人有明中葉七世祖指揮均寓居遼陽遂籍焉我朝龍興遼陽首附收入正紅旗得紫伯父清泰總制八閩父朝英以甲午副榜授湖北江夏令卒于官得紫時方十二齡家徒壁立孤苦好讀書尤工騎射康熙四十七年八旗以騎射選引見得録用由步軍校牛彔章京累遷至侍衛上神武善射百步穿鼓子百發百中顧羣臣罕有能及者命得紫得紫惟上意所適視鼓子中邊上下左右命中不差毫釐上大悅自是每射必從明年補石匣守備未幾遷山海關都司復遷汀州鎭右軍遊擊五十九年調臺灣鎭中軍遊擊秋七月抵任訓練有方子兵字民臺人敬且愛之在臺九閱月南路崗山土賊朱一貴倡亂夏四月二十有一日聞報請出師親往𠞰賊鎭帥弗許遣右軍遊擊周應龍以行越七日兵敗賊陷南路營乘勝直趨攻府得紫偕鎮帥率諸將弁分剳春牛埔禦之晦日大戰得勝賊退竿津林五月朔日黎明賊衆漫山塞野分路俱集得紫獨當一面鏖戰中路口須臾兵丁王福舟奔報鎮帥兵敗得紫急殺回春牛埔救應則總兵官歐陽凱水師副將許雲遊擊游崇功戰敗死矣賊四面攻圍得紫猶賈餘勇左衝右突奈衆寡不敵所乘馬為賊所殺遂被擒引頸受刃賊素重其名不忍殺得紫從容謂之曰吾為天子命官今日萬不宜有生理但求埋吾帥屍首死亦瞑目賊首黃日昇嘉其義聴之已復羈學宫朱子祠求死不可得賊與之言弗應遣其徒進食弗食餓數日不得死同難漳浦人陳上珍見其不食不語日永難卒度貽綱目三巻自夘至酉不釋手賊勸之降厲聲曰汝輩要我順從快把刀割了頭去賊相謂曰劉公忠義人從其便但戒守者不令出凡良民入省視弗禁得紫猶不食七日仍不死把總張文學贊禮生陳時遇揣其不食賊之食親為煑粥勸進得紫泣曰食禄不分憂乘馬不濟難縱賊憐而生我何面目見東寧父老是時羣賊不和將吞併諸生林臯劉化鯉等言諸賊皆攘雞盜牛椎埋烏合之衆亡可翹足待乃稍稍進粥食延性命以待王師貢生黃國英民人鄧世禄楊鼎龍等餽金錢衣服物食日相繼有不識名舊兵見得紫卧地移一床與之又有泥水匠贈氊褥亦不知其名六月十有六日大師攻克鹿耳門復安平鎭得紫聞知大喜然守者益戒嚴十七十九兩日戰鯤身賊復大敗得紫陰散賊黨去者半焉越三日守者盡逃得紫因得出遂叩統師軍前請帶罪立功募丁壯百五十人隨師征𠞰北路二十八日遇賊於大穆降得紫奮勇先驅衝殺大敗之所向無不一當百斬賊徒無算奪其旗械窮追至鹽水港閏月七日領兵接應溝尾庄鄉民圍捕賊首朱一貴等巨魁脅從皆就縛南北二路悉平臺郡士民以得紫為奇也白其事于總統大帥請旌之以勵臣節論曰劉得紫可謂從容就義臨大節而不可奪者也崗山之役早以斯人行當必不至于此悲夫東寧禍殃蓋亦有天定焉士君子遭際不同或舍生取義而死或取義求死不可得而生其忠貞一耳得紫德容晬盎望而知為端人正士余東征得覩丰裁愉快不能自己於其去也思之深因珥筆而書其事雖然君子愛人以德得紫今後或出或處俱不可知當念名節既成以第一等人物自命無使後之遜今則余文藉不朽矣吾友何峯山將還中土此行必見得紫以斯言告之鹿洲初集巻十五
