body:
  text: 鹿洲初集卷六廣州府知府藍鼎元撰序送宫詹沈心齋先生還浙序浙西沈心齋先生曩以宫僚來督閩學清公明慎為有閩學使第一還朝者四載矣閩人思之甚搆祠勒碑用志不朽猶云未足為報也歳己丑先生以歸省之暇重遊閩邦邦人士喜躍欲狂如赤子之依父母日於名勝地集良友鋪几筵以娯先生先生顧而樂之分韻賦詩張侯較射登道山望滄海拜九賢書院上平遠臺出西寺泛舟西湖乗風荷亭之間凡榕城古蹟名勝及時人園榭亭沼諸生無不奉以遊遊無不醉以歸如是者匝月將行諸生把袂牽衣復為强留數日或奉將錢幣或解刀劍琴書竹石玩好山蔬野品隻雞樽酒各以其意致慇懃先生雖固辭不得也而興泉汀漳之士日望先生辱臨以壯山川之色伸尺寸微誠者竟不可得喁喁怨慕亦各携筐餽贐寄遙情于千里之外且囑後日來閩無獨棄我南州為也是時鼎元家居去㑹城八百里倍道疾趨六日造謁至則刻期登舟矣倉皇再拜悲喜交集因念昔者先生督學閩南鼎元獨䝉國士之知追隨三載丙戌一別四易星霜曾不能有所樹立以慰先生之望加以雲山遼逺覿面無由於今始得一見而招招舟子鼓棹欲西生非草木何能為情於是隨至武夷同行七百餘里目覩先生所過富沙南劍諸州多士迎送懽闐慇懃欵洽不異所聞於三山者始知古人所謂廉吏不可為者之妄也人當涖官據要時雷厲風行何求不獲迨事權己謝有靦面目不堪復對此邦之人即中材以上有恩澤於人者事後重來其慇懃欵洽不過數人而已孰能使九郡一州六十縣之衆人人踴躍如一心哉先生昔日在閩之苦鼎元身親見之而先生毅然不回及事竣還朝蕭瑟難堪愛先生者莫不以太自苦為憾觀此日之行樂乎否耶人生富貴不啻浮雲金穴寶庭於今安在先生雖自苦於一時而名且流千百世邦家之光豈獨吾黨之幸乎特恨鼎元不能同至浙西又將匆匆別去也黯然銷魂澘焉出涕未知侍側又在何日敬書數語以送先生之行送陳少林遊呉越序吾友陳君少林將遊呉越鬻田質衣拮据百餘金以行同學諸子追而送之邑之郊餞焉少間有執爵而言曰拙哉先生示富耶寒士出門携數寸不律襆被一囊足矣必效富人載金而出能遊者有幾或曰方今世路氷清當道貴人不忍以財帛汚君子遊者所至擁篲迎門鞠躬揖讓及其歸也兩拜而別耳長汀黎媿曾先生每聞遊客歸來必問被囊在否在則酌酒相慶君無乃鑒于此故預為之備與陳君笑未有以應藍子曰噫君之為此有所為也君昔在襁褓尊人寓居東粤與㑹稽林漢冲公友善君二歳喪母尊人以托于林未幾尊人又没林撫君如己子教之讀書成立及君伯氏元戎公擁旌節于粤始以君歸而林公己卒君經紀其二喪既復負二骸同兩尊人柩還葬于浦林公有孫在㑹稽君庚寅遊越當事有餽君金者君傾囊與之今拮据此行將為更置桑田數畆非漫遊之謂也或曰君家未有足食之政而遽為此舉人情乎陳君愀然太息徐而應之曰噫吾之為此非得己也吾少受林之恩不啻父母向者尚思改葬二柩還諸㑹稽冀得稍稍有力將經理其家以厚為報今年逾半百功名二字淡若浮雲筋力日以就衰後雖欲行難矣吾非不恤吾家顧念饑寒吾素即不為此亦無解於饑寒藍子曰嗟乎古道之不存久矣負恩寡情皆由富貴未有責及貧賤者夫惟吾黨能人之所難斯世道人心頼柱礎耳君才具優長文詞古雅不屑意于非道之富貴而情義之間若此亦足觀矣予與君同受業于廷尉陳公閣部沈公之門君此行將由㑹稽而鄞水存問吾師廷尉之家又將過浙西溯苕霅哭吾師沈公靈次為漳郡及門致諸祭軸誄章是則予小子所傷心内慙臨風隕涕者也稽首丐君于二師之前為予小子多一拜焉秋風瞬息鼓棹遄歸或兼程入都就試京闈一展平生經濟報二師平昔之望吾知林公九原其喜更有大焉者矣因書數語以送其行時庚子莫春三日也送林仲謙之陽曲序仲謙如晉應沈陽曲聘也辭家七千里劍佩長征將由粤而豫章歴江漢經鄭衛以至太原同學諸公出邑郊三里送之得仙橋賦詩酌酒為別仲謙意氣豪上無黯然銷魂色斯遊也可謂壯矣秋髙桂馥奪幟燕臺春日杏花驤首王路在此行也夫士君子一舉一動必思有益於人目之所觸足之所履皆有痛癢關心之處吾聞陽曲古晉陽地繭絲保障事在人為沈君賢且能必有以擇乎此仲謙經濟才長得與朝夕談論揣摩民間疾苦晉之窮簷其靡不周乎在上體恤一分則民受一分之賜不特物力為然民隱尤甚願仲謙與賢主人共存此心以為陽曲之幸此行為不虚矣是為序送謝古梅太史還閩序太史謝古梅謁告將南歸同學榮其行也為詩若文以送之於是鹿洲藍鼎元慨然嘆曰噫美矣良友之行余亦安忍默也顧以浮華之辭則不能揚頌之辭則不必離愁別緒亦近婦孺氣非所當言思惟朋友之義有善相勸勿謂余為迂余亦達其情太史曰善試言之鼎元曰太史於詩為伯於文為匠於字兼晉唐宋元諸家之長志髙而行篤學博而才宏今之三代士也余惡乎言諸年少而壓羣英排金門典一代鴻章鉅制海内方以燕許相推重忽興將母之思足亦解趣移疾有辭今將扶笻杖趨桑梓開竹廬於道山之麓板輿萊袖以林泉詩酒為養志人生勝事無有過於此者余惡乎言諸雖然太史好學者也行矣為鄉先生請與言吾鄉之學吾鄉前哲自龜山得伊洛之正傳歴豫章延平以及朱子斯道燦然如日月經天淵源可得而溯也建陽游定夫與龜山同出程門武夷胡康侯則程門之私淑也傳二子為致堂為五峯而從子籍溪與劉氏屏山白水皆嘗為朱子之師可謂盛矣朱子傳之蔡西山九峯黄勉齋陳北溪李果齋諸先生而浦城真西山又朱門之私淑也有宋閩儒甲於天下爰及元明以來亦有熊勿軒蔡虛齋陳剩夫稍稍絶續吾儕生先儒之鄉可令鄉人不知先儒之學乎憶侍中丞儀封公倡開鼇峯講席爾時同學諸君子彬彬一堂曾幾何日遂成疇昔余不肖固不足道其他皆以事業功名顯於此事寂寂鮮聞惟蔡梁村先生一繼臯比不憚大聲疾呼以成就後學為已任今仕宦於朝又無暇此太史之居則勉齋故里近鼇峯若彼其甚也余不能無厚望焉詩文詞賦真草篆𨽻之學偶爾適情游藝焉則己必孳孳矻矻日夜以求極其工則程子所謂玩物喪志者矣太史于此數者既並臻絶頂直造古人之奥域願自今勿復以此為意專一心志於聖賢之學誘廸吾鄉英偉之士使皆篤學力行人人有不自暴棄之思又相與講求經世理物兵農禮樂之經濟使皆有體有用達可為國家之名臣窮勿墜閩學之宗風則太史之功大矣俗士狃於見聞以科名利禄相矜髙與之言聖人之道則駭為狂且愚不知道非髙逺即在人倫日用之間臣忠子孝兄友弟恭夫婦居室朋儕洽比一舉一動皆有當然不易之則夫誰能出吾道之範圍乎饑而食渴而飲人人皆然也而食所當食飲所當飲即道也異學以窈㝠昏默虛空影響言道似人生綱常倫紀之外別有慿虛髣髴之一物是以終日言道而無可捉摸言悟道而歸於惝恍善乎朱子之言曰道者日用事物當行之理皆性之德而具於心無物不有無時不然所以不可須臾離也孟子曰人能充無欲害人之心而仁不可勝用人能充無穿窬之心而義不可勝用仁至義盡則己為聖賢矣此無欲害人無穿窬之心學者敢謂自己無之乎而不敢學為聖賢是立志欲害人欲穿窬也聖賢未嘗難學人人皆可以勉而能而特不許浮偽者之矯托于其間若外談仁義而勢利若烈火之焚心貌似篤誠而胸懷若鬼蜮之變幻此等為吾道之害有甚于釋老異端辭而闢之廓如夫非吾徒之責歟太史榮名既成蒼生未迫乗兹寛閒之歳月知必有以闡明絶學大為功于吾道者道固在躬行不在詞説而欲傳之來學則不得不費詞説太史安得獨吝也禮於名當諱卑不可以名尊賤不可以名貴然二名不偏諱記亦有之余不敢避世俗之嫌請太史思當日父師命名之義太史名道承當不以余言為迂而必求名稱其實乎吾友林洙雲績學精深踐履純篤天將使與于斯道也是故老其才於有用不忍以科名利禄早紛其力量而淆其志氣蓋所以待之者厚矣幸併以余言告之送李司諫觀察江西序今天子重民生國計之任愼簡名卿士為牧伯於是大司諫樂亭李公承命觀察西江綜理糧儲諸務公畿輔名儒為吾師儀封先生丁酉京闈弁冕士先生以絶學屬之戊戌㨗南宫簪筆侍従癸卯甲辰分校禮闈者二典江南鄉試者一所得士皆卓卓有聲天子方開言路崇正直遷公諫垣乙巳擢都諫天下想望風采將頌公為名諫官甫越月而又有此行蓋聖主愛公之深用公之速而西江獨䝉嘉惠何其幸也夫觀察表率守令佐制撫宣朝廷政化為一方上下樞軸所係甚重守令弗能其官觀察得更張之制撫弗便于民觀察得匡救之依阿詭隨無所建白則負當宁簡任盛心若有意自表孤貞棱棱圭角亦非協恭和衷同舟共濟之道膺斯任者良難矣况糧儲民生命脉國家本計取於下者留不盡之脂膏藏諸官者絶侵漁之雀鼠管蕭流亞乃足以與于斯天子知公精明渾厚有經世理物之才不得不暫移股肱耳目為民間調燮元氣公之行也正已率屬以匹夫納溝為己任有體有用不隨不激展布歳月之間當必大有可觀者余與公雲泥迥隔而所學同師亦有榮辱相關之誼不自覺舉手加額為吾道幸也抑吾聞西江多君子鹿洞遺風於今猶昨公得無有儀封師之志乎振興絶學長育人材所以報聖天子知遇為百年民生國計造無疆之休豈區區目前云爾哉於其行書以送之送勞尊三令昭文序吾友漢陽勞尊三以詩若文雄江漢壯歳㨗南宫或尼之因困滯未得行所志乙巳秋中天子以江南財賦重地新析蘇松閒十三邑政繁局創非才長行卓不足以勝厥任於是宰相薦其能而尊三得昭文以去昭文距姑蘇未百里分常熟故邑之半似無難治然歳徵租賦較貴州一省尚加其倍有竒草昧初開百務創始一日精神當周數世以後為之亦良難矣且邑令者民之父母也父母于子養之教之燠寒疾苦事事關心豈徒催科云爾哉然江南所重首在催科晝夜敲扑號呼達旦歳未能完十之六七雖有卓魯不暇煖席此其間豈盡民頑亦為之未得其道也余聞江南之弊惟在册籍不清户無真名畆無真額其民亦無真欠或田己鬻十數手而額糧尚畱本户為我價勒贖之基收糧經手侵漁之地或細民畏官吏苛擾以糧畆附豪强户内者有之又有包攬代兌之弊吏胥役𨽻欺隱之奸輸糧者一人乾没者數手此之為害不可紀極而刑杖輕重民役不同以役笞役百千不癢官有敲扑之名役有為民受責之功民又有出錢為役養板之困於國計毫無禆益也以君聰察必能灼知利病湔洗舊習與之更新昭之民其有厚幸乎愚謂他務未遑必先為良法以清其册籍使人有真名名下之糧有真額然後可按籍而稽完者真完欠者真欠為良法以催其輸納去包收代兌欺隱之弊尋常比較敲扑一概勿施施則必使之畏使之服使役與民俱不敢犯而後刑不濫而法必行而又以時巡行阡陌與老農課晴論雨問苦樂勸耕桑作興學校萃文章經濟之才為書院以教育之沙汰僧尼使消怨曠旌賞孝弟義烈存䘏孤寡搏擊豪强使民惇厚案無停牘訟無久累訟師蠧盜盡法鋤除而又教民齊家使風化起于閨門一變其入寺燒香出郊嬉遊之故習余今贈君以女學一書君其為我播而行諸否訓方型俗良有司之事也為民父母子女皆當教誨君無以余言為迂也君才具有餘牛刀割雞無足措置多謀而兼以能斷愼重而濟以剛果他日宰天下亦若是焉己矣君必大有以報天子宰相之知非鄙人所能測識顧余猶不揣妄昧以區區芻蕘進者朋友責善之道不以臨岐別緒浮詞贊頌為長諒泰山河海不以土壤細流而厭之請修補普寧形勝序從來氣運之盛起于人心文物之興由乎衆志故湮鬱將開必有人焉起而振之譬如燎原之火有鑽其燧而為星星之然者然後焚山烈澤光輝照乎四國是知事無大小為之則成欲之即至人心之專一即為造化之感通未有能限之者也古稱人傑地靈謂地靈可挺人傑之生亦人傑能補地靈之闕二者相因詎可以人事不修而徒咎山川於造物哉普邑山川秀美土田沃衍雖彈丸蕞爾可云樂郊而文物未興大雅弗作無論仔肩道統經天緯地之儒吾不得而見即文章科名尋常泮璧之士亦寥寥晨星不及他邑一村落焉建邦啓土數百年無有留心及此一從而振興之者良可嘆也論者惑於青烏家之説謂巽地文峯弗起溪水來短去長河隍焦乾地理淺薄永無文物之望余曰噫此可以人力補之耳因相度形勢邑東郊崑安寨居巽方小山隱伏竒石虎踞古為文昌祠故址今祠移邑中可建文明閣於上昂凌霄漢以當文峯中祀濓洛關閩五先生旁設學舍百十楹為普邑人士讀書講學之所榜曰文明書院人事與天工並至則文物之根源也水口石潭山亦為巽地建急水塔山巔作中流底柱使河行停蓄不患去長又有文峯挿天之勢命其名曰文峯塔以明余之所建特取聳秀壮觀與迷惑于浮屠邪説者不同也學宫之前舊有泮水宜清深今沙淤為陸當疏濬之凡城中大小溝渠城外環繞濠水一槩開通使舟楫可行如人身臟腑通達脉絡分明血氣周流無所滯礙則四體自然堅强百役自然從令蓋有諸中者不待外求環城皆水又不患其來之短也余涖兹日淺越爼潮陽屈指一歳之中治普纔兩月耳雈苻既清雀角亦馴此一變至道之鄉余固樂其民風之質也潮之文物視茲百倍余治潮之苦亦視兹百倍而功利夸詐不可救藥竭晝夜鋤荆剪棘明先王之道以道之尚未能一變至魯余于是亦遂忘其為普之余凡普事弗遑經畫非獨於潮厚而于普薄也幸年歳豐登萬井盈寧余得偷潮冗之閒為吾普培禮教信義之俗欲與普士興正學必先為普人壯志氣峯髙水深地理淺薄之患吾知免夫余於潮有棉陽書院於普豈可無文明書院祀濓洛關閩諸儒讀濓洛關閩之書人人有為聖為賢之志他日英才濟濟詩書禮樂直紹魯鄒而文章科名之號為文物又其所操劵而藐焉小者也但土木之興工程浩大濬河築塔建髙閣而開書院自笑清俸無幾未免有蚉力負山之虞蘧伯玉恥獨為君子余敢不與斯邑搢紳先生好義樂施諸人士共之語云衆擎者易舉集狐成裘積簣成山諒諸君必有同志不待余之贅也姑弁數言以當鼛鼓重建苕南書院醵金小序漳之有苕南書院為吾師心齋沈公生祠師來視學既明且清為有閩學使第一文章意氣入于人者深矣書院舊在西河登仙宫側頗簡陋十餘年來吾黨惄焉乙未冬十月更卜地龍門山竒特爽朗怪石嶙峋可愛甘棠蔽芾其間有合周人思召公之義僉曰吉問其主則呉及蔡若黄若潘若劉五姓六七家之所寶而弗售者也聞欲建沈公祠六七家者皆欣然願各亷其直遂購之鳩工庀材版築丁丁中堂輪奐成且有日而堂之前後舊屋宜清新楹宜構俱有待經營焉門徑䆳然又廣大可容駟宜建築西南學舍七八間宜葺治山之上議建清風亭古樹森隂鳴聲聒耳緑野清溪繚繞城下為郡中第一名勝宜捄度規模己定需費浩繁集腋而裘是誰之責與呉蔡諸君聞風者髙義且爾況在吾黨其又何説之辭敢請同志共襄盛舉勿以貧富較量各盡心力拮据使苕南勝蹟與紫陽鹿洞並垂不朽龍門之山聲價十倍矣方輿小序有邦國必有圖籍自古為然蓋方域之廣蒼黔之衆敷治者不能躬自遍歴也因為圖若書以統貫而條理之不出户庭周知天下之故大政逺猷皆從此出是以周禮大司徒掌以職方而聖人見負版者式之重矣後世所謂圖山水畵卷耳望之蔚然可觀按其東西南北且有十九不合者即位置不甚剌謬而圖固不能言也代之言者率又浮光掠影語焉不詳求其談之歴歴如聚米畫沙可按而行𣺌未之見也潮郡嶺表名藩屬縣十有一煌煌井疆較虞周大國不知幾倍大山大海幅員雄壮播之輿圖上登天府詎徒為美觀哉將於此求治道焉疆啓自漢歳閱二千兵燹既多滄桑屢易經之營之有居重馭輕之要有控制調劑補偏捄敝之宜必待脂車秣馬䟦履山川而後議鞏磐石將不勝其勞矣兹編方輿具有苦心披閱之下十一邑提封形勝阨塞險易苞桑户牖瞭然心目之間其所謂指諸掌者乎一方清晏百代治安按籍而定焉可也志方輿城池小序有城有池國體也鑿斯築斯王政也若曰徒以固圉則時際隆平夜扉不閉安事此乎然設險以守大易垂象原為太平無事者言之春秋以莒為戒惡弛備也潮郡故皆石城濠流環繞金湯壮矣都村棊布擁衞如雲既泱泱乎表海亦惟勤修時政使地利與人和並興庶於國體有合焉志城池兵事小序潮郡山深海闊宵小易於出没依古以來兵事多矣舊志謂山魈易撲海冦難靖蓋有鑒于當時鄭氏父子祖孫竊踞臺灣蹂躪邊疆故為是懲羮吹虀之言耳山藪腹心重地脫有莽伏詎可以為易而忽之善用兵者先治内而後治外使吾民安業樂生尊君親上峒崖樵牧含鼓嬉遊雖有海上遊魂寧敢窺吾圉哉況今萬里波澄島夷効順宄孽絶踪向之飜濤破浪為我民憂轉而百貨流通為我民利斯亦千百年來僅覯之隆平也民生不見兵革守土將怠而驕前車之覆後車之鑒因縷述寇變撻伐諸事使凡百君子觸目儆心咸知制治保邦當有憂盛危明之意焉戒衣袽籌未雨非曰迂遠而不切於事情也志兵事人物小序潮郡山髙海闊幽竒雄壮磅礴鬱積之氣鍾為偉人為傑士固其宜也昌黎過化天水奮興而後趙德海陽人韓愈刺潮州牒攝海陽尉為衙推官勾當州學時稱天水先生文章行誼星炳雲燦蒸蒸然盛矣聖朝教養百年君父求賢若渴誘掖奨勸造就多方雖木石猶將鼔舞況具有血氣心知之性而誦法聖賢者乎官無論大小立忠者貴人無論窮達砥行者傳讀斯編者頑亷懦立思欲為邦國增光駕古人而上之鄉士大夫之責也樹之風聲激厲培植使成人有德小子有造地方司牧之事也匪誇既盛用勵將來志人物孝義小序孝庸德也義者宜也人無此二者吾以毛角目之矣尚儼然命為人物哉人物有志孝義該焉何事多為差等乎曰然何以處夫山農閭巷目不辨之無未得躋人物之數者孝為百行之原推其極可以格天地洽神明馴致乎篤恭而天下平之盛故聖人以是為德之本也敎之所由生也雖以堯舜之道不過孝弟而已若非其義也一介不以取諸人千駟萬鍾視同嘑蹴至於急病讓夷敦解推之誼事關家國頂踵可捐詎得以韋布少之孝義之于人大矣哉潮雖僻處嶺嶠而雞豚旨甘刲股廬墓人有同情或貲財可共或忍飢不食非義之食或出入萬死一生救全城旦夕之命固亦卓卓犖犖不應與草木同朽者潮之孝義大概可觀矣沐浴聖化日漸日深將見孝里義門遍鄉村而皆是太和洋溢於變時雍安能量其所届乎志孝義流寓小序名賢所至山川生色瞻丰采者如快覩景星鳯凰雖世逺年湮猶將侈為勝事焉潮處嶺外蠻烟瘴雨之區自古以為罪臣投荒之地氣運日昌化草昧而開文物海濱鄒魯錦繡江山駸駸乎與上國爭瑰麗由是偉人君子無不來遊來歌以擴其胸中幽竒曠朗鬱積雄浩之氣而寓公輪棹踵相接矣其以譴謫至者若常衮李德裕趙鼎等十數公既以廢置諸賢附於名宦之後居官無慚于君國雖竄謫猶陞遷也今兹所紀皆屬逺遊亦有貞臣烈士﨑嶇于風濤崖谷之間提兵集旅究同傳舍則皆得以寓賢列之嗚呼乾坤正氣蔚為正人在一鄉一國則為鄉國之光足跡徧天下天下人皆欲私而有之若蔡京秦檜子孫且不以為祖況他邦逆旅車轍塵雝之汚人乎讀是編者流芳百世之心勃然興矣志流寓風俗小序千古治化全在風俗故觀于鄉而知王道時雍風動則為唐虞澆薄囂凌則為季世唐虞叔季豈以古今論哉風俗異也潮自昌黎謫守是邦士篤文行民稱易使海濱鄒魯可謂隆矣千有餘載時異世殊流風日下習俗因之忽蠻忽跖亦儒亦釋强悍慆淫功利夸詐兼而有之𨽻卒齊于搢紳逐末多於務本鄒魯之風遐哉替焉幸賴我皇諄諄教化聖諭廣訓月吉宣傳陬澨窮鄉聞遒鐸而蒸蒸興起一變至魯一變至道於以幾于時雍風動何難乎夫奢示儉儉示禮風行草偃端屬何人承流宣化之君子精神命脉不可一日不在於斯也志風俗物產小序周官職方氏掌天下之地九穀六畜有別管仲相齊以五施別五土蓋盡地利窮物宜以導民樹藝而安居後此經天下者皆勤勤于物產為萬姓阜財求而利器用焉五方風氣不同所產亦異潮處南服霜雪罕到四時皆眷草木敷榮禾種山巔者有之蔬果之類出非其時海錯繁多雖更僕未可悉數也若夫瑰寶竒珍來自南交外域於潮何有焉書曰不貴異物賤用物民乃足又曰惟土物愛厥心臧因所利而利之重物力以淳民風則樂業安生飛潛動植之間皆有王道志物產古蹟小序探竒問勝懷古情深非陳跡之可傳亦地以人重也潮處天涯未覩三代之車轍既不得與魯衛齊秦並誇聖賢芳躅然而一隅之地亦有名區昌黎之鄉校雖湮紫陽之遺踪尚在聞其風者猶將頑亷懦立矧身履其境而低回憑眺乎忠臣孝子名流碩彥撮土片石皆足動後人觀感之思其蹟存即其人存也不然瓊枝玉樹金谷瑤臺亦等諸荒烟蔓草己耳君子觀古人遺蹟當思為其可傳者夫志古蹟雜記小序志以雜名紀軼事爾譬諸厯此其閏也方諸易此其雜卦也搜羅今古凡書不盡言言不盡傳耳目所未經意想所不到者皆雜也茍可以擴心胸資談助無論洪纎曠𣺌胥為錯綜以出之要不使離經畔道以新竒而或失其正焉倘一言一行有裨彝教則以天球大訓目之矣齊諧可志常存子不語怪之心經正民興斯無邪慝可曰寓言無關于世道乎志雜記藝文小序道之顯者謂之文子瞻言為文必與道俱朱子非之謂其視文與道二也後世以學文學道為兩途如氷炭之不相入雕琢辭華鏤金錯采靡然于倫理經術之外而命之曰文自以為登韓桞之堂排歐蘇之闥矣或摭古字使人難識掇拾梵音矜心髙妙由君子觀之曾涕唾之不若耳潮中文學有昌黎為開風氣自是名賢接踵極嶺外文章之盛輓近學者多規橅六朝排砌瑰麗振秀揚華人人家有千里焉若夫經世理物發揮至道有益于天下國家身心性命之文與夫起衰式靡古雅髙清之韻海潮雄浩之觀則所望于此邦作者匪細也腐生災石頌德稱功市儈操觚丐羮謝炙及無關潮地風土民物者雖佳不錄其在舊志所存則亦未遑淘汰諒有心目當能辯之志藝文鹿洲初集巻六
