body:
  text: 鹿洲初集卷五廣州府知府藍鼎元撰序黃越甫詩序陸雲好笑阮籍好哭余讀越甫詩亦笑亦哭越甫詩無所不工而尤長於古上追漢魏下薄初唐苐所著不以示人雖吾邑亦鮮有知者偶録一二挂忩壁間見者疑古樂府初不知為越甫之作也越甫美鬚髯慷慨謇特有古道與之處如對叔度鄙吝咸消使越甫不欲藏其名挾其具以遊吳越走京師名公卿間復何有于今之詩人哉乃兀坐窮廬併其詩而亦隱焉古之君子獨言而恐人聞獨行而恐人見越甫之謂與此余之所以喜而不覺逌然笑也越甫嘗執贄先君其尊人長民先生先君好友也憶余總角時隨先君過先生家一時名士雜遝角幟詞壇越甫從旁吟咏先君每擊節焉未幾先君棄世又數年而長民先生亦溘然長逝荒草茫茫白楊蕭蕭痛於何極此余所以讀越甫詩不覺百感交集未及終篇而繼以哭也猶幸越甫有先人風立身行己矯矯拔俗使余得師資友益篤兩世昆弟之交不然而余悲又何極乎夫蘭生幽谷無人自芳玉藏深山太璞自完越甫詩不聞於世斯其所以為越甫也觸於喜而笑觸於悲而哭隨乎情之所至余亦不得而主焉丙戌夏四月同人將梓越甫詩以行越甫不聽余因袖其集辨數言而歸之鹿臯詩序鹿臯余總角好也長余半歲余九齡失怙鹿臯年十五喪其尊人孤苦蹭蹬同學相切磋嘐嘐昻昻相期許欲以文章事業名于世既受知邑大尹四明陳公學使者歸安沈公喜其潛心聲律有得於風人之遺故鹿臯獨以詩名余頻年奔走乞食雖有意摹古人文妄希著述不過力爭於窮愁勞瘁舟車戎馬之中與載籍相見之時少欲浸淫於詩未能也夫詩之道良難矣心粗氣浮不可以為詩格弱調卑意雜味短詞野字俗庸腐淺陋雕鑿小巧皆不可以言詩也故欲老欲清欲雅欲深欲純雄渾沈痛悲壯蒼古優遊平淡各造其極方為得之非十年讀書養氣其孰能與於斯小夫學究烏喙鵙舌悍然以騷壇牛耳為已任無怪乎言詩者多而如鹿臯者百無一二也昔人謂詩必窮而後工蓋亦有為而云殊非通論窮者勞筋餓膚幽憂拂鬱矻矻無所成就發之于詩鏤心嘔血悲悽激楚之韻或足以動天地泣鬼神而和風慶雲清廟明堂之氣有所不足則亦非邦家太平之瑞也文章與國運相關盛世元音晚季變徵低昻正自有辨士君子不幸而窮當藉為他山攻錯進德修業之資而往往狂跳呌號墮造物之坎窞束縳顛倒頽廢百端何工之云鹿臯詩溫厚和平在六朝盛唐間韓子所謂和其聲以鳴國家之盛者舍鹿臯奚屬哉自為沈陳二師所欣賞而觀察李祁山及閩南後先諸當道無不膾炙求之詩名久籍人口余東征還棹更讀鹿臯新吟與前所見又進而深卓乎可名於世余不勝慨然愧不如鹿臯逺甚也鹿臯喜臨池善楷法書淳化帖釋文十卷刻諸石以行價重薦福且其才可用願併踐昔日所期於事業者加之意無使世俗以區區詩文了儒生分量也因為序其集且相與共勗焉李遜唐時文序余女弟夫李遜唐與余少同學年相近癸未童子試並受知學使沈心齋先生余時從師校士上遊周流八郡自是而後每以家食奔走風塵十年之間在他鄉者八九遙想遜唐髙卧山齋安居樂業大肆其力於文章窺古人之堂奧其為霄壤未可言盡也辛卯夏姦人搆釁族中有力者擠之禍且不測遜唐遂竊負遵海逃竄嶺南間關跋涉於荒煙瘴癘之區辛苦莫可名狀猶時時拈題課業以娛其親每遇松隂野渡旅館僧寮意有所觸輒於文焉發之父子相對嘯歌陶然自樂若不復知有歸計者越明年當事者憫其寃始得還鄉尋以大中丞滿公文章知已復己去之籍學使者張公稱為八閩秀傑聲震三山延建上遊素不相識之士莫不來讀其文爭覩其人以為快鄉闈落第策蹇將歸又以中丞公命與余同事鼇峯因于暇日裒平昔所為文屬余序之余惟時文一道本非可見諸施行有益於民生國計又非可與經史百家並垂不朽特為國家以此取士不得不鏤心刻骨敲戛金石期足以輔翼經史黼黻皇猷然而淺夫掇取油滑學究勦襲餖飣紆青拖紫有如拾芥以此博科名即以此操衡量悠悠天下求其真能文與真能知文者百十人中曾不得一二焉今觀遜唐之文髙華沈實其氣沛然一往而不可禦其舉動雍容間雅有佩玉鳴珂之度見理明立論正不為偏陂詭異靡曼庸俗之談固應為髙下所共賞而亦至今顛倒險巇行年三十未脫泥塗人生遇合遲速之間真不可問矣然造物生才終必有用其挫不力則發不宏譬猶參天之木苦以斧斤而成梁棟之用長溪大河之水回山觸石衝磕淜湃輾轉蜿蜒數千里而達於海大屈大伸自古然也向使遜唐弱冠登巍科懵然不知人世之甘苦君子且以為不幸即不然而安常處順所見者小所就亦必有限孰與夫身經艱難動忍衡困歷名山大川之險易觀王公大人之舉止察消息盈虛之有數覽禍福倚伏之無端有以開擴其心胸而磨鍊其情性哉小人設穽張機適足為君子進德修業之助天之所以造就遜唐非偶然也遜唐方卧薪嘗膽深自奮勵以期不負知己將必大有以表見於世而非區區時文之末者余又將與遜唐共勉於無疆焉王滋畹歷試草序人生知已自古為難故士之泥翻淖屈焦尾哀音者常恨不得起中郎於今日而稽之拜之嗚呼其亦實有可感者也當世以制科取士士競習為科舉之文鏤心嘔血刻意時趨若宇宙間經天緯地之事業無有出於此者既己敲金戛玉學成一家而聞者見者熟視猶之無覩幾欲發狂跳呌乃有人焉開鴻濛具隻眼相賞於驪黃牝牡之外拂拭顧盼不能自己則知巳之感沒世猶將不忘此吾友王滋畹所以惓惓於歷試草而不忍置也滋畹與余少同學又早孤赤貧境相類滋畹能孝友於其家不以孤苦貶其志沈酣經史若飲食嗜欲之不可離憶余辛巳歲與滋畹乘桴西湖以經學相切劘中流髙歌視天下事無足措置者至溺水中猶抵掌笑語以為樂當時滋畹己能文衆論未歸也未幾受知邑大尹四明陳公有國士之目三試連冠童子軍而郡刺史趙公學使者楊公范公皆知之遂乃聲震梁鹿衆論大定戊子辛卯鏖戰棘闈遭時按劍環念知己弗能忘情以壬辰讀禮之暇裒其歷試所為文屬余序之余惟滋畹之文閎中肆外有典有則固與夏鼎商彝同為三代之法物幸遭盛世博古者多宜知已若斯之衆也顧學期有用充時文之大用不過弋獲科名即使傳之不朽亦等雕蟲細玩何補於世道人心余願良友之日躋日上無徒以是為絶頂之事業也滋畹自幼喜讀先儒書於朱子小學近思録深有所得反覆玩味而不厭余早知滋畹之可與適道幸從兹身體而力行之道本在人倫日用之間未嘗有出於知能行習之外隨處檢點察識擴充則可馴致於聖賢之域又講求經世理物禮樂兵農刑名錢穀之設施使全體大用皆備於我達則見諸事為為生民立無疆之福命窮則守先待後為百世留不朽之經綸所謂宇宙之文章莫大於是乎遇不遇皆我事業併不必藉乎人之知己是即滋畹壁立萬仞無負知已之一日也區區帖括顛倒英雄歲月蹉跎望道未見言念及此可為愴然不知滋畹與余有同心否古來知己難得知巳亦自難酬必思有出類超羣大慰知己之望者而後不負知巳非徒感之而遂己也滋畹勉乎哉鳴廬試草序余東征返斾就試三山寧化隂子耳及裒其歷試所為文偕尊公琫素造余曰小子不忘知巳之感且欲因自考證所學先後淺深願先生辨數言教之余曰然耳及令器是所樂為言也我來自東心神未定簿書羽檄戎馬戈矛依稀在目歸航復遇颶風幾覆溺者數四濤翻浪擊崩崖裂石之聲夢寐盈耳又以千里奔馳來兹就試百凡倉皇應接不暇且遲至還家可乎皆曰諾願勿忘比余還家又下第未果尋以選拔入都就試京闈居者行者均靡所賴至於仲冬月杪乃造三山又聞建溪水涸舟不可行闈期日迫難堪濡滯正在惶急不聊中忽憶耳及所屬文遲之久未踐約呼童張燈中夜起坐己而笑曰噫余何言古有治眼疾者自目病不能醫謂求者曰眼藥在架子上梓人擅國之工其床闕足而不能理以余久躓場屋而欲昻首伸睂論列應試之文章己有從旁而竊笑者况其荒疏冗雜奔走困頓于征途勞攘之中即言亦曷有當乎昔者應試之文有一定之造詣有一定之聲價按神切脈戛玉敲金有識有度有聲有色有規矩繩墨揣摩元魁若操劵而不可移易今也不然為之者既茫茫而不知所主取之者亦搖搖而靡有定見一日之長一時之合難如登天易如拾芥則純乎命之為之與人事毫無干涉也耳及而求為應試之文如是焉足矣他日主司擊節登上第操海內文衡亦綽綽有餘余自病不能醫將求他工而理床足無能為耳及進也耳及而求為名世之文則意者本之六經以固根柢參之左國史漢唐宋大家以壯魄力研窮程朱諸儒諄諄論辨之旨以清障蔀厚其氣味偉其聲光洗伐皮毛錘鍊精髓浮詞弱調槩乎無所用之余雖不敏猶將援桴鼓以作其氣但恐不入時眼未必有補科名此中髙下權衡惟耳及自擇焉如余之碌碌無成固可羞若飛蟲弋獲徒抱園一册謂天下之文章莫大乎是則亦甚可惜也士不學為聖賢祗欲以文章自表見己非余之所望況斤斤科舉之文章以主司意見為賢否余亦烏知是戔戔而以此期耳及匡耳及之所不逮哉質之吾友琫素其以余言為然否鄉會墨繩序或曰文章之有制義非古也制義取士不足以得人才也余曰何居子姑言之曰制義始于宋衍于明漢唐以前無有也支離訓詁斤斤抱繩尺不越儒先糟粕之常既不足與諸子百家爭衡不朽而又束之以功令合有司之意為中式而所謂主司者又未嘗有一定之繩墨示人以必由稍𥪡論則病其髙稍思索則病其深推陳出新則曰生曰澀立意稍別則曰竒曰怪矜鍊則以為造作刻劃則以為傷氣引用故實則以為餖飣雖有馬班韓柳之才亦聽浮沈于萬一不可知之數不幸而遭逢不偶即伊周管葛亦當終老蓬蒿制義不足以得人才如此無乃可廢乎余曰惡是何言與夫文以載道也道莫備于孔孟而發明于程朱制義闡孔孟之藴衍程朱之傳者也詩詞歌賦不可謂文秦漢唐宋之文名為古不能古于六經語孟今之為古文者摹秦漢唐宋爾為制義者疏六經語孟精微糟粕則視乎為者之能不能豈制義之過哉雖有絶世聰明而不學為制義自詡作古文詩賦其中必有扞格難合似是而非之病其心思不細其經術亦必不醇國家以制義取士既可明聖賢之道又可純豪傑之心豈諸子百家所可同日語哉場屋廊廟之章必有中正和平昌明馴雅之氣象匪髙匪深匪新匪竒鍊不造作刻不傷氣鎔經鑄史不見餖飣自然而然乃為中式豈無一定之繩墨哉即主司意見間有異同卞玉隋珠或遭按劍枯木輪囷或器萬乘君子惟道其常修其在我昌黎所謂業患不能精無患有司之不明者也言未畢而清溪李儀卿以所選鄉會墨繩屬為序余曰噫善哉此即一定之繩墨也本朝巨公名儒皆從此出謂制義不足以得人才又不可也前車之軌轍後車之率由從繩則正天下所以無棄木也儀卿家學淵源潛心經史詣極純邃惜久困鄉闈兩中副車未得遂所志昆弟子姪皆雋有司獨留此文壇碩果無一毫怨尤之意益修其舉子業今以此自繩即以此繩其後生小子且不忍祕于家欲與斯世共繩之可不謂知道者乎學者就兹繩也無怨有司有司執是繩也可告無罪于學者余故喜而為之序思補集序思補集者平逺尹黃君運滄公餘隨筆也取退思補過之義故所言多省身克己閲歷人情世故物理酌劑之宜德性學問於此見一班焉余讀之囅然喜也曰於戲君可謂知道矣世人沾沾舉子業以為極宇宙間之能事髙者習雕蟲摹佶屈自命詩文作家大雅君子亦樂之不知文所以載道也必有益于天下國家身心性命乃為可貴詎徒以辭華而己應世之文非文也即名世之文亦未為至文也事不關經濟學術雖鏤金錯采終屬浮談言無補世道人心縱鴻篇巨章究歸安用躬行體驗隨事省察內淑其身心外宜其民物斯有道君子之所為不期文而文至焉程朱語録原不與韓柳八家爭工拙豈雄竒奧博鏗鏘金石曾平淡之不如哉芝草醴泉孰若布帛菽粟有功於人世也君金陵名下士於舉子業極精邃經經緯史氣靜神恬書法詩文吏治皆留心講求固髙自位置不甘與世汨沒者余方恨獲交之晚且惜其邑太褊小不足以展厥才猷而君皇然若靡及刻刻有寡過未能之思讀思補一集可以知其躬修之大槩亦千秋仕學龜鑑也裨補世道非同茍作故弗辭而為之序粵遊草序辛亥夏五過平遠謁運滄黃使君官署小坐環翠軒緑樹紅花繚繞可愛有山泉從小溝西來循清池而東半畝方塘源頭活水紫陽師詩中景也故人相見情景倍增會使君令弟介青偕草衣居士自白下泛舟蕪湖泝豫章踰筠門嶺而至所過佳山勝水歌嘯唱和有詩盈囊讀之甚快蓋余曩在京師素耳熟草衣詩名今歲春初與使君晤對韓江旅館習聞介青學行二君皆余所渴想而願一見者片時駐足飈爾並集又得讀其所為詩髙山流水鏘鳴金石仰視壁間古琴髙挂而余情不知何適矣介青慨然援琴而鼓之為余操搔首問青天一曲音節凄清氣概豪邁草衣詩云數聲遼海天邊鶴一假廬山雨後泉其斯之謂與遙憶太白善手明徽澗松萬尋愁猿危呌失志之客淚淋沾襟平生學聖賢不灑窮愁淚然見介青寫聲發情於妙指亦覺悲涼雄壯之觸我懷也既又為余鼓關雎清平和樂優柔靜正美哉雍雍乎其諸家齊國治風化盛美太和洋溢宇宙間如追隨左周右召盈耳二南此心為之陶陶焉遂遂焉不自知足之蹈手之舞也琴心賦手二君兼之聞琴而知其詩況讀二君詩不啻拂白石而聆揮絃則粵遊一草烏可以不傳哉運滄使君既合其道上賡歌諸什為之序以問梓人且屬余更辨數語夫二君之詩之工加海外江山之助性靈品格使君己言之詳余惟再三雒誦即以其琴序其詩其凄清之韻豪邁之氣如操前曲和雅之音靜正之調如操後曲傳之於世若巴之魚牙之馬移情爽心不知幾何人矣二君皆豪於飲當為我連浮百巨觥不知運滄使君有酒如泉否也吳豳川時文序鎮平使君吳豳川吾閩豪士也少工聲韻喜詠吟位置在微之香山以上則豪于詩學晉唐書法腕力徑強使筆如千鈞之弩則豪于書辨論天下事詡詡洋洋鬚睂俱動雜以滑稽諧笑雖蘇張亦為卷其舌則豪于談興會所至傾瓶罍酌大斗虓然一噱若灌漏巵竟日夜不醉醉益酣目空今古兒撫一世馳名士鄉人謂之酒狂則豪于飲公車倦遊度嶺作吏歷五六巖邑皆以亷能著聲粵人有六縣蒼生一父母四年潮屬三神君之謡則豪于治豫以辛亥夏五過鎮平讀豳川制義又喜其豪于文嗟乎豫至今日然後知豳川能文哉曩在家鄉耳熟豳川名尚疑名下多虛士即見其試草鄉墨不脛而走亦以為一日之長既屢聞建邵諸友推重豳川學行始渴思欲得一見又恐梓桑阿好未必盡如所云至入粵中與豳川共事乃快然信名下無虛而豳川之豪大為吾閩生色不可及也豳川之時文豈如世俗所謂文者云爾哉世俗所謂文皮毛焉己耳不知人身之有骨血也形體焉己耳不知人身之有精神力量也錐之不痛刺之不癢隨意增刪不見短長徒以徼幸一日博懵然主司之知遇一經弋獲遂以為玉律金科此可令君子見之乎豳川之文剝落浮翳直搗中堅見理明立論正法脈真矩矱嚴有明季之鋒稜而加之圓潤有國初之氣味而出之秀妍宜其為髙下共賞也顧不必問世人之賞與不賞而後見豳川之豪即豳川亦何知世人之病己賞己而終無改於其豪於戲豳川真可謂豪士矣時文小道亦建旗鼓固知豳川嘐嘐揭揭無一事肯以讓人也豳川雖豪氣未除此詣已幾于純粹則時文一稿惡可以不傳哉余因鎮邑人士之請將梓其文以行世聊辨數言豳川其為余痛飲一石揮長歌百韻相酬勿以余輕薄使君輒肆乃滑稽嗤余也女學自序天下之治在風俗風俗之正在齊家齊家之道當自婦人始昔周盛時淑女流徽化行江漢降及鄭衛帷簿不修禍延家國閨門風化之原自開闢以迄于今不可易也婦人善惡不同性習各異化而齊之宜莫如學古者男女皆有學周禮九嬪掌婦學之法以教九御婦德婦言婦容婦功各帥其屬而以時御敘于王所今其書不傳其詳不可得聞矣秦漢以來惟班氏女誡最為親切而章句無多學者少之劉向列女傳擇焉而不精鄭氏女孝經語焉而不詳若華論語便初學矣其詞俚無風雅之致女訓女史閨範女範之類補苴雜出難以枚述大約簡不能該繁不能盡鄙陋淺率難登經史之堂欲擇其一以為女學專書管窺蠡測未見其可夫女子之學與丈夫不同丈夫一生皆為學之日故能出入經史淹貫百家女子入學不過十年則將任人家事百務交責非得專經未易殫究學不博則罔有獲泛濫失歸取裁為難女學一書烏可少哉百家衆技各有專師化原之地當若何訓迪防範乃既不幸不經聖人之述作以附四子六藝之末又不幸不得程朱諸儒講明采輯滙諸家之長而進退之與近思小學流布人間徒使深閨令淑若瞽之無相倀倀乎其何之此亦古今一大缺憾也鼎元少孤父書未讀窮愁困頓蠖屈蓬蒿之間每於人心風俗三致意焉竊不自揆采輯經史諸子百家及列女傳女誡諸書依周禮婦學之法開章總括其要後以婦德婦言婦容婦功分為四篇又于四篇中分章別類使讀者一見瞭然隨事矜式婦以德為主故述婦德獨詳先之以事夫事舅姑繼以和叔妹睦娣姒在家則有事父母事兄嫂為嫡則有去妬處約則有安貧富貴則有恭儉可常可變則有若敬身若重義若守節若復仇為人母則有教子為人繼母則有慈愛前子為人上則有待下巫祝尼媼之宜絶則有若修正闢邪而以其餘者為通論此則婦德一篇之大槩也婦言不貴多要於當則有若勗夫若訓子若幾諫若守禮若賢智若免禍婦容貴端莊靜一婉娩因時則有若事親之容敬夫之容起居妊子居喪避亂之容婦功先蠶績次中饋為奉養為祭祀各執其勞而終之以學問各以其餘者為通論此則婦言婦容婦功三篇之大槩也識學粗疏見聞寡陋姑就其昭彰耳目者編次以便初學其近代百十年間貞節義烈筆不勝書皆未暇載入懼繁也他若詩媛才女咏物寫情雖極工巧無關名教概置不録至孟德耀之偃蹇數夫阮新婦之捉𥚑停郎蘇若蘭之陽臺懷忿皆諱其瑕而取其瑜防微杜漸亦具有苦心焉或義例未符考據未確僭越之罪知無所逃然于閨門之道庶幾略偹或可以少補風化是亦世道人心所不可闕者也程子曰天下之家正則天下治矣願天下人各正其家以默贊九重肅雍之化風俗醇美家室和平鼎元將歌關雎麟趾之詩拜手稽首而揚其盛云平臺紀略自序藍子自東寧歸見有市靖臺實録者喜之甚讀不終篇而愀然起喟然嘆也曰嗟乎此有志著述惜未經身歷目覩徒得之道路之傳聞者其地其人其時其事多謬誤舛錯將天下後世以為實然而史氏據以徵信為害可勝言哉稗官野史雖小道必有可觀求其實焉耳今以閩人言閩事以今日之人言今日事而舛錯謬誤且至於此然則史氏之是非其迷亂於稗官野史之紀載者不乏矣臺灣雄據海外直關內地東南半壁沿海六七省門户相通其亂其平非於國家渺無輕重者致亂之由定亂之略殉難喪節運籌折衝皆將權衡其衮鉞以為千秋之龜鑑言焉而不求其實習焉而不知其訛鄙人所為懼也謭劣不才學荒識陋東征逾載躬歷行間風濤戎馬磔鼠哀鴻執馘獻俘招降殄孽至於罙搜窮山綏靖畨黎無不目擊手揮又或中夜聞警磨盾草檄千里驅馳睇瞻要害廢寢食冒風露蓋亦幾經勞瘁矣無一命之膺當贊畫之寄事定歸來滿船明月惟有全臺形勝治亂事迹了了胸中所見所聞視他人較為切實則平臺紀略之作惡可已也據事直書功無遺漏罪無掩諱自謂可見天日質鬼神而或者以列憲稱名為譏是猶未知載筆之道者載筆所以傳信非一人一時之文天下後世共之而姓名尚不敢筆之書則過失在所必諱縱功績可紀亦等之諂語諛詞夫豈其可傳耶鄙人愚昧文不足傳平臺大役事在必傳直道平心無為市井訛談所昏惑亦庶乎其可矣若夫鑒前車綢未雨施經綸措康乂有治安之責者諒早留心不待閲兹編而後得之也鹿洲試草自序余少薄帖括以為文辭末也帖括抑又末矣雖勉效操觚心弗善也顧以國家取士舍此末由即有君相特達之知竒才異能之薦舉鄉俗猶將以偏途病之而徴辟薦舉曠世罕逢雖有經濟才能無以見諸事業於是俯首治帖括焉始則喜成𢎞慶厯間之文既而以為儉也恣肆於啓禎兩朝及國初諸公宏博深厚之作雖畫虎類狗栩栩然帚千金爾四明廷尉陳公方宰吾邑歸安閣部沈公督學閩南皆不以余為謬期許甚奢余亦髙自位置惟慮將來經濟事業不知如何科名可唾掌得也博覽揣摩妄意場屋廟堂之章必有清明廣大氣象欲言則言欲止則止無描頭畫角島瘦郊寒之態故命意欲髙措詞欲確法脈欲真精神欲旺結搆欲圓氣度欲雅錘鍊精純韻味悠永斯可以言中式矣乃博覽當時中式人文或迥然風馬苖莠並生余將安所適從乎一戰不勝就正先達砭曰太髙則循途守轍為庸近之文弗售再戰不勝砭曰太實則振筆直書為機神流利之文又弗售三戰三北砭者亦倦隨興所之不求甚解或神疲喉格疏庸強湊慙恧纍日不可告人幾幾乎售矣又以偶用經語一二字見擯遂不敢復用經史性理六戰依然也韓退之所謂大慙則人謂大好小得意則小譏訶之余僅得其似大慙人乃謂小好小不慙則為大不好慙之又慙人終不以為好而余亦倦矣古人四十強仕余無聞焉少讀父書既傷孤苦長為飢驅奔馳勞瘁一歲之中無兩月之勤一月之中無兩日之靜強勉涉獵于窮愁呌號倉皇急迫之際生吞活剝而曰吾讀書吾為文不亦可哀乎余之所謂好與不好固宜其罔有合也令余不以衣食亂心得束其身於明忩靜几夫亦何學不可成而區區帖括乎哉余將入深山結草廬求數畝之地而耕之茹蔬飽粥讀書著述數十年舍其末而務吾本焉天下後世皆我知己往古來今皆我事業何羡彼科名為耶然余聞太史公行天下歷覽四海名山大川故其文疏宕有竒氣今余生長天末雖嘗從軍海外出入風濤雷湧之中所見不過干戈戎馬磔鼠哀鴻與夫劗髮鑿齒刳耳文身之衆曾未能一造京師瞻天子宫闕壯麗與其名公巨卿賢人君子遊文思僻陋恐山靈竊笑且當出一快遊而後退而隱焉鹿洲試草余二十年來顛倒醉夢見小敵勇而大敵怯之文也海內巨公必有以教我矣鹿洲初集卷五
