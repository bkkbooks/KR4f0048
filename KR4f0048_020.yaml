body:
  text: 鹿洲初集卷二十廣州府知府藍鼎元撰行狀墓志銘墓表先王父逸叟先生暨王母陳孺人行狀先王父逸叟先生諱繼善字逸淑世為閩之漳浦人曽祖處士毅叟公生三子長諱初芬次諱初茂以文學著名先生其季也本名初蕙生于明天啓元年辛酉二月之七日性好學博通經史及天文地理諸書深沈不露童年應試屢不得志于有司將北遊取道南粵見時政日非急走還慨然有髙隱之志時族父紫濤公巡按三楚楚寇張獻忠漸橫撫按治理諸院方羈縻招撫為息事寧人計先生聞之頓足曰撫獻忠如養虎子終非可馴及其長大將搏主人食之矣此曹亟誅之尚恐不死何撫之能為吾叔父其不返也家居官塘鄉湖墘里與先王母陳孺人謀曰天下將亂此處非避兵之所萇溪山母頂先世故居左右數十里皆吾宗族且深邃在萬山中無他患當徙宅焉孺人曰善先生往鳩工庀材結廬甫就中原大亂土賊肆橫孺人負姑逃難遂走入萇溪山中孺人同邑大坑陳氏女世為宦家素纎弱不能任重姑黃太君雖老病甚頎碩料孺人弗勝負荷謂曰吾老且死死于賊與死于家等耳若年少當急逃勿以戀我受纍我死不瞑目也賊且至里婦皆倉皇竄匿孺人襁負姑行十五里跳澗踰嶺如飛不自知其苦及至萇溪再扶姑不能動族人大笑稱奇以為勇生于孝蓋孺人平居婦德閫範為宗族所推而孝行尤嘖嘖著聞者也先生既隱居命童傭闢地開山種竹木花果數千樹每當桃紅李白涉趣行吟孺人釀秫為酒舉杯對案相敬如賔教子讀書聲琅琅出金石不復知有人間利祿事矣康熙甲寅三藩繼叛耿精忠傳偽檄郡縣割髮辮示降鄉人恐請先生議之先生曰作亂也不可聽國朝王氣方盛雖十藩亦無如何況耿逆如行尸安能以兵加我于是鄉人竟不割辮耿逆亦不能來時臺灣鄭氏聞耿盜兵亦大舉入冦攻擾漳泉偽署吳球為漳浦縣令駐劄萇溪沿鄉徴糧球聞先生名求一見不可得直造先生廬先生遁入老虎洞球踞駐先生巖野齋數月終不得一面嘆息而去先生以虛名太著非自全之道乃改今名更號逸叟深自晦匿縱讀堪輿書逍遙山水尋求地脈窮數月不返人莫能測其所之由是先世隴塋多所自擇若官塘江東霞嶺蓮花諸祖墳其表著者蓮花山形勢特奇初求之不得則為施姓者購去使人請之價十倍弗可居數年間行油柑嶺見山麓僵尸度遇盜摶而仆者就視之不識何許人氣奄奄未絶先生命僕負以歸延醫調之得不死然傷重弗能行養之月餘盡老酒數石晨夕雞豚如事所親比復初問姓名感泣而去不知其為即奪購蓮花山者也施歸與婦謀無以報再生恩遂獻蓮花山為謝先生厚其直售之以葬我髙祖母蓋吉穸云虎朝徑生基今先生安厝之所亦早年自擇者也先生為人忠厚誠篤寬和淡定平生無一言欺人無憂愁無畏懼無盛怒無與人爭見人有非則從容勸戒橫逆之來亦笑而受之教先君讀書必令為聖賢之學先君幼極博負竒才為多士辨冕名震閩粵學者多宗之先生淡然不以為喜年三十二不祿哀動里閭族戚友朋如壞梁木先生寂然若無所事者不孝孤時方十嵗號慟欲絶先生惟令讀書繼父志耳不孝鼎元既稍長為時文頗自負先生曰程朱曽為時文否鼎元曰非是無由得科名先生曰皋夔尹説皆得科名否鼎元不敢復言既學為古文詞繕以進先生曰此亦近日之空谷足音也道以文傳但為其有用者可耳庚寅秋鼎元著女學一書告成先生閲之大喜謂孺人曰五百年無此矣不意吾孫能如是此有關風教為世道人心不可少之書確乎可傳也蓋先生生平無狂喜惟此舉頗為愜意鼎元由是益黽勉正學後此著述先生俱不及見矣先生年九十始扶杖俄則曳之而走若忘其為杖者尚喜遊山日行四五十里當道屢欲見之皆不出及鼎元移家邑城迎就養邑令汪公培祖行鄉飲酒禮以先生為上賓始一見焉康熙辛卯冬十月二十有三日覺微疾遽呼孺人曰子夏云君子曰終小人曰死吾今日其終矣夫孺人曰未嘗疾何至此先生曰是矣為我喚諸子孫來既咸集笑曰吾平生所為無一事不可對天日全受全歸更何所憾惟願汝輩勉為善人而巳遂卒孺人治家有禮法閨門之內肅若大庭方正整齊而不為苛刻至老猶紡績織絍罔憚勤勞家中上下大小皆化之無敢舍業以嬉者生崇禎元年戊辰春二月十有三日少先生七嵗後先生五年卒則康熙四十五年丙申冬十一月十有三日也先生享年計閏九十有四孺人享年計閏九十有二夀考齊眉孫曽繞膝孟德耀梁伯鸞不足道也子三長諱宗明生孫鼎欽鼎恭鼎銓鼎錡鼎漙鼎陶六人曽孫雲鵬等十七人次即先君諱斌生不孝鼎元鼎光二人曽孫雲錦等十二人又次諱宗哲生孫鼎輔鼎弼鼎藩三人曽孫雲沛等四人女無之孫女七人曽孫女九人聘娶皆名門不具述先考文菴先生行狀鼎元生十嵗而孤先考行事不甚知其詳惟憶五六齡時最為先考所鍾愛嘗攜與步月中庭從容問曰汝長大作何事業鼎元對曰讀書先考曰汝讀書何為欲為官乎為聖賢乎對白皆欲之先考曰奢官弗可必也得不得其權在人聖賢可必也為不為其權在巳鼎元曰吾為之喜曰善他日鼎元問曰人為官不得為聖賢乎先考曰居官正好為聖賢致君澤民皆聖賢事如伊尹周公俱是聖賢孔子亦是為官者但官難期必得顔子閔子不必為官皆聖賢也由是日以聖賢自居先考亦隨事誘迪之松隂乘涼見小彘負尨而趨抵掌大笑先考曰非禮勿視汝此一看便不是聖賢非禮勿動汝此抵掌亦不是聖賢後當戒之鼎元曰諾一日偶拂意跌地而啼外王母攜之不起固勸之啼愈厲忽先考至佯為不知者但呼曰今日聖賢何在即躍起急對曰在此先考笑曰聖賢不哭也拭淚曰無之七嵗從外祖入學讀書先考指所讀示之曰弟子入則孝出則弟汝欲為聖賢當從此章書做起若不能孝弟便非聖賢為人不謹慎説話不信實便非聖賢遇衆人不能廣愛遇仁人君子不肯親近有間暇不肯讀書皆非聖賢汝將此一書記熟擴充馴致至極處不患不造聖賢地位也先考時授徒邑中每館旋必令背誦所讀書及十嵗五經讀畢則大喜以為可教臨終執鼎元手曰汝無忘為聖賢之志我含笑九原矣是時鼎元正在稚騃所記者如此而巳不能狀先君行事後聞之先慈又以問先王父乃得其概先考諱斌字郁人學者稱文菴先生先王父逸叟公仲子也少聰敏一目數行皆不忘九歲通六經史記左氏傳以能文見稱比長益刻勵晝夜攻苦理學經濟諸子百家以及天文地理禮樂律厯韜鈐行陳奇門演禽星卜諸書靡不講究精微欲以措諸世用雖恂恂不露圭角實自命為一代人物云先外祖子興許公物色當世賢豪士無一可意者見先考與談論驚為偉人以先慈歸焉先考弱冠補博士弟子員為一庠辨冕自後屢軼其羣然數奇不遇先王父逸叟公隱者也視世態如浮雲笑謂曰人生何必科名學聖賢焉足矣汝讀書太博正程子所謂玩物喪志者宜屏去一切専講求理學經濟即使不用亦不失為伊川之徒也先考悚然受命由是専以程朱之學教授生徒而文名太盛漳潮間談文之士多從之若但知先考為文人者初臺灣未靖閩督姚公啓聖駐漳籌海設修來館以招攜鄭家將士凡歸誠者無真贋皆納之視其才可用實授以官有薦先考于制府者召見太悅將附入歸誠例授官先考辭曰官者吾所欲但不可以欺而得之請仍還清白書生應制舉同邑前輩黃太常公時參制府軍事以此重先考行誼延禮于家俾族子受業焉其族黃長民先生與先考友善亦遣子元美來就學元美字越甫人品器識迥異時流為先考髙弟受業最専且久觀人論世定事幾成敗當否與先考吻合每喜談先考遺事以為後學式栩栩得意鬚眉俱動嘗述先考言王仲淹為晉宋隋唐數百年間第一學者無師無友崛起塵濁之際儼然自命為聖人可不謂豪傑之士乎中説大有意思非揚子法言所敢望其萬一使天假之年確乎可入聖人之室也天生此才不豫之夀亦獨何哉言訖凄然淚下越甫意先生懷古情深不料其自知不永年故有感而悲耳先考易簀時謂越甫曰窮達命也修短數也吾無顔子之學適符顔子之夀既用自愧一生懷抱弗得少展不知天之生我何意也豈尚藴釀以待子孫之發泄耶及卒越甫號慟如壞梁木逺近聞者莫不欷歔痛惜之不孝鼎元幼年失怙追憶音容依稀在目奉持遺訓刻骨鏤胸中夜輾轉涕零惟恐稍自暴棄無以慰吾考于泉臺之下倘天牖其衷略開一隙之明得以望聖賢門牆而識所從入之方無負先人臨終丁寧之囑是則不孝鼎元之上願也夫先考生于大清順治十五年戊戌夏四月二十有六日卒于康熙二十有八年巳已秋八月十有八日享年三十二嵗配吾母節孝許太君自有狀子二長不孝鼎元雍正癸卯科選拔內閣一統志館纂修特授廣東潮州府普寧縣知縣娶許氏先慈姪女次鼎光南澚鎮標外委隨征守備娶陳氏女三長適癸卯科聨捷進士吏部候選知縣李杜次適戴承恩三適林宗嶽俱先慈出孫十人雲錦福建水師提標功加都司僉書娶林氏浙江定海鎮總兵官諱亮女雲龍業儒娶林氏甘肅巡撫贈尚書諱日瑞公曾孫癢生諱從龍女雲翔未聘雲翼聘黎氏巳丑進士奉天府尹兼盛京刑部侍郎諱致逺女雲鶚雲燦俱幼未聘俱不孝鼎元出雲樞雲路雲槐雲衢俱幼未聘不孝鼎光出女孫三長適都司僉書江諱藎臣子沛然次幼未許配俱鼎元出又次幼未許配鼎光出曽孫成德幼未聘雲錦出成功幼未聘雲龍出餘未艾先慈節孝許太孺人行狀先慈姓許氏邑西郊景文里人外王父諱世昌公明太僕寺卿諱祚昌公介弟也博學好古遭亂不仕先慈生有異徴外王父最鍾愛之授以書過目成誦稍長通載籍嫻吟咏嘗賦落梅詩有銀鱗香大地鐵骨鬭寒風之句識者巳占其兆矣然片紙隻字未嘗留稿曰閨中字迹不欲令人見也年十四絶不復吟善女工外王父益奇之而是時先君年少行卓才名聞逺近外王父造廬相訪驚為偉人遂締焉先君家世讀書不治生業及先慈于歸去華飾鬻粧奩食貧作苦以供孝養善承翁姑意飲食衣服起居不待詔告動中窽會相先君經理內外俾得専志讀書孳孳以逺大相勗閨門之中若師友焉嵗巳已先君染寒疾秋八月六日病篤謂先慈曰勢不可為矣若當奈何對曰相從地下無他説也先君愀然曰雙白在堂不克盡子道死難瞑目翁姑之愛若實甚若死益傷翁姑心是重余不孝罪也言訖氣絶先慈拊膺大慟昏仆移時不蘇進湯藥不得入口外王父以刀尖格先慈齒灌之夜半先君復蘇顧先慈曰吾未死若先死耶若執性如此何以慰吾魂于泉下須臾先慈亦蘇與先君從容議後事甚悉越十有八日雞初鳴度先君不能至旦更問所欲言先君瞪目視之曰上事舅姑下撫兒女前言已盡願母我違遂卒先慈哀毁如禮尚刻刻有殉亡志喪畢之日閉户自經大母率家人擠户救之乃免先王父泣而詔之曰若立志死節是也吾夫婦老矣兒死遺以二孤若在尚冀成立也若復死誰當撫之且吾兒臨終與若作何言語息壤在彼而忍忘之耶先慈矍然垂淚曰兒今不死矣時年二十有九也不孝鼎元鼎光方懵然惟瓜果是利諸妹終日呱呱厨無宿舂先慈以女工經營家計市番薯給饔飱種蔬為糜以佐不逮時或具甘脆承舅姑歡心親教督不孝兄弟講授詩書反復開導終日不厭夜則篝燈自課女工于旁視不孝倦或思睡則縷縷述先君遺事以感動之且勗以立身成名繼述顯揚之大不孝鼎元或不率教先慈不忍加箠楚但涕泣責讓不食鼎元因憂懼不知所為急引咎請改乃許之由是稍有警悟始不敢不讀書雖隆寒盛暑苦雨凄風機響書聲永夕互答道路聞之無不傷心流涕者癸未秋鼎元受知邑大尹今廷尉四明陳公以五經冠童子試先慈頗有喜色復誡之曰汝無萌幸心此不足當毫髮數也吾所喜者陳公有知人之鑑為所賞識將來學問或可有成汝必勉之冬鼎元受知學使者今內閣學士歸安沈公且命隨軺車校士先慈復馳書誡曰沈公當代大賢所取閩士千數汝獨見器重如此亦謂汝自幼孤苦當激昂自奮勵欲朝夕左右俾至大成此千載知巳也勉之光隂如駛學業無疆暇則詳審世務留心經濟毋長傲偷安吾之望也丙戌夏沈公憫先慈清操苦節欲特疏題旌以年方四十六未合例手書霜貞衍慶四大字旌奬鄉人榮之未幾大中丞張公撫閩漳紳士僉採先慈節孝事實請于中丞公而郡刺史山隂趙公邑大尹悔菴汪公掌教蔡公及通庠人士左右鄰里皆以先慈節孝可風合懇旌奬各加美詞申詳其事張公韙之是時先慈年四十八猶未合題請例張公因檄郡守鏤飾節孝流芳匾額邑大尹汪公親具彩幣設鼓樂牽羊舁酒到宅褒旌先慈撫匾愀然曰節之一字足矣孝豈敢當且家素貧不能備養翁姑耄耋之年弗飽雞豚之奉念之傷心今妄得美名徒增罪戾無益也先慈念王父衰老常憂懼不自安望不孝鼎元成名甚切每誦歐公言祭而豐不如養之薄二語鼎元流汗沾背及秋闈被刖念無以慰老親先慈則又寬之曰人生科名不宜太早再加數年之功造物厚意也其鬱深者施必暢其積久者發必𢎞顯達之驟聲問易減增益不能大器乃成不孝因復黽勉淬勵又屢以貧困不能家食飄泊風塵歸囊偶有所得必問所由曰寧可清飢不可濁飽蓋恐或從非道來也辛卯冬十月王父棄諸孤先慈哀傷過憊得嘔血疾然旋起旋止亦不為意事王母益辛勤癸已春不孝鼎元將應恩科省試先慈欣然謂之曰昔汝父臨終謂汝必能有立今蹉跎二十餘載矣大母年髙望之甚切勉之是時先慈起居無恙言笑甚歡不孝鼎元亦遂安意就道嗚呼孰謂臨别丁寧之語即為不孝與母永訣之日哉暮春落第䇿蹇將歸以大中丞覺羅滿公再三慰諭留省讀書重違長者命而不孝鼎光音問往來亦不云先慈有所患苦中秋後四日忽接八月五日家信云先慈痰氣大作勢且危不孝鼎元始憂懼急辭回家二十八日過海澄則聞初六日之訃嗚呼痛哉不孝鼎元終年飄泊情事未伸生不能備奉養殮不及憑棺衾天地罪人抱恨何極雖曰靦然人面曽羊烏報本之不如矣自先君沒後距今二十五年先慈千辛百苦莫可名狀近來喘息甫定方私幸來日正長庶幾得徼天之佑少報罔極於萬一嗚呼孰謂其竟如此而已耶灑血問天我罪伊何即使苫塊餘生或得藉先人餘慶大烹列鼎以享以祀亦無補于終天之恨矣嗚呼痛哉先慈平生恭慎治家不嚴而整待妯娌大小咸得歡心對女婦終日寬和無疾言戾色早年極懦弱及撫孤井臼操作娓娓弗倦自奉極不堪而祭祀必豐潔賓客往來極力供奉親戚有困乏者分所有周之鄰婦或以為言則曰我家常在苦中亦不爭此區區者也二十年未嘗為疾所苦自辛卯嵗一染血症隨亦平復今秋八月朔痰氣始盛覺寢不安席然猶整頓家中器具及小大敝衣躬自補綴之越五日知不起乃命馳書之三山召不孝鼎元及暮正襟危坐與舅氏霞山公談家事甚悉夜二鼓鼎元婦許氏侍旁先慈低聲謂之曰吾自而翁沒後常刻刻欲殉亡為子女所纍延我二十五載今吾事巳成將報而翁于地下矣不孝婦慟哭曰祖母年老遊子未歸願少遲之先慈搖手曰不能待矣問遺囑則曰元兒能理會無俟吾言時不孝鼎光及舅氏霞山公暨諸男女幼孫俱至側先慈一一注目視之遂終則雞巳鳴矣是為八月六日也嗚呼先慈性情寬厚舉止端莊無一毫局促之氣半生苦節不克食報于厥躬固巳痛矣又不能姑待數日使不孝鼎元得親醫藥含斂悠悠蒼天此恨何窮期耶天道而無知則巳天道而有知其以此報施先慈乎哉先慈生于順治十八年辛丑二月二十五日已時卒于康熙五十二年癸巳八月初六日寅時享年五十有三配先考文菴公子孫名字具載先考狀中不復贅李求可墓志銘憶余辛卯秋讀寒支集為元仲先生立傳時向汀友問檀河後人寧化隂君琫素為余言先生令子求可公有父風閉户讀父書屏迹城市心韙之丙申遊汀偕琫素之泉上始得見求可公時公年六十有七老矣翼日余登茶窠山拜李先生墓公命子琳甡暨諸孫從離檀河可里許樹木鬱蒼山岡環抱天然一安樂窩墳前搆饗堂數椽頗幽雅蔬畦曲沼皆潔淨有致余顧謂琫素曰求可公之葬其親也能子矣琫素曰公天性至孝事先生極盡子道嫡母邱孺人病且死委頓床席者纍月衣襦數浣公以手承其惡藥餌必親不假婢僕是墳先葬白沙坳族人所贈先生夀域者有水患公乃改葬此經營布置極苦心焉余徘徊睇審不忍去左臂有墳昂然稍異趨視所鐫石大驚曰嗚呼此吾故友上杭劉先生鼇石也曷越五百里而來葬于兹再拜畢與琫素諸君席地坐始知劉之尊人嘗師事李先生劉尤為先生所器重癸巳五月五日客檀河病篤求可公舁諸家中為易簀以沒衣衾棺椁皆公所備欲自用者復遣使周其孤婺葬之先生墓側春秋祭掃如禮余為劉痛心澘焉淚落感公古道髙義謂真不愧李先生子也琫素曰公見義無不為恐恐然慮弗克繼父志四方遊客及君子之至于斯者必誠敬欵留致其歡以去去則酌人品髙下逺近量餽以贐一如先生在時父執交遊有晚景不如意者尤殷勤遣使問遺不倦楚人劉某遭亂為兵所掠父子祖孫離散者久之友人述其事公拮據多方斡旋俾其骨肉復聚未嘗有德色至于待宗族解紛難處兄弟著友恭據苦辭甘推財讓産又公平日尋常事令名籍籍里黨間以為必有後福者琳甡曰家君言為德非以幸福併非以邀譽也但行吾心之所安與力所得為而巳余曰嗟乎此有道君子之言世人安得聞之日將晡偕諸君下山歸目覩檀河精舍琴書卷軸花石亭池皆守先生之舊有增新無廢失家廟土堡廬井橋梁先生所建置者咸井然不墜余益嘆公為能子而公悽然以悲謂丁亥冬不戒于火土堡所藏書籍器物頓盡先人手澤灰燼傷心余以先生生平心血全在著述公既次第登棗梨傳播海內他長物何足繫懷信宿公家公之仲孫倓以所為文相質余嘉倓之為令器且喜公之子若孫皆不類尋常也盡歡而别巳亥嘉平復會琫素于粵中則言公巳沒甚痛之念兹哲人有禆風化思著其美以勵頽俗而琳甡奉公遺命以庚子秋七月攜公狀造余屬為文以志其墓嗚呼余安敢辭而安忍辭哉公諱向旻字允懷後更名子權字求可世居寧化之泉上父前朝徴君諱世熊即元仲先生生子三人公其季也幼力學諸子百家皆研究稍長隨先生遊豫章泛鄱湖登匡廬五老諸峯謁天下遺逸名宿咸以國士期之弱冠補弟子員戊午以貢入國雍例當授職辭不就其生平大致如此諸懿行芳規未易更僕鄉之人能道之余特就丙申所目見耳聞于公生前最確者敘述其事而其餘槩從闕焉不欲多為諛詞傳信也公生于順治庚寅九月三日卒于康熙巳亥八月朔日俱亥時享年七十元配邱氏年六十四先卒側室陳氏子三人長琳甡邱出也娶于母族次是恆娶張氏次葆光聘張氏陳出也女七人長適隂承天邱出次適隂承德即琫素長男也次適邱夢陽次適將樂伍其元次適歸化馮廷楷次許字清流雷超士次許字清流鄧登龍俱陳出孫五人俍娶隂氏倓娶楊氏俅聘張氏賅聘邱氏俱琳甡出倕幼未聘是恆出孫女四人一適伊肇炳一適張豐一適歸化葉國撫一適清流王雲鳳俱琳甡出曽孫三人長壆長壁俍出長榮倓出曽孫女四人俍出者二一未字一許字清流曽聨芳倓出者二一許字將樂伍開天一未字某年某月某日奉公柩葬于某里曽坑山坐某向某銘曰檀河水清且漣彼君子兮能承先孝友道義無欠闕曾坑抔土隴岡阡昌厥後非偶然誥贈奉政大夫夢巗戴君墓志銘代先民有言窮達命也出處時也時命在天君子聽之苟有心于世道安往不可以濟人利物勵詩書立志節敦氣誼挽頽風皆儒者素位而行之學必拘拘身致通顯而後有所表見陋矣余曩嵗撫綏兩浙以天台戴令有異政升諸朝今厯郎官攜厥考夢巖君行狀涕泣請余銘其穸因乃子而知其父之賢亦余所樂為志者按狀君諱某字夢巗江左建平人少孤力學弱冠坐皋比教授其鄉之俊髦多所成就而君顧數奇困童子試者久之逾三十始補博士弟子員省試又數報罷慕范文正公作秀才時以天下為巳任留心康濟講求民生利病上書陳言位當道所不及鄉之人咸嘉賴焉先是建平正賦外多雜𣲖有所謂兵豆米者苛苦尤甚君條陳制府檄清釐得豁免民困以蘇又建邑土産皆秈米而功令徴白糧民貿遷他境以輸苦煩費亦以君條陳入告得請改徴本色秈米又學圃為豪民兼併數十年莫過問君昌言於官遂復之君既以文章意氣名一時士無論知與不知皆浩然歸重邑令李君蓼匪尤欣異之延為子師君早暮談經術不預外事李益服其品髙以為時賢莫及也李浙人以遷去不通音問者二十年而李物故久家亦零落其子以仇陷縲絏乘守者懈忽揚去念浙東西皆法吏所及莫能容間道走君家亦不為君言其故君遇之甚厚未浹月以病死循無歸我殯之義棺衾含殮如禮令巳子制緦麻友生之服朝夕哭奠走一介訃其家而其家孥孺親黨巳皆被攝錮獄蹤迹李生去向及使至則遣吏隨之啓棺驗曰是也然幾以逋逃藪及君大吏聞君言始嘆服君因厝其柩先兆側嵗時祭掃如私親十餘年乃召其子資之扶櫬歸吳越間嘖嘖君髙義而君居鄉多隱德不欲人知人亦莫能盡知也有陳某者負君劵纍纍復以官逋急將鬻子婦以償君惻然召之至出故劵毁之且贈數金輸官逋陳感泣率子婦羅拜君所君引避無德色他行事多此類云君事兄如父恤宗黨重然諾嚴取與敦本尚實無浮華刻薄之氣使得志于時當卓然有所樹立乃時命迍邅五十始餼于庠七十以明經老一生不得持民社尺寸之柄亦獨何哉然君也素位而行濟人利物之心不徒空托之懷抱固亦有足多矣修德獲福之談儒者所不道而或者又有不于其身于其子孫之説吾以君之子某驗之始信理有不誣乎君生于云云乃為之銘銘曰珠韞櫝玉在璞身雖隱矣道自足問汝佳城惟兹吉卜氤氳精氣見山川子子孫孫世式穀寧化文學翠菴王公墓志銘寧化翠菴王公將葬乃子鷺以書來京師請余志其墓余與鷺為同年友于公有通家猶子之誼況吾鄉名卿偉士肩相摩而鷺弗之請獨不逺六千里以屬余余安敢辭公姓王氏諱如綸字右針號翠菴系出宋丞相文正公之後有評事君者從南渡轉徙入閩居寧化之龍上里久而蕃衍名其地曰王坊世力田為家法迄明中葉而義菴公饒于財好施豫捐千石賑飢直指使者旌其義以鄉飲酒禮賓之五傳至二魯公有隱德則公之父也公幼聰明讀書必求根柢識者知其與俗學異矣通經史旁及諸子百家髫年應童子試署郡守盧公異其才拔冠一軍旋受知學使山陽陸公補博士弟子員試輒髙等盧遷辰州守邀楚遊敦趣再三許厚贈公以二親且老不忍離晨昏固辭弗就時人以亷孝目之公讀書立品不事干謁性嚴毅無所阿丰采為鄉邦所畏愛甲寅藩變毒巨室索餉狼戾羅公父于獄公涕泣請以身代不可固請乃可晝夜坐縲絏極苦楚至皮骨僅存不能堪公方以脫父為幸安之不悔也及事平家亦零落然所保全者大矣公之孝如此勇又如此不以禍難怵其志不以利欲動其心有學有品實足風勵一世蘭生幽谷不為王者之香惜夫今天子重孝亷方正之士徴詣京師量其能而授之職使公如在綰綬在所必先其如命之不逢何哉然讀書自樂老而彌篤教子孫能傳其家學視徼幸得志于一時不為人所稱道者又倜倜乎逺也公生于云云以某年某月某日葬于龍下里察徑午山子向兼丁癸堪輿家謂其地形為荷葉蓋金龜云銘曰生龍上葬龍下翠華朝察徑夜扄汝穸安汝舍荷葉青青出清漣國寶家藏重聲價子孫世守天庥迓太學仲謨周公墓志銘代公諱天榮字仲謨姓周氏福建海澄人系出唐開漳進士周匡物自髙曽以來世有聞望族祖起元前明大中丞精忠亮節忤權閹魏忠賢以死公生而穎異童孺若成人父景文最鍾愛以大器期之不幸早失怙恃遭兵燹弗得卒舉子業以太學生老未竟所懷族人悼焉某獨喟然而嘆曰躬有天爵足以榮其身行推孝友能為政于家全受全歸毁傷無憾何不足之有哉緬思在昔海氛不靖公兄弟轉徙流離季遭冦掠公與伯兄蹤迹十餘年乃得之而季巳殁僅存遺孤一人捐重資贖以歸此則公之友也喪亂既平祖廟傾圮公協謀更新捐資襄事輪奐巍然又置祭田若干畝俾世世子孫皆奉蒸嘗以無忘祖父此則公之孝也性渾厚無虛夸狙詐之習見義必為聞諸子讀書聲輒油然以喜好親近名公巨儒極力延致為兒曹矜式孟子曰有天爵者仁義忠信樂善不倦惟公有焉孔子曰惟孝友于兄弟施于有政是亦為政公又有焉公享年五十有八順治乙未康熙壬辰公生卒之嵗也七月草二四月草三公生卒之月日也辰公生卒之時也待封孺人林氏公之元配也丈夫子七人曰嵗貢生楙曰正健曰朴曰相曰柱曰檟曰橋孫一人曰泌女子二人外孫男女四人公之嗣續也九疇五福曰夀曰富曰康寧曰攸好德曰考終命如公其庶乎世之居髙位糜厚祿事業無所表見沒世而名不稱者其視公何如哉公卒之七年戊戌其長子楙將以某月某日葬公于郡北茶園先期請志銘京邸某公之族弟也義不容辭故為書其事于石銘曰丹霞城北有茶園從今以後植芳蘭坐丁向癸兼未丑仲謨塋域在此間相戒松楸勿翦伐子孫世守磐石安隂醒菴墓表寧化為邑介汀邵萬山之中奇峯嶔岑清溪溜瀝地多隱君子自李元仲先生翹然傑出一時風教潛移有志之士砥行修身好行其德厚彝倫而薄財利勤學問而淡功名巋然以古道自處不為末世浮囂之習如隂氏醒菴先生尤其矯矯彰著者先生性孝友能篤于親三嵗而孤母雷孺人撫之先生感念先德榜其齋曰烏夜刻苦自勵及居母喪哀毁三年不御酒肉遇先人忌辰嵗時伏臘展像跪拜淚涔涔下以父柩未葬徒步千里走江西造豐城訪形家楊震延以歸既得吉拮據襄事凡先世塋壠無不修祭祀無不舉昆弟戚屬無不存恤今先生雖沒而其孝友雍睦嘖嘖里黨間尚有稱其分産從弟推愛堂姪及撫謝氏孤成立故事則先生之天性可知矣先生為諸生者二十餘年為太學生者三十餘年中間棘闈數蹶連不得志于有司淡然不以為意孜孜好學老而彌篤當甲寅閩變偽帥索餉狼籍毒流薦紳先生為從兄株連滯獄半載一時同患諸人俱相對號泣悲不自勝先生讀書獄中晨夕不倦聲朗朗若出金石手抄較録一如無事非其涵養精深置死生于度外而何以能此先生素簡朴寡嗜欲不喜聲伎嘗衣大布衣方領闊袖古貌岸然舉止言動悉中規矩繩墨望而知為有道者間從賔客飲他人酒酣耳熱謔浪歡呼先生正襟危坐終席無惰容後生小子或因之為迂先生弗顧也見人有過必面折不少假借人亦諒之間居無事灑掃庭除蒔花澆竹娓娓然若有甚樂于中者課兒曹讀書立品無墜家聲嘗曰吾見世人刻薄殊甚每因財利而傷同氣吾甚痛心焉吾願後日子孫切不可蹈此轍又曰待人接物須之以平恕遇事以知足忍耐為主嗚呼先生此言真季世之藥石也使先生得志于時出其言坊行表維末俗而挽頽風豈不足為天下矜式奈何窮山僻處獨嗟肥遁蓋亦有不幸焉者乎歐陽公曰為善者能有後而託于文字者可以無窮先生子若孫克自振拔所以慰先生者方興未艾而長君琫素不逺千餘里跋涉山溪持行狀徴言于小子故敢不揣固陋為之表以揭于其阡俾寧之人士有所觀感焉先生諱卿月字省孺醒菴其號也以太學生老享年七十五嵗生殁年月子孫名字具載墓志中不復贅鹿洲初集卷二十
