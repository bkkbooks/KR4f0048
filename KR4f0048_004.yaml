body:
  text: 鹿洲初集卷四廣州府知府藍鼎元撰序青海平定雅序皇帝聖德廣淵神功赫濯天戈所指青海蕩平臣不勝歡忭昔者有苖弗率虞廷徂征防風不臣夏后行戮周官大司馬以九伐之法正邦國凡馮弱犯寡負固不服賊殺其親皆征討所不宥征之為言正也有罪當正不廢荒逺六合一家豈容蠢動方隅幸逃王法之外青海部落僻處西陲聖祖仁皇帝廓包荒之量封查什巴圖魯為王及其昆弟皆膺顯爵是宜悉心效順俯首帖耳優遊食飲於堯天舜日中不應尚懷悖叛萌辜恩負義之想也三十年來中藏不軌聖祖以其反逆未彰姑置汪洋大度之內皇帝嗣位更加優容而羅卜藏丹金怙惡不悛自殘骨肉脅鄰羌作亂侵擾邊陲今乃命將出師往撲滅之授方略於深宫決制勝於萬里雲屯用命賈勇爭先癸卯初冬大師敗賊數次羅卜藏丹金力詘不支附逆番羌雷轟電擊脅從貝勒台吉等俱皆歸誠青海醜類顛連膽喪不能復集矣皇帝曰除姦務盡其靖根株復命以兵搗巢穴甲辰仲春遂破賊巢禽逆母及同惡渠魁吹拉克諾木齊等斬獲巨萬牛馬器械山積羅卜藏丹金從百餘人逃竄我軍奮力窮追復𠞰阿比者三千餘人盡收其輜重人畜逆賊窮蹙衣婦人衣隻身遁入深林委命山谷大師以三月朔日凱旋捷書至天顔大喜推本聖祖仁皇帝厚德逺猷培養將士感恩奮勇以及在天默佑克奏膚功之由禋祀祭告大沛殊恩皇帝文德武功超邁今古善則歸親仁孝至矣命將則知人善任恤兵則解衣推食邊塞肅清烽煙永靖遐荒番部罔不尊親太平之期永永無極誠宜播為雅頌以咏歌聖德如古所云鋪張對天之鴻休揚厲無前之偉績者臣閩海愚賤學問譾劣然嘗從軍臺灣躬歷行間深知疆場之苦又以生番四出戕害人民多方百計綏之以餌懾之以兵備悉醜類馴服之難事定還山讀書著述幸以貢入京師得於辟雍恭迎聖駕圜橋聽講稽首而獻視學之頌復逐隊臣工入朝太和殿始終成禮前後蒙賜克食帑金蓬蓽書生遭逄異數臣雖下第南歸亦足以耀於田夫野老兹復際西師大捷青海蕩平幸得親覩堯舜之君千載一時治定功成之會豈敢以筆墨荒陋為辭輒依古江漢常武作平青海雅三篇拜手稽首以獻臨雍頌序皇帝覃敷文德加意作人元年特開鄉會兩試復命學臣考選行著鄉閭學通經術之士貢入成均以廣勵人才陶成俊造雲漢章天至矣盛矣二年春躬耕藉田大采朝日庶政具舉百度咸修乃遵古典制行臨雍釋奠之禮重學也記曰王者建國君民教學為先又曰天子視學大昕鼓徵祭先師先聖漢唐宋明以來代多英主尊養老更講經論道烺烺炳炳潤色皇猷未有誠心實意鼓舞人材如我皇上者道德髙乎古帝而學問勤於儒生無書不讀揮翰如流樂育一世之英賢日命九卿大臣各行保舉龍蟠鳯逸起泥瀆而登青雲復念京師首善之區太學為四海人文類聚之所將使蘇湖安定之學復見於今諸生經明行修文章氣節經濟理學之彥彬彬蔚起慶澤播於無疆淑問揚於中外此臨雍視學之舉所由來也臣鼎元株守鄉學二十餘載整齊風化之思徒垂著述之空文自念歲糜廪餼無一毫有補於國家故嘗從軍臺灣參贊機務握管草檄無非哀鴻磔鼠之篇紀事直書亦同稗官野史之陋歲餘海外學殖荒落歸來鍵户讀書幸際維新景運學臣奉命選拔以臣應貢辟雍臣伏讀邸抄見皇上用人行政事事超越前古推心置臣下腹中洞悉民生利病若燭照數計臣不勝歡欣蹈舞謂堯舜在上何幸身親見之比來京師又幸逄臨雍盛典臣得匍伏道左恭迎聖駕大禮大樂圜橋門而聽觀遂復逐隊臣工始終成禮草茅愚賤榮幸曷極敢不奮勵濯磨以期無負聖天子作人至意伏思臨雍大典世祖章皇帝聖祖仁皇帝皆親行之皇上至孝天成念念不忘繼述踐其位行其禮奏其樂此亦以孝治天下之一也臣鼎元不揣固陋謹拜手稽首而揚頌日月合璧五星連珠頌序我皇懋昭敬德合撰清寧凝大寶以迓天庥覆載所及日月照臨之地罔不瞻被光輝顒首向化如衆星之共北辰也昊蒼眷念謂為千古不世出之君將俾遐福受茀祿休徵嘉瑞悉集於厥躬於是不愛道不愛寶膏露醴泉和風甘雨年穀順成河海清晏四靈為畜重譯來朝巍乎盛矣聖修日茂天眷益加謂此千古不世出之君其錫而嘉祥必髙髙在上極千古不多見者庶幾稱厥德焉以皇帝赫赫明明洞矚民隱有太陽中天之象清暉照逺圓徹可親有明鏡在天之象燦爛八極萬管難窺有搖光布天之象明德慎刑陽剛與隂柔互濟有日月並明雙璧符合之象敬五事協五行既曰貌曰言曰視曰聽曰思之並懋而不忒亦為仁為義為禮為智為信之交修而無間有五星蟬聯纍纍如貫珠之象於是上帝即以我皇之德播為天瑞以彰之靈臺之官占驗推測奏雍正三年中春二日庚午晨雞方唱玉漏報寅日月會于營室五星並躔娵訾之次合璧連珠曠古不多見也太史大書于册以昭示將來禮臣拜手稽首請御殿受賀皇帝謙讓不居歸功聖祖遣官祭告寢陵願與天下臣民共享無疆餘慶大哉聖德蔑以加矣賢才登進歸培養於先朝荒裔擴清溯逺猷於昌後愾聞僾見於今三年日麗星輝動輒愴念以千古不世出之孝思凝千古不多見之祥符綿延厯數永享太平知與天地同無極矣小臣何幸躬逄盛美敢𢋫復旦以紀重華河清頌序皇帝御極之四年丙午冬十有二月黃河澄清自關中而豫而兗而徐淮上下二千餘里瑩徹三旬日至明年丁未之春湛如也於時天下臣民咸歡欣忭舞以手加額謂黃河千年一澄清為盛世庥嘉之大瑞書契以來實所罕覯相傳聖人在上乃克有之今以皇帝聖德膺茲難得之祥宜播絃歌垂史册以昭示萬世臣伏思天地民物一理一氣至誠感通如影隨形惟皇衷懋建其有極斯清寧昭著於上下瑞應之徵非偶然也臣謹按禮經聖王用民必順故天不愛其道地不愛其寶人不愛其情是以有膏露醴泉器車圖馬鳯麟龜龍之瑞而又申之曰聖王能修禮以達義體信以達順此順之實也可知天瑞之來必由人事禮義信順即為稀世之嘉祥惟其有之是以應之自古及今未有無其實而能徵其應者臣又按白虎通曰天下太平符瑞來至者以王者承天順理調和隂陽隂陽和萬物序庥氣充塞故符瑞並臻皆應德而至德及天則斗極明日月光德至地則嘉禾生蓂莢起德至山陵則景雲出芝實茂德至淵泉則河出圖江出貝乾鑿度曰天降瑞應河水先清又可知上帝無私惟德是眷苞符彰兆必歸之承天順理調和隂陽之大君亦未有無因而至者也我皇上心涵太極道備中和法乾坤之情定民物之性一氣感召同體相關是以精誠所格上通帝載每有郊廟祀事乘輿出入無不天霽日朗景色和舒或四方小有水旱則深宫齋戒感動天和時雨時暘應念不爽祥風至瑞雪零日月五星呈聯珠合璧之象此所謂德及天者乎躬耕藉田勤求民瘼以如傷若保為心蠲租減賦平糶給賑至于三農告豐嘉禾瑞麥有一莖三穗五穗九穗之竒又有御苑葡茯辛夷種種珍異此所謂德至地者乎仁孝誠敬善繼善述是以祖宗陵寢靈蓍逾丈芝草蕃生此所謂德至山陵者乎聲教四訖海不揚波江不溢浪河不驚瀾而且運道深通畿輔山左開鑿河渠收水澤營田之利此所謂德至淵泉者乎於是昊蒼之眷顧日隆謂聖德山髙水深彌天際地當錫古今極難之上瑞以嘉樂之俾億萬載享永清之福千百國慶大澤之長爰命河神澄泥汰濁特垂清淑以耀乾坤此所謂天降瑞應河水先清者又若合符契也河色黃赤吞納百川揚波鼓浪猛迅湍急開闢以來未有能使之清者即史册所記極盛之時或清數十里數百里不過一日二日三日未有渟泓四省至二千餘里之遙經二三旬日之久而未艾者也良由我皇上清明在躬上下同流其存于中者無欲而靜虛居敬而動直心事光明豁達洞然無一物之能蔽其發於外者智周萬物而明無不通道濟天下而公無不溥庶政源源本本沛然無一物之能淆是以大化潛孚氣機在握雖極濁如河亦轉靈明之象焉夫黃河源逺流長上通天漢下湧崑崙蜿蜒萬數千里而注海若亘古無間斷之期黃河清則天下皆清此我大清萬年福祚靈長之瑞也是宜播告八方御殿受賀以敬迓庥祉皇上謙讓弗居歸美聖祖仁皇帝六十餘年豐功駿業燕天昌後之隆祭告景陵彌深繼述又遣官崇祀河神增修德政嚴恭寅畏之小心賢于升中告成泥金刻玉者萬萬矣古之聖王遇災而懼前史且誇為美談况我皇上受天之祜得瑞若驚嘉貺駢臻乾惕方懋放勳之欽明恭讓重華之溫恭允塞臣何幸身親見之既稽首稱賀又早夜以思天聽聰明天心仁愛夫豈徒徴瑞于河用彰聖德無亦有勗我臣民洗心滌慮之意乎人受天地之中以生所性皆善至清至明非如黃河之本性而濁也氣習之染物欲之蔽雖或有時決堤防而不分涇渭然乎旦清明之氣未嘗不存非若黃河之水土比附交融固結而不可澄汰也本性而濁者尚可以聖心所感而澄而清之比附融結者尚能以聖化所孚而淘而淑之况本然至清至明之皆善可任氣拘物蔽之濡染而不奮勵濯磨以無負聖天子清明之治哉從茲天下吏治咸激濁揚清以澄肅相崇尚天下士習民風咸潔已自好以同流合汙為愧耻則禮樂可興風俗可淳長流慶澤垂美無疆我皇上顧而樂之謂河清之為祥大矣此之謂人不愛其情與天不愛道地不愛寶同為大順大化之實也臣不敏願與天下臣民共勉之因拜手稽首而揚頌楊龜山先生文集序有宋熙豐以前閩人未知理學也自龜山先生載道南來遠方之士遊其門者日衆閩學駸駸然盛矣一傳豫章再傳延平而後紫陽夫子集厥成焉當時後先輝映炳蔚天南若劉胡黃蔡真陳李廖諸君子難更僕數伊洛之學至是大明如太陽之出扶桑照耀天下無不見者鄒魯而外推閩儒為獨盛龜山先生之功不可忘所自也今天子重道崇儒御書程氏正宗賜扁於先生書院正學重光萬世一時敷天薄海之士孰不思蚤夜濯磨置身聖賢之域哉聖賢之道明於程子而先生傳之聖賢之道備於朱子而先生開之先生固吾道之津梁也舍此而他求别無所謂正學矣先生之學言仁言義言性善言未發之中推本孔孟之説發明中庸大學之道有功於後世非淺少年登進士授官不赴與遊定夫立雪程門固已知其志道真誠置爵祿宴安於度外及其出也浮沈卑位四十餘年不求聞達而德望日重士大夫翕然尊信之至於髙麗亦問起居則先生之聲名洋溢宇宙如泰山峙目雷電轟耳荒裔絶域之人猶知尊慕獨於朝廷之上不見不聞良可悲也晚居諫垣才九十日安民備邊之策纎悉必周責宰臣不忠罷奄寺兵柄乞誅童貫姚古論割三鎮黜安石王爵去配享禁三經使淫辭不為學者之惑其剛毅正直經濟設施規模次第難進易退之髙風皆非他人所能及使欽宗盡用其言置之輔相之地得展平生所學以扶大厦於將傾或可無青城之禍即不然而髙宗能用之為中興賢相與李綱同心協力天下事亦未可知顧乃退隱山阿淪落終老天不祚宋抑欲使著書講學為閩中傳道計耶蓋嘗論之熙豐以前閩中學者如草昧之未開先生初闢灌莽披荆棘樹幟指迷招誘後學未幾而大儒接踵遂與濓洛爭盛吾道之興若彼其易也今之閩猶古之閩也學者當禮明樂備之日生大儒講學之鄉逢聖天子重道崇儒勤求正學之盛前有可循後有可繼無先生創起之勞而有取携不盡之樂茍能實用其力于身心性命之地察識體驗于人倫日用之間以聖賢之絶業轉移世道人心其觀感而興起者不知當何如也余承中丞公命敘次先生文集問之剞人因附數言為序兼山堂遺稿序兼山堂遺稿吾師四明廷尉陳先生作也先生殁而令子子厚裒其平昔所為詩若文遙寄二千里命小子鼎元為之序小子再拜卒讀泫然流涕曰嗚呼此先生精神心血所萃烏可作文字觀哉先生由翰林出宰吾邑十有三年強教悅安民忘疾苦調南靖一年內遷主政擢侍御參銀臺復由鴻臚晉廷尉三四年間皇華鞅掌出入大海汪洋馳驅于南楚西秦蠻煙瘴雨荒沙廣漠之外撫賊勞軍賑恤災黎靡不焦心苦思宣上德而達下情以匹夫內溝為已任曷嘗沾沾于語言文字冀垂不朽哉雖然經濟者文章之大本領也占畢小夫敷衍風雲月露之詞花鳥禽魚之狀自以為雕肝琢腎戞玉敲金與馬班李杜爭衡矣由君子觀之文章不足措實用如鬼磷螢火熠耀目前雖使窮巧極工為人世不恆有之物終與草木同腐耳芝草醴泉無益百姓何如布帛菽粟能使人世不飢不寒故非有關世道人心禆益民生國計之文皆為茍作君子不忍以有用精神耗費于不急之地也先王以經濟為文章詳見于漳浦政略製錦操刀者爭誦之兹集所載疏草條陳民命海疆諄諄三復至於序記論説皆有深意嘗一臠而知九鼎百代猶將見之區區以為詩文之工抑末矣先生涖邑時以經學及詩古文詞振勵多士漳之樹幟建鼓與海內相角如蔡梁村世逺阮鸛石蔡文陳他齋夢林莊葵山亨陽林于九錫齡王鹿臯道李鱗蒼松齡等諸君皆其教也月湖水鏡固梁浦學問之淵源宜吾鄉爼豆尸祝於今為烈乎余小子童年應試即遭先生賞識期許甚奢經濟事業亦有厚望今落魄二十年無以克副中夜愴然頤涕背汗讀先生斯集儼然若臨之在上滿腔抑鬱對此潛消震動奮發之心亦復油然而起敬識數語于簡端不知子厚以為何如也蔡梁村捫齋初集序余少時未識梁村則聞梁村好為古文詞心識之辛巳春館于浦邑西湖上梁村過余談竟日各恨相見晚已乃出袖中文稿示余余益驚喜過望察其行則天性孝友族黨籍籍然稱之意氣磊落胸中無城府見義若嗜欲不顧前後蓋梁村位置髙固不徒以文人自命者余既喜與定交因與朝夕論文當是時余家桂山之麓離縣六十里雖不能年年常聚然梁村有所作余未嘗不得讀歲癸未宫坊沈心齋先生視學閩中余與梁村俱受知門牆追隨軺車者數載所過名山怪石洪濤激湍梁村悉取筆記之余讀且擊節相對髙歌又時與評論古今人物揭其可法可師可憎可罵之狀梁村不盡發之文不止心齋師每嘆其學行超卓序其集而刋之更教以立身行已之道明體達用之學且以經國大業不朽盛事屬梁村至是而梁村之文且一變矣乙酉秋梁村舉鄉闈余被刖冬梁村公車北上余亦别師還浦明年丙戍又以奔走衣食羈館丹霞當是時雖已移家邑中反不能與梁村朝夕談論丁亥夏大中丞儀封張先生撫閩倡明絶學開書院于三山延聘九郡知名士纂修先儒書籍梁村首蒙特達之知余樗櫟下材亦以徵書來覯盛事更得與梁村切磋砥礪因以讀所未讀之書上自濓洛關閩下逮許薛胡羅梁村皆有以得其要而會其歸無意于為文而文日進乎道蓋梁村之文至是又一變矣今秋闈余又被刖冬梁村又將北上儀封先生因其舊集而增訂焉重付剞劂梁村屬余序之余惟梁村之文名儒巨公序之者衆矣知之者亦衆矣梁村雖閉户家居不肯向人妄投一刺而吾鄉諸當事震於其名凡有撰述折節重幣靈蛇之珠紫燕之馬奚待髙其聲價哉況余廓落不才再戰再北偃蹇槽櫪之間蔑由昻首天衢古人云敗軍之將不足語勇文章一道亦豈余所能知加以數年來庶務紛心謀生計拙視曩者心齋師三年教誨學業之疏久矣竊愧無以對儀封尚敢栩栩然向吾友攘臂談文耶苐念八載同學文居其半又今者梁村此行將馳驅王路為國宣力盡出其生平所學而見之行事又以其禮樂政教發為文章烺烺炳炳經世理物之謨猷知爾日梁村之文當又有一變也友朋相愛之情學問無疆之境余所望於梁村者别有深焉故復不能默默書以為之序戊子冬十月林元白詩序南詔林元白先生老於詩者也少慕微之樂天因自字曰元白集成即以名編吾鄉前朝侍御李寶弓先生及今太史蔡梁村為之序其詩沖和宕逸瀟灑出塵質不傷俚華不及靡是真能得微之之神而兼樂天之致者學優才長可為世用念祖父纍世忠貞遭寇難愴痛傷心敝屣功名托於詩以自見身經亂離天倫聚散之感慘然流溢行墨間讀懷浦七歌寄弟諸什不墜淚者非人情矣滄桑屢告寄慨尤多寅卯見聞益增酸鼻蓋蒿目坎坷礧磈填胸有所觸而不能自禁故每放浪形骸借山水花月潛消不平之氣而以酒為家旦暮歸宿當其豪飲大醉揖影徘徊掉臂行吟叶宫商而鏘金石雖使微之騁詞樂天分韻騷壇牛耳正未知執自誰手爾今年逾八十詩興益豪回思生平心血不忍聽其散佚重鋟棗梨而命豫小子為序夫前達巨公既詳哉言小子更何庸贅惟有盥手卒讀奉櫽栝而守筌蹄以無忘先生愛我之意而已然是詩必傳于後與微之樂天增雞林之價則豫之文亦將附先生以行逺且分賈人之金先生其許我否不揣荒陋再拜稽首而書之邱義尊詩序梁潯詩人邱君義尊既沒知交羣從裒其平日所為詩若干卷將付梓屬余文為序余手其詩讀一二過為之流連嘆惋淚澘澘下也憶十五六年前廷尉四明陳公方宰吾邑余與義尊鏖戰童子軍並受知始相識面已復會于吾友黃君越甫家始知義尊與古為徒詩學甚邃當是時余家萇溪深山中義尊家杜潯濵海相距百里而遙弗獲再晤然屈指漳南英傑心焉數之矣自是而後余從歸安儀封諸先生周遊他郡以衣食纍心頻年馳逐聞義尊偃蹇海嶠數益竒詩益工興益豪躬耕食力有伐檀詩人意方自恨家居日少不得與義尊把臂談論猶幸其年華方富繼見有期不謂荏苒數年間義尊遽賫志以沒也義尊性豪邁髙自位置視人世詹詹末學及一切浮薄炎涼之輩直奴𨽻之既窮約不得志有懷莫展重以門祚衰薄骨肉淪亡於是悲傷憤悶放浪巖阿嘗登梁山入石室陟金剛最髙峯窮四柱佛子山頂遍晉亭獅子王瓶蓮花諸峯振衣千仞踞虎登虬俯瞰提封城郭人民之盛桑麻鳥獸之蕃大海汪洋番舶梯航之來往慨然歌嘯山谷齊鳴忽而愁懷頓湧磈礧填膺則又仰首問天涕泗橫溢幾欲排雲闕呌帝閽一訴其胸中憂思鬱結牢騷不平之氣故其為詩如歌如哭慷慨激烈悲凄之韻雖古人無以過也嗚呼以義尊之才之學無論得志茍使寬其歲月吟哦以老所就亦豈可量造物者必欲擠之死吾不知其云何也雖然是詩出義尊死不朽矣古所謂既沒而言立其是之謂乎千百載下讀是詩者如見義尊聲音笑貌宛然几席之間謂義尊尚存可也以視富貴而無所建白死與草木同朽者其賢逺矣九原有知尚聞余言而自壯哉鹿洲初集卷四
