body:
  text: 鹿洲初集巻八廣州府知府藍鼎元撰傳林元戎傳林亮字漢侯福建漳浦人也生四歲喪母八歲失所怙依從父撫養甫二年從父又沒事從母如所生未幾從母亦棄世伶丁孤苦難名狀然性不羈好結納當世賢豪嘗曰男子桑弧四方安能屈守鄉閭長為農夫没世哉屬濱海多事決意從戎習騎射擊刺留心海務島澳險夷舟航利鈍營陣戰伐靡不講求熟悉識者覘其有將才矣康熙丙戌擢臺灣水師右營把總壬辰遷福寧鎭左營千總丙申授桐山營守偹其明年以熟諳水務調澎湖協右營守偹辛丑夏臺灣土賊朱一貴作亂竊踞全臺文武守臣或殉難戰死或逃歸澎湖澎臺相距一水居民洶洶澎協將弁以孤島難守僉議撤歸厦門各出家屬登舟亮力排衆議按劍厲聲曰朝廷封疆尺寸不可棄我等享昇平食禄廩捐軀報國正在今日焉有鋒刃未血而相率委去之理丈夫死忠義耳寧能駢首市曹為法吏所辱耶請整兵配船守禦要害賊至决一死戰戰不㨗而亮死公等歸亦未遲皆曰諾願死守亮馳出江干申主將號令驅官民家屬各登岸敢言退厦者斬衆心始固又以臺米弗至慮行間乏食捐家財買穀碾米給軍製造戰攻器械及諸軍需以俟大兵進剿共圗克復水師提督施世驃南澳總兵官藍廷珍統師至澎以亮膽識超羣忠勇出衆委為前隊先鋒領舟師五百七十人自澎進發六月十有六日黎明大師咸抵鹿耳門外賊目蘇天威據鹿耳砲臺發大砲以拒我師百千奔雷飛轟海面亮奮勇争先以六艦冒死直進盡鋭攻擊遥望砲臺火藥桶堆積如山命施巨砲專攻其火藥桶中之火起烈熖冲天燔斃賊不可計數賊衆大敗奪取鹿耳門砲臺焚賊營壘乘勝進攻安平鎭賊目鄭定瑞悉衆抵敵亮復先士卒登安平城竪大軍旗幟遂克之鹿耳安平皆天險臺之要害一日而兩大捷百姓歡呼舁酒饋食知賊不難平也十七十九兩日我師鏖戰鯤身亮駕舟夾擊横衝賊陣賊大敗入水淹斃斬獲殺傷無算自是賊人退保府治不敢復出晝夜固守以老我師施世驃命亮及董方魏大猷洪平率兵千二百人分兵閒道從西港仔暗渡出府治之背藍廷珍復統大軍繼之二十二日黎明大戰于蘇厝甲賊死傷遍野夜戰犂頭標又大敗之次日窮追敗之于木柵仔復敗之于蔦松溪遂克府治七日之内恢復全臺紀功第一總督滿保手書褒揚勞以白金四百兩方之古賢將馮異曹彬云雍正元年春授南澳鎭左營遊擊秋八月擢臺灣南路營叅將俱未之官以議叙平臺功加都督同知世襲拜塔拉布哷哈番再加一等九月引見温綸褒嘉特擢臺灣水師副將賜孔雀翎寶刀貂皮縀疋火䥥包帑金二百兩蓋異數也途中聞邸報奉㫖特授臺灣鎭總兵官臺灣海外重地甫離兵火亮撫恤窮黎正已率屬整飭水陸兵防和衷文武創建郡治木城民歡樂之南北路内山生番未習教化性嗜殺時出沒為民害亮設法招撫傾心歸順者一百八社男婦一萬八百八十七人於是附山居民咸得安堵事聞上大恱賜金一萬兩從優議叙特加四級亮仰體皇仁因番姓所嗜購色布漳烟鹽糖等物遣官遍歴各社宣朝廷德意賞賚諸番歡呼之聲震山谷計動用賜金一千八百九十餘兩尚八千一百四十兩有竒封貯臺庫流交公用絲毫不私為已有也雍正五年春奉㫖移鎭浙江定海定海四面汪洋為浙東吭扼亮殫心綢繆訓練卒伍日率戰艦弁兵巡防周歴南抵温台北窮盡山花鳥不敢一日自暇逸積勞成疾卒於官年六十有四賜祭葬論曰林元戎名將也人知其平臺先登功第一不知保守澎湖尤為節之大者門庭㓂逼僉謀委去獨以一末弁排衆議仗劍奮呼遂固疆圉不特忠勇冠三軍於大義皎然星日矣以此制敵何敵不摧宜其虎吼雷奔鹿耳鯤身莫之能禦也分兵西港永奠東寧千秋百世之後扶桑日出之區言臺澎遺事者不能不為此君屈一指嗚呼可不謂竒男子哉先兄福建水師提督襄毅公家傳公諱廷珍字荆璞福建漳浦人世居萇谿鄉為閩南著姓曾從祖紫濤公諱銘球明侍御歴宣大三邉湖廣巡按有聲族祖義山公理以平澎臺功累官福建陸路提督諸弟皆將帥公少樸拙耕于野作苦忽有所懐喟然曰吾其為持㦸之士乎義山公移鎭舟山不逺二千里渡海自請入伍日習騎射舞戈揚盾趫捷如風又善為火攻鎗砲無虚發義山公壯之康熙三十四年擢把總越四載遷磐石守備又六年授温州鎭右營遊擊追賊於南麂外洋乘風縱擊獲其人船贓械復在鳯凰外洋巡捕賊艘晝夜窮追至青水大洋沈其一舟又獲其一斬首十五級生擒二十七人當事以為能調温鎭中營遊擊甲午夏在官山外洋捕賊復追至青水大洋斬首二十一級奪二巨艦擒六十四人凡汪洋絶島險逺僻深從來官兵不到之地窮搜靡遺洋賊聞風破膽皆曰謹避老藍他鎭協如嬰兒女耳自是威名日盛諸將多忌嫉者上官亦惡其形已䜛於總督滿公保將劾之提督吳公陞固争謂此兩浙第一良將滿公未信也㑹闗東大盜孫森等竊遼陽巨砲戰艦逸入海聖祖震怒責成沿海封疆諸臣滿公入覲面奉諭㫖由海濱巡行南下提督偕至溫州時方憂逸盜未獲温帥來迎問將弁賢否及藍某安在帥曰彼在家觀劇未暇也滿公怒據帥揭密繕疏明晨將拜舟次瑞安公跪迎於江滸滿公曰觀劇忙耶何為來此聲色俱厲公從容言某於某日乃自海面緝賊來在黑水外洋與賊大戰斬級落水甚多擒逸盜孫森等九十餘人盡獲其戰艦贓物砲械滿公愕然曰有是哉幾失吾良將也召入舟厚撫之提公吳公繼至笑曰何如余言不謬乎於是改彈章為薦牘時丁酉夏四月也己亥春超遷澎湖副將夏秋間授南澳總兵官尋攝理碣石潮州二鎭務辛丑夏土賊朱一貴䧟臺灣五月七日警報至卽簡師徒治軍需慨然以征討為己任條陳進兵事宜首請總督駐厦就近督師時滿公聞變屈指浙閩諸大帥惟藍總兵可任已飛檄調公而自兼程趨厦途接公條議意見脗合大喜委令總統水陸大軍領戰船四百餘號官兵一萬二千員名前赴征剿六月十一日到澎湖用閒諜得賊中情狀謀於提督施公世驃曰羣盜皆烏合不足憂一攻即靡但其衆至十數萬誅之不可勝誅且多殺生靈無益今但張檄止殱巨魁餘勿問皆令自新則人人有生之樂無死之心可不血刃平也施公從之十有六日黎明師逼鹿耳門賊衆扼險迎敵前鋒林亮董方冐死直前攻擊公率大軍繼之遂敗賊衆奪取鹿耳門乘勝進攻安平鎭拔之戒將弁入郡之日無妄殺掠徧檄市里門書大清良民者即為良民自是賊脅從者多解散各為自全計十有七日鏖戰於四鯤身大敗之追至七鯤身瀬口詰朝遣將以小艇載火具敗賊於塗墼埕水仔尾燬其戰艦十九日賊以數萬衆蜂擁牛車架砲列盾為陣來戰公親督大砲連環迸發指揮將士賈勇争先遂破其陣復遣舟師以小艇附岸夾擊賊衆大敗淹斃千餘人於是賊退保府治不敢復出施公用降者計夜遣林亮董方魏大猷洪平率兵一千二百名從西港仔暗渡出府治之背公曰此誠竒計顧賊衆兵單脫有失賊難制矣即馳入施公營謂曰公宜遣將弁於瀬口塗墼埕等處分道夾擊某當親率大軍疾繼林亮等之後方可萬全賊聞我師北來必棄營遁府治恢復在此兩日間耳遂乘夜進發扺西港仔二十二日黎明在竿寮鄉登岸令空舟悉回安平左右曰登岸棄舟何也曰示軍士必死無有還心今日戰勝明當直抵府治耳言未巳諜者報賊在蘇厝甲與林亮魏大猷決戰勢甚張公分兵八隊為四正四竒而自將中軍馳赴之賊望見驚曰此老藍旗幟也公縱兵大戰賊稍却急乘勝崩之賊大敗薄暮至犂頭標屯劄料賊必夤夜刼營漏初下傳令撤去帳房捲旗幟露刃伏芒蔗間夜未半賊至弗見大營方驚顧忽金鼔大震我軍突出四面擊之賊大亂自相攻殺比曉追敗之於木柵仔復敗之於蔦松溪朱一貴率餘賊逸去遂入府治秋毫無所犯民大恱計自進兵以來先後纔七日耳於是分遣諸將復南北二路二十八日敗賊於大穆降朱一貴走灣裏溪大軍追至茅港尾鐵線橋及賊於鹽水港朱一貴走下加冬公密購楊旭王仁和楊石楊雄等給與守備千總銜劄令糾合庄民誘致朱一貴於溝尾庄閏月八日朱一貴及王玉全翁飛虎張阿山等皆就擒復擒獲吳外陳印李勇陳正達盧朱於是林曹林騫林璉鄭惟晃張看等皆向大軍乞䧏南北二路弁兵擒斬賊目顔子京鄭定瑞楊來萬和尚安撫各處庄社民番臺地悉平公奉檄署理臺鎭總兵官事仍統征兵秋七月南路阿猴林餘孽繼起復討平之䧏江國論鄭元長等遣千總陳章渡海入郎嬌招䧏劉國基薛菊散其餘黨已而陳福壽等後先俱至皆渠魁也為之美衣服恣其出入炫耀以動逸賊使悉來歸九月望日提督施世驃卒公奉檄署理提督印務招撫杜君英杜會三父子獲黄殿黄日昇郭國正張岳鹽水港六加甸紅毛寮諸孽先後思逞悉皆擒滅梟楊君林君李明黄輝卓敬等於市石壁寮餘孽復叛發兵擒獲蘇清林阿尾王教等十五人皆斬之又擒獲賊黨陳成鄭文苑等十三人康熙六十一年廷議改設臺澎總兵官於澎湖臺灣府治設陸路副將調公赴澎鎭守將行南路下淡水北路八掌溪奸民相繼作亂復發兵剿擒併遣諸將分道搜山先後獲林亨顔煙李慶黄潛等二十一人六月以提督姚堂奏奉㫖總兵官仍駐臺灣公遂為臺鎭從征將士以次班師雍正元年春逸盜楊合復謀作亂遣外委陳栩等捕之又遣千總何勉擒獲王忠劉富生等臺灣匪類根株盡絶冬十月奉㫖特授福建水師提督加左都督世龍衣三等阿達哈哈畨既抵任將弁行陣整頓一新立巡防之法數千里波恬浪静商賈晏然凡闗係地方有禆軍國事務竭智殫誠不遺餘力信賞必罰雖親故無所私一草一木不以擾兵民而於賢才則深加愛惜必力為揚薦引與同升嘗云人才難得不為國家愛惜培植而媢嫉壅閼非忠臣事君之道也以故汲引多至節鉞者偏禆以下難更僕數然靡有德色也提師六載始終一節兵民愛之以雍正七年仲冬二十有七日卒於官年六十六自幼失學壯力農將畧似有天授指畫謀謨皆合古法居官以政學征臺後益諳練胸中朗朗㸃竄幕稿皆中窽會教兒曹讀書明理盡脫弁韐氣習焉雍正三年入覲恩禮有加久而益隆先後賜予蟒袍翎㡌人參貂裘綺紵綢紗弓刀硯墨白玉素珠珍玩器皿菓品食物之類凡二十四次病聞遣太醫院劉君裕鐸馳驛診視至省遇遺疏乃還賜帑金二千兩治䘮贈太子少保全禮葬祭賜謚襄毅蓋異數云論曰公一生忠勤好捕賊勇敢善戰常為士卒先他事恂恂如不及虚心自下功成名立令終有俶非偶然也夫䜛嫉之於人甚矣哨海稱戈可云在家觀劇含沙之口何所不至所恃當權勿輕以耳為目而已使其時無提督吳公之保全大盜孫森之急救則良將已失誰復為國家建勲業垂不朽乎征臺大役所闗甚偉滿氏實式憑之雖骨肉手足未足喻其相需之殷得無自嘆前此幾為小人所悞否妬賢害能小人常態非聰明仁智公忠為國者其孰能知之黄廣文小傳子陽復附黄業字新江廣東平逺人所居鄉曰寨背明末設鎭平劃以屬今則為鎭平人矣業嘉靖間歲貢有隱德世守文公家訓居喪不作佛事授湖廣鄖西教諭力持正學闢浮屠常言釋氏之教虚空謬妄無益於世有害人心學者當如虎狼蛇蝎以避之不可為所摇惑若誦法程朱踐履實地彼詖邪者將不攻而自破也在任數載清白著聲去後人思其德立祠祀之子陽復邑庠生敦行嗜學親喪廬墓三年悲號不輟撫異母弟及兄弟之子皆自教之濟濟克有成婚娶畢悉分以腴田而自取磽瘠者事載平逺縣志潮守吳頴修郡志有傳康熙丁夘守林杭學再修則削之孫恒亦庠生萬歴丁未歲歉捐家資賑濟全活甚衆論曰鎭之有業景星慶雲也必力持正學始可為澤宫師儒前志逸其傳則以闢浮屠之故耳於何知之於他傳知之澄海林孝廉佳相者吳志傳曰喜浮屠學林志改曰精浮屠學比事觀之義自見矣孔子曰攻乎異端斯害也已朱子云專治而欲精之為害甚矣名教中自有樂地何事浮屠喜之且害況精乎佳相蓋有托而隱者未必眞溺浮屠林志一字之褒銛於斧鉞豈春秋之微詞歟因業而惡及其子則又何其已甚也業持正學闢浮屠居喪不作佛事在任清白著聲此鎮邑第一流人物余故特為闡幽以為崇正之的楊湘陰小傳子州俊附楊開字恱之廣東大埔人崇禎間以舉人授湘陰令流賊張獻忠擾湖廣䧟岳陽癸未八月至湘陰火攻其城開集民兵突烟出拒賊於白鶴洞長沙䧟不支為賊楊天桂所執至湘潭誘之降不應授以長沙知府開罵曰我豈受汝賊官者恨不能為國殺賊得從屈原遊幸矣挈妻子六人同沉湘江將投時賊奪其冠開曰吾豈可囚首見先帝仍冠而死次子州俊順治辛夘舉人郝尚久之亂謂同年生黄標曰吾等受國恩何論禄仕與否義不為逆黨所汚遂棄家之廣城至鐵江値他賊不屈死之標亦遇害盖父子前後殉節云論曰湘陰罵賊沉湘江從屈原遊得死所矣乃子州俊復能不為逆汚鐵江遇害何楊氏之世忠節也受國恩何論禄仕與否二語可為千秋之寶訓其説行天下無復有不義者姚烈士小傳姚霽雲潮陽人明季諸生也性嗜學好古立品端介工鍾王書法崇禎十七年闖賊亂懐宗殉國雲聞報大慟數日不食逢人輙跳呌衆以為癲又數日赴和平橋投江而死論曰李自成起潢池覆明社當時臣工迎拜道旁上表勸進者有之即號稱名士儼然為倫物所宗尚不免有四海歸心較湯武而無慚德之頌非我朝特申天討洗穢濁而清明則衣冠皆為盜賊矣霽雲邉海書生如此其忠且烈也即以和平江為汨羅誰曰不可黄攝尉傳黄新德海陽縣吏也讀書僅識字涉獵故事出語好遣文人皆笑之家故貧義不苟取或勸以稍趨勢得周急新德曰原憲之緼袍賢於季孫之狐貉宣孟之魚食甘於智伯之芻豢時人異焉康熙辛亥授廣西梧州府竇家寨巡檢弭盜有方郡守稱其才乙夘夏攝藤縣尉値滇黔叛逆山㓂蜂聚圍藤邑時兵少議降者半遁者半新德曰棄城非守土之義降賊受戮社之誅不如死守脩雉堞整樓櫓身先登陴鼓舞衆志相持者旬餘薪糧内絶外援不至呼其子日禱曰忠孝不能兩全汝扶我老母旋歸後此奉養諸事皆汝為之汝孝於祖母即汝之孝於我也城䧟被執賊欲授以偽官新德曰何面目見天下人王彦章且不肯降唐況天朝臣子從賊乎賊欲屠民新德曰倡守城者尉也誓不與賊俱生期滅汝曹朝食者尉也死賊殺尉足矣於百姓何尤賊怒斮之新德罵不絶口刃斧交下碎其屍家人四婢一皆死焉日禱負祖母得脫隱跡丐食越兩載始還至家事聞賜祭褒恤贈南寧衞經歴論曰新德微官耳以死勤事可謂大臣矣彼擁節封疆平居赫赫莫已若未見敵而棄城去者厥官居何等哉況於屈膝從賊曾狗彘之不如新德將叱而奴之敢曰孰尊孰賤耶李張白何列傳李成功奉天鐵嶺人登順治己丑武闈歴官潮陽遊擊調潮州鎮中軍以叅將管左營事訓練有法能得士心康熙十三年總兵劉進忠叛成功仰天呼曰天步方艱臣心不改倘可誅賊九死何辭潛與城守遊擊張善繼續順公標防禦于國璉謀戮進忠進忠覺執之誘以同叛不可刼以兵刃弗懼進忠偪之成功曰頭可斷志不可奪進忠曰汝為中軍我以猶子待之何無義至此成功曰禄山叛國死於猪兒朱泚叛國死於韓旻汝叛國賊臣不知死之將至我何為從汝反哉進忠令斬之罵不絶口而死時甲寅夏孟二十有一日也事聞贈驃騎將軍賜祭葬廕一子奕桂守傋張善繼直𨽻彭城衞人㓜習儒博覽羣書長為孫吳學登康熙丁未武科鼎甲第二人己酉授潮州城守營遊擊甲寅吳耿盜兵善繼赴省請餉為出師傋潮帥劉進忠陰遣腹弁楊希震赴閩獻欵耿逆授偽寧粤將軍印剪辮歸與進忠謀曰張善繼剛方固執深得衆心宜亟散其卒進忠然之遂以所部衆分𨽻王承業李雲陳璉約束焉迨善繼歸而麾下已虚無人矣謁進忠曰公不聞晉王敦乎武昌犯順直抵江寧威勢未嘗不赫也兵敗身死發瘞斬屍自古未有叛國而克令終者若至崩騰蒼莽震懾旄麾之下繫頸求活晩矣進忠怒羈之馬王廟有明經林應璧者亦被羈善繼與談古忠孝事相得甚歡並披覽史書不輟若不知刀爼之及也進忠屢遣人諭降終不屈令斬之善繼臨刑嘆曰生未統師誅叛逆死為厲鬼復深讐遂遇害事聞贈叅將賜祭葬廕子張大陞守傋白虎陜西秦州人久典戎行著勞績康熙十一年授澄海協右營都司簡閱戰艦製火攻諸具纎悉畢傋文武同事者嘆為竒才遐邇咸稱虎將云劉進忠將叛調虎與其子崇質入郡虎臨行謂妻張氏曰滇黔閩楚相繼盜兵吾父子當立功以報國汝善撫㓜孫無以我為念蓋未知進忠有反謀也及至而進忠待虎加篤左右防範甚嚴越日乃知其事嘆曰我以出師征討星月馳來豈虞變生意外悠悠蒼天彼何人哉因澘焉淚下進忠傳虎見令易㡌虎曰頭可斷㡌不可易令剪辮虎曰頸可截辮不可剪隨責進忠曰付託全潮任重榮極不圖報國甘為叛首恐皇天弗宥也一旦師敗勢窮竄身茅簷亦不可得悔何及矣左右以虎摇惑軍心請斬之進忠愛其勇不忍刑曰此愚人不識時務耳復拘虎妻張氏孫士俊為質虎與同志者密遣人赴省請兵恢復約為内應謀洩將就刃謂崇質曰食君之禄死吾分也委身存祀惟在汝崇質曰父為忠臣子從叛賊烏乎可苟就義以全貞豈不因忠而成孝孟秋朔日縛至西市虎望北叩首曰君臣大義盡於此刻父子至情亦盡於此刻生不能提三尺手刃逆賊上報國恩臣虎有餘辜矣百姓觀者為飲泣張氏士俊窮無歸貧無爨襤褸衣衫行乞於市事聞贈秩恤典如禮廕其孫白士俊守傋何亮潮州程鄉人澄海協右營千總也少充健兒每薄伐虓闞身先諸校戰功甚偉得授千夫長善馭兵量機決䇿頗洞中都閫白虎以腹心待之􅓵籌畫焉劉進忠將叛檄全潮將士赴郡城亮隨虎至進忠以偽寧粤將軍印行事亮曰以逆犯順者亡進忠忘國厚恩敢為叛逆亡在旦夕耳誓誅此賊方快我心或告之曰任天下事易死天下事難如其敗天下之事死不足以塞責如其成天下之事生亦可以有為亮曰否君猶父也子為父死無所怨人固有志不可强耳虎遣亮訂李成功于國璉張善繼密請援師恢復謀洩進忠縛亮叱之曰汝何敢作亂害我耶亮曰背義賊臣人人欲誅豈獨亮哉我一片精誠上訴天帝當於㝠曹待汝對質遂遇害亮之兄弟妻子被殺者九人觀者多嘆息泣下事聞奉㫖賜䘏蔭其子何閣龍千總論曰劉進忠之逆也同城將士為賊犬馬者多矣慷慨激烈取義成仁獨李成功張善繼白虎何亮與防禦于國璉耳于國璉奉天人為續順公沈瑞旗員進忠作亂瑞命璉偕都統宋文科鄧光明攻進忠戰于太平街鏖鬬三日璉身先士卒射傷進忠左臂賊披靡衆寡不敵終為所敗瑞縛光明璉以降璉不屈縶之幽室諭降終不聴乃斬於市尸僵立不仆數日面不改容舊志為國璉立傳而李張白何皆闕焉余竊嘆進忠叛逆呼吸死生威勢赫赫而成功面斥為禄山朱泚善繼此之王敦所以挫亂賊之鋒褫奸人之魄非淺尠也白虎曰頭可斷㡌不可易頸可截辮不可剪虎子崇質曰苟就義以全貞豈不因忠而成孝之數語者可以垂千秋登金石矣何亮末弁一則曰國恩再則曰君父罵賊至死舉家殉之使天下守土之官人人傚此四君子雖有亂賊其誰與為亂哉檠天柱礎端頼斯人余故表而出之李都閫小傳李其昌字遜伯廣東程鄉人父成材為善於鄉賑貧濟乏里人德之以為其後必有昌者因以其昌名昌偉軀幹喜韜畧補武庠弟子員慷慨自矢有棄繻請纓志値鼎革王師入粤仗䇿隨征以功署平鎮營守傋時潮疆初定土弁恣睢握兵雄鄉里昌弗之善也請於幕府願戮力疆塲得題授武昌守傋再補直𨽻楊村營遷隰州專防都司康熙十二年告病回籍其明年潮帥劉進忠叛賊黨聞風響應脅其昌從逆昌正色曰天朝用兵如神汝輩不知君恩亦當畏懼國威奈何背亂頑抗自取滅族吾受朝廷爵禄豈從而賊反耶賊怒掘坎活埋之終不屈焚殺其全家時仲冬二十有一日也子以猷方十五歲得脫告之官官無如何越四年以大赦弗究猷呼籲不已當道憐之許自行緝捕卒得賊首以雪仇恨論曰其昌明於大義舍生取之忠矣假當年畏死從逆賊平之後終亦不免一死泰山鴻毛相懸奚翅萬萬哉父為忠臣子為孝子百世而下凜冽存焉嗚呼其可敬也黄龍泉小傳黄仙春原名中通字理卿潮陽人淡泊守禮慨然有志于濓洛薪傳潮揭人多師事之順治辛夘舉於鄉授龍泉令涖任九閱月引年歸優游林下以詩酒自娱卒年八十四論曰言濓洛於潮幾乎資章甫而適越溺于禪者不足道中離講倡岐入姚江墜緒茫茫尋者鮮矣仙春獨慨然有濂洛之志可不謂豪傑之士乎惜所學弗傳而邑乘又言其詩酒自娱則亦未知其果濓洛否也彼駿而骨猶享千金況夫眞濓洛者林藍田小傳林世榕字可亭海陽人明司徒熙春元孫也父應璧昌化教諭榕九歲喪母事繼母以孝聞登康熙己酉賢書授陜西藍田令値歲荒一意噢咻以寧静寛仁為主日巡行原隰間勸耕耨捐牛種助民墾闢建義學延名士為之師躬進諸生與論文有課士論文一書行世復葺文廟新呂祠求四呂先生後以主祀事改建昌黎祠合祀栁州以栁州故藍田尉也在官十二載謝病歸閉户著述隻字不入公門建宗祠增祭業周親故之貧乏者病世俗停喪不葬嘗著歸厚録二巻以垂勸戒蓋推論風水之無憑親骸之不可棄以悚動人子於至性至情而激發之廣推逺引靡所不周至於治喪不用浮屠尤三致意焉又著有瓦注草世範纂家禮等書卒年七十四祀鄉賢子八人長元振化州訓導以善教稱長於詩早世次元擴北城兵馬司副指揮元貴訓導元掞縣丞餘諸生論曰世俗信青烏家言停喪者衆矣余讀林氏歸厚録悄然悲之歸土為安古今正理若富貴福澤則闗乎作善降祥惟子孫之自取之不信理而信術以親為市殊可痛也如世榕者眞仁人孝子之用心哉陳鄭二生列傳陳修字擴潛廣東惠來人邑諸生家貧嗜學棲山巖刻苦自勵其學以程朱為本又喜讀遷史莊子書舉子業規橅王唐不肯逐喧鬧以從時好屢不得志於有司脩亦不以此争得失抱負益豪一時文人執贄者争先後有土弁者聞其名以百金聘却弗受曰阿齡雖飢弗食陶粟吾豈與雁鶩争哉晩歲文益古而道益窮嶔竒厯落竟不遇以卒年七十七鄭國光字闇生惠來歲貢生也性勤敏諸子百家寓目成誦日求詩屬文者踵相接順治乙酉邑舉人林學賢嘯聚作賊圍攻惠來縣孤城無援絶糧四閱月邑中皇皇國光畫守城十䇿邑令沈惟煌悉舉行之凡請援請剿請增旅請飭師前後血書二十四次授盧和從閒道達者皆國光一人所為公牘秘函口授手書搦不停管人稱其倚馬才危城頼以保焉丁夘預修惠來縣志事竣始絶筆年八十論曰陳修鄭國光皆負才不遇坎壈以老豈所謂命薄者歟脩兀傲不合時宜窮且益堅固其志也國光摇筆千言危城贊畫功在桑梓亦不克用於世悲夫士之處巖穴不能自表見如二生者恐亦不少陳明經小傳陳復平字虞章澄海歲薦士也少孤哀毁骨立事寡母以孝聞順治乙酉海㓂踞澄欲羅致之利餂威脅皆不屈賊怒囚之八日伺懈得脱載木主負母逃於金砂寨乙未賊破金砂得之脅以從不可殺其妻蔡氏以脅終不可賊義而釋之甲辰以海氛不靖遷沿海居民於内地平僑居郡東與生徒講明正學先品行而後文藝親戚乏者分束脯贍之播遷之餘耕具多缺平鬻産分給雖困不悔展復後捐廩以脩學宫置祀田築潰堤鄉人頼焉生平不事干謁年八十猶鍵户窮經學博養粹卒祀鄉賢論曰陳復平可謂有道矣身可囚妻可殺而賊必不可從此之謂志士與生徒講誦程朱先德行而後文藝此之謂正學孝親敦族至老猶鍵户窮經不事干謁一舉一動皆足訓方型俗明經二字平無愧焉蔡廣文小傳蔡叔度字介士廣東海陽人康熙壬子歲貢也以孝友著於鄉兄弟親愛白首無私財家訓嚴肅病不問巫喪不延僧婦女不踰閫閾司訓石城振文教勸輸將在官十八載多士彬彬禮法焉手植木泮宫比引年皆合抱人方之南國甘棠論曰潮有叔度空谷足音也俗尚鬼病者弗巫則心危僧有地獄喪弗佛人稱不孝叔度能以正勝邪不畏人非鬼責獨信其親為篤行守道之親不敢文致其罪假秃厮以超度之權可謂仁人孝子矣伊川先生家治喪不用浮屠洛有化者江東婦女畧無交遊姻家或數十年未相識惟以信命贈遺通慇懃風何古也我思古人忽於叔度得之善夫陳廣文小傳陳王猷字良可號硯村海陽人也祖衍虞平樂令父周禮太學生世有詩名猷年十九舉於鄉至性孝友異母弟四人祖父遺産悉與之昆季節嫠皆立孤為撫養諸喪皆為殯葬族祖百年絶祀者亦繼之歴曲江連州司鐸遷肇慶教授所至講經史明禮義多士負笈從學者廡舍為滿絃誦之聲達街衢文風翕然丕變焉曲江射圃為𣙜部馬廐汙及殿廡莫敢問猷力請上官得清還舊例廣文見𣙜部皆羅拜庭下猷以為失賓師體挺然長揖時人韙之連學傾圮猷捐貲倡建醵金千餘成其事端州丁祭典禮闕畧為置爵斚爼豆祭器及樂器舞器集生徒學禮習樂入廟雝雝郡人以為創見云卒於官年六十八生平篤學力行敦友誼周窶助喪更僕難悉數文章推淹雅尤工詩詩得力子美昌黎叅以歐蘇黄陸卓然成一家吟咏至老而不輟所著有蓬亭詩文行世論曰風雅一道難言之矣補鍋之匠妄鑄湛盧不有君子其流將於胡底乎海陽陳氏以詩學世其家推敲者甚夥頗自負潮人多宗之猷其表表者也猷詩成一家言能淑其鄉之後學為人有至性敦行誼在學盡職無忝人師𣙜庭抗禮凛凛乎臺諌風裁非復苜蓿先生舉動也詩曰彼其之子邦之彦兮吾於斯人亦云蔡文學小傳子長焞孫同髙附蔡相體字任士海陽諸生也事親以孝聞有兄三人白首奉之惟謹家訓嚴肅僧尼巫嫗無敢至其門者婦女終歲不出閾雖親鄰喜慶遊燈觀劇如雲喧鬧扄扉寂寂與潮俗迴不相同也長於詩工書詩宗岑嘉州書得顔魯國片楮寸箋人珍重之子長焞長熹熹以庚子副車貢太學焞字明如舉康熙癸酉武闈授千夫長防守普寧汛清介盡職四壁蕭然若寒士有以錢十緡進者焞駭問何來其人曰無傷也但屠牛勿禁賭博勿禁則月以此為恒規可養亷不竭耳焞曰不可以養口腹不義之食也以遺子孫是誨之賭也其人笑曰汛弁微官奚事矯亷為焞曰非矯也官雖小受禄於朝豈敢以貧故自汚如犬彘不擇食哉母病目焞舌䑛復明孝友有父風能守家訓工書法時游神於顔栁間焞子祖坤同高高字世廣偕坤並學祖父書能率教臨摹唐帖各極神似而高尤篤好敦孝弟好學忘貧能赴人之急雍正癸夘兄弟同膺選拔而高以丙午省試卒於羊城督學惠士竒賻其喪以歸里有癲者王明聞其櫬歸也哭之慟人怪之明曰誰謂予癲夫豈不識君子耶論曰蔡氏父子祖孫皆孝友清介正士也而皆以工書名美矣書於六藝一也不可不學顧海濵時尚以趙董為宗見軟媚則恱之未有講晉唐風格者蔡氏傳家其殆得中原風氣者歟徐孝亷韓小傳徐韓字景之潮陽人少失怙母黄氏明敏嗜學通子史百家言堅貞守義授韓以詩書紡績篝燈課誦弗輟韓亦克孝力學副所望康熙丁夘舉於鄉教授生徒以倡明正學為己任出其門者多一時英俊數上春官不第以孝亷終未竟其用生平負氣節不謁權貴長吏之庭未嘗投一刺也雖環堵蕭然漠不為意士大夫重之論曰韓教授生徒以倡明正學為己任余聞之喜不寐焉惜著述弗傳其造詣不得而知果所學出於正又能以正淑後學則大偉矣内承灰荻之教心志筋骨從嚴霜密雪中錘鍊而成操履清高矯然流俗之表覘其行可知其學以正許之可也徐孝亷夢麒小傳徐夢麒字忠移潮陽人少孤從叔父明經轍受業博極羣書以五經中辛夘副車甲午登賢書性剛方不屑治産業家貧甚處之泰然所得脩脯悉與轍子均分事叔母如母邑人推孝友焉先是麒為諸生教授達濠有寒士陳姓者邑之華里東人亦訓蒙於其地兩人交相善也已而陳病且死與麒訣曰死不足惜但無後負不孝罪耳昔有某蜑婦一男頗佳願為某嗣有成議今已矣言訖嗚咽而卒家不能具殯歛麒拮据為之經營窆焉訪所謂蜑婦男者則陳外遇産也笑且詈曰䜿子作此不切事今死矣弗足責無後為大猶愈於他人子也詢其狀非六金不可麒徧貸親朋得金六取其子躬抱送至陳家里人聞輿中有呱呱而泣者以為女客來矣比至門停輿皆駭愕不知為誰氏親眷羣趨視輿夫揭簾見抱兒者出則龎然長髯昂藏一丈夫也里人皆大笑麒從容呼其父母告以故舉兒畀之里人皆感激或泣下相謂曰此義人也麒仍時省視周其困乏今兒已成立且生孫矣麒生平慷慨好義大都類此論曰麒為人孝友方正敦品行重廉節鄉人以未竟其用惜之獨詳細事何予存孤也事莫大於義敦師厚友風化所闗況繼人絶世乎使一鄉一國聞風效尤則鄉國之民歸厚矣麒生平大節無踰於此烏可以細行目之頼逸民小傳頼應字紹庭廣東鎭平人篤學高尚不求知於世超然有古逸民風宅邉有大榕樹手書一巻坐臥窮年為人度量洪雅無争競里黨間怡怡如也鄉有賃其牛而耕者牛疲行遲鞭牛背詈曰頼應何不速行應適經其處若為弗聞也而過之鄉人覺而謝罪應曰戲言耳無足怪邑有邱甲者好訟應嘗買其田十畝俄而甲訟焉將赴郡待質甲貧甚囊無一錢求附應舟徃應許之復飲食之甲對簿理屈不伏辜復他訟連年不解徃返皆隨應應待之無改於初人莫知其為仇訟者或以為從行之僕耳後甲悔踵門謝罪應欵之還其劵甲得田大喜稽首稱謝及應卒甲哭之慟如喪所生論曰頼應古之君子也以此風世則民無所爭或曰既如此曷不還田於未訟之先省僕僕公庭乎曰刁風不可長恐人人效尤罄田宅無以為繼耳積誠以感之俟其倦而歸之亦善處小人者夫固不以一訟累其逸宣化農小傳宣化農者陳其姓孟壯其名潮州饒平人也世居宣化里事農業目未識詩書然性狷介家貧絲毫不苟取里人異之一日徃黄岡買米負以歸量之多一斗愕然曰咄嗟彼悞也我不可受家人曰天賜也悞自彼於君何與且當其時則還之今已負至家相距二十餘里何辭為壯曰不可非其有而取之盜也彼雖自失悞我奈何欺天日乎即負斗米疾走至黄岡送還之與人渡澳山樵採為颶風所阻不得歸衆競竊園間番薯以食壯獨否或勸之曰非義也寧餓死旦日風不息或又勸之仍不可餓三日而歸其生平行事多此類論曰孟子言人皆可為堯舜若壯者眞堯舜之民也身為山農目不知書立心制行不欺天日如此雖伊尹伯夷猶將揖而進之敢以凡民目之耶士大夫居其位朘其民欺其君蠧其國者視陳氏子何如哉盧壯士小傳盧和潮州靖海所人居惠來縣東郊塗城身長七尺黧面長鬚為邑壯丁順治乙酉邑紳林學賢為㓂攻縣城圍困數月援兵莫至内外信息不相通縣令沈惟煌與紳士謀求救夜召和入計事命突圍赴郡乞師和曰諾胸藏血書懐二鴿從城南縋出夜暗如墨人對面不相見和匍匐膝行十五里至神泉遵海而東從守禦所過潮陽入郡至則放鴿為號夜或遇賊則蹲伏似狗又或似棄尸賊竟以此紿去書得達如是者二十四次援兵至圍解論曰盧和壯士也義士也煢孑匹夫能為國家出力救全城旦夕之命厥功偉矣包胥秦廷霽雲斷指亦不過此忠此誠耳人有貴賤忠誠則一誰敢以壯丁目之黎京兆傳黎致逺字寧先福建長汀人名所居曰抑堂門人因以為號父士𢎞字媿曾厯官叅政以文章吏治名於時致逺年卄一登康熙丙子賢書時叅政已大耋矣長兄文逺辛酉舉人仕山東新泰令叅政卒致逺遵遺教喪葬悉依古禮不用浮屠時人異之戊子春應閩撫張公伯行聘居會城修書講學者一載己丑成進士選庻常壬辰授翰林檢討時士風猶尚干謁通聲氣以詞臣當持衡門多如市致逺獨峻弗納終日扄扉絶奔競時人以為高不可攀莫敢以私語者公卿間雅慕才名冀投一刺不可得大學士李公光地己丑會闈座師也方宣白麻倡正學教誘後進門墻甚盛以致逺同鄉植氣節獨加敬禮致逺淡然每進謁起居數語輒負墻而退或以為太泠不近情李公獨喜曰賢者也張公伯行任倉塲總督屬吏有知致逺與張厚者願納交餽問慇懃致逺峻却之戒閽者曰彼為倉塲張公來非為我來也張公以正人待我我豈藉張公以為利且我生平自命居何等可於此兩失之乎丁酉典試粤西願納交者踵其門詭云與太史公面言留白金四十兩家用家人辭不獲置笥中致逺粤還甫踰閾行裝未卸詢家事家以為言則大驚命送還家人請俟卸裝不可且詈曰吾既知之矣此豈可片刻存哉聞者嘆服庚子冬奉命督楚學政痛抑奔競先品行而後文藝一時拔擢稱得人成進士讀中秘書者甚衆雍正二年甲辰還朝復命上疏通言路加意詞臣欲使敡厯中外明體用以傋任使授致逺吏科給事中致逺忠誠愼密每奏輙焚草雖至親不得聞丙午春以保舉山東巡察引見上大喜謂廷臣曰此人可大用山東巡察未足展其長湖廣係兩撫地大事煩命巡湖廣改奚德愼山東上又言此人大有見識前嵗年羮堯方盛他人未敢言獨密陳請加裁抑深為可取蓋致逺此奏留中舉朝無有知者至是皆竦然起敬且服致逺之果不猶人也致逺奏請馳驛遍歴荒州僻縣㫖俞之賜紫貂錠子藥以行單車赴所部弊絶風清驛站塘汛皆肅然盜賊屏息靖州有謬冲花衣苗怙險為㓂截商旅抄村落守令苦之然畏及兵戈多遷延觀望致逺慨然謂宜亟治無使羽翼日多根柢深固為害滋大移檄督撫提鎮言謬冲花衣苗焚刼抄掠毒害州邑小民痛恨深入骨髓環輿泣訴咸謂該州詳請會拿民皆鼓舞以為更生不虞黔省稽延推諉徒費文移肆惡倡狂日甚一日方今天子聲靈四訖澤被遐荒當事文武兼資壯猷偉畧蠢爾不悛難於寛宥所當殲而殪之以示創懲之威不徒驅而去之僅紓旦夕之憤不知黔省官弁何以稽延推諉一至於斯以封疆之嫌耶則天語煌煌罔分彼此以山峒之險火鎗之毒耶則楚人粤人亦重身命况苗性至惡莫甚於謬冲母論在黔在楚總宜發兵剿捕懲一儆百化梗還淳倘再濡遲觀望致使生靈遭殃貽悞封疆咎將誰諉於是諸當事感動奮發齊聲剿擒粤黔兩撫提督以兵四面阻絶湖廣官弁罙入進勦渠魁就擒句月平定楚人嘖嘖歸功致逺不任受也明年報政命徃江南稽察河工錢糧未幾遷光禄少卿復遷奉天府丞俱未行此役竣則丁母艱奔赴京邸哀毁不自勝復拜大理寺卿給假扶柩南還己酉命典江南鄉試庚戍夏六月授奉天府尹兼盛京刑部侍郎奉天為國家龍興地勲貴莊屯禁網疎濶屬吏多因循積習不能自奮致逺極力振飭以興起士風民俗為己任案無停牘官無玩愒逺近肅然又修舉文廟禮制鄉飲酒禮刋圖式頒行各州縣講習在刑部則常以欽恤為心多所平反飭各司無濫刑出俸錢資囚米罪人多頼以全活年五十六以疾卒於官囊槖蕭然無百金之蓄屬吏士民助其喪以歸舊屋數椽不蔽風雨蓋致逺嘗言吾仕宦二十餘年不敢他有所積以玷先人清白惟大叅公文集失序編次訂訛刋刻成書吾願已畢子孫貧寒非吾所及也是以畢生未置田園半畝先世所遺亦於巡察湖廣及查河時鬻為資斧不少留今妻孥饘粥不充而家聲弗替論曰京兆性端介立氣節一生無所依附座客或涉勢利言某人遷某官則笑曰何足道或舉杯飲之曰後但言立身行已人以為孤高絶物不可攀躋矯矯乎雲中之鶴也然和平謙雅與人無競舉動豁達開誠直爽以此人多愛慕之歴顕仕官九列無半畝田宅以累子孫可不謂大丈夫乎鹿洲初集巻八
