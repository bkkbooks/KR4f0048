body:
  text: 鹿洲初集巻十廣州府知府藍鼎元撰記棉陽書院碑記程子曰治天下以正風俗得賢才為本余謂非必天下也即一官一邑亦然欲正風俗必先正人心息邪説距詖行賢才不可多得當培養而玉成之然則化民成俗之方興賢育才之道莫先於明正學潮邑為嶺南文獻之邦昌黎過化趙子助教而後英賢代興文章星炳號稱極盛獨正心誠意之學濓洛關閩一綫相承之道統則杳乎未有聞也余以菲才代庖兹邑適當頻年荒歉之後脱巾而呼者五營持梃而奪者遍野伏庭攀輿繁言相告訐者日千七百有餘人盡瘁經營鋤荆斬棘兩月而始稍就緒不謂亷恥道喪有林妙貴胡阿秋之孽以後天教流毒逺近厯多年所招誘四方無賴為徒數百人駕言能書符治病為人求嗣又能使寡婦夜見其夫以故城村風動澄揭惠豐之人無不篤信其術重趼而至余聞而髪指躬詣禽之庭鞫其所為多不可問乃斃二渠魁從犯以次杖儆餘黨數百輩皆人其人邑紳士方以殄孽消妖洗穢濁而清明為快余則皇然内慙謂教化不興使吾民泯泯棼棼以至於此實官斯土者之咎今羣邪滅息醉夢初醒此風俗還淳人心返正君子道長之一大機不可不明先王之道以道之也籍其廬於官毁其奸竇更其門牆以為闔邑人士讀書講學之所榜曰棉陽書院棉之風俗將於是乎正棉之賢才將於是乎得之矣顧惟書院之建必崇祀先賢以正學統正統不明陽儒陰釋之徒皆得竊其似以亂吾真宋有白鹿書院亦有鵞湖書院明有河津餘干之講學亦有新㑹姚江之講學同學孔孟同談仁義而操戈入室甚至詆紫陽為洪水猛獸毫釐之差千里之謬夫非天下後世之大憂歟周程張朱五先生上接洙泗之正傳下開萬古之聾瞶宜妥侑斯堂春秋祀典勿替俾學者識所依歸而異端邪説不能淆亂孟子曰經正則庶民興庶民興斯無邪慝自書院既建以後邪説息詖行消人心正風移俗易禮樂可興余亦幸兹雨暘時若百室盈寧得于簿書鞅掌之暇與諸君子横經講學溯白鹿之淵源塞鵞湖之坑阱雖不敢謂廓清摧陷可能於斯道有功亦庶幾兹邑之風俗人才由斯而一大振起哉希聖希賢自是儒者分内事世多聞之震驚則不學之故也吾所謂學者非窮高極逺幽渺難行之謂即在爾室屋漏人倫日用之閒爾心無邪則為正爾意無妄則為誠爾為善人無為惡人則可以為聖人尊君親上祗父恭兄爾之能事畢矣文行忠信是為四教禮義亷恥是謂四維吾所以移風易俗者在此所以興賢育才者亦在此願諸生發憤自雄以聖賢為必可學登五子之堂讀五子之書行五子之事濓洛闗閩將復見於今日夫寧獨一鄉一邑風俗人才之闗係也書院為屋三中祀周程張朱五先生前為諸生出入行禮之所後為閑存堂凡學舍十有八院左有隙地可擴充尚遲有待余忝一日長敢不揣固陋而為之記若春秋典禮祭享田租同學諸子姓名另書他石重修潮邑義學碑記自古美玊必藉良工美才成於師友師道立則善人多濓溪豈欺我哉化民成俗之原惟在師嚴道尊人知敬學是以昔賢殷殷立教澤宫之外復有義學之設責之専任之重也潮邑義學在縣治譙樓之東始於康熈二十四年前令臧君憲祖創成之為齋舍凡二十間迄今將五十年牆傾椽朽瓦桷頽敝春雨漏淋無地容足諸生猶勤勤於學聲琅琅出金石閒余愛之因捐清俸設法興修先小學次大學幽齋曲徑静几軒窓雖在闤闠之中而有山閒静穆之致不可謂非讀書之善地也士為四民之首一舉一動闗係民風士習端則民生觀感興起日趨於厚不端則鄉里效尤放縱日競於邪故士不宜妄自菲薄當以言坊行表為已任潮邑文物之邦民風未盡淳美今盜賊廓清豪强斂跡訟師棍蠧漸次驅除加以嵗登大有萬井盈寧正我民安居樂業興起教化之秋也余不佞不能家喻户曉惟有隨事誘掖樹之風聲使知孝弟仁讓為官斯土者之所樂聞而所藉以身體力行為鄉閭孝弟仁讓之矜式則所望於諸生助我者非細也余以闔邑人心風俗分寄其責於諸生而又以諸生立心制行學問文章分寄其責於司義學擁臯比之一二人可不謂専且重哉明經姚子先登篤學能文之士也根柢深厚不同流俗可為諸生師表茂才鄭生大釗醇謹好學足跡不輕造公庭以之師小學課童子克稱其任義學之修二生籌土木董工匠悉心經理備極賢勞余又念學租微薄清出前人乾沒官租文㑹張陂沙港濟糧嵗共穀二百餘石以為棉陽書院及大小義學師生膏火之資循例詳請不知上官其許余否倘邀嘉惠亦斯文之慶也自笑寒酸力微規模窄狹未能恢而大之睇兹義學之側有前令彭君未成之廢祠牆垣露立基址頗寛以之擴充義學建講堂齋舍當必大有可觀者此與棉陽書院之左柯家廢地如出一轍余曽向柯生購求為書院増亭臺講室而生以外出未歸阻余之興二者皆余心中所欲為之事未知余之駐此有幾月日木强戅拙為人所忌而上官憐我狂愚欲改調他邑以去恐土木工程非旦夕所能猝辨後之君子有與余同志者不獨諸生之感亦余所厚望也義學諸生濟濟技彦皆一時之選而趙生世成林生愛霖與書院之劉生峯鋭林生之檻鄭生炳文尤其矯矯出羣非復尋常士也附書于石以志一時人才之盛文光雙忠祠祀田記棉陽之祀雙忠自宋熈寧閒始也邑志載軍校鍾英入貢京師道出睢陽拜張許二公之廟已夢神告以將偕南行指寢殿笥中遺像示之鍾事竣還仍過廟如言詣寢殿探篋笥果得像及銅輥以歸一夕而至棉人素欽仰二公忠義謂靈爽所依必致佳祥千百載城池可保無患乃建廟祀于東山之麓於是香火遍棉陽窮鄉僻壤皆有廟而文光寺後一祠則因明末寇亂薄城城中諸紳士於嶺東古廟請二公神像入城捍禦者也賊望見忠魂金戈鐵馬率神兵殺賊遂遁去城賴以安於是立祠祀焉顧祠惟田乃可久獨此祠向未有議及者左近文照堂有僧静㑹晨夕奉香火恐後來未必能繼僧乃請于邑之紳士捐貲置産為嵗時薦享香燈之費得貴山都八啚中田一十三畝二分有竒請余書于石余惟潮俗多淫祠自昌黎公建邦啓土而外獨雙忠大忠為正大忠祀宋丞相文文山先生雙忠祀唐睢陽張許二公皆可使百世下聞風起懦維千秋綱常於不墜者也使當日睢陽無二公據守則賊勢披猖河朔潰盡誰保江淮以障東南半壁中興二字夫豈易言前輩謂唐之不亡二公之功不在李郭下蓋非阿所好者矣二公平生氣吞逆賊忠憤常周宇宙亘萬古而不為少衰使見戎馬近郊梯衝乗墉必怒髪裂皆殄殱醜類不留遺子此理之必然而不可移易亦為民禦災捍患之常非棉人之好為語怪也棉人敬祀二公當學二公之忠義食禄不分憂乗馬不濟難吾知免夫思忠義之為美凡一毫非忠非義之事皆不敢為則孝弟由此而生而風淳俗美為太平教化之助則崇祀二公捐貲置田者之功亦不細也静㑹為棉陽好義僧賑饑埋胔不憚煩勞庶乎韓公所謂頗聰明識道理者而余絶不敢與之遊恐蹈昌黎大顛故事貽後世不白之譏而其有功於斯祠則與諸紳士一片苦心均不可泯沒也是為記遊夢筆山記夢筆山在浦城西北郊距邑可半里相傳江文通讀書處也余童時即聞兹山為浦城名勝思欲一遊不可得乙酉春從學使沈心齋先生至其地出郭眺之心甚喜行愈近而興殆索然逺望有二三古柏亭亭可愛既至則竒止此矣柏之下為寺寺之旁為文通祠俗僧數輩荒草一坵非有他景也其為山也卑而小既無巍峩壯偉俯視八州之槩又無竒峰怪石幽泉曲徑爽人心目之間徒以頑然一拳土久享芳名余甚惑焉豈所謂地以人傳者非耶不然何其負重望而中無實也將江郎才盡而兹山之勝亦隨之余終莫得其解請以問後之來遊者遊茗川記丙戍仲春既生魄何子馥庭從余遊茗川茗川者馥庭家别業也在郡之東南蔬圃數百弓環可二里為巨園園有巨池池有亭亭後有竹循竹而下池之東也有梅花閣閣外梅樹繚繞實纍纍如貫珠葱蘢䆳密宜避暑池之西老栁偃蹇倔立小草芊芊散花雜木繽紛蓊薆皆可愛行三四十步有小池荷錢方出水從池上過石橋即南溪草堂也極西又有池無竒景取其水便於種菜云折而北更十數椽風送花香烟飛嵐色鳥雀語桂蘭間如笙簧聴之忘倦轉而南則高堂大厦難以言景稍轉為篆松軒臨巨池投􅀢􅀢於水魚應手至豪歌放飲攘臂談天下事不知身之在何境也嗟乎如斯名園其可易得乎哉單寒卓犖之士類能為山水増光而天若獨嗇其遇甚至欲求容膝之安以與古人相晤對如在三島十洲可望而不可即而膏粱貴介名園深美不為鷹隼犬馬之塲即為呼盧陸博之地而天每樂畀之而不吝吾不知其何意也吾子年少未知得斯景之難則未知不負斯景之難夫惟知其難而後能長保其有有之而負之未見為能保也余忝一日長烏能已於言哉遊興酣作記示之遊武夷山記閩中山水幽竒以武夷為第一余之結想遊兹也十年矣武夷居閩北之崇安去江西為近余家漳浦在閩之極南地鄰東粤相去千五百里吾漳能遊武夷之士百未有一不獨余為難也蓋非有力者不能遊即有力者非有便道經厯富沙潭陽之間欲其窮數月之力出千五百里之外以遊名山亦未易覩斯豪舉哉已丑夏吾師沈心齋先生重來閩嶠送之至崇安因得以從遊武夷殊快甚登問津亭入古觀參天卉木夾道繁陰遂遨堂上遶後庭摩娑㫁碣以為娛逺望髙岡彌天石壁有幔亭二字大可二尺許黄冠云方廣各二丈乃紫陽夫子手書采茗童叟復嗚嗚歌唱相上下洵可樂也出迴廓臨清溪土人編木為桴畀余乗之由一曲溯流九曲兩㟁竒觀目接不暇大王峰巍然髙拱玉女亭亭若迎若送其餘羣峰羅列拜舞俯仰進退皆似有眷戀情緒大抵海内名山多竒在石未如此山渾然石骨儼似人工削成巉巗昂霄巔大於麓水泉從石末迸出瀏瀏竹樹間如天半飛花滴厯澗底峰峰皆然峰下溪流瀠洄坐水遊山飄飄有仙意所以老氏之徒號為洞天而吾鄉山水無復有能出其右也余乃舍桴而步遍陟髙巗訪名賢遺跡拜紫陽夫子於精舍謁定夫諸先生祠至接笋峰而余懐不知何適矣峰髙插天周環陡絶昔人以十圍之木長十餘仞者為梯梯窮復接如登天之勢至上梯復窮則過雞胸石石僅容足右壁立左臨淵谷不計丈必手捫鐵索斜行不敢反顧行可三十步稍坦古有亭今廢從石畔排闥入過劍脊小失足則墮崕從人多猶豫有半途而返者或竟坐峰下以須黄冠為余言昔人多避兵於此若城髙巗晩對峰金井兠鍪大小藏三姑石小桃源皆避亂勝槩而天遊閣一覽臺九曲諸峰厯厯足下尤遊人所托跡云余是以知昇平之樂而登臨之自適也假使余生當海宇未靖之日即有力好遊且無由一至於斯就令生長斯土而緣崖遁谷惟恐見獲何暇尋竒問勝聖人在上宇宙肅清山川木石倍加妍秀此日吾師弟子從容暇豫攀躋徜徉於此間可不知所由來與抑余又有私焉余與兹山相去千五百里藉非吾師之來得以追隨便道經厯於此則余之來遊亦且未卜何年耳因執筆而紀其事以志君師之恩於不忘若夫竒峰怪石之位置幽巗洞壑之隐淪仙舟虹橋御園之故蹟前人之説詳矣余皆不贅除庭草記已丑夏余歸自武夷過三山留中丞儀封張先生官舍西園桐陰之下有軒髙爽窓几明浄余樂焉庭前荒草蒙茸多灌莽名花怪石沒其中余惡之顧謂童子斬之茀之集其桀驁多刺者烈火焚之蕪穢既清佳景畢露余方以為快友人陳尚友李鱗蒼囅焉而來尚友曰濓溪窓草不除子奚為者鱗蒼曰丈夫當掃除天下安事一室余曰噫嘻善哉然吾亦聞之矣稂莠不除反害嘉禾槎蘖不翦終成斧柯振古如兹今亦然耳夫濓溪窓前細草芊芊紛披可愛未如灌莽之害也故留之可觀造物生意焉今斯軒之庭荆棘蔓延而其中古榦異卉竒石假山參差布列皆數十年之内所羅致於數百里外者吾不為表而出之蓬蒿之下也可乎哉譬諸治心去私克已而後天真復焉譬諸治國屏邪逺佞而後正士昌焉若陳蕃者明於大而略於小雖有掃除天下之志而疎於為謀語以洩敗是亦大言欺世者耳古之人夙興夜寐洒掃廷内小心慎密無地不然未有忽近圖逺不能治其一室而可以平天下者也虎狼在野凡人操戈而逐之蜂蠆入袖壯夫為之動色天下之禍常發於細微而困於所忽可不慎與嗚呼一室雖小可以觀大今人含垢何所不容而余獨斤斤於此亦迂且褊哉然使聴其滋蔓而莫為擴清則心目之間常存茅塞雖使濓溪居此亦不能以終日二友喟然嘆曰有是哉盍書以記之餓鄉記醉鄉睡鄉之境稍進焉則有餓鄉王蘇二子之所未曾遊也其土其俗其人與二鄉大同而小異但其節尚介行尚髙氣尚清磨礪聖賢排斥庸俗則又醉鄉睡鄉之所未能逮也昔者伯夷叔齊嘗造是鄉愛其境婆娑不忍去鄉之人留之羣奉為主凡有過客悉稟命辨别去留孔子去衛適陳道經是鄉伯夷率鄉人郊迎伏謁禮甚恭欲以主位讓孔子不顧然亦重違其意乃偕諸弟子為停驂者七日其後孔子之徒如曾子子思原思輩嘗竊往遊焉或三旬九回或并日一歸大抵與夷齊兄弟甚相得於陵陳仲子矯亷於齊齊人疑之仲子投是鄉三日欲親伯夷夷笑而麾之曰若避兄離母非吾徒也仲子慚而去漢周亞夫慕是鄉高義棄通侯之尊徒歩欵里門伯夷蹙額曰亞夫粗人豈足以居此但彼既來亦不可拒者顧左右即於里門别搆數楹與之亞夫樂焉未幾而幸臣鄧通亦貿貿然往伯夷叔齊勃然大怒曰吾鄉固清白世界也豎子敢來相辱命左右擠出數十里外撲殺之而延晉處士陶潛以髙風蕩滌羞穢潛亦舍彭澤令與夷齊交稱莫逆焉然潛性放誕不能安每越境與王無功遊夷亦不禁梁武帝為侯景所迫逃入是鄉伯夷不納因叩頭力請不肯去卒免侯景之刃夷懼為天下逋逃藪爰集鄉人更訓典嚴條約日出數十人要於路以覘客凡有聖賢豪傑孝子忠臣髙人義士辱親敝鄉迎之致敬無敢失禮其為賤𨽻鄙夫亟撲殺之里門之外至於富貴庸人亡命至止亟遣之去無辱唇齒自是之後遊者日以衆不得入者亦日以多為所敬禮周旋去來任意者若唐韓愈宋呂蒙正范仲淹而外代不過數人焉近世士大夫罕有得其門而入者也吾友黄越甫嘗遊是鄉歸為余言此中佳勝非俗人所知余初未以為然年來偕越甫聨袂而征未半途覺道路險􅇖苦不可耐復勉强前行忽爾氣象頓寛别有天地其山茫茫其水淼淼其民渾渾噩噩忘貧富貴賤三光如飛彈大塊如轉圜俯視王侯卿相不啻螻蟻之尊持梁齒肥醉飽欲死殊覺可憐莫甚焉伯夷叔齊皆為余言是鄉來厯及君子之至於斯者且言彼未入時虞帝大舜及商臣傅説膠鬲皆嘗流連是鄉後又有管夷吾孫叔敖百里奚諸公謁吾徒而來請蓋天將有意於是人必先使閲厯是鄉以増益之二君其亦然乎余笑而不信但樂其鄉人之不余拒也輒數日一往往則與夷齊上下議論盤桓盡興而歸深以為二人獨得之秘恨玉無功蘇子瞻之不獲從吾遊也士之不自菲薄有志是鄉者自行束脩吾將誨之盤陀宜城記出浦南二十里許無象盤陀之間有地寛曠彌漫數里置之荒煙荆棘者千餘年矣昔人就其西為市市亦寥落今未廢附近居民若晨星十數里外亦無薦紳賢達巨公名儒地瘠薄而人鮮少覘風景者之所不道壬辰夏五余與李君遜唐遊屐南下至斯境心甚異之氣象開豁山川聳秀逺近地無可與比者其高而潤者如圭璧錯而列者如旌旗昂然插雲霄者如鎗如筆坦然圓且厚者如鼓近者不逼逺者咸朝土田既多溪水瀠帶吾兩人顧而樂之謂其宫府之才廢置閒散因相與度地指畫窮原竟委允宜築城而居為東南第一勝槩城西因舊市恢廓規模以來四方之商賈西偏瀦水為湖大開書院集四方學者相師友其間城北行二里許有雙澗從大山負石飛下境幽竒清絶種梅竹成林搆别業於中夾道植楊栁直接北門城南跨水港當孔道為閩廣往來之衝種松隂三十里下接蒲葵闗上達浦邑東臨綏安溪縱舟順流亦達邑治兩㟁桃栁聨綿紅綠參錯依稀江浙風致城之中祖廟廏庫居室社倉家塾樓臺各有位次花塢果園沼沚卉木各有等差凡内外宜髙者築深者浚亭者亭榭者榭橋者橋閣者閣凡花之類無不蒔果木之類無不植不十年間棟宇連雲菁蒼暢茂人民多則田地肥美詩書盛則名賢奮興人傑地靈遂為東南一大都㑹嗚呼何其快也闗東鄙語曰人聞長安樂出門向西而笑知肉味美則對屠門而嚼其吾兩人之謂乎然以兹山形勝不生於大江南北之間為王公貴人所識抜徒偃蹇荒徼見渺於田夫牧豎而吾邑士大夫亦無有獨具隻眼相賞於風塵蓋亦兩有不幸者矣顯微闡幽是誰之責也作宜城記七賢圖記此吾老友鶴石翁所貽也時雍正己酉春余以公忠為國獲戾上官待罪潮陽鶴石聞之驚悸輕千里遣一介來視余既縷縷相慰藉併惠此圖以供玩賞良友髙情於斯為摰惡可却也拜而受之則所謂七賢過闗者蓋唐時張説張九齡李白李華王維孟浩然鄭䖍也隆冬雪後興㑹飈舉偕出藍田闗遊龍門寺鄭䖍奮筆圖之嗚呼可不謂千載韻事哉元虞集題孟浩然像詩云風雪空堂破帽溫七人圖裏一人存又張輅詩二李清狂狎二張吟鞭遙指孟襄陽鄭䖍筆底清風滿摩詰圖中詩興長即畵圖之證也倣鄭䖍筆意譜斯圖者曰静菴明浙西錢塘人姓戴氏名進字文宗又號玊泉山人山水人物擅一時之望鶴石曽祖宦浙江時得斯圖以為至寳傳家四世今鶴石割所愛以畀余余敢不珍而重之時披此圖如對鶴石行將入深山結草廬徜徉林臯之勝當挂此圖於幽巗䆳谷竹亭石厂之間如晉接曲江青蓮六七公一堂尚友又若七人之外隐隐有鶴石一翁追隨上下於其際亦庶幾不寂寞矣乎濡毫作記以示子孫俾後之觀斯圖者千秋百世而下無不知有鶴石併鶴石祖宗之精神亦儼然不朽焉斯弗虚良友之賜也已鶴石姓隂氏名念珖字琫素閩之寧化人鶴石其别號也辛亥暮春十有八曰記陳玊山畵記海陽山人陳玉山高士也以善畵名一時余耳熟焉顧余于畵素少所許可又所見皆時流俗筆堆青砌墨無一可人意者因以此輕量天下含毫士即聞玉山名弗信也庚戍秋以纂修郡志之役得與玉山遊見其端方静穆無世路脂韋之氣心異之時余方博訪舊聞以顯微闡幽為已責玊山為余言潮帥盧烈姬殉節事余喜而筆諸書以為有心世道者益甚愛且敬之余結想林臯躬耕自樂玉山為余作課耕圖山水人物皆閑雅有致視世所謂繪事者相懸若千仞之淵余於是知此中有人矣造其廬幽齋數椽結搆金山之麓出北門不過數十武負郭臨流草亭石榻懸崕曲徑登眺而上下則有名花異卉脩竹茂樹參差錯雜於其間亦城市山林之勝槩也考槃在阿碩人之薖非所謂有道而隐者歟遊憩之餘復縱觀其筆墨布置神色種種髙妙翎毛花卉之工尤其超軼絶倫者玉山以余為知已畀我杏林春燕圖兒曹争寳貴之四兒雲翼來潮玉山復以斯圖見惠蓋肖物入神幾莫能窮其涯際余於是遂酷好之深駸駸乎有畵癖矣夫畵神鬼易畵人物難畵鳳麟易畵雞犬難雞本俗物天下最難著筆者一經玉山㸃染遂不見其俗而見其高惟其傳神入妙也雄雞卓立顧雌若有情雌雞見雄似奮彌伏羽毛森􅆆氣色如生雞雛厯落母側或出翼間或隐毛下遊行飲啄渾噩神情靡不曲肖雖使化工賦物亦何以過于斯佳哉技乃至此乎使玉山生長大江南北之間或遨遊京師齊魯豈至今尚爾寂寂僅馳聲譽于荒陬余以此悲玊山之不幸也然蘭生幽谷豈必待人而後芳玉山筆墨自足千古傳不傳固非所計余獨有以信其必傳蓋非阿所好也聞余言者幸及玉山之未老多購其畵而藏焉他年一絹片紙皆足為海内寳貴始知余説之不謬云喜得斯圖爰書以記之高隐屏小記石則髙而隐於樹下似列屏因以名焉陳子玉山高士也不朝不市倚金山之阿以自適飄然有古逸民風其為人端静樸雅操履狷介韋脂凉炎之氣淘然浄矣好筆墨渲染自娛肖物工妙余所見海内名手頗多如君者甚少是以獨深嗜之敢劵其必傳耳傳不傳非玊山之意世情貴逺賤近未必能知其所以然數十年後當有饑渴思之者人生一藝可傳即不與草木同朽況其為隐者也品之粹行之高併所居之地皆足以傳耶於戲自有潮即有金山有金山即有此景有此石千餘年無賞識者獨留以待玊山且待余之磨琢造物者可謂無意乎考槃碩人於今如昨髙隐屏足千古矣雍正九年八月十五日記怪尹記丁未冬余在潮陽聞海豐有怪尹焉不知其何所謂明年春便道豐邑問諸其民曰而之令君是何如之怪耶對曰不然愛民如子理邑如家吾豐循良僅見也然則曷為以怪名曰布衣蔬食不事上官好直言觸諱忌官以此怪之余聞愀然曰布衣蔬食何害於人不事上官事國事民以亷直為怪余不知之矣薄暮宿豐郊尹來視余果衣古布衣騎羸馬以兩𨽻導行余曰噫善哉清操逼人君獨不畏夫媢嫉乎尹曰然嫉者多矣吾行吾素耳嫉我不過去一官吾徒步歸何害蓋是時嶺表亷能吏無出尹右者尹目中亦寡所可獨與余相得甚歡先是五日前撫粤中丞楊公騶從過尹境尹惟掃一館以待他無所有楊公曰吾所欲劾者三人一曰貪二曰庸三曰怪尹夷然長揖曰前二者下官無之三恐不免請受劾楊公不悦詰以地方事條對了了在尹境内行三日數問田間民乃知尹為政明決折獄如神嫉惡嚴而待民恕祿俸外一錢不染地方大小事務無不辦楊公喟然太息曰吾幾失子子之守連馳六稟謂子怪誕貪墨請出彈章糾子不意子之賢若是吾今知子子勉之自是始有謂尹非怪者然是守終不能容必欲去尹而後快而豐邑向來陋規尹俱革盡獨雍正五年税契溢羨未奉全解之檄存貯邑庫凡上官公事捐輸修造戰船砲臺之類就中支解俱用公文一錢不私入已守弗知其詳即思以此中之乘尹之省遣官籍其帑攝其家人尹聞摭守受賕事列狀通揭遂以互訐並解任中丞公議於鞫明之後特疏薦尹不謂尹事未了中丞奄逝袒守伐尹者遂稍稍出矣然守已自伏其賕又受尹庭折拊膺憤恨未幾以病卒由是亦被尹不白名凡所存庫皆目為贓支解公用令償擬極刑追贓九百司臬樓公少之為増至一千三百有竒尹若為弗聞也者讀書談笑不改其樂比秋審復以戅直觸中丞傅公怒當事皆為尹危尹昂然侃侃不少讓由是怪名大著海豐士民懼尹之終受累也倡義樂輸為尹償應追之數尹乃獲免尹自解組後屏去從人獨以孑然一身出入禍難之際險阻不知勞苦不避時或賃一僕為炊油油自得粤東郡邑人士無不慕尹之名争欲一見尹面尹亦若為弗聞也藍子曰嗟乎尹未嘗怪也上官以為怪則怪名甚哉居下位之難也在下位不獲乎上民不可得而治上官豈可不事哉尹精神勃勃不可遏抑行當復用用必大且顯願從兹稍避怪名焉清操直節必不可變要惟斂之於内勿使觸人耳目則免禍之道也我輩天生鈍才既不能阿諛攀緣違道以干當權之喜悦豈可復炫亷逞能以技彦不啻自口出槩望之三代以下老氏曰良賈深藏若虚君子盛徳容貌若愚去子之怠色與驕氣尹其奉為韋弦乎雖然余自病不能醫而為鐵漢謀藥石尹且笑之尹去位未幾余以上官侵漁西穀弗能掊克代償平空飛禍視尹有加所賴潮普士民及當途士君子好義同聲為余了此重累余未嘗怪也而禍難則一然則尹之得罪亦豈必盡在怪名歟且兩人之禍譬諸遇賊尹見賊之將殺已也先揮一拳擊賊首斃之從者撼而擠尹於水余拱手與賊較論賊剚刃而顛之水死不死雖皆有天亦以見余之不如尹逺甚也使當時亦如尹之怪為一方除蠧國巨賊雖自落水不亦善乎抑聞之窮愁險難乃君子進徳修業之資動心忍性増益其所不能之學三載以來讀書閲厯所得頗多余將拜仇人之賜尹亦自此勉之矣尹姓王氏名者輔字近顔江南天長人以諸生舉賢良召見特授海豐縣令京兆尹孫公嘉淦督南學時所薦士也粤人謂孫公知人高叟洞可堂記浦邑東郊五十里有高叟洞洞之名不知何自昉或曰晉仙人葛洪棲隐處或曰宋高東溪先生讀書於此紀傳皆不載余意後説為是而梁山之上東溪書屋存焉有不得不姑闕者洞處萬山之麓三面峻峭獨開其南為門户門内兩山拳然從大峰迤􅆔而下似雙鵞形雌鵞曲項在田際雄鵞昂首若向天鳴者巔坦平可容一屋余曩為諸生規模闊大以其陋也置之宦海風波孤忠靡騁遙憶澗巒如在天上思欲移家入空谷耕山而食守先聖君子居之何陋之有之訓命長兒雲錦相度之結茅數椽名曰可堂堂廣一丈四尺深丈有七尺房廣九尺深如堂之數東西小屋三楹深廣各不過十尺棟桷諸材出伯兄敬菴所助其陶瓦則良友黄澤齋賜也土木工匠之費鬻一婢充之既落成輪耶奐耶柴扉不具土堦不築編籬為捍聊存内外而已夫何可之有哉雖然可不可在心者也心以為未可則甲第連雲亭臺數里尚蹙若無容身之地以為可則管寧藜床嵇康鍛竈坐卧且有餘適況如斯之綽綽者室雖小山則大地雖狹天則多田雖少岡可稼木雖濯根可劚是造物者藏富之區也何不可之有哉余將墾蓬蒿闢峭壁種黍稌薯芋薑瓜錯落石罅外蒔松杉竹木内植橘荔棗栗諸果之品以百數嶺上梅花澗邊桃栁以及蘭桂薇荆諸花之植以百數參以畜牧五七年而成富家陶朱公可坐致也東西兩澗至鵞嘴合流甘棠白石間淙淙然大有佳趣堰為池可釣可濯澗畔松隂掃地布席焚香煑茗可展巻作竟日坐坐則濡毫著書或集子弟親友講經史小學近思錄數章客至則摘園蔬炰筍蕨射雞取魚放飲盡醉醉則枕一石以卧覺而徐徐然起命兒曹援琴而鼓之以清客懐操畢舞劍數周以壯客氣復令諸子並攜巨硯對客揮毫較臨摹工拙隨興賦詩或聨吟一二首投壺對奕復挈巨觥持弓矢登觀徳之坡以中且貫革為勝負又相與陟危巒窮叠巘居髙眺逺目極天地之廣大天地間之樂復有過於斯者乎世途險阻官塲為甚欺君父則不可以對天日顧君父則不可以對上司安所得適可之地而居之惟此堂名可乃真可爾拂袖還山將坐卧於此堂尋濓洛闗閩之統緒修宋元二史改陳夀三國志縱讀生平未見書隨筆撰述為世道人心之助更推求民生利病經濟設施使後生小子皆可出為世用無處士虚聲之誚庶幾不負此堂焉古人躬耕畎畝隐居以求其志豈僅坐茂樹以終日濯清泉而自潔而茂樹清泉其當前受用者也則以此髙叟洞為李愿盤谷也可南陽卧龍岡也可紫陽白鹿洞也可何必深辯東溪之果否來學及沈淪神仙荒渺之説以滋人世之惑哉爰書以為記遊惠州西湖記辛亥冬十月余將之羊城留惠州聞城西有湖為天下三西湖之一心羨之既生魄偕友人散步出西闗一望澄然延袤十里許山青水綠橋閣㕘差依稀武林圖繪足未至而身已馳初不意嶺外之有斯景也循蘇堤過西新橋遂登六如亭弔朝雲墓望孤山臨西子池蘇堤孤山皆本杭州西湖之舊傅㑹雷同余所弗喜但東坡逺謫専賴此湖歸善錢塘若合符節雖盡舉山川而姓名附麗亦君子所不厭況金錢犀帶既資工築侍兒魂魄尚眷戀兹則謂蘇家之私有以朝雲當西子可也前山有浮圖曰泗洲下為表忠祠祀建文殉難御史王度以洪熈初諒江州判劉簡配忠節相同故表而出之前為崇道祠祀濓溪周子今不見從者曰即景賢祠原祀周子以博羅主簿豫章羅子配萬厯間㑹英祠圮雜祀諸賢於崇道祠則唐平章事張錫宋崇政殿説書陳鵬飛學士蘇軾提刑楊萬里博士唐庚御史陳次升丞相吳潛文天祥益以明人何真王守仁乃改為景賢祠今則惠守皆躋祿位作生祠矣百十年後牌位山積謂萬賢祠可也憮然下山麓趨烟霞橋橋介豐鰐二湖間截豐水而堤而橋其内為鰐湖東坡所築放生池自謂少有功徳者置之勿復道耳上有永福寺浮屠所居今惠守吳公簡民建惠陽書院於側以居學者取逃墨歸儒之義大可人意又北為豐山山前歸雲洞明興寧令祝允明有辭鐫諸石訪平逺臺故址溯横槎溪溪故豐源所自出還睇湖中古觀巍峩黄冠所宅倦於行從旁指數芳華州荷花浦平湖堤明月灣澄心亭湖光亭㸃翠洲落霞榭尋坡詩望湖樓故處仍返西新泛漁艇遊湖心亭陟黄塘徜徉於留雲亭上逺望黄峝石埭諸山半徑樵歸水簾飛瀑彷彿天台武陵不復知瘴海氣象從人指前面有桃花源龍塘水最佳宜茶唐子西有烹茶説又有清醒泉甘太守欽采飲之而甘以為不入世味故名泉上為榜山中有鳳棲洞韶華石石埭之東為飛鵝嶺西南有澗曰濯纓遶石環瀉逸韻鏘鳴東南沙子步為子西嶺以博士唐庚所居名之也對峙南隐堤有鐵陵橋大通橋集鷗渚縱觀荔浦泛菱溪釣臺經浮碧渚披雲島而歸則斜陽已在山矣黄冠秃子之巢窩老兵俗吏之祠堂余未暇為悉數也嗟乎以斯湖之景位置姑蘇燕臺之間㸃綴作興豈杭潁二湖所能過不幸逺棄遐荒摧殘濯濯於蠻烟瘴雨海天寥落之外僅遇東坡一為知已子西留相于時卜居亦不能有所發明為此地壯山川之色況今四五百年又更寂寂斯亦宇宙間一缺憾事也余家行潦珍若蓬瀛恨不能移此湖於高叟洞中作東南半壁之名勝又慮此間世情日巧心計日多將有以妬為愛議決塞而田疇之湖不從余以偕隐余安敢保其厥終第為莊誦陶魯過兹之言曰嚮使此地不湖萬兵可屯為受敵之地庶有所憚而不敢廢則斯湖之幸也夫惠陽書院碑記惠陽刺史呉公治郡之數月風清政肅民氣和舒乃推本化原留心士習萃十二邑州成人小子程文藝而觀其行能一時甄賞彚征皆邦之望郡人咨嗟嘆美謂百年來不多見公曰未也士行為民俗之根牖民以淑士為鵠君子之教有本有末君子之學匪專不精予其建書院開講堂育我士子俾皆範圍於孝弟忠信禮義亷恥之大講求民生匡濟為國家有用之儒吾民觀感興起自日遷善而不知乃相豐湖北鰐湖東就永福寺旁隙地恢而擴之取逃墨歸儒之義弗厭其逼築惠陽書院若干楹講堂學舍亭軒樓閣畢具凡四閲月而造成中祀濓洛闗閩五夫子俾南方學者不謬所宗創置書田若干頃為春秋祭祀師生膏火膳脩之費歸善海豐等十二州縣咸有之不専一地示至公且溥而可久不廢也延名師講正學諸生百十禮樂彬彬藍子曰於戲美矣空谷足音非龔黄小補所及也凡民雖智不能自為風俗端士習以作之倡不啻家喻戸曉轉移最捷惠之民其一變至道乎公閩南宿學以經濟見重於時曩刺湖州亷能之聲震兩越今之來也未期月而謳歌匝道知民間之疾苦念周窮簷雪數載之沈寃人稱孝肅其於士習民風又若此可謂知所本矣從兹惠陽士子皆敦學行必有鴻才偉品出為邦家之光而農工商賈又各守法奉公尊君親上相化於時雍風動之俗公之功其可忘耶宜誌所由鐫諸珉石俾他年治惠者勿替引之其費金錢若干緡出公亷槖暨好義諸君子共成者爵里姓氏及書院屋宇間數田地頃畝處所糧租佃名具刻碑隂遊珠江閣記五羊城南大江中小渚拳然昔人謂之海珠此珠江所由名也宋前哲李忠簡昴英讀書其上鄉人肖像祀之國初砌墉堞為砲臺用資守禦城南恃以為固然世俗通稱曰海珠寺則粤人崇佛尚釋而李祠有僧主掃除因以寺名歸之耳余入粤數年舟過其下者屢矣以浮屠所宅懶於一遊壬子夏初偕友人泛舟江上由日近亭溯海珠巨砲周羅勢甚雄壯中間髙閣接天丹艧巍雅曩所未嘗見者因問此閣由來從者言方伯王公倡建余曰噫善政也附城砲臺以海珠為最要東西掎角作省屏籓地利得焉第處江心不能居髙望逺是其所不足者自建斯閣靡遐弗矚四面八方一人一騎無能飛跳而越直作大江望樓為國家磐石之衛非僅騷人逸士遊覽登臨之所方伯公之功斯為大矣拾給而登窮最上一層東望虎門南望順徳香山汪洋萬頃厯厯足下白雲西樵羅列西北山川之要害形勝之阨塞人民土田番舶梯航之衆盛胥於一覽收之下為李公祠旁後往僧小屋有唐吳道子繪佛像鐫諸石並無所謂海珠寺乃知前此傳聞之悞也返舟浮大白盡興而歸居久之偶論海口兵防及諸修舉廢墜事稱珠江閣之勝制府鄂公曰然附城砲臺此為最要顧時方議毁子亦曽聞之乎對曰未也公曰王方伯精堪輿學以海珠震砲不利議撤砲臺建呂洞賔許真君廟為粤東造福吾弗敢信持不可乃建高閣資逺望列砲住兵如故余曰噫善夫海宇昇平夜户不閉去砲臺而果能福粤東方伯公之見善也降祥降殃惟人自召建一廟而即能轉移方伯公之術又善也雖在盛平不忘武備存天理篤民彛而弗乞靈於地理總制公卓識正論足大破千古之惑斯又善之善也非古大臣孰能及此此遊為不虚矣遂記之得平蠻碑石刻記出端州東門可一里有平蠻碑焉明萬厯間平粤西八寨新安汪道昆為之文吳郡周天球書也碑高丈餘廣丈有五尺字大如拳鈎勒甚工緻神廟庚辰以迄於今未有過而問者雖在闤闠之中閲江樓側晏遊之地等之荒煙蔓草也久矣余兩至端州未有聞壬子夏仲從制府鄂公巡海口相江堤泝峽而上復至端州吾友江濆野人為余言平蠻碑故蹟命工備楮墨搨之書法堅勁秀雅有晉唐人遺意子瞻所謂剛健含婀娜庶幾近之端人士覩兹鑒賞如破天荒挾楮攜墨伺碑下日不知凡幾人此石駸駸生色焉閲端州高要郡邑乘藝文棟充獨斯碑闕而弗載尤不可解竊怪世人貴耳賤目百千萬里之外僧墳寺塔珍若球圖以兹大役豐碑文無紕繆字追古人屹然市中萬目共見偃蹇一百五十有餘年曽不得一人知已至於郡邑志乘併罔紀及當亦汪周二公所憤懣不平者也然粤中字學好尚趙董文蘇中土人㩦古金石度庾嶺多廢然而返有章甫適越之嘆斯碑所處既非得地又弗能從時俗之所好寂寂固宜二公其又何憾焉今遇知已紙貴洛陽固兹碑之積厚流光應當出為世用然風塵物色發自何人則僉曰江濆先生之功先生亦笑而任之不辭也望七星巖記端州七星巗名勝也嶺西山水之竒此為第一隋志謂之定山余閲端州志七區連突形勢如北斗故名最著者曰崧臺即石室巗聳石廣二十餘丈髙二百丈有竒下為石室南北二門似人功闢成生風煙中高五丈餘寛廣可坐百人左右各有穴入以燭前為高星浦西壁有石如懸鐘擊之鏗然以石擊地作皷聲所謂石鐘地皷者是也唐李北海邕書景福二大字及石室記鐫諸石又有璇璣臺水洞副墨巗抱珠井諸勝唐宋以來遊人書名氏紀嵗月鏤石間不可悉數連逾瀝湖羣巗匝布如列星曰屏風曰閬風曰天柱曰蟾蜍曰仙掌曰阿陂六巖相距或一里半里或二里皆不出十里之外合石室巗而七之瀝湖環其下可通舟春夏之交湖水盛長雖蓬瀛無以過也余丁未入粤結想遊兹再至端州騁目未能壬子後五月約同儕治遊具詰朝命駕狂喜連宵坐待東方之一白又以尼者中止心不能平乃命長兒雲錦邀江濆野人登制府東樓而望焉雉堞之外竒峰森立如雕如削如假如繪鬱蒼磊砢在水中央方之武夷覺九曲乘桴嫌其水小較杭州之西湖又覺土山擁腫不如玲瓏蕩漾信乎雖蓬瀛無以過也中原山水若斯之勝者寡矣雲錦曰聞老兵言瀝湖水淺至冬多涸為陸此不足恃江濆野人喟然而嘆曰在人耳浚其淤疏其源築堤啟閉以時蓄洩又為之花栁竹木樓閣亭臺以㸃綴之左右田疇皆資潤澤佃漁之利惠及貧家何中原名勝之可比余曰噫非我與若其誰肯任之吾儕一遊一屐兹巖且莫之能當他何論焉以素有山水癖如余不免有對面不相逢之嘆牧豎秃厮齷齪㝠頑偏若與此巗結知已事不可解大抵如斯此則存乎山川之福命於我與若無與也雲錦曰今日樓頭一望已足為山川増色以此當十日遊也可江濆野人曰然請記之記然後能増色不然後誰知者余笑而下樓作望七星巗記鹿洲初集巻十
