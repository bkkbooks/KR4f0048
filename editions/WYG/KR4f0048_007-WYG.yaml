body:
  text: 鹿洲初集卷七廣州府知府藍鼎元撰傳寒支先生傳先生李姓勝國諸生也寧化泉上里人名世熊字元仲自號曰寒支子少豪宕不羈視天下人讀書無足當意者自經史子集以及秦漢唐宋近代百家靡所不覽獨好韓非屈原韓愈之書故其為文沉深峭刻雄偉凄麗奧博離竒如悲如憤如哭如笑如寒泉烈日如暴風雷雨雖非盛世和平之音蓋自稱其所遇也時當天啓崇禎間金甌未缺若預知有甲申以後事者每論古今興亡儒生出處及江南北利害備兵屯田水利諸大要未嘗不慷慨欷歔惓惓有所屬望奈數竒困頓諸生九試冠同列典閩闈者莫不欲一物色李生為重竟不可得大清定鼎閩中尚擁唐王未歸命故大學士黄道周何楷並薦寒支尚志博學徴拜翰林博士辭不赴反復上書與道周悲憤時事及道周死義走福州請褒䘏時問其孤嫠存没廬舍完燬輙嗚咽不置丁亥王師入閩序應嵗貢辭自是杜門絶迹城市有齮齕於郡帥者帥遣某生移書逼入郡寒支復之曰天下人無官者十九豈盡高士來書謂不出山慮有不測之禍夫死生有命寧遂懸於要津且余年四十八矣諸葛瘁躬之日僅少一年文山盡節之辰巳多一歳何能抑情違性重取羞辱哉時蜚語騰沸勢洶洶不測寒支矢死不為動疑謗亦釋寒支既以文章氣節著一時名聲大震辛卯壬辰間建昌潰賊黄希孕剽掠過泉上里有卒摘寒支園中二橘希孕立鞭之駐馬園側視卒盡過乃行粤寇至燔民屋火及寒支園其魁劉大勝遣卒撲救曰奈何壞李公居室是時天下人雖盜賊亦知有寒支矣寒支積有礧磈於胷中每放浪山水以寫其牢騷不平之概嘗詣西江泛彭蠡登廬山絶頂追維闖獻横行事痛悼欲絶淚下如泉湧不能禁也乙卯耿精忠反遣僞使敦聘絡繹踵門寒支嚴拒之自春徂冬堅卧不起乃得免寒支自甲申以後山居四十餘年鄉人宗之有為不善者曰無使李公知也晩號媿菴顔其齋曰但月所著寒支集寧化縣志錢神志史感物感本行録經正錄各若干卷年八十五以疾卒於家論曰余聞先生少時嘗單車走泉州出安海潛觀鄭芝龍其意念深矣及唐王據閩明數己終日月出矣爝火不容於不息宜先生之不應聘也使先生早年得志癸未甲申間必有可觀者一腔熱血付之清冷之鄉悲夫文章如韓心事如屈志節之清高與管幼安伯仲矣黄太常傳黄太常名性震字元起號靜菴福建漳浦人也家貧年十二怙恃皆見背㷀㷀拮据從父子完以倜儻不羈奇之取史傳古文命讀一目數行皆不忘遭時莽伏變起四鄰黄族多遇害幾不免者數四幸得脱自信為天所生必有所用之也客遊三山靡有合困窮益甚然不肯作受憐意人莫能測其淺深慨然嘆曰丈夫生際擾攘當以盤錯顯利器但世無常何孰識馬周吾長此落落乎歳丁巳閩督姚啓聖入漳籌海時軍興旁午才略之士多欲出見所長又聞啓聖虛心求賢可與共事於是仗策軍門進平海條陳十便啓聖奇之與語大悦恨相見之晩每引入卧内談機密促膝借箸至夜分乃出凡練兵遣將用間用奇剿撫機宜無不竭謀盡智動輙有功其出龍虎山復長泰縣奪江東橋小港洲水晶坪諸處招撫五大鎮皆出區畫啓聖上其功廷議以同知用奉㫖従優議叙加僉事道感激知遇益思報稱念敵勢蟠結浩大非離散其黨羽隂亂其腹心未易猝圖請建立修來館以收納歸誠將士來降者無真僞胥善待之夏屋美衣車馬僕從炫耀街衢由是海上諸黨多潛來歸順具白啓聖分別授以官可用者竟實用之至者如歸皆大喜過望得海上閒諜悉不殺厚賜之恣其徃來即用以偵海上事凡敵人舉動㒺不知者視島中將及所所信任腹心有才幹智謀者或大書其官爵姓氏標之公館飭備供應偵者以為實然輙隂報海上疑而殺之由是賊人自相疑貳來歸者日益衆一鼔而平十九寨復海澄克厦門金門將帥有利剿者性震密白啓聖禁戢安民全活數十萬衆㨗聞優叙軍功三十二級加正一品壬戌授北直霸昌道建義學立義塜治悍鷙旗丁以響馬賊為害莫知踪跡密謀𨽻役中可任者二人陽以法斥去之俾充賊黨因得悉知賊姓名及其居處出沒以次執縳械送刑部咸寘法政聲大震車駕幸密雲召見褒嘉賜蟒袍宫紵寵異之尋擢廣西提刑按察使於署側設省刑所二鍋竈器皿薪米􅀍帳皆備觧差犯証至者寢食其中按名分給訊結即去沈寃滯獄多所平反有崔玉枝一案牽累多人皆久定大辟察其可哀矜者覆訊得實力請廣督吳興祚具疏閒釋頼以全活者數百人纍纍盈庭為具酒食給衣服賞賚還家一時呼天動地以為于定國張釋之復見也計典入覲上粤西瘴癘一疏俞㫖嘉納未幾遷湖南布政使清革陋規剔包收詭寄諸弊詢民疾苦用緩咸宜憫長沙郡河洶湧商艘屢淹相度地勢别開一河于側使得安泊楚人以為百世之利云武昌夏逢龍作亂變起倉卒䧟没四郡人情洶洶廷臣以湖南為慮上曰有黄性震在無虞彼佐平六十年海氛河况于此果胸有成算知草宼無能為晏然如故不數月而賊徒殱滅更修葺書院作興士類正己率屬撫安窮黎瀟湘雲夢間頌聲洋溢翕然稱善治焉辛未春得嘔血疾遂以病乞休優游林下漳浦學宫歳久將傾圮重修文廟明倫堂輪奐聿新置義學田租為邑士科舉公車之費復建文昌祠敬一亭修梁山鍾秀坊濬泮池傅公河浦自前明以來人文甲于漳郡形家謂䨇溪二壩收礬山梁山諸水朝宗城下富庶莫京後以年久壩壞二水背流氣運稍減今欲興復其故需費二千餘金僉謂非常工役非黄公莫能舉此則毅然起而肩之獨力填築疏通内河俾諸水仍舊朝宗邑士大夫高其義鐫石學宫誌之家居故在湖西先世所聚族者兵燹後晨星散處一望蒼凉每澘然淚下有敦族立宗之志顧謂所親曰倘得一命之榮施及三黨是余願也甲子司臬粤西遣族子太學生賜旋家董其事鳩工庀石築土堡為藩籬俾族衆咸有寧居中立大宗廟以示報本次立小宗廟聯五服之親各置祀田租千餘石以供烝嘗立義塾令闔族讀書其中置書田租四百石為膳脩膏火之資復置義田租八百石以贍族中冠婚喪祭孤寡貧窮無告者仲兄都司僉書性昂逺居蜀沒已久遣人挈其家扶櫬歸葬功兄太學生性祥久居粤亦為挈家旋里授宅分産兄没為置祀田凡羣從兄弟之子皆視若己子婚娶田宅次第均分五服皆有分産多寡以服制為定居鄉由由弗與人爭角即有犯者亦不校嘗曰君子與小人校不惟不能勝亦不可勝雖勝亦非也甘淡泊食無重味與郷士大夫立敬簡堂公約以尚淳風時率園夫灌花蒔竹自鋤採以為娱每逢勝景偕好友三五輩出郭遨遊芒鞋竹杖談詩對奕有洛社耆英之致己卯冬召督永定河至京師奏對暢春苑荷温綸總理錢糧工料事務河中要地在清凉寺口舊為沸水衝䧟深幾二丈許興工之日以夭子命為文禱告河神次日沙淤數尺不五日衝塌悉平渾河性多不測洶湧恣肆堤幾潰者再三躬督視防護朝服屹立無所畏狂瀾卒安人皆以為異河道長數百里為設五里一旗一砲旗書督工官姓名以専責成有急則施火砲便于聞聲馳赴沿河安置物料省臨時搬運之費日夜奔走勞勩衝冒風雪廢寢食舊疾閒作従子尚錦従旁寛􅇺曰憊矣稍休息焉瞪目視之曰不强不逺不勞無功任君國事即委致其身也庸知勞乎不四閲月大工告竣車駕臨幸放水一日召見五次慰勞殷渥未幾遷太常寺卿辛巳冬卒年六十五生平好善出於天性屬吏搢紳有文學皆隆禮待之尤好扶植單寒海寧學士查昇未遇時一見如舊相識不惜千金資其成立四方名士登門締交或延為諸子師束脯至以千計如江南進士黄暉烈陶自悦福州翰林嚴宗溥皆所羅禮以訓蒙者時人服其藻鑑卒之日士無論知與不知莫不咨嗟嘆悼謂斯人不可復得云論曰世無常何孰識馬周豪傑所扼腕也當其遇知己奮風雲不五年遂臻方伯雖馬周知遇亦何以過於斯鄭氏父子祖孫竊居海上者數世地利人和未易猝拔所以離散其手足撓亂其腹心啓聖力也啓聖得力専在修來一館司館者之功不待問矣運籌決策績在封疆敷政宜民聲施金石至其宗族鄉黨之間仁深義篤直與范氏希文頡頏千古豈馬周僅購佳宅所敢望哉士大夫履豐席厚如斯人者不乏試以斯人自比擬吾不知其何如也月湖先生傳先生姓陳名汝咸字莘學號悔廬浙江鄞縣人家居月湖之濱學者因以名之也父錫嘏舉乙卯鄉薦第一丙辰進士官翰林編修有文名先生㓜聰敏日讀書徑寸年十四通十三經廿一史諸子百家里中前輩以神童目之二十一登戊午賢書辛未魁禮闈選翰林庶吉士丙子夏出宰漳浦浦故閩南劇邑也多詞訟丁糧版籍歳久混淆胥役因緣為奸弊官民胥困焉先生正已率物勸民親遜設紙皂懲訟師聽斷明決莫之能欺由是公庭肅然念編審為賦役大政非精詳整頓不能使宿弊一清日夜焦心勞思躬自核算編糧均户人丁各歸現在之籍令民自具親供實計丁口産業自立徴戸自封投納除户長承管之弊歳省民二千餘金均保甲清屯糧併寺畝除根租行滚單之法使糧戸自相催納不用啚差方舉行時豪强不便吏胥隂撓至上官亦為摇惑勸以勿事紛更先生毅然不可囘條分縷析三年而法立弊竇悉除差役袖手胥吏無所施其技民歡樂稱便鼓舞輸將秋冬之交歳賦全完罔有絲毫逋負者濱海習俗輕生誶語小故輙服斷腸草自盡圖賴先生力懲其弊令當刑者掘草根贖罪或出俸錢以市積堂下燬之革相驗花紅夫役飯食不避臭腐周屍上下反覆諦視以手指按雖仵作謝弗及也邑多山虎白晝常出攫人捐貲令鄉民多設虎牢復募善射者伏强弩毒矢要之潔誠齋戒牒城隍默相驅除自是虎悉入牢又多為毒矢所殪值歳旱朝夕歩禱夜宿壇登梁山絶頂觸龍湫備歷崔嵬紳士行四五十里多不能從先生葛袍芒屨不辭勞瘁甫下山而靈雨四郊霑足人以為精誠所感云丁亥夏霪雨溪流驟漲高及雉堞南郊廬舍為巨浸民皆升屋而號先生力疾登城樓輿錢數十緡募船拯救又多為木筏懸賞格毎渡一人給錢三十諸生蔡衍鎤黄尚柔皆輿錢以助男婦老幼蟻附登城者數千人分糜粥飼之次日復賑以米多方撫恤故民雖災而不害興文教設義學在邑中者一在雲霄銅山杜潯者三延諸生有學行者為之師月於初三十八日㑹邑中士大夫及鄉之俊彦集明倫堂講經史性理諸書繭絲牛毛終日論辯酬答娓娓無倦朔望日課時文二詩古文各一浦人士濟濟奮興文章經濟與海内相角先生之教也大修文廟造祭器樂器俎豆鐘鼓煥然一新雲霄銅山向皆有朱子祠祀典久廢先生以漁船二十户暨公溪泥泊税羡充祭祀及諸生郷試之資東郊明誠書院故黄石齋先生講學之所秃厮寄寓漸忘其故幾為浮屠窟宅先生撒佛像盡逐僧徒以黄氏子孫主之浦故有教堂四所男女羣聚茹蔬禮佛名曰無為教先生籍其居為公所為育嬰堂西洋天主教流毒至浦將開堂以惑四方之人士先生峻拒之無敢容納有西洋人奉欽差道經浦邑以好言浼先生繼以威挾先生弗顧屬諸上官為先生言先生仍弗顧也城東東嶽廟廊廡立功曹祠旁有鬼卒能作祟邑人無識者香燭酒牲晝夜不絶先生命毁其像𨽻役皆悚惕不敢前先生怒令鞭而碎之村民信巫禱病者輙舁土木神鳴鑼擊鼓採藥以療先生亦厲禁之有奸匪百餘人潛伏七星洞招黨入海發兵追捕遁聚丹竈山掩擊之走平和山中竪旗集衆謀再至浦先生遣鄉長黄利見密致賊黨林大札啖以重利誘擒巨魁曽睦及其従蔣卿江貴等奸徒悉散復獲海賊徐容等十餘人搜所剽掠白金二千八百八十兩珍珠四十六顆瑪瑙二顆綺紵羅紗千餘疋洋鐲洋簪盃斚之類不可勝數始知海上巨賊有仁義禮智信興六號徐容即信字號賊首也細詢行踪直陳不諱併賊中情形作何剿撫機宜言之甚悉先生以所獲金帛悉歸藩庫因條陳撫捕以靖海氛利商舶請赦徐容以致其餘黨未幾當宁遣大臣廵海招撫諸賊皆歸誠惟禮字號賊目尚作海上㳺魂耳南靖宵小恣肆督撫大吏僉謂非先生莫能了此交章調宰南靖浦人相率赴㑹城籲畱不可歸取田器塞縣門晝夜環守久之行有日矣民扶老擕㓜數萬塞街巷環跪泣曰公毋去活我百姓擁肩輿不得行先生下輿歩入李太學家夜半假城守二騎作廵邏者閒道従北門逸去士民追思不已即於北門搆月湖書院塑先生像其中嵗時瞻拜靖邑積年逋寇多伏深山旋剿旋聚或始撫而復跳梁聞先生至相謂曰此漳浦陳公十三年矣善治盗我等出没彼皆知之將安所逃顧其人長者能自詣歸誠必無患也於是前後數月悉受撫先生開示威信皆革面終不為盗頌聲大作己丑内召庚寅補刑曹主事辛卯擢廣西道監察御史廵視西城疏陳臺灣事宜及更定命案條例㫖嘉納之除西門外白蓮教訪私雕假印偽造貢監照劄者徐徳孚傅雲生等二十四人皆執赴刑部置之法壬辰秋七月聞海賊焚燒營汛舟楫因之熱河行宫上防海事宜一疏盖先生在閩日久熟悉海上情形又以商船被刼多由沿邉掛號水路屈曲礁嶼錯雜賊船遂得截刼于必經之地而當事皆以掛號稽查為良策商民苦不能自達先生至是始痛切言之沿海數省利頼焉是日在熱河復陳弭盗事宜一疏㫖皆嘉納賜克食鹿條魚脯小菜慰勞之是冬海賊陳尚義遣周錦赴兵部求撫先生謂尚義必係禮字號賊目陳老大當年海賊徐容稱此賊久在海上肆刼今就其求撫請率舉人候選知縣阮蔡文千總王三駱南左其彪等徃鐵山鳯城島入海撫之諭㫖慰勞以風濤不測但駐鳯城着蔡文等坐船前徃不必親自下海復以兵部郎中雅奇為副未幾颶風大作駱南等船飄失無踪蔡文一船飄折大桅先生馳至天橋厰遣舟徃㑹文南等俱至盡山花鳥遇陳尚義并其黨百餘人皆招致詣京師明年春正月擢通政司右叅議尋遷左叅議夏奉使入楚祭炎帝神農帝舜有虞氏陵及頒賞楚省綠旗兵丁先生自裹行糧不擾地方官一絲一粟入境即頒賞賚不忍多擾驛逓隨至隨行湖南山川險峻或請僻逺營汛可調官代領結發先生艴然曰王命屬我何敢憚勞披星䝉霧即峭壁危崖馬不容騎輿不容肩者亦必捫蘿附葛徒歩而行且遍訪紅苗窟穴情景利弊以籌撫乂久安之計祭二陵皆竭誠盡敬見虞帝寢廟傾圮捐貲屬令修葺陵逼諸猺峝峝長率男婦百餘人拜謁男帕其首擊長腰皷吹笙嗚嗚舞跳而導婦女辮髮纒三小竹于髮為椽繡紅絨布覆其上連袂而歌為靡曼聲譯其語乃蜜蜂飛來千丈高槃王子孫在山好等句先生因改著竹枝詞四章備揚天子萬年太平有道使之習而歌焉楚使告竣遷鴻臚寺卿又遷大理寺少卿甲午春三月奉命赴甘肅勘視荒災見饑民襁負蜂擁皆鳩形鵠面鶉衣百結餓殍縱横先生目擊傷心不復茹葷飲酒㑹同陜甘督撫發倉賑恤尚慮窮鄉殘黎或未遍沾實惠徒歩郊野汗淚交并時值癘疫炎蒸遂一病不復起以四月二十五日卒於固原之海都喇彌畱之際語不及私惟恨饑民情形不得上達地方有司檢視其囊衣一襲錢一緡而巳年五十七所著兼山堂遺稿漳浦政略行于世論曰先生出宰十四年入於人者最深一生事業此為顯著宜漳人之尸而祝社而稷之也固原訃至自士大夫以及農工販䜿莫不咨嗟太息刑牲設醴奔哭于月湖書院數十日不絶復劇金置田春秋饗祀事之若私親焉詩曰豈弟君子民之父母先生可無愧也已立朝日淺措施未暢使天假歳月其經國逺猷必更大有可傳者惜夫儀封先生傳先生河南儀封人姓張名伯行字孝先號敬菴諡清恪學者稱儀封先生從所居邑名之也先生七歳入小學恂恂有儒者氣年十四丁母喪二十五補博士弟子員康熙辛酉舉于鄉乙丑成進士讀有宋五子之書以聖賢為必可學辨義利闢異端墜緒茫茫有毅然搜紹之志一時學者歸重焉壬申官内閣撰文中書甲戌改中書科中書舍人是冬丁父喪越三年建請見書院于邑之西郊與鄉人士講明正學奮興者甚衆己卯夏大雨北闗堤決水汎濫入邑中居民憂之先生募人夫嚢沙土填築得無患總河張公鵬翮異之題赴河工効力以勞績懋著遷山東濟寧道值歳荒傾家財運穀以賑并載錢及綿衣數船分給凍餒者俄有㫖賑濟先生奉檄賑汶上陽穀等縣以擅動倉穀數萬石將挂彈章因申辯其略曰賑濟乃奉恩㫖非本道敢于擅動也動倉穀以推廣皇仁非希圖名譽救濟饑民非私侵肥已也使奉㫖賑濟不動倉穀坐視各州縣之流離死亡而不救倉有餘粟野有餓殍本道之罪其可逭乎昔漢汲黯過河内以便宜持節發粟賑貧民武帝賢而釋之今本道以擅動倉穀題叅理應順受苐恐將來山東各官皆以本道為戒視倉穀重民命輕害有不可言者矣事得寢在濟四年多惠政於河務尤所盡心灉河毎當秋溢淹民田數十萬頃先生疏濬𢎞深又築五岔口使鄆城等十五州縣皆安流士民至今尸祝之啓利運閘注水南旺糧艘得遄行遷江寧司臬聖祖南廵以先生為江南第一清官遍問大學士督撫以下皆推奬無異詞天顔大悦曰汝等何莫保舉朕保之將來居官好天下以朕為明君若貪贓壞法天下笑朕不識人至松江授福建巡撫入閩值旱荒疏請動支庫帑貿米賑濟民得不饑而永安漳平無賴陳首魁吳海等煽誘愚甿竄山谷為孽先生密諭漳守趙完璧撫平之褒亷糾墨訪猾吏奸胥之為民害者悉中以法由是訟庭一變教化大行崇奬孝弟嘉惠農商置社倉興積貯建鼇峯書院延九郡一州才品卓越行誼端方之士讀書談道其中為明體達用之學設藏書樓置古今經籍四百六十餘種膏火之資捐創獨厚視山左時所建清源夏鎮濟陽數書院乂迥然不同矣福州有所謂五帝者瘟神也廟祀遍城鄉土人惴惴崇奉先生悉毁之或改為義塾祀朱子核省城尼僧令所親贖囘匹配其崇正闢邪多此類云在閩三載風聲日上當宁以江南重地移先生巡撫江蘇庚寅春抵任適維揚一帶荒歉疏請海高等十三州縣暨徐州乏食軍民設法賑救又以江蘇等屬帶徴災漕一年完年半之租民力有所不贍請暫緩以紓其困皆報可上動帑平糶疏與閩事後先一轍但拜疏即日舉行謂臣因災黎窮迫恐俟命下部文徃返遲延時日專擅之罪伏望鑒原㫖嘉納之是夏赴常州㑹審欽件多所平反與總督不合總督者噶禮也性奇貪以先生扼吭未敢動先生直已行道興除舉劾如恐不及噶禮惡之每掣肘不得行所志先生以疾辭請解任奉㫖張伯行操守清潔立志不移朕所深悉江蘇重地不得以衰病辭因勉强復視事辛卯秋江南大比物議沸騰姑蘇士子迎財神入文廟事聞詔尚書張鵬翮出偕江南督撫案驗先生奉命如揚州㑹鞫弊端畢露總督故驕横張威勢欲遏之衆熟視莫敢攖先生奮然上疏劾督臣抗㫖欺君營私壞法請正國典以彰公論其略曰皇上臨御以來内外臣工罔不奉法兩江督臣禮受豢養不為不久蒙委任不為不專稍有人心自當仰圖報効不謂督臣自履任後文武屬員逢迎趨附者雖穢跡昭彰亦可包荒藏垢守正不阿者雖亷聲素著難免吹毛索瘢此在聖明睿照之中無容臣再為贅凟可異者江南今科鄉試盛傳總督通同監臨提調攬賣舉人臣以督撫藩司皆朝廷大吏豈有喪心病狂至于如此之極迨後榜揭不公主考臣左必蕃疏内有或發督臣嚴審之語乂聞總督要銀五十萬兩保全無事臣雖未敢遽信固已心竊疑之及奉㫖㑹同察審則舉人程光奎吳泌供稱闗節是實藩司書辦李啓供與家人軒三買賣舉人是實督臣大怒不容直言臣再三勸解歷詢諸犯皆有確據及提訊軒三語多曖昧事渉督臣夫國家設科取士以供將來任使必科目之中有正士斯朝廷之上有正人我皇上諄切訓戒以期風清弊絶不謂賄賂公行自有制科以來未有江南辛卯之甚者奉命徹底詳察而督臣必不肯詳察奉命嚴加審明而督臣必不欲審明推其抗違聖㫖始終庇䕶之故則以前通同監臨提調攬賣舉人以後要銀五十萬兩保全無事之説情真事實不為無稽之浮論矣其欺君壞法之罪督臣雖百喙奚辭若不請㫖解任一併發審則通同作弊之人為奉㫖察審之人真情何由得出國法何由得伸哉故自督臣震怒之後至今要犯一名不能提真供一句不可得皆由督臣驕横之氣足以震懾人心臣實有欲提不能欲訊不得者不得不大聲疾呼煩凟聖聽我皇上明見萬里無微不照而督臣敢于欺皇上皇上待督臣高爵厚禄何等隆重而督臣竟忍負皇上擅作威福賣朝廷之官賣朝廷之法復賣朝廷之舉人惡貫滿盈兩江之人知之在朝之人知之天下之人無不知之祗縁權勢赫奕莫敢攖其鋒以賈禍臣非不知此言一出天下之人無不為臣寒心但臣自念一介䜿儒候補中書數年之閒超遷巡撫受恩之深無過于臣圖報之難亦無過于臣故在督臣敢于欺皇上負皇上臣則斷不敢顧慮身家畏避權勢同為欺君負恩之人貽譏天下後世是雖言出禍隨亦所不惜況臣之功名予奪出自朝廷性命死生亦有定數督臣雖甚殘險亦豈遂能加害無辜臣又何憚而不言哉仰祈皇上大奮乾斷將兩江督臣禮解任發審俾狐鼠之輩失所憑藉而承審之官亦無瞻顧庶真情得出國法得伸振千古之綱常培一時之士氣除兩江之民害快四海之人心將見天下後世咸仰聖主除奸燭弊之神明億萬斯年永享國家賢良喜起之福澤矣疏入噶禮亦誣先生他事以互訐俱解任詔遣張鵬翮赫夀並案之士民聞先生解任罷市輟業扶攜集公館號泣失聲環當道籲保畱倉皇奔走數十日山蔬野品各持獻不受則膝行前曰公在官止飲江南水今將去無却子民一點心固跪弗起先生亦弗能遏也五月審案上以先生所劾全虛例革職治罪噶禮免議部覆如之詔尚書穆和倫張廷樞再出確審審如前覆奏部議又如之聖祖以先生為天下清官第一此議是非顛倒命九卿臺諫矢公據實再議九卿持平上聖祖復諭曰治天下要于至公朕御極五十年諸事以公心處之張伯行居官清亷天下所共知噶禮操守朕不能信㣲伯行在彼江南朘削半矣朕自㓜讀書研窮性理如此清官不為保全則讀書數十年何益而凡為清官者何所賴以自安乎初次遣官徃審被噶禮制定再遣徃審與前無異汝等既係大臣知張伯行清官當㑹議時何無一言及朕有諭㫖始同聲贊其清亦已晩矣汝等體朕保全清官至公之意使正人無所畏忌則海宇享昇平之福翼日命先生仍畱原任噶禮革去科塲作弊諸人尋亦正法有差方是時噶禮聲勢蟠結浩大舉朝莫不悚息而先生孤忠獨立自分無救不意當宁撥曀霾而揚日月得至于斯也江左士民歡聲遍郊野牓于門曰天子聖明還我天下第一清官焚香結綵拜龍亭呼萬嵗者至數十萬人復有數萬人赴京師暢春苑跪疏謝恩願各減一齡益聖夀萬萬嵗以申真實感激之誠而閩省士民亦不謀而合若赤子之慶父母也先生念有宋五子發孔孟之藴于千載不傳之後使聖道如日中天其所論説足配六經語孟因輯粹精可誦者為訓詁詳釋以示後學號五子書集觧又作續近思錄廣近思錄皆獻之于朝所建紫陽書院集諸生講論正學規模次第如在閩時極江左人文之盛鎮江故濱海承平水師戰艦多入主者嚢或察驗以民船支吾聽㸃無所别先生條陳海洋舟楫分營哨商漁編列號數又奏免揚州落地税民皆稱便先是奉㫖出海搜捕逸賊鄭盡心等與蘇松提鎮查緝防範先生慮海疆任重勤慎有加動輙奏聞同事愠之甲午乙未閒以奏報張元隆張令濤等海案詔尚書張鵬翮之江南按驗劾狂妄自矜解組嚴訊擬置極刑羈候鎮江城隍廟中俟朝命先生讀書著述晝夜無閒纂脩四書周易正宗為子姪講解經書積有講義數十篇置死生度外俄奉命進京陛見當事者以同知胡某監之行仲冬二日渡江自𤓰州至維揚父老數百人焚香拜岸上士民夾兩岸隨舟行四十里不絶乞暫停一見為胡同知所格弗得近越日過邵伯高郵亦如之至淮安總河來㑹見先生所乘舟朽蠧將潰敗大驚曰曷坐此若渡河沈爾以已舟易之行暮將泊清口胡同知不許督舟子乘夜渡黄河急雨怒風周天如墨濤浪湍急人對面不相見皆曰命畢矣然不得不行俄而雨霽浪靜星斗燦爛如晝遂渡黄河舟人皆大喜相慶賀先生亦不以為意也至京召對乾清宫明日召講民可使由之一章復召講太極圖説擢倉塲總督發倉平糶貧民得沾實惠奏請設立社倉依朱子社倉法増益條例十六欵奉㫖赴永平經畫社倉事宜丁酉典順天鄉試晉少司農辛丑主禮闈所得士來謁必告以聖賢之學不可汨沒勢利實心報國無負科名河南馬營口決條奏黄河水勢情形㫖嘉之冬十月以母病乞假命于臘月旋京便道閲河南武陟決口壬寅春召赴千叟宴畢賜坐諭羣臣曰汝等皆大臣大臣職分當仰體君心惠愛百姓如張伯行為巡撫是真能以百姓為心者也後召對澹寧居論事久暈眩色變命大臣扶掖以出皇帝嗣位體恤舊臣眷注逾格外㑹議大政保舉大員皆命同親王大臣在乾清門預議晉秩一品封三代廕一子員外郎未幾遷禮部尚書先生以濓洛闗閩五子書集解進呈上親書禮樂名臣四大字賜焉復進續近思録廣近思錄及宋儒文集數種皆蒙嘉納凡朝端衡文如搜羅鄉㑹遺巻考試官生翰林咸命校閲祭祀大禮如郊壇視牲辟廱祭告向皆王公大學士之事悉命先生行之而闕里一役追封先聖五代命以便道旋省家鄉尤異數云錫賚便蕃有加無已緯冠蠎袍錦綺珍玩龍飛鳯舞之書玉振金聲之文松花之硯泥金之扇西洋之鏡内造器皿嚢香之餙絡繹頻頒炫煌於道以及南方鮮茘西域異𤓰大内新棗參苓茶膏時果節物鹿羊雞魚天㕑之饌㒺不充牣几席滿車滿家每召進乾清宫以年老諭旨免跪嗣後請安諸事多以不能乆跪免勞頓或奏事跪乆輙命内侍扶之起雍正三年春二月十有六日以疾卒年七十有五歳遺疏請崇正學勵直臣為千古第一首出之君綿萬世無疆之福無一語及私家事天子悼之遣王公大臣臨奠加太子太保全禮𦵏祭謚清恪於䘏典常例外加祭一壇詔舉朝公卿臺諌咸臨其喪及殯亦如之所著有困學録續困學錄五子書集觧近思録集解續近思錄廣近思錄居濟一得學規類編家規類編道南原委伊洛淵源續錄性理正宗正誼堂文集凡若干巻藏于家論曰先生之於學可謂醇矣流俗滔滔沈淵滅頂科舉訓詁詞章皆謂之學彼其志不過取富貴利達而止去聖人之道遠也或稍自振拔無賢師友之撤其障蔀又不免陽儒陽墨近似亂真為學術人心之害悲夫先生自㓜毅然以聖賢為必可學志趣固已不侔崇尚程朱薪傳獨正排異學之為程朱難者大聲疾呼欲與天下共正之即治水賑饑刑兵錢穀紛呶糾錯之㑹以及坎陷交訌死生危急之秋罔不敬業樂羣守道自娛所謂造次顛沛於是者乎自古大儒罕竟其用先生際兩朝明聖極千載一時之盛與伯夷后䕫爭埒矣曾叔祖孝亷玉書公家傳公諱銘璽字玉書福建漳浦人家貧落魄以族兄侍御紫濤公占籍粤東之普寧徃依之遂家於普性好讀書立志節為人冲雅無疾言遽色弱冠補弟子員登順治辛卯賢書潮帥郝尚久叛聞公名使人召致之公蹙然曰作亂也此豈可哉其人曰非也復明耳公曰我天朝舉人不知其他固强之弗赴人還報郝逆怒遣其黨以兵蹙之公守義不屈集鄉壯據守東山寨賊晝夜環攻寨破死焉闔門皆遇害鄉壯同死者八十餘人子士旌在外得免邑人哀之論曰公守義嚴正而詞氣不迫真可謂冲雅矣出之以和平行之以果決至于闔家殉難鄉閭手足亦皆視死如歸抑又何其烈烈也名教干城庶幾無愧叔祖宜侯公家傳公諱忠字宜侯福建漳浦人也生有膂力讀書知大義能孝於親配孺人卓氏尤盡婦道宗族稱之所居村曰墩内在萬山之中故有虎患歳甲子有巨虎竒横徃來百里内傷人不可勝計臘月十二日抵某社為伏弩所傷甚憤四顧無人跳踉大呌聲裂山谷所觸草木皆糜爛直奔墩内村過土地神廟張牙舞爪齩泥像碎之居民閉戸懾息莫敢有出聲者公父元章公叔父裕公比屋而居時漏下可二鼓皆已熟睡虎既碎土地神猶咆哮不肯已衝撲附近人家倒其門攫二豕啖之裕公夢中大喊虎怒撲其門以世居山中防虎患門内植兩柱衞横木擎之虎竭力衝撲不可入裕公恐益大喊虎聞喊聲益大怒狂跳登屋破瓦桷直下斃裕公糜爛其體公父元章公聞弟有虎患發聲助喊虎復狂跳破公屋撲元章公仆地公持長刀直前鬭虎卓孺人攜杵從之虎舎父撲公公舉刀刺虎中其咽喉刃入腹中三尺許㧞刃不得出手餘脱柄虎負痛復撲公孺人從後抱虎雙手搤虎頸虎内既重創不能自脱公持手中柄連擊數十惶急中卒無以斃虎孺人呼曰斧公急從門後取斧竭力連劈之比雞唱夫婦氣力皆疲瞪目熟視則虎已死矣急視父尚卧地呻吟乃共扶入寢所以藥敷治之天明村人屠虎得肉二百有餘斤越翼日元章公竟死公及孺人哀痛激切喪葬悉如禮觀者莫不下淚里中父老士大夫謀欲白其事於令長請以上聞公泣且謝曰忠不孝獲罪於天致使父叔喪於非命忠雖苟留殘生此心已死久矣若又因以為名是幸災而樂禍忠尚得為人類乎敬謝尊長切勿復言殺虎事諸父老持之再三公辭愈益力僉曰姑置之無傷孝子心也天道有知大節豈終泯沒尚留以有待焉公長於韜略後為武諸生以卒論曰哀哉宜侯公之為孝子也非獨公之賢卓孺人尤不可及矣舎生救父避旌表以為名幸災樂禍數語聞之而不墜淚者非人也當殺虎時鼎元㓜未能知後十七年後族兄唐民先生受業始得其詳距今壬辰秋又已十有三年矣家乘未登懼將湮沒不揣固陋粗為叙次以俟載筆者採擇焉幽光潛徳歷乆彌新公雖不欲以孝名而名卒不可掩人亦何靳而不為孝哉叔祖福建提督義山公家傳公諱理字義甫號義山福建漳浦人少桀驁自大不屑與羣兒偶長益卓犖偉軀幹虎頭燕頷巨目豐頤口可容拳力舉八百鈞足追奔馬曵其尾倒行刀盾鎗砲靡不精絶時拊腹跳呌曰丈夫不封侯拜將非人也年十六無以資生或勸之業染笑曰君子固窮吾姑試為之設缸置靛收里布躬染濯一日遇族叔贊皇于道見手青問何為以實告贊皇怒舉扇撲其額罵曰天生一具銅筋鐵肋不立功萬里外作此不肖可鄙公矍然歸持斧擊靛缸破之集族中雄徤者十五人謀曰我欲為國家出力顧世莫我知無尺寸憑藉今海寇盧質擁衆岱嵩井尾間荼毒生靈我與若往殺之官以我為能必聞於朝用我矣皆曰善遂行出洋尾橋招邀得五十人至岱嵩屯駐盧質居井尾隔一江遣二小賊遊巡公傳言吾欲與質鬭令質來質開率衆三百至公虓然大笑曰人言盧質英雄僞耳質曰若何名公曰豈不聞藍理質曰乳臭耳吾安得聞之公曰吾素聞若勇今始知若非勇若所恃二三百人耳假令二三百人弗動手獨若隻身與吾鬭吾擒若矣質喜曰有是哉令軍皆壁立母擅動質與公各攜籐牌短刀躍出沙塲鬭百合不分勝負盧質有名劇賊身長七尺餘白面長鬚揮刀盾如閃電百夫莫能當其勇見公少年心易之至是始知為勁敵悉殫其技不能勝公度質氣餒忽虎吼大呼曰着矣質愕然趾出盾外公截其趾顛遂斬之謂其衆曰降者免賊衆皆降其副王都聞之亦降公議馳詣郡獻功都請緩數日言有仇欲報實潛出剽掠後以傷卒公始自詣郡郡中當事方疑公作賊又慮海寇侵擾戒嚴公指天誓日言屠賊狀弗信逮公于獄雜羣賊中鞫治之爰書置極刑届期將斬計五十有三人議留一人緩死待後來者令掣簽公曰死則死耳何掣為羣賊向前競掣之遺一簽于地公曰地上者予我官揭視之乃生字由是五十二人皆斬而公獨留乆之同繫有謀越獄者事洩當斬將及公迅雷忽作晝昏似夜當事度其寃乃止然終不能出獄公亦晏然無出意日束芻捆屨以為食康熙甲寅靖藩耿精忠叛悉縦繫者令更衣赴藩下授職公公曰我豈従賊作亂之人哉間道走上游出仙霞闗聞親王統大師討逆星馳迎之具陳平閩䇿王嘉其忠令隨征為前導屢立戰功奏授松溪營遊擊未幾遷灌口營叅將灌口地當孔道軍興旁午供億甚繁閩督姚公啓聖駐漳籌海每使過有誅求公不應且執而鞭之由是諸使皆譖公姚紏公虚兵冒餉革職永不叙用公有卒鬭殺人當死公憐其母寡無昆弟白之官曰殺人者我也卒無罪得免死置公于理公在獄又經年始獲釋嵗癸亥朝廷以鄭氏父子竊踞澎臺數侵擾泉漳為邉患議大興師命靖海將軍施公琅徃剿滅之施名宿老將善用兵聞公英勇奏請隨師平賊檄署提標右營遊擊領前隊先鋒公喜得遂報國志日在厦門練習水戰教演行陣有二卒出市薪蔬遇将軍標噶叭什觀劇使酒擒二卒撻之併詆公革職之員不可為將卒歸愬公笑曰汝曹鬭毆常事且問汝勝耶負耶卒曰受撻耳何敢爭勝負公怒命斬之曰汝二噶叭什不能勝何能殺賊卒呼寃曰我等以主帥内標姑譲之請復與鬭如不勝願斬公縱之再鬭曰勝矣大勝矣喜命二卒仆門板上刺一雞淋之舁以隨徃見將軍請發噶叭什二人者付懲治施公不可公固請曰今行軍用人之始士卒不敢愛軀命為將軍出死力將軍宜一體撫恤之惟公惟溥可服人心噶叭什小輩恃將軍親暱無故鞭撻士卒且當衆大言謂某革職之員不堪為將損先鋒威重摇惑衆心將軍不發此二人付某懲治恐軍士人人解體也施公不得已付之公馳至營遣卒賫公文飛報將軍曰今日上吉先鋒啓行殺賊即詣海岸祭江綁噶叭什二人斬之轟然大砲九聲順風揚帆而去施公聞之不悦既而曰虎將也必成功命治裝統諸軍繼之公帥師直抵澎湖鄭氏將曾逐等以數萬衆迎敵戰艦蔽江公奮勇與戰自辰至午益力忽有賊砲斜飛過公腹公偃曾遂呼曰藍理死矣公次弟瑶從背後扶公起立公空拳虎吼大呼曰藍理在曾遂死矣唤草茵持刀來連呼殺賊者三聲如巨雷舟中軍士皆氣壯無不一當百草茵族子法别號也持刀授公見公腹已破腸流出外為掬而納諸腹中公四弟瑗傅以衣五弟珠持匹練連公腹背交裹之公大呼殺賊不暇顧伊時賊舟競進以鐵鈎鈎住公舟我師亦飛鈎鈎賊舟火箭火龍火罐彼此對擲烟燄漫天賊中有飛天鼠者沿大桅而上伏篷隂銜刀捫䋲負篷而立羣賊轉篷向外則持刀飛跳下我舟公弟瑶揮刀斬之賊人氣喪我軍賈勇先登公命以火藥桶盡傾賊舟燔斃賊無數沉其二艘賊大敗逐北數十里棄械浮屍盈海面遣弁赴將軍報捷施公大喜拜疏上公首功親至公舟慰勞有紅彛醫藥極神效命醫公醫言須七日勿動氣乃可平復施公曰大功已成安卧十日可也其後施公將戰戒左右勿使公知將帥齊出千艫競奮賊悉鋭拒我師日中小却施公以大衆犂之過猛艦擱淺沙不能動羣賊環焉施公故善戰神閒氣定不以遇淺故挫衂賊見篷上書中軍二字弗知其為施公遥望總兵吳公英一船高牙黄毒縣甲帳甚盛以為此真將軍多趨赴敵然潮漸退淺益甚施亦未得突圍出諜者飛報公左右偶語曰將奈何公聞問故紿曰無之公㧞劍起大驚乃言將軍遇淺被圍狀公傳令徃救左右弗能止遂行時諸將所乘舟皆書官爵姓名篷上字大二尺許逺難辨獨公舟止書藍理二字字方廣各二丈賊遥望見相謂曰藍理來矣稍却公追擊大敗之奪賊舟請施公更舟施執手慰勞曰愛我也但醫言七日勿動氣是以戒左右無令公知今方三日奈何遽動公笑曰主帥被圍吾安忍偷生即瘡裂以死亦有天定無悔也於是與施公乗勝殺賊賊大敗死傷不計窮追至西嶼頭賊退守城壘不敢出施復拜疏上公功數日公瘡平復與施謀出輕師以擾之賊數敗首尾不能相顧大困弗支鄭克塽聞之懼遣使納降我師入臺灣百姓安堵海疆厎定朝㫖以公血戰破敵功在首先遇缺先用而公以二親且老乞歸省弗赴未幾丁父艱服闋又越二載戊辰始入都過趙北口遇聖駕出水圍將迴避騎凝立道中弗肯行鞭之數十不動乃舎騎歩入梁園中駕至遣侍衛問誰騎公乃出曰臣藍理従福建來者上問是征澎湖拖腸血戰之藍理否公奏曰是上曰來何遲也召至前問血戰狀觧衣視之以御手撫摩傷處嗟歎良久復召至行宫極慰勞廷議授官部臣以公革職閒員擬守備弗可擬遊擊叅將俱弗可乃擬授陕西神木副將賜帑金三百兩未行特授宣化府總兵官挂鎮朔將軍印越三載以海洋多盗調補浙江定海鎮在浙十餘年四署理提督事兵民相愛山海肅清修定海文廟祀忠烈墾荒蕪築道頭通洋舶海外蒼黎欣欣大有起色焉尤重斯文禮賢士諸生單寒者必周恤培植之鄉㑹大比皆資行李之費浙人士籍籍弗衰每遇上南廵接駕或入京陛見恩眷之隆羣臣無比上常向諸王大臣言公拖腸血戰狀又引見太后曰此破肚總兵也盖愛公如家人婦子賜賚優渥不可悉數公每敷奏侃侃指畫或手舞足蹈上嘉其真率手書所向無前及勇壯簡易匾額賜之尋以天津為京東重地調公鎮守公以畿輔産米無多而天津一望平原皆沃衍閒曠可濬河引水開灌稻田率兵疏鑿躬胼胝負土築堤市牛種農具募民耕種得水田數百頃嵗收稻穀上俱以賜公丙戌遷福建陸路提督調公五弟獨石路叅將珠赴天津接管營田事公至閩見桑梓父老欷歔太息道及微時顛沛事慨然有廣厦千萬間盡庇寒士之意地方鼠竊盗賊搜除廓清盡撤街巷柵欄曰此非弭盗乃弭捕盗者漏下三鼓城門洞開民間夜户不閉行旅戴星徃來遺貨物于道無敢拾取數郡人民安樂之時詢疾苦聞文武胥役弄􅁠舞弊以及勢豪大惡訟師土棍朘削人民悉闗白當事按法區處親近者竞自治之堪輿家言漳郡人文鬱塞乃後山仙殿壓學宫地脈東南田裏港未築水門直瀉所致公毁仙殿大興工役填築田裏港又以江東橋被賊斷後險渡狂瀾民苦病渉倡修江東大石橋二役費須鉅萬公偕諸文武官紳捐貲不足則以郡人之不孝不弟為富不仁者罸出鍰附益之又狭小市廛制度築漳州浦頭石瑪泉州新橋安海沙溪塗嶺行舖千百間大開街衢便民貿易常曰以地方不義之財為地方萬民之利可以勸孝弟抑豪强轉移風化莫善於此或曰此有司事非所宜公怒曰天下官管天下百姓腐儒何足以知之由是告訐不法事者日按踵差弁勾攝絡繹於道而假威藉叢之軰紛紛四出富人重足而立矣公左右親暱多隂交泉郡土宄偵訪素封詭稱公令恐嚇之獲利無算或遇豪黠不聽従則以抗拒為大辱又不敢明目向公言伺公遊行處隔牕偶語故作嗟歎不平聲公聞問故則故匿不言再問尚吞吐其説似絶不經意者公性急不能休乃言某某為富不仁極害人不堪之處或暴横孤寡諸非人類所為事公曰豈有此理世間無官法耶復極言勢力浩大官吏莫敢攖公曰治之則後此諸事皆公所為其人不能支必請托左右納賂求觧凡出入公門者皆致富而惡名盡公受之泉郡勢豪妬公者刻匿名帖繪一虎以比公多列條欵傳播京師聲名大壊辛卯秋以漳平陳五顯盗案解任壬辰入都值覺羅滿公保出撫閩據虎帖叅劾上命侍郎覺公和托廖公騰煃偕總督范公時崇廵撫滿公保並按之左右不肯承公曰吾大臣何必辯舉筆署曰皆實擬極刑追贓八萬家産皆籍入官上念公功免死挈家歸旗俄以西藏用兵命之軍前効力有進戰退守移營就糧數事合機宜上深嘉之赦免所追贓而閩中家産俱經有司變鬻一空無復有立錐地矣越數載以老得賜還京康熙五十九年卒年七十二公生平躁急性發如震霆過即忘之無藏怒宿怨劇談大笑聲聞里許惟好自尊大不服人尤善罵凡權勢赫赫位在其上者多倨侮挫之以示天下莫已若遇才人傑士雖寒賤徹骨亦必折節禮下以此人服其藻鑑教家勤儉衣食粗糲無所擇家奴悉珍饈自奉草蔬敗肉皆留以待公公亦甘之好書大字濡毫伸紙有求無不應者諸弟皆以平臺功加左都督最著者次諱瑶公功烈居多未仕卒四諱瑗公仕至福建金門總兵官亦喜書大字拳能入口揚盾一躍三四丈五諱珠公累官叅將英勇不讓諸兄而好學聰敏能背誦朱子綱目始終不遺一字文人畏之公有子五人長國英嵗貢生次文魁太學生早卒三國庭辛卯科副榜貢生以軍功候選郡司馬四國定嵗貢生五國柱與國定皆効力禁門並授京營千夫長康熙六十一年壬寅秋賜公家屬出旗仍還閩省為民籍䕶其喪歸葬論曰公一代虎將也起草茅建竒勲生平舉動種種異人可不謂非常之傑乎使公稍謙慎自持或官非梓里急流勇退千載猶將慨慕之以好大喜功卒為左右所䝉垢晩節弗完深可惜也然公之竒氣終不可没拖腸血戰功在社稷未可以儒者潔清之操堕國家干城之彦庶幾乎論得其平哉阮驃騎傳阮蔡文字子章號鸛石閩之漳浦人父曰魁居下魏郷以海氛遷徙苦徭重轉之江西生文于南昌寄籍新喻文㓜警敏年十一即能屬文然性剛以膂力自負喜弄刀盾隣兒皆畏下之十三補新喻諸生以貧甚隨父耕作父贖得蠧壊綱目授文讀冬無絮文擕斧斸樹根累百斤者負歸坎地􅋹而圍之父没教授村童以養其母二十四登江西庚午賢書數上春官不第留心經世所至南北山川阨塞險易沿海島澚遊魂窟穴以及東南諸蠻夷情狀利害無不瞭瞭胸中齊語楚咻吴越閩廣方言苖猺鴞鴂侏􅍣之音入其郷即與之化肖其聲調口角莫能辨為何方之人也即落擴無所用周逰餬口與武人吴郡交相善文族父欽為為台州副將拜興汀總兵官偕郡徃依之文任書記郡為小校兩家母通徃來飽飯坐之堂上擊鼔長歌以為笑樂郡事文母如母郡母亦視文如子雖親昆弟無以逾也未幾文以母没扶櫬挈家還浦時浦令陳汝咸率邑人為講經之㑹月兩期文攘臂前席髙論古今治亂得失救時急務同學韙之丙戍後讀書都門己丑被放南還抵三山閩撫張伯行邀入鼇峯講洛閩之學分纂先儒諸書或勸文離家五載宜遄歸文曰正學失傳久矣斯㑹可多得耶顧吾方謀葬母亦當歸耳還至海澄距家不百里芒鞋布襪遍厯山原為母求葬地風餐露宿四閲月得地于陳坑將發引之前二日乃返舎其明年漳泉諸郡饑文將有姑蘇之行傾囊以資族人之在下魏者酌親疎計口多寡分給之謂其子曰吾非不念汝曹顧此皆吾祖宗之子孫吾與汝同源共本者也脱二日不舉火非填溝壑寧免散之四方哉時吳郡已為定海大帥詔截江浙漕米三十萬石由海道入閩分賑文自姑蘇趨如浙偕吳郡分運五萬石揚帆先至漳泉之人頼焉以功晉秩一級壬辰冬十月海賊陳尚義遣其黨赴兵部乞降時陳汝咸為御史奏請自徃招撫薦文與俱詔御史駐錦州賜文帑金衣裘加二級偕千縂駱南左其彪等入海遇颶風大作駱南一船飄失不知所徃文船折檣幾覆溺數四舟人大恐文怡然曰我等為朝廷招逋㓂靖海疆雖葬魚腹不猶愈死兒女子手耶至登萊易舟踪跡所在則遊奕盡山花鳥間文直上賊艘見尚義開示威信聲情慷慨賊黨有疑貳欲刼文颺去者憚文丰裁未能决文陳説利害遂悉衆降由寧波登岸則吳郡已為浙江提督遣官弁護至京師召見便殿上問文書生此行良苦頗驚怖否文奏言臣仰仗威靈頑梗革心無所怖更問沿海事宜條對甚悉議功晉州牧選雲南之陸凉未行改授福建厦門水師中營叅將則以文材武可大用而大學士李光地亦奏稱其猷略故也厦門距家百餘里利弊纎悉無不知通闗梁除盗賊動合兵民意紅夷市舶故驕横主者貪其利多為所玩一日有互市者奠賈輕重不相中一船㧞刃以譁軍吏惶急不知所為文單騎徃縳譯榜之為評其直皆羅拜次日其酋率衆謝承筐多儀免冠以獻文大陳武威坐堂皇召之入語以朝廷威化呵責甚厲皆不敢仰視復椎牛置酒饗之庭廡所獻儀物悉遣還由是諸夷畏服明年調臺灣北路營叅將諸羅令周鍾瑄才名吏治為海疆冠文一見如舊交和衷共濟戢吏卒撫番黎捐金助建學宫城隍悉除所轄陋規部伍器甲簡閲整齊躬廵歴沿海増置要害營汛北路地方千里半線以上民少番多大肚牛罵吞霄竹塹諸處山川奥鬱水土苦惡南崁淡水窮年隂霧罕晴霽硫黄所産毒氣薫蒸鄭氏以投罪人庚寅始設淡水防兵及𤓰生還嵗不能三之一廵哨未有至者文決計徃部曲皆涕泣强諌文曰不然臺雖彈丸實閩之安危淡水又臺之鍵鑰也由淡水至福州利風一日可達民番錯襍亡命者日多不熟知其里道情形何以控制調度自齎帳落具脯糒日或于馬上成詩夜燃燭紀所歷地里山溪風候土俗為文以祭戍亡諸將士悽愴激烈聞者感泣山谷諸番具牛羊酒食迎餉道旁文悉慰遣無所受召社學番童坐幕下與之語曰我汝師也勿懼能背誦四書者旌以銀布為講解君臣父子之大義反覆不倦諸番皆感悦竟以中瘴氣歸而病痞遷福州城守副將赴京道劇卒于宿遷年五十文偉軀幹黝面闊口好劇談大笑鬚眉俱動讀書忘寢食有時賔朋滿座朗誦高吟或展巻喜動眉梢失聲揮淚㦸手怒罵嘗曰吾見古人之忠孝節烈恨不起其人於紙上而拜之跪之也見古人之悖逆奸回恨不起其人於紙上而烹之磔之也為文章不假思索對客揮毫數千言立就詩以韓為宗然其志在經濟事業欲以設施見長故著述無多所遺淡水諸作南北海道盡山花鳥等記耳平生無留錢或贈之千金以葬母輙盡在官二十有四月未嘗取兵民一粒一絲運米及招撫時所過當道以文需次閒員為國宣力慮資斧弗繼輙贈金帛文悉却之曰吾不以天子之使受人憐也沒後妻孥饘粥不充無一廛之宅然素淡泊亦不見為苦云論曰阮鸛石全才也粗豪曠爽有湖海之氣望之知為英雄耳其沈幾權變肆應詳密非與共事不可得窺測也使竟其用經濟事業豈必多讓古人天奪之速則不解其何故矣世所傳造物忌才吾始不信悠悠天下人才難得又困苦沮抑之不使展盡底藴是天既不肯多生才生之復不愛惜之則謂之忌也亦宜游遊戎傳蔡章琦附游崇功字仲嘉福建漳浦人也㓜喪母事父以孝聞兄尚功任湖廣辰州守備終廣東肇慶都司崇功材力雄健有逺志操行不苟年二十九從蔡老虎鎮襄陽老虎器之拔右營把總老虎亦漳浦人名元屢任總兵官以善戰為敵所懼故海内稱蔡老虎云崇功既得官益勵志節歷千總秩滿遷福建長福營右軍守備分防長樂縣縣濱海有磁澚為賊艘出沒之區崇功亷得其狀以兵二百伏仙峽塘要口復率兵捕之賊棄舟登岸伏發擒十七人獲其舟自是島澚肅然癸巳夏長樂水災民艱食崇功憫焉躬之㑹城見巡撫覺羅滿保請發粟平糶許之即遣徃羅源轉粟回縣濟民食邑人始安滿保以為能比遷閩浙總督即以調補臺灣北路營守備訓練兵衆輯和其民人諸俗健鬭動輙梃刃相加歳旱爭水如臨大敵崇功親為和解均水道競者以平協修學宫建無祀壇凡勤民事多此類諸羅之人深德之三載瓜期遷海壇鎮右營遊擊海壇故多盜崇功巡緝外洋遇賊舟窮追力戰擒賊陳阿尾等六十餘人滿保益器之復題調臺灣水師左營遊擊康熙六十年辛丑夏四月臺灣土賊朱一貴作亂逼郡治崇功方巡哨北洋月之廿八日在笨港聞報以兵還赴安平次日至則羣盗已大猖獗而文武守臣眷屬悉在舟中矣崇功曰官者兵民之望官眷登舟則兵民心散大事去矣急登岸赴敵其壻蔡章琦叩馬請一過家門區處眷屬崇功厲聲曰吾此身已許朝廷今日遑知有家哉躍馬麾衆竟去前後連戰殺賊甚多五月朔日黎明賊衆數萬戰于春牛埔總兵官歐陽凱失利及副將許雲皆戰死崇功從容無懼色突圍衝擊手刃百十人乗馬被創遂死焉時年六十及臺平朝廷贈秩廕子以旌其忠蔡章琦字又韓游崇功子壻也其先浙江餘姚人隨父官湖廣之榖城因家焉援例充太學生家中落以康熙五十九年攜孥渡海就食崇功官舎章琦為人慷慨有志節能為詩崇功甚愛且敬之朔日既暮聞崇功陣亡喟然嘆曰吾甞讀聖賢書今日可不死哉遂赴海而死論曰游崇功歴官三十餘載未甞營一畝之田數椽之屋以武職而勤民事所至有能名是不必待沙塲馬革之日早知巍然志節丈夫矣蔡章琦太學諸生蹈海成仁洵無忝游家壻也同時北路叅將羅萬倉戰死有妾蔣氏投繯完貞德盛化神之世士女皆知忠義立志節豈不偉歟余欲為羅蔣立傳不能悉其家世里居及生平事蹟尚闕有待李弁傳李茂吉本姓江福建漳浦人也磊落不羈家素貧弗屑治生業與弟江尚皆從戎邊省將帥相沿懶更兵籍毎召募入伍則指一空名畀之以故茂吉姓李而江尚兵名侯鵬皆不得姓本姓云茂吉由海壇鎮隊目以班渡臺屬水師副將許雲麾下雲一見大奇之康熙五十八年秋九月薦于鎮帥歐陽凱凱考驗材技出衆轉薦提督施世驃總督滿保授安平鎮中營把總茂吉不以官小自卑奉職甚力岸然有大志稍委靡事皆不為朱一貴之亂茂吉自請于副將許雲乞一旅率弟侯鵬為前驅殺賊時羣賊蜂擁逼郡郊雲聞警欲躬赴援遂以茂吉從四月晦日戰于萬夀亭茂吉虎吼雷奔直入賊陣左衝右突所向莫能當賊退屯竿津林五月朔日復隨雲在春牛埔迎敵杜君英朱一貴合兵圍殺鎮帥歐陽凱死焉守備胡忠義千總蔣子龍把總林彦石琳皆戰死獨水師弁兵不少挫許雲游崇功自分必死率千總林文煌趙奇奉力戰茂吉奮刃大呼賊披靡僵尸匝地自黎明戰至日中矢窮砲盡雲崇功文煌奇奉皆戰死茂吉亦力竭被擒矣賊擁之演武亭見渠魁戴穆茂吉挺立昻然穆怪其不跪叱之曰若兵耶茂吉曰官穆曰把總微官耳若壯士降當以汝為將軍茂吉瞋目厲聲罵曰死賊我朝廷命官豈肯從汝作賊遺臭萬世耶舉足踢其案案翻奮力斷縛直前欲奪刀殺賊賊衆舉刀共斮之頭腦破裂尚痛罵不絶口賊怒碎其屍時年三十九侯鵬被傷不死潛匿民間覔兄屍數日不可得大師入鹿耳鵬隨軍殺賊遍訪諸埋屍所發視皆非遇與茂吉同擒之舊兵蔡爵乃得其詳以茂吉妻許氏及三嵗兒江忠還漳浦總督滿保出帑金賞恤之拔侯鵬把總復姓名武明年奉㫖旌忠廕一子論曰官以盡職為榮李茂吉雖末弁萬户侯安足道哉罵賊不屈百世下凛凛如生常山睢陽當囅然孺子可教矣臺變殉難諸臣惟茂吉最烈若許雲歐陽凱叅將羅萬倉遊擊孫文元守備胡忠義馬定國千總林文煌趙竒奉蔣子龍陳元把總林彦林富石琳皆捐軀報國不為苟且偷生欲一一為之立傳惜乎末由知其生平事蹟也鹿洲初集巻七
