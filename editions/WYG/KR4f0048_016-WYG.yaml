body:
  text: 鹿洲初集巻十六廣州府知府藍鼎元撰讀傳書後跋讀西門豹傳西門豹以河伯娶婦故沈巫嫗三老於河千古大快也邵國賢乃以為任術而未仁何哉夫仁莫大於愛民愛民莫若順其欲而除其害除數民害以生千萬民何所為而不可且巫嫗三老歲歳為河伯娶婦斂民間數百萬錢而瓜分之所沈女子不可勝計天道好還絲杪不差殺人者死古今常法也今如國賢言將教而誅乎抑教而遂赦之乎教而誅之其身總無改過之日教而赦之是殺人之過可改則人皆曰吾今日殺人明日改過不知為令者將何以待之孟子曰是不待教而誅者其斯之謂無疑也雖然使豹明牽巫嫗三老而戮於市亦未大快人心而蚩蚩者民或以得罪河伯是懼惟漸次投之河若曰彼固歲歲為河伯娶婦者亦可因此以為河伯酬恩之地河伯有知當必善待之終送之出無令其死也至於良久不出而巫嫗三老竟死矣則河伯之無能為可知矣而後民心大快羣疑盡釋故豹是舉雖近於戲而以其人之術還斃其人之身至當不易非婦人之仁所可同日論也讀田子方傳田子方高士也然未聞大道遺子思狐白裘而曰吾與人也如棄之子思曰某雖貧不忍以身為溝壑魏武侯為太子時出遭子方於道下車伏謁子方不為禮由斯二者觀之殆亦不學之士乎君子將以物與人必使之可受奈何欲使人受棄物無禮甚矣且禮尚往來謙尊而光匹夫而非我奴𨽻苟以禮來將善視之焉有君之適嗣下車伏謁而不為禮之理哉貧賤驕人之說是未免戰國遊士習氣也聖賢舉動決不如此雖曰子方嘗師卜子夏吾將以為未學云讀郭崇韜傳拙哉郭崇韜之與故人子弟謀去也莊宗取天下崇韜以謀議佐命功第一位兼將相而宦官伶人用事將迷其君敗其國此大臣去邪遠佞盡忠報主之秋也崇韜自度其力能則誅之不能則以死諫又不能則挂冠出國門惟恐不速胡為乎委曲觀望於其間而乃與故人子弟謀去耶欲去則去何待謀謀而後去豈真欲去者哉市里野人挺身將鬬復從容而解衣則旁觀一勸輒止矣明胡靖欲盡節呼家人飼猪君子知赴義之不果也崇韜之不可不去豈待智者謀之莊宗耳淫於聲目眩於色宦官伶人不可斯須去也我不能使之去而又不肯自去鰓鰓若隂柔婦寺妬嫉之復口中喃喃危言以惕之彼自度邪正不兩立且畏禍及身欲其不先謀我也難矣故為崇韜者去則生不去則死去而速則生不速則死不謀可決也故人子弟何為向使崇韜早乞骸骨歸田里優游巖壑絶口不言功雖少伯子房亦何以過而戀戀雞肋百訃彌縫尚欲立功以自固不思此日之功豈復有加於開國佐命之上老饕顛倒一至於斯罟㨦籠頭猶不知覺直至奸人矯詔五子同殃然後悔之無及其寃可憐其愚更可恨也雖然功名之際見幾明決者有幾惟有道之君子斯用舍而皆宜余于崇韜曷怪焉讀桑維翰傳桑維翰在晉為功之首實則罪之魁也少時臨鑑自奇賦日出扶桑鑄鐵硯以明不改業其志可謂遠矣惜未聞事君之大道耳蓋本正而後末順源清而後流長自古以來莫之能易維翰結契丹以興晉棄鴈門十六州譬養虎而依之以食其遺犬彘犬彘盡則已亦随之興邦之初大本已失又貪戀富貴善政無聞百計彌縫招權納賂其源不清故張彦澤利其貲産而束帛加頸景延廣一肆狂謀而負義侯封而晉亡矣則末不順流不長之明效也悖而入者悖而出非此謂乎茅鹿門曰使出帝能傾心維翰未必不可轉危為安余謂此說大謬維翰興晉之日已為亡晉之日豈至此而後知之即使傾心維翰毋絶契丹亦不過苟延旦夕曾奚益之有哉無維翰則晉不興晉不興石氏亦不亡先哲謂縱不得帝猶於帝室為甥舅無論其僅不得帝即使見殺於唐尚始終不失臣節何至辱身賤行稱兒稱孫為契丹陪臣奴𨽻又為契丹所滅亡貽天下萬世之唾罵以養虎之犬彘自居哉功不足錄罪不容誅余不能為桑維翰恕也書淮隂侯傳後淮隂侯之寃前輩論之詳矣余謂當日情事高帝未嘗不知之特畏惡其能不勝褊刻之見姑為是昧心舉動耳不然以謀反大逆之人恨不得立膏斧鑕豈容赦罪封侯又與從容談論遲至五六年始殺於婦人之手哉教之反者尚可免烹帝固知信之實心事主不聽人言也然則信非吕后亦未必遂夷三族蓋帝雖惡其能猶知其心后惡其能則直恐為他日外戚之患將使劉氏不可危吕氏不得措手足所以切齒忍心必急急焉除之也觀於彭越之死亦由吕后高帝甫崩即與審食其謀族諸將意可知矣女子小人之禍人國必先毒螫其羽翼墮壞其柱礎然後可以為所欲為而無復顧忌惜高帝在其術中而不覺也以一念之褊刻釀惡婦之亂階社稷宗廟幾至覆滅嗚呼可不懼哉書諸葛武侯傳後武侯去顔孟五百餘年蓋當道統復續之秋應聞知景運而起者雖遭時不幸𢎞濟艱難不得專一其功闡明身心性命之學然行道之君子又不必與明道者較論議短長也況戒子書精微廣大正議二表百世可師直補經傳所不及哉出處似伊尹忠誠似周公學問似顔子三代以下第一人之目明道君子咸推之即以躋之臯萊望散之班吾未見其不可也是宜從祀至聖廟庭俎豆萬世乃千五百年之間未聞有議及此其亦不可解已然斯道斯人不容泯没後當有舉而行之者書王弇州完璧論後藺相如趙之能臣也歸璧一事余亦無取弇州之論可謂先獲我心矣一璧何足為重輕而行險以徼幸耶孟子曰諸侯之寳三璧不與焉又曰寶珠玉者殃必及身趙豈未之聞與趙有璧而秦生窺伺之端璧之能為國禍也璧予秦猶之嫁禍於秦趙未為喪寶也使趙自度能支秦則璧可無予自度不能支秦璧何必不予而相如純以詭詐用事也何居雖秦虎狼之國不足言理義然君子不可使曲在我相如既使之齋戒設九賓又懷而逃之當是時秦未嘗明言不予城也業召有司按圖指十五都予趙雖詐也而詞實順是曲仍在趙也秦不得璧又不殺相如則秦寛𢎞甚矣萬一秦王大怒立誅相如殺身無益於人國且有反覆之名亦足羞哉趙之有璧與有相如孰緩孰急何不思之甚也君子不貴幸成之功余終不謂之智而謂之不知本書伐魏檄後平生最惡曹孟德毎聞三家村豎儒稱為魏武帝必徵色發聲唾其面而奴之操雖覬覦漢鼎終其身未嘗為帝無端千百年後奉以武帝之稱何其善媚亂賊耶帝者天下之主豈可以此名為盜賊之所好而遂如其願而稱之在丕家臣僕以媚丕者媚操則然後世讀書君子何因而媚則王莽李自成之父皆將以帝稱之乎丕雖自帝亦莽自成之儕偶學者不帝莽自成而獨帝丕蓋狃於前人之誤未及改正不知紫陽綱目大書特書千載名分已定豈應復因循謬戾自居名教之罪人故以直則曰曹丕愛其詩文則稱曹子桓論其國事則稱魏主丕無仍稱文帝之理况操本未嘗自稱又何煩小輩之魏武之耶竊歎漢家不造昭烈之賢弗亞高光孔明天生王佐伊周吕召之徒又有關張熊虎諸將為之輔翼終不能興復一統僅存正朔於巴蜀南蠻之間則以中原地利皆為賊人所據無一得展手足耳忠臣義士百世下猶為傷心曹氏父子之罪不可恕也明矣陳琳一檄余所最喜恨其時操惡未著僅詈及三分之一尚為千古憾事因思武侯出師仗義正名似當移檄州郡一數賊惡動海内臣民之心豈當時鞠躬盡瘁未遑及此耶讀史無聊戲擬伐魏一檄自知學殖淺陋不足為武侯續貂亦聊以補陳琳所未及使小儒知帝魏之不可云再書伐魏檄後余讀三國史戲擬武侯伐魏檄既成六日矣夜夢一丈夫自稱曹孟徳叩扉請見命之入見其濶面多鬚不冠不帶素衣而散髮嫌其無禮不命坐戲之曰孟德公亦不冠耶又欲來作征西將軍曹侯耶今聖明在上恐無地可以容君其人黙然無以應若有羞赧狀向余連作五六揖余笑曰不冠而揖仍是賊輩禮文耳指几上檄使觀之閲數行面漸赤至操戈犯闕弑后妃於天子之前即肉顫手亂不敢卒讀欲懐之而逃余擕其䄂止之曰無若兹吾稿必欲存也其人慌甚將已閱者扯碎僅存三分之二余仰天大笑曰桓溫有言丈夫不能流芳百世亦當遺臭萬年君之謂與君作惡一生不畏天下人議論復何有於余文哉且語云欲人勿知莫若勿為君何不戒慎於生前而思掩飾於死後無乃惑乎吾文自能記憶吾稿必欲存也其人大慙而去余亦蘧然驚覺取筆索燭而記之時康熙丁亥五月二十七日也嗚呼亂臣賊子所以敢悍然不顧者謂天下皆可欺耳使知千秋百世尚有人焉欲正其是非即形銷骨化而後且無所逃於鈇鉞誰敢復為犯上作亂哉操而有知定當赧然沮喪勿以無稽之夢囈嗤余也聞斯言者忠孝節義之心油然生矣書潮志方輿卷後按是編輿圖諸說提封阨塞疆界遠近既已靡所不周詳哉言矣尚何疆域形勝闗隘之紛紛乎舊志所存删之可也然歷來志書未嘗廢此三者今欲便于觀覽盡入圖說之内聚米畫沙原原委委雖可一望瞭然其體亦嫌于創未敢自以為然耳海宇昇平非復向時之舊昔人所謂疆域形勝關隘者十已不符二三戰塲化為中閨兔窟栖于雞豚滄桑改易徑途亦異欲仍循故籍經畫防守以為遠猷難乎免於刻舟求劍之誚也書而弗削懼掩前徽列于小註示不可用以俟後之君子焉書風俗志卷後臣按放勲曰勞之來之匡之直之輔之翼之使自得之又從而振德之即聖諭廣訓書之意也夫風草之機捷于影響人非木石豈有不可訓化者哉宋儒謂無好人三字非有德者之言必謂俗刁民惡如蠻髦盜賊無可如何亦非有道者之言也古云上以孝取人則勇者割股怯者廬墓又曰城中好高髻四方高一尺城中好濃眉四方且半額上有好者下必有甚變化之易自昔如斯今豈伊異人乎細民之則傚士大夫之倡也化導之不勤弗能宣上徳意使人人遵路近光有司之責也潮俗已去太甚爭趨淳美雖一時之勉强將習慣而自然風會人心日躋日上鄒魯復見于海濱庻幾仰副皇上平章協和之治臣不敏願與地方官吏士民共勉之司馬溫公文集跋古所謂大臣者必有正學以為之本領而又有經濟宏才足匡社稷利蒼生毅然以身任天下之安危由是事業顯爍於古今聲名洋溢乎中外吾於宋司馬溫公見之朱子曰溫公可謂智仁勇其治國救世何等次第公亦自言去惡從善若轉户樞余讀宋史見公正色立朝直言敢諫扶綱常植國本除新法恤民命進君子抑小人有旋乾轉坤之力忘身殉國之節至大至剛浩然不可撓之氣竊謂三代而下本正學以發為經濟而擔當世道無如公者雖通鑑一書是非議論間有謬於聖人不過史識有所不足無害其為大君子也己丑夏中丞儀封張先生以公文集授余又見公以經濟為文章忠愛懇忱流露翰墨有古大臣以道事君之意益歎公學術之正道德之隆規模宏遠條理詳宻非大儒而能若是乎今人讀書蓬茅中胸有所得恨不得位以行及位果可行則又顧慮身家委蛇遷就不曰君王明聖愚昧何知則曰福先禍始古人所戒舉平居慷慨磊落陵轢宇宙之精神一立朝班反奄奄欲絶徒以守雌守黙博休休有容之狀如此之人是國家大蜮也雖千百輩何益于天下哉溫公一生過人止是肯任天下事見義勇為禍患不計忠誠上貫天日利澤溥于方州是以人民思慕田夫婦女皆恐其去朝廷及其没也市人巷哭鬻衣致奠四方畫像以祀飲食必祝則公之為公可知矣學者讀公之文當蹶然而起思公之學術經濟乃公擔當世道之所由鄙夫脂韋皆坐在不學耳庸庸多厚福非儒者之所願聞也鄭母輓詩跋余讀鄭母林氏狀泫然悲之既而猶幸其遇也婦人立節貞與烈不同烈者慷慨一時大事定矣其節易見故得名較赫守貞之苦則終身焉風凄月冷唳鶴啼烏悲悼何極采風者又未敢即為標榜必遲至髮白齒落老且死而後論定嗚呼蓋其難也然或不幸不遇肖子復不獲當代鉅公為之傳信荒山僻澥之間湮没者何可勝道鄭母守貞三十年有子成立厥功懋哉蓋棺以後其子陽豐述其狀而號泣吾鄉諸君子哀其志為詩歌以揚厲之凌霜勁節没有餘芬鄭母之遇其亦可幸者乎名教二字閨閣同之余病女教無專經乃輯經書古訓為女學六卷竊不自揆欲為風化津筏今觀鄭母得力於孝經内則列女傳諸書益信學問之功大也化民成俗其必由學豈獨男子為然哉余既幸鄭母之為名教光因書數語附焉時丙申又三月也臺灣後遊草跋臺灣後遊草吾友陳君少林征帆三渡之作也其初渡臺以聘修諸羅縣志君既有遊草矣辛丑再渡臺以制府滿公屬㕘軍事隨師平賊歸舟遇風賦天風數章未幾而復有癸夘之遊殊非其意憶昔征帆諸詩所為作也深情雅調雄壯蒼涼如英莖咸韶音節超詣中丞沈闇齋比之少陵宗伯蔡梁村以為即子美北征諸將之什而廷尉黎抑堂復以一言韙之不許他賢置喙君之詩定矣余何言顧念君之才之遇則亦有不可解者少壯迍邅名塲馳驅楚越滇黔間戎馬江湖俯視一世歸而講經學誦洛閩分修先儒諸書則恂恂儒者也征臺一役慷慨從軍運籌決䇿屢縛魁渠海疆甫定長揖言歸制府薦授郡守之約初陳君臨行時制府滿公約曰賊平當薦子於朝授以郡守直與童兒瓜果付之逌然一笑中初不知於已何涉者蓋位置其身于三代以上過人遠矣竊歎造物生才甚難君相求才若渴深山窮谷老死隠淪者不具論既出其經濟之能以表見於世尚終棄置乎巖穴鮮不謂當途之過也雍正六年上命内外臣工各舉有猷有為有守之士中丞闇齋先生以為無逾君者亟草䟽欲薦于朝稿已具而中丞疾作乃寢余不自量人微言輕復欲以君應詔梁村宗伯來書亦以君讓予盖度余必不肯舍君而他求方歎友朋知已萬里同心毅然以推轂為己任不謂速君未來而余已陷于非辜事又不果明年春抑堂廷尉復欲薦君以手札趣君赴汀並轡入都而君又不行抑堂别君二十餘年或言君且老難見至尊及期君弗至復中止梁村宗伯既以君讓余别有汲引至是亦悔之無及可見君行藏遇合自有天定非人力所能為也君子所性不為窮達加損廊廟巖阿均有不朽之事業第以昻然七尺應為國家驅馳不敢躭泉石之安駕言高蹈耳守先待後事功且及於百世豈與一時利澤較菀枯高下云乎哉君歷久不遇正造物所以厚君不欲使安於小成君必大有以副造物厚待之意不以有用光隂消磨於牢騷憤懣此余所信之於素者也君學殖深沈非世人所能窺測後遊一草不過偶爾緒餘使讀者知當時情事想見雄浩奇偉之氣欲以一臠蔽九鼎君且笑為不然矣君年六十有八精神益壯將之楚遊以辛亥九秋晤余於循陽客署促膝連床者三日數年來一大快也索君詩文開余茅塞為書數語于巻末明年此日又將讀君楚遊草君其教我勿吝鹿洲初集巻十六
