body:
  text: 鹿洲初集巻十三廣州府知府藍鼎元撰說江濆野人說海豐君既以不合時宜為當途所嫉於是當途號為異端或名之曰怪物君曰異端非聖人之道疑與二氏混迹怪物何傷乎遂篆其章曰怪物鹿洲山人聞而笑之曰咄怪物不可以為號請為君更號曰江濆君曰何謂也曰隠之也文之也而不見昌黎書大江之濆有怪物乎業已負其異於衆安能與常鱗凡介為匹儔則亦任世人之怪與不怪耳我固不必以見怪易操亦可不必以居怪自炫青波泥淖則存乎天矣仰首鳴號早知君不屑為也君家天長距大江為近人以地名亦固其所且濆為大防江流滔滔或虞泛溢所賴以砥狂瀾奠井疆蒼生無魚鼈之患厥功偉焉嶺外蠻江隨波曳泥已成風尚獨君以一怪挽回頽靡立世道人心之防使吏治由之潔清丈夫胥存氣骨障百川而東之功豈在禹下哉君曰以若所云則吾豈敢顧余山野之性家近江濆即謂江濆野人也可鹿洲曰此夫子從先進意也善夫作江濆野人說王用九字說江濆先生有令子曰錫疇請鹿洲山人字之山人曰諾先生曰疇年十一通五經自幼桀驁客不衣冠者命之揖弗能也山人曰然是又欲存氣骨者弓而箕冶而裘各有所肖君之子也而桀驁固其宜先生曰為我誨之即名或未佳併改之山人曰佳哉吾聞諸箕子天錫九疇彝倫攸叙疇之功用大矣彝倫為天地經緯邦家理亂氣運盛衰所分在叙與斁耳錫則叙不錫則斁此名所為佳也雖然疇有九自五行而下皆以一用貫之字錫疇曰用九可乎道存於天壤不用則虚而無寄治心修身經世理物皆有至當不易之宜踐而履之為德行措而施之為事業墨守訓詁茫然不知所位置無用之儒也有體無用不可以言學有疇不用不可以言錫惟用九之勉之矣抑用九之義又取諸易亢龍有悔天德不可為首也用九既年少有竒才恐挾持過甚賢智先人或不能免是在涵養渾厚以學問陶淑其性情無使稜稜圭角觝攖人世之諱忌斯乾元用九之意乎余與乃翁皆以剛直取禍氣骨二字可為前車然欲使子韋脂求容奄然媚世又非君子之道為宇宙立綱常為名教存柱礎在乎子之善用之也於書而求彝倫之叙於易而識悔吝之幾吾所望於用九者蓋有深焉先生曰善夫請書之以為錫疇勗山人曰可涂守謙名字說黃子向自梁麓來為予言盤陀涂子交相善也其為人沈厚好學倜儻有大志將來所就殆弗可量予曰然吾邑内外山村海角人物鬱蒸忠孝節廉理學經濟文章之彥所在多有獨梁麓西偏無象盤陀二十里許自唐宋迄今少槩見焉山川之湮鬱既久靈秀日開固當有人出也頃之子向介涂子於予予得交甚喜出自意外涂子原名邁倫以童試不利更名學詩又不利屬子向請予更之予曰名者父母所命不可更也邁倫善哉丈夫生當世上不可無出類拔萃之思吾立心制行事事求為聖賢則聖賢為豪傑則豪傑馳心於聲色汨沒於勢利卑陋齷齪俛首蓬高自安於愚不肖則愚不肖而已矣志所存則氣赴之故學莫先於立志立志既高發奮自易振拔流俗超邁羣倫在一鄉高乎一鄉在一國高乎一國固其所也最愛一武人語云我輩即為人奴亦應作羣奴長此言雖粗可以喻精學者常存此等意趣砥礪激昂隨在皆可出人頭地予願涂子顧名思義仍名邁倫無疑也是時邑大尹汪公月課多士遂以涂邁倫冠童子軍予戲謂子向曰涂子今果邁倫矣曩之不利於試者固知名不任咎也子向復請為涂子字予固謝不敏既而曰涂子既名邁倫則有不可一世之槩懼其尊已傲物也道在守之以謙易曰謙尊而光卑而不可踰毎見世人小有才華輒驕盈夸誕陵尊長侮朋儕無論輕薄淺陋非有成之器即其面目可憎不啻拒人千里外此學者之大患也故立志必以聖賢豪傑自期而待人接物常凜乎有匹夫勝予之懼所謂位置愈高而檢身若不及謙謙君子真能出人頭地者乎欲為邁倫字莫如守謙宜子向以為然屬予筆之予既喜子向之能擇交又自幸得交涂子知涂子之立志矯然不隨流俗波靡將為盤陀山川開湮鬱焉故樂為之說抑予聞涂子大父江伯公為吾邑名薦紳尊人長源先生烟霞高寄而好善樂道庭訓有方涂子當以信友者順親以繩祖武者養父志庶幾無愧乃翁命名之義予與子向亦有榮施焉涂子勗哉程子篤字說乙巳中秋余在太學助教程枳軒先生語余曰小孫名傳曾應童子試矣其為我賜之字且書數言勗之余曰嘻善哉斯名也其㫖深其義大其望子以聖賢有振刷流俗之意乎聖門之道惟曾子獨得其傳越千數百年而河南程氏夫子慨然以興起斯文為己任今君也程其姓而以傳曾為名可不顧斯名而思厥義哉凡人之生皆可以造於聖賢卑靡小夫以科名富貴為止境聞言道而怪聞學聖賢而舌撟不能收若而人者余何暇與之言耶曾子之學誠篤而已聖門學者聰明才辯不為不多而傳其道者曾子此程子之言也程子又曰顔子黙識曾子篤實得聖人之道者二子也又曰欲當大任須是篤實蓋淺露輕浮非有成之器虚憍夸詐非大受之才余今字君曰子篤君無以余言為迂篤之字義訓厚而力君立心制行待人接物之間務皆從厚凡所當為之事必認真着力為之徹始徹終登其峯而造其極無使留餘憾焉則他日之學問文章經濟事業可預知其遠且大而為子篤孝為臣篤忠為兄弟篤友恭交遊篤信義遇民篤仁物篤愛實心實力無虚假而無間斷雖聖賢無以加矣夫忠孝信義仁民愛物皆道也造其極則為聖賢留其憾則為不肖𡨕然無覺悍然不顧則獸與禽學者不敢為聖賢必將自安不肖流于禽獸而後止嗚呼可不懼與余語君以聖賢之學或必以為迂且怪不知聖賢之道即在人倫日用之間夫何迂何怪之有而曾子所以為聖賢不過篤實二字學曾子曰我不能學篤實亦曰我不能乎自欺欺人飾名務外以奸巧為作用以刻薄為聰明近今學者之通病也夫惟賢哲不逐波流願子篤無負而公命名之意則吾說未必無小補云隂子儒字說酉春放廢待罪棉江鶴石老友自翠華千里專伻馳書慰唁且以其次孫延宗屬余字之余曰噫宗之義不一古之以宗聞者亦衆不知鶴石所取者何居也徒綿衍宗支為朝廷增户口此無能之士備人數耳謝超宗稱鳯毛則詞藻之末也范蔚宗有史才作後漢書至今不朽然亦不過文史之傳非吾所望於隂子五鹿充宗講經嶽嶽為漢名儒渠雖未聞聖人之道亦能學聖人之學者鶴石所以名孫不知或取諸此與否但宗之一字毎為異教所剽竊命名之義不可不清余觀晉室習尚虚浮猶稱賀循為世儒宗則宗必以儒為正而鶴石所望於乃孫之延之者意在斯乎雖然循不足道也晉安得有儒循亦未足以宗也先王之道具在六經坐而言起而行日用倫常終身由之而不盡讀書不講求實學當躬踐履汨沒于清談誕放與沾沾八股制義科名得失之間其荒陋不甚相逺也公然命之曰儒可乎儒者之學有體有用自身心性命之地推而行諸家國天下而準可久可大可以紹往聖藏名山而開來學如此之人乃足當儒宗而不愧余願宗之為君子儒也字延宗曰子儒宗其顧而思厥義焉正學昌明大儒輩出若宋之濂洛闗閩則宗孔孟元之許魯齋明之薛敬軒胡敬齋羅整菴則宗濂洛闗閩此皆君子儒也不宗程朱則為異學金谿姚江白沙之徒皆以陽儒隂墨見譏有道況彼浮屠邪說所謂五宗尤離經畔道不容於堯舜之世者余將火其書廬其居肯聴後生小子墜入其阱中而不悟耶學者宗濂洛闗閩則不為異端邪說所搖惑而孔孟之門牆可進余願子儒之識所依歸無負乃祖命名之意不知鶴石以余言為然否也族子曰仁字說曰仁字近哉求仁當自近始也孔子曰仁遠乎哉我欲仁斯仁至矣孟子曰仁人心也可知仁非外鑠當前求之即是世俗因聖門不輕許仁雖顔氏子亦僅三月不違遂疑仁為古今絶德高遠不可能之事無怪乎天下之不仁者多而一二不昧天良若景星鳯凰之不數見也夫仁之為道廣大悉備而切近精實造乎其極而安而純之雖大賢有所不能盡隨其所見而存而體之即中材亦擴充而不竭是何也無惻隠之心非人也人敢曰吾獨無惻隠之心乎孝弟即為仁之本人敢曰吾獨為不孝不弟乎近哉年少力強正當以仁為己任不可汨沒世情而甘自暴棄孩提知愛稍長知敬實用其力於事親從兄之間推之而忠君愛國推之而濟人利物滿腔舉惻隠之心而仁溥於天下矣顔淵問仁夫子告以克復仲弓問仁夫子告以敬恕克復敬恕不在外求皆近也莫近於視聴言動而非禮者勿之則為仁莫近於持已及物而如見如承不欲勿施則為仁天下無明知非禮而故犯之學者無立意驕慢而陵人之學者於此求之其庶乎抑夫子有言剛毅木訥近仁非剛不足以任道非毅不能以致遠非木則病於浮華非訥則流於誇誕近哉養成剛德遂兼四者此亦天生一近仁之質也近哉勗諸長兒雲錦字說長兒雲錦冠而字命之曰倬文中庸引詩言衣錦尚絅惡其文之著然則字錦者宜有取于絅于闇而余獨命之以文何哉蓋實有是錦之美於胸中則宜韜宜斂使無即於淺露而中未嘗有是美則又當濟之以所無守先聖博學於文之訓反求之六經陶淑乎禮樂而後有章美内含之具錦少不嗜書好走馬擊劍彎弓習礟以為樂余惡之長而從軍海外逐北獻俘浪擲居諸戎伍間歸始皇然自愧欲一肆力於學復奔走弗遑兼騖為詩歌喜古金石泛濫琴書玩物喪志於道茫未有得焉若又命之絅與闇是益其疎且陋也昔張橫渠好談兵范文正勸讀中庸卒成大儒兵武事也不可不以文藥之倬之義何居則取乎其大耳文之大者在天為日月星辰在地為山川草木而在人為綱常名教臣忠子孝兄友弟恭立身行己待人接物莫不燦然秩然有法有則所謂道之顯者謂之文非浮夸粉飾欺人媚世之謂也勝質之文不可為文風雲月露雕繪詞章之文詹詹渺小亦非吾所謂文也錦其歸而求之六經淑乎禮樂自日用飲食灑掃應對進退之地居敬以收放心讀書窮理以擴充其知識致力於修身齊家之要而講求乎經世理人有體有用之學篤實輝光日新月益斯可謂天下之至文矣華國者以此章身者以此倬雲漢而章天煌煌乎弗可量也雲錦勉乎哉次兒雲龍字說雲龍字虞颺或曰大皥軒轅雲龍紀官孔子之學於郯者可述也抑孔子稱老子猶龍而東漢荀氏有八龍管邴三人為一龍諸葛公為卧龍龍之可學者多矣而獨虞也耶曰居吾語汝上古之世荒邈難稽儒者讀書尚論斷自唐虞始老子猶龍之說不見於經未敢信且釋老異學將擯斥之不遑豈可復求其祖而師之荀氏諸子雖有八龍之稱予觀其學問人品未有衷於道者東京習尚好相標榜君子不貴也管邴三人為一龍而華歆狗彘厠其間則名士風流掃地矣南陽卧龍乃真名士迄今讀澹泊明志寧静致遠數言猶將中夜以興再拜而私淑之但其遭時匪盛𢎞濟艱難則非堯舜之民所願比擬者也今天子神聖遠紹勳華百僚師師嫓休皋益當兹草茅誦讀惟䕫龍足慕耳我思龍之際虞賡颺盛美為帝喉舌遭逢之盛千載無比雲龍幸生聖世得為堯舜之民不學斯人愚之下矣夷考龍生平事史册不多見意其人必善自韜斂不矜才不好名類乎斷斷無技者堯舜所用之人既非無才者比況乎秩宗之讓優於禮樂又為同列所共推則其沈深厚重之槩可師也讒說殄行震驚朕師此何如之重任則其剛方正直之氣足以鎮壓奸回之邪心又可師也納言之命曰夙夜出納朕命惟允夫允信也即誠也龍之必誠必信不在出納帝命之日而在平居伏處之時學者有志賡颺為䕫龍之接武其必自立誠始乎誠存則日用動静之間一言一行無有不實而浮華標榜之弊不覺自消異端曲學不足以搖惑心志居敬弗怠涵養日深讀書窮理知識日明講求有體有用之實學無使賡颺虚處士之聲則所以為盛世䕫龍者在此矣無媿虞颺之字惟雲龍之勉之不然而德之不修學之不講悠悠忽忽坐廢居諸將學龍不成不為虞之颺蚓竅蠅聲貽羞大雅猶畫虎不成而類狗也可不懼哉三兒雲翔字說字雲翔曰仞千取鳳皇翔於千仞之義也世途險阻矰繳孔多非特枳棘不可以悞棲安知梧桐之下不有挾彈攝丸之之子自古及今殊尤見嫉雖上聖大賢且不能免況末學之戔戔者乎惟有高飛遠舉足以全身遠害君子於是有知幾之學而余方自悔其前此之昧之也三子雲翔質最魯才最庸無足為時所妬嫉賦性高搴有入山惟恐不深入林惟恐不密之意向固非余心所喜者公忠獲戾後始器此子之不汲汲於榮名與世人無争患也將遂使高蹈烟霞勤四體分五榖鑿山為田堰澗為池嘯歌自得於清泉白石之間與巢父被衣相上下庶幾古人所謂名可聞而身不可近德可仰而形不可覩者鳳皇于飛凌霄絶漢雖有矰繳將安所施可為翔也信之矣虎豹在深山人人聞聲而惴恐以之遊五都之市則販夫孺子皆持瓦礫而逐之是以麟出大野足折鉏商龍入魚羣豫且見困英雄失路今古同悲孰與夫鳳兮鳳兮獨往獨來於千仞之上併梧桐亦不棲竹實亦不食確乎有以自全不致貽德衰之誚哉閱歴日深識見日益倘樊籠之可脫即奮飛以為期余將振翮入山求所謂千仞者而居之自耕隴上而妻子耘於前則翔也為克家之肖云四兒雲翼字說莊生言大鵬不知幾千里其翼若埀天之雲嘻大矣凡物不徒貴其大以大而有用者為貴翼而飛則有用之用也大展其能於青漢之間依日月躡風霆數千里山川民物皆在肘腋覆庇下其為用也大矣四兒雲翼自孩提即高自位置稍長顧其名詡詡然自以為大也余欲其勉為有用字之曰展青青者何霄漢間氣象也與溟海迥别則位置獨高展之為義有積厚發𢎞之意焉志立而氣赴神動而天隨非胸中大有藴蓄腕下大有設施者詎足以與於此顧余聞儒生常談有長莫展迨當可展之時履得展之地靡不臨局倉皇薾然沮喪是何也抱負無多鼯技易窮舉之莫能勝也行之莫能至也此亦如鷽鳩決起展在榆枋烏足與言青青之上展運大翼者哉其平居不動聲色匪潛匪伏養融思奮幸際天清日朗鼔壯氣以騰霄直上九萬里橫飛九萬里東西南朔皆我適意之地天下共仰展布之非常莫能測其精神力量之所届斯鵬之為大所以異於凡鳥而君子之善其用者亦若是焉則已矣立體以致用積厚而發𢎞雲翼勉乎哉五兒雲鶚字說北海有言鷙鳥累百不如一鶚以鶚性方嚴好搏擊為羣鳥所畏又鷙而有别立不妄動古人以比御史大夫立朝凜凜風裁焉余獨喜其善峙有卓然自立強毅不移之槩可為後生小子求道入德之方字雲鶚曰立甫取此意也吾夫子十五志學至三十而後立又曰可與共學未可與適道可與適道未可與立若是乎立之難也蓋篤志固執不為事物所搖非知之明而守之定其孰能與於此故學莫先於立志以聖賢為必可為不以游移委靡蹈庸愚不肖之轍以千駟弗視萬鍾弗屑為立品真實無妄忠信不欺為立誠卑汚茍且私偽牽引之譏吾知免夫自古及今未有悠悠忽忽而克有成者能立則日進高明以幾聖賢非難事不能立則日淪頽靡至違禽獸無幾希於戲可不懼哉抑立之為義兼有樹立之意焉道德功業可傳於世者是也世風日下士子以科名為樹立茫不知聖賢事業為何等居官以尊顯為樹立杳不識堯舜君民為何事皆未聞道之故也天下王侯將相當時則榮沒則已焉烏可以言樹立若叔孫氏所謂立德立功立言斯可傳之千秋百世而不朽者乎是以君子不論窮達常志在此三者出則立功處則立言立德無間於出處立言亦功在萬世有一於此足以屹立千仞為世道人心之柱石況其兼修而並致豈不為聖人之徒歟鶚其夙夜黽勉克思所以立哉六兒雲燦字說今上聖德光昭卿雲叠見郁郁紛紛蟠成異采緬想虞廷爛縵百工相和而歌光華復旦亘古獨盛自非堯舜之民何能身親見之今兹所覩乃與符合幸得瞻被祥輝分映麗藻於光天化日之下可謂千載一時燦之生也會逢其適則亦今之堯舜之民也字雲燦曰舜民燦其顧思厥義無輕視此民乎均是民而獨為堯舜之民則必立心制行無背勳華風動時雍先為表率有一事一言不可以對堯舜則非矣顧民之等不一燦當勉為其上者天之生此民也有後知後覺則有天民之先覺君子以其身全盡天理為天之民則當思上天所以生民生我之意是故得時而駕則能致其君為堯舜之君使其民為堯舜之民即所遇或窮而躬耕畎畝亦能抱堯舜之道樂堯舜之樂而非道非義之一介不輕取與千駟萬鍾弗屑顧視養其志以有為而後可以當天下之大任而不懼孟子所謂達可行於天下而後行之者此民也孔子所謂隠居以求其志行義以達其道者亦此民也其次則不能自立待上之鼓舞教化而後興凡民也雖不可語於豪傑之士亦庶幾不自暴棄者又其次則不識不知耕田而食鑿井而飲併帝力而亦忘之蚩蚩噩噩之民余不能為燦也數矣若言非禮義而行渉浮華立志不敢以聖賢自期舉動偏欲與庸衆為伍此則聖世之苖頑其違禽獸也不遠舜不願以之為民也燦也思無愧舜民之字當先思堯舜所望于民之心為臣則忠為子則孝為夫婦敦禮法兄弟篤友恭知交全信義立心制行事事可以對勳華之主協風動時雍之化併以其身為四民之首而躬行表率不遺餘力使百姓親五品遜今之堯舜從欲以治亦曰此國家之天民矣夔龍元愷固堯舜之民也伊萊望散亦堯舜之民也惟其道在焉而已雲燦勗諸從子雲樞字說雲樞字德辰樞本北斗第一星為政以德者如之字此何居欲小子之據於德耳志道據德學者所同孔子曰德之不修學之不講聞義不能徙不善不能改是吾憂也人有生即有德五常百行聖凡皆所當修豈必論為政與不為政哉出諸於身謂之德加諸於民謂之政獨善其身兼善天下有逺近而無大小惟在學以修之而已講學以修德則道明聞義能徙不善能改則德立司馬溫公自言去惡從善若轉户樞似為汝小子砭也抑大易云言行君子之樞機樞機之發榮辱之主也汝曹謹言慎行無使有累厥德寡尤寡悔禄在其中於從政乎何有秉鈞軸佐太平固為政也一官一邑亦政也政行而人嚮慕之窮居修德而不孤有鄰皆北辰星共之義也小子勗哉從子雲路字說雲路字汝由孟子曰夫義路也惟君子能由是路又曰舍其路而弗由哀哉以是知義為天下古今所當行之理在由之為貴耳世人弗由路而由徑舍光明正大之周行而趨邪暗屈曲之蹊間或枉尋直尺茍且以倖功名或汨沒異端以索隠行怪為學問吾不願汝由之也又有不由徑而由竇阿權勢􅆺要津以患得患失之心希一階半級之榮昏夜乞哀驕人白日栩栩然竇中之智未必不笑竇外之愚吾不願汝由之也君子以仁為宅以禮為門而以義為路坦坦康莊如砥如矢何羡他人之徑與竇為耶澹臺滅明行不由徑高子臯避難而行不徑不竇彼謹小以慎微懼毫釐以千里是故畢生無邪曲之累循途漸進幾造聖賢之域後生小子安可不則傚之且古未有行不由路者馮河超海立見滅頂之凶適燕而南其轅勢將愈求而愈遠惟君子由所當由如規矩準繩之不可易由所不得不由如日用飲食之不可離是何也曰宜也宜在斯為義義在斯無不宜為臣宜忠為子宜孝皆義也皆人所當由之路也凡言不忠信凡行不篤敬皆自投荆棘陷阱之中無所往而可矣或曰雲路鵬程科名美事命字者宜有取於此吾獨以為不然讀書本期用世豈不願以科名望汝惟恐汝曹以科名自域視為登峰造極之品詣不復求進於聖賢之道耳科名得失有天者存即得之而不足齒於人數者多矣聖賢之道不以窮達加損得志與民由之不得志與千秋百世共由之斯天下之正路非區區功名富貴之途所得較遠近廣狹也汝由勉之從子雲鳯字說雲鳳字藹臣勗鳳也鳳棲梧桐食琅玕美矣棲與食世人知之而不飛不鳴則德有所不足也巻阿之詩曰鳳凰于飛翽翽其羽蓋有道來儀天下大安寧之象是以言之不已而重言之繼之曰藹藹王多吉士維君子使媚于天子又曰藹藹王多吉人維君子命媚于庶人媚愛也悅也非諂也藹吉良臣維上命使明良會合拔茅彚征之象也媚于天子則愛君媚于庶人則愛民竭忠藎以報國家賢者惟知有君民耳高岡一鳴朝陽菶萋車庶馬閑翹翹徵聘原非以榮臣子之身家將使茀禄康純嘏常泮奐優游千百年如一日也嗟乎世人但能務居棲美飲食耳既飽既安則斂翼緘口雖鞭䇿之不能動其巧焉者媚于權勢而已矣受重禄而弗知其君處高位而弗恤其民蟠結營私牢不可破此齷齪鄙夫之所為不可以士人目之䲭梟䲭梟傅虎而翼視兹藹藹勱相國家其臣品相去何如也鳳不喜詩書而好以武功自詡余故以藹吉進之仕途無用媚之區惟媚庶人以媚天子則可耳聴命使于私家附權奸之黨羽早知鳯不屑為也溫文爾雅使天下稱愛國愛民干城腹心之良士有功世道匪淺矣藹臣勗諸鹿洲初集巻十三
