body:
  text: 鹿洲初集巻十一廣州府知府藍鼎元撰論叔孫通起朝儀徵魯兩生不至論事有各行其是者君子不必執一端以相律譬諸音聲趙人鼓瑟秦人彈筝因時地之所尚皆足快一時之耳目不相妨也亦不必相非余觀叔孫通起朝儀而東魯兩生矯然塵埃之外後之論者紛紛莫決夫漢高殘刻嫚儒非能興禮樂之主叔孫通阿世取寵非能興禮樂之臣兩生拒之誠是也然天下初定君臣草創諸將飲酒争功至於妄呼抜劍擊柱不有禮法以繩之恐有天下不能一朝居通之功亦未可少者矣蓋通所定者朝儀也生所論者禮樂也禮樂必百年而後興儀節不妨量能以救世各行其是又何責焉嗚呼禮樂之為用大也通竊其似猶足收功一時若使朝廷之上聖賢相遭興先王之禮樂其為效更當何如也先儒或責通以訪求遺老講明三代是又待通太過矣漢以周昌為趙相趙堯為御史大夫論漢高帝既不果易太子憂趙王不終乃用趙堯策為置貴强相以御史大夫昌相趙而拜堯御史大夫嗚呼帝之愚甚矣堯畫是策非為趙王母子計也為御史大夫計也呂后殘忍險毒戚姬奪其寵又幾危太子位勢不兩立久矣豈一貴强國相所能鎮壓者且相雖貴强臣也趙王亦臣也呂后太子則君也君欲誅臣誰得而止之昌且不保何救於趙哉帝不能慎之於始善處嫡庶之間及其殺機已成又無保全之術憂心慆慆作兒女態卒使趙王不終以成人彘之禍天下後世謂帝以英武定乾坤而不能制一婦是古今之大恥也若趙堯之貪位慕祿斯亦不足論矣韓持國服義論伊川言韓持國服義最不可得一日與泛舟潁昌西湖有上書謁韓求知已者伊川不悦云大資居位不求人乃使人倒來求已是甚道理范夷叟謂正叔過執求薦章常事也伊川曰不然必其曾有不求者不與來求者與之故致人如此持國便服由是事觀之此宋之所以南也三代以上席珍待聘多囂囂不肯輕就漢時猶有古風雖不類如公孫𢎞猶待強起乃就對是當時自媒干進者尚少而在上持衡亦未有不求則不與之見流及唐宋風遂邈耶求人於道左塵雝受人之求於廣衆遊觀之地亷恥道喪全不知惻隐羞惡為何物時事尚可言哉潁昌西湖直同東郭墦間則公朝私室應接不暇可知韓維范純禮如此舉國習尚可知伊川正論僅能使持國一服則風氣不可挽回又可知也昔者所進昏夜乞哀今者所進白日路旁徽欽之禍已兆於此豈待明者而後見之髙宗南渡猶存奄奄一息則一二正論如伊川者有以延之也嗚呼賢才為國家之寳以鷹犬奴𨽻之愛待之將遯世以養髙況令其卑躬屈節啓口以求一薦達是不肖鄙夫之所為而謂賢者為之乎自媒求嫁安有貞女君子雖吐握需人不汲引卑汚求薦之士此非可與肉食者言也貴州全省總論臣按黔省本西南荒徼入中國版圖最後古以蠻夷目之然鬼方懐服于殷宗髳微聴誓于牧野固已沾三代聲教矣後王失馭廢為狉獉莊蹻畧地如同過客夜郎之知漢大則自武帝始也東漢末牂牁尹珍自以生于荒裔未知文學從汝南許慎授經還里教授傅寳尹貢之徒並有名徳號南州人士而周公仲尼之道亦漸漸及之矣後帝建興間丞相諸葛亮南征蠻酋濟火刋山通道聚糧以應王師功成表為羅甸王是出谷遷喬識漢家得統之正賢於鄴下江東昧義而扶漢賊者逺也山川之靈秀將開惜晉宋隋唐以下莫有起而振之朝貢時通因革時頻亦視為蠻苖羅鬼偶爾羈縻而已趙宋中葉始名貴州然分𨽻楚蜀而政教無聞元時稍擴而大至明永樂間設貴州布政司始自為一省亦未立學校興教化宣徳中始命合雲南鄉試嘉靖十四年始開科本省有成進士讀書中秘者孝義節烈亦遂羣然以興人文風氣駸駸欲上然地多蠻獠居民鮮少魋結侏􅍣半不通語言文字盤踞深山密箐中累累作孽蓋自建省以來終明之世蠻夷土賊叛者三十有三中間圍省城陷府州縣衛者十有四殺巡撫藩臬道府州縣總兵㕘將指揮都司守備等官先後百有餘員小者隨時撲滅或一年半年即平大者三五年或十數年如米魯不過一蠻婦六年乃平金石蠻石承寵卧龍蠻王阿倫或十年或六年乃平銅苗鎮苖陷思州石阡十餘年乃平播酋楊應龍抗王師六七年合川湖貴之兵乃平安邦彦水西餘孽圍省城一載合湖貴援兵僅得解圍曾不旋踵而六廣内莊全軍覆没巡撫總兵膏塗原野披猖至七八年傾五省之甲乃克平之又五六年而餘黨始盡凡皆連嵗兵戈瘡痍未起鳴鏑又至二百年間曾無生聚休養教訓之日安望其人文物采與上國絜短長也明社屋流賊横丁亥戊子年間偽秦孫可望陷遵義入貴陽屠貴陽城屠定番安莊安南普定諸城而人烟絶數百里哀鴻甫集王祥皮熊搆釁相攻復圍貴陽孫可望復自滇中遣黨白文選襲入貴陽李定國繼至蹂躪抄掠居民相率投夷反以苗峒為安身之所哀此十餘年間生靈塗炭極矣順治十五年我世祖章皇帝命宗室大臣帥師臨黔羣盜風捲居民始見天日俄㑹師取雲南明年勦馮天裕又明年征焉乃康熈三年平水西版圖式廓流寇叛夷以次殱滅然郎岱黎平烏撒田心定番廣順都勻諸苖蠻猶相繼伏莽頻血天戈而逆藩吳三桂舉兵反復陷貴陽天不容逆殛死衡州孽孫世璠尚據貴陽黔民在湯火之中幸聖祖仁皇帝廟算神威迅速誅鋤康熈二十年以後宇宙肅清恩膏屢沛黔省民夷始知太平之樂於今四十餘載負耒横經嬉遊含鼓其民庶朴陋有古風士大夫亦質直而知亷節至於苗蠻婦女間有貞烈可不謂過化存神速於置郵而傳命乎乃當今仕宦尚以黔為畏途謂其山髙地僻土瘠以荒民貧以鄙無文獻之足觀有異類之難馴夫湮鬱之開在人不在地轉移風氣在官不在民苟實心經理行力農務本之政磽确可化為膏腴曠土荆榛悉令墾闢寛其成賦課其惰勤鑿山疏泉堰澗谷為水利崇原廣阜可灌而耕樹藝畜牧竹木果蓏牛羊雞豚之利可貨可飽不出十年其民大富教之以孝弟忠信急公奉法寓軍政於保甲之中聨絡鄉村守望相助飭營伍勤訓練生苗他盜莫敢相侵則弱可强作興學校多置書籍明聖賢之道以道之以蘇湖安定之規育經義治事之才薾陋文風日振日上而苗蠻亦薰以絃誦漸為衣冠文物之人民生苗亦樹之風聲將為户口貢賦之黎庶山川險阻乃足壯國家籓籬夫何嫌於鄙僻哉吳越之初皆為蠻夷而至於今乃能若彼地固不能限人豈於黔而獨限望官斯土生斯土者共勉之貴陽府總論臣按貴陽一府為全黔腹心重地東西與平越安順輔車相依南北無齒唇之邦粤西巴蜀杖㦸可撞從來省㑹未有若斯單薄者也内則蠻獠雜處卉服鳥言毒矢標鎗喜則人而怒則獸七州縣無處無之民居寥落户口田賦不及中原一中邑然阨塞要害有所必争厯代以來頻勞師旅非無故矣蓋黔於滇為咽喉貴陽於黔為腹心無黔則無滇斯貴陽重也貴陽本牂牁蠻徼漢武帝通夜郎置郡其後蠻叛相尋戎馬蹂躪無已至明之末又特甚焉水西偽秦屠戮最酷幸我聖朝洗滌甲兵起殘黎而噢咻之休養生息以有今日嗸嗸安宅雖其子孫未敢忘帝力於何有也生齒日蕃人物日興富而教之非官斯土者之責歟理苗之道無他謬巧綏以恩使不忍暌峻其法使不敢犯安生樂業於函蓋之中無抄盜殺掠焉足矣禮教之漸摩徐以俟之潮州建置沿革總論潮在嶺東山海雄郡也屬縣十有一不亦多乎所不得不多者因地制宜有臂指相聨脈絡相通之道如人之肌膚筋骸血氣有一之不周非所以為安也諸邑居重馭輕無庸更易獨惠潮交界之間竊有欲㕘末議者其山廣綿不亞五指澗谷礦徒有逾黎峒自東北而南則普寧至海豐相去三百里自東而西則潮陽至龍川穿山四五百里自東南而西北則惠來至長樂穿山三百餘里自北而西南則程鄉至永安穿山五六百里介此八縣之中深箐廣阜川原大谷外人足跡之所不至禮教信義法令刑威之所不及奸宄大於夜郎礦徒横於豺虎潛滋暗長可為隐憂而揭屬河婆實當其吭雖處萬山四通八達南界與海豐犬牙相錯地闢民聚可以設施宜割左右山塲併海豐一二都附益之建立一縣重以兵防為八邑山中鎮壓闗鍵庶農民畬户知所向方而奸宄礦徒皆化良善似當一為籌畫者近議於海豐東海窖添設一縣最為長策但止為海豐地廣起見控御海濱未為山中謀也即東海窖添設新縣距河婆尚二三百里可遂云周密乎普寧一邑距揭陽太近東去潮陽一百二十里而出城十里之洞仙陳洞二徑已為潮陽界矣西至揭陽棉湖寨南至潮陽大壩墟皆僅止十五里從來邑治單薄未有若斯左右肘腋皆屬他人雖有龔黄豈能越境而治哉稽潮陽縣志謂惠來千秋鎮水遶山盤宜改置普寧縣於此而普寧士民又以潮陽之􅚉水貴山二都為卧榻患請割入屬由前之説似覺安土重遷由後之説已為據情申達俟院司上憲斟酌其宜可也潮屬城池總論城郭溝池以為籓衛者也不必中規矩貴乎扼險而可守管子言之矣郡城扼要在湖山置之城外苟為捷足先得兹城豈可守哉築陴固壘其上亦庶幾知道者東北跨金山據江為濠險莫京焉西南平曠自古戰塲司築鑿者至此能不加之慎重乎潮陽澄海横迫大江人民繁庶城郭規模尚須恢而大之惠來要地濠隍淺狹勢亦乾焦顧安得深池百步如揭陽之雄壯哉普寧雖腹裏却當孔道内外溝池急宜疏深而城亦太狹合東安崑安附益焉可也程鄉為北路要衝斗大之城殊不相稱饒大平鎮皆處萬山為江閩阨塞南澚海門黄岡大城達濠靖海均作海邦鎖鑰城池之固亦有心者所亟籌畫乎修之以時則力省而費不奢備之以豫則本固而邦以寧諸君子撫有提封幸於斯懋哉懋哉兵事志總論潮自建邦啓土以來用兵者百數矣賊在山者十之七在海者十之三而海之為禍較烈焉倭黨入冦與明代相終始而嘉靖萬歴之間沿海生靈頻遭塗炭竟似島夷窟宅全在此邦哀哉明之為治也其他海冦不可枚舉許朝光吳平曾一本劉香等皆有名劇賊而鄭氏芝龍父子祖孫一門相繼播虐海上潮疆慘毒殆不可言舊志目擊心傷痛定思痛所以有山魈易撲海寇難靖之悲乎然自唐將軍陳元光宋少保岳飛提舉楊萬里皆為山冦而來而有明伏莽尤甚憲孝兩朝屢下赦撫之詔世宗以後雈苻四起張璉一賊害及江閩至傾三省之甲乃克平之么麽五總鄰省震動在山者亦豈易易哉聖朝徳威赫濯千古百十年負固之賊剪滅廓清九夷八蠻匍匐入貢不論山魈海孽俱歸無何有之鄉陬澨敉寧烽煙永息孰難孰易斯亦不足辯矣雖然兵可百年不用不可一日而不備山海均當預防不闗乎有無魈孽知斯説者其於道蓋庶幾云人物志總論右所載潮郡人物若干人皆一鄉一國之善士也雖豐功偉烈卓絶寰區希聖希賢力扶道統者尚猶有待而敦節礪行足樹倫物之坊表文章科名潛修自好之士村村傑出濟濟衆多蓋亦不勝枚舉矣擇其尤著登之方策將百禩以為傳信寧敢虚詞溢美使人嘆左氏之浮夸乎夫求木於蔬圃拱把猶將珍重取材於鄧林則必千尋喬幹足為國家棟梁而後入工師之選惟潮地人才之多是以余特奢其望已精而益求其精也倘余不割愛盡加收錄既為旁觀巨眼所揶揄亦恐潮中人士以鄉黨自好為極則而不以聖賢待其身余罪安所逭焉據實直書不為粉飾詎敢曰一字之褒足以為榮亦庶免於搢紳家譜之誚夫孝義志總論潮之孝義指不勝屈為即其尤著者書之山村海角之間事蹟湮没民無得而稱其名姓余惡乎紀諸所紀者皆可傳否予亦不得而知也但鄉評所推則肅然起敬若陳孟壯之不欺天日盧和之冒死急難尤古所稱君子人者乎介節忠心有功世道以此知聖化流行風俗盛美非偶然耳平逺里民林元卿者有至性父殁𦵏畢母以為出就外傅也卿攜一箬笠詣父墳日夜悲號露處達旦旬餘鄉人頗言狀母趨視之曰兒歸此間有虎甚可怖卿曰吾知有父耳何畏焉結草為廬以居哀毁不輟朔望還家省母省畢復往雍正七年邑令劉延泰造廬唁之明年鄉士大夫憐其孝為計其居已三十有六月矣於禮應畢共迎之以歸路人嘖嘖稱道之卿年甫十有八嵗少未便為立傅附書其事以俟他年採風見此日治化之隆云隐逸志總論孔子曰邦有道貧且賤焉恥也滄桑變易不事二姓則隐逸可佳識時將亂知大厦不支於一木亦欲潔其身者之所為若夫當明盛之朝而矯語髙蹈君子以為誰欺乎其才其徳果足為時所利賴豈有泉石重於蒼生獨貽君父以焦勞如秦人視越之肥瘠哉文無經邦之猷武無鞏苞之略顧安所得髙位而居之惟有托於隐逸而已矣雖然堂陛之上皋䕫布列草野之民熈皞成風自知厠名仕版如黑子著面何闗有無姑肥遯以養高君子亦無惡焉或不得志於有司安分守拙借山林􅔚寂自文固陋不為牢騷憤懣之所為則亦有足取者因其逸而逸之文之以美名曰隐也何不可流寓志總論右所載三十有八人潮之寓賢可謂盛矣濓溪紫陽先後並至吾道南來之日也龜齡角聲其事近怪曲江盤桓誠齋嘯咏東坡一代文人留詩鑱石皆足令百世下聞風興感況文山陸相鄒劉林陳杜蕭諸君子鄒㵯劉子俊林琦陳龍復杜滸蕭資陳榘俱從文天祥提師至潮先後殉節者間闗播越忠貞炳宇宙者乎對斯人而不興忠義之心吾敢以人類目之哉其他或以經濟顯或以忠孝傅或以亷節稱或以詩文著洋洋濟美有功世道足跡所屆草木留香將髙標其姓名以増十一邑山川之重夫惡可泯沒也士君子寧為良臣文陸諸公遭時不幸非堯舜之民所比擬乃所願則濓溪紫陽耳竊嘆楊龜山自洛還閩遂開百代閩學之盛大儒接踵直甲中原濓溪紫陽造詣已幾於將聖乃當日命駕至潮不聞潮中學者孰為周子高弟雖郭叔雲鄭南升受業朱子之門其學亦不傳於世豈惠照大顛之異説浸淫蟠結於人心而不可猝變抑停驂未久教澤未深靡有横經講學以隨其後者耶易曰麗澤兑君子以朋友講習孔子曰學之不講是吾憂也後人以講學為迂闊遂有避其名以浮沈於世俾後生少年懵然若夢之弗醒悲夫其賊夫人之子也使濓溪紫陽留斯講説一二載道南統緒不得専美於閩矣一時寓公為全潮正學之祖庶幾不負來遊之意尋常遊客不過以詩自鳴肯闗心風教誘人為善則當代之山海鳳麟也望君子之至於斯者勿虚遊寓一行皆有裨是邦風土民物焉漳浦蔡梁村世逺嘗於辛丑嵗至潮流寓澄海集蔡氏宗人講明正學潮士以為空谷足音從遊者甚衆今官少宗伯見任無立傳之例附書以志不忘俟他年載筆者採錄云古蹟志總論蹟以人傳固也舊志載王莽南海亭為古蹟之冠異哉南海亭不知在何所據云員水又東南一千五百里入南海東厯揭陽縣則南海亭之不在揭陽縣也明矣即使至今果存以亂賊晏遊之地猶將壊其屋汙其宫而瀦焉忍復張之為勝耶又潮僧大顛墓唐時被發舌根朽化未盡復瘞之宋至道中鄉人再發視則無矣此亦傳為古蹟何潮人之好為語怪也使舌至今尚在亦可以云怪物而自宋即已無有何蹟可言郊野山原之地荒墳纍纍骷髏豈皆悉化此而誇為美談將大長椎埋發塜之風使既寂僧徒不得安居窀穸誰實階之厲乎潮中勝蹟惟鄉校有昌黎教澤拙窩有濓溪遺意覽勝亭紫陽手書鐵漢樓元城勁節皆足令百世下聞風興起若太子樓北殿山千秋鎮和平墩聞雞亭則有宋君臣播遷顛越不勝感慨係之今舍鄉校聞雞亭弗書而張南海瘞舌之荒誕是輕大儒而重亂賊且視帝子之芳踪不如死僧之臭壤傷壊名教莫此為多不可不一較正者也其他古蹟備數而已遊山摩石題名傳後不以人而以官中離銘鐘竟同梵偈以其為好學之鄉先生尚不忍削去之然則人可不好學哉莽賊自比周公妄擬典謨訓誥曽不得與好學而未聞道者較一日短長㫖哉唐陽城之言曰凡學者所以學為忠與孝也忠孝所在寸土皆香自後人慕之則見為古蹟矣然則古蹟亦豈易言哉物産志總論世皆稱嶺南多珍異土物之産甲於中州非潮也潮所有者鹽絺海錯布帛菽粟尋常服食器用之需而已黠民覷山礦竊取土砂懼啓釁端久經厲禁銀銅鉛錫之類遐哉尠矣程繭鳳葛潮􅂒潮紗初何嘗有甚佳美空負重名奔走逺近求之者若天降地出貿之者如大貝南金貨之者聲價日高品質日下非官斯土者之所樂聞也其他常産皆益生民樹藝畜牧可以致富成家生之者衆為之者疾猗頓陶朱在乎人之自取之加以司牧留意為民間撙節愛養則熈熈攘攘者用之不竭耳前輩云地方産一異物則為地方之害竒技滛巧不如勿産之為佳信夫潮州雜記總論雜記雖志乘緒餘亦不可専務索隐致傷名教交趾道士仙花嶂叟雖荒誕不經未至壊人心術若舊志載梅州異僧為定光佛化身庇䕶宋貺事深可駭焉宋貺為秦檜用人以鷹犬而致大位檜敗被劾安置梅州遇聰明正直之神將痛心疾首為天下誅殛之恐後何勞老佛化身不逺二三千里指示前程許隂助於數十年之先則何不教以勿附奸邪併此隂助而省之為奸伏辟乃天道王法之常豈可以建庵慈報終為庇䕶俾復顯官享遐齡佛之乖謬竟一至此極乎李綱廢棄趙鼎放逐宗澤沾襟岳飛被害佛何不助之庇之豈尚不知有忠良邪佞之别耶何所見而黨惡何所因而佑賊使後世奸諂小人安心病國恃有佛而無所顧忌所闗於世道人心匪細也又載巫師張法星以葦席作舟載米榖一日為三山國王召風覆之巫師怒與神鬬聞妻哭不能歸令以鐵嵌棺首置廟前潭水漲棺浮擊壊其牆三山神乃讓居座左鄉人肖像合祀之不知誰為好怪造此齊諧曽是堂堂民牧亦篤信而筆之於書耶譬民間載米穀出海司牧治之其民不服徑至堂上與牧鬬牧亦將讓居座左與之偕尊一堂乎好勇鬭狠可以並神何怪平民之操戈動衆相争相奪所闗乎世道人心又匪細也其無傷名教之事雖隠怪纎微足資談笑即膽怯無能如吳大理之類亦皆臚存弗削焉若劉元城之節槩鍾元濬之自表莊淑禮胡世和之勤事陳添桂之舍生全主皆忠誠轟發宇宙間足為名教干城者鄉厲誓文可化風俗周妻雷震可懲不孝大書特書何所庸疑議哉讀是編者勿徒以遊戯視之留智廟紀聞論潮州舊志云梁猶龍庚戍計偕行徳州道上宿留智廟旅店自言夜夢傳呼玊㫖召星君四人導行至廟見宫闕巍然四人者入止猶龍待命食頃乃出云玉㫖敬勞星君真靈不昧一生正大光明多行好事端的不負科名猶龍遜謝稽首四人相顧指㸃有若語此間是星君坐次者有若語星君姑了科名事業者既魁南宫第十人悟前身事歸為兄弟述之未幾卒後其甥入都門兄應龍囑其詳訪癸丑秋還報廟始自前朝展敬岱宗中使以神光示現請建中尊冠帔如帝后即東嶽碧霞元君旁列散聖第一位丰采鬚眉忧似猶龍云海陽縣志不載其甥入都徃訪事云弟夢劍公車徃廟瞻拜訪廟始自前朝展敬岱宗中使以神光示現請建東嶽散聖等語俱與府志所載其甥之言一字不差但夢劍有題壁詩云崔巍廟宇夕陽中路絶天人忽此通十八星霜姜被冷七千闗塞鶴魂空羨兄朝闕雲霄樂媿我遭家鼠雀攻君父深恩俱未報可能安坐玊清宫題畢覺其神顔赭若汗云偶然夢寐何足憑信況其荒誕不經如女巫見鬼釋子之説投胎轉世俚鄙可嗤至此極矣神道雖泥塑木雕不能離人之形以為形耳目口鼻鬚眉顔面偶與相肖何處無之因其肖已而遂以神自居疑為轉世疑斯夢夢愈疑此常人之情也勿論轉世之事幻妄無稽借曰有之生為正人沒為明神神復為人亦理之常有何可異人顧樹立何如耳豈必以神之轉世為榮而玊㫖星君數語又甚醜而寡趣言之者不以為羞聴之者直神其事吁可以知風俗已昔人大書志乘今宜削去恐夢夢者仍然莫覺其非反以為掩前人之美而乃弟夢劍詩詞有君父深恩俱未報可能安坐玊清宫二語稍為近正是以姑存弗削耳考梁猶龍一生未嘗有所表見甫成進士即賦玊樓果係神靈降生不應歸去之速弗令樹立於世則又何因而來豈神之志願僅一進士足乎進士朝廷之名器既叨名器當報君恩奈何冒竊而逃焉鞠育顧復棄若敝屣不忠不孝之譏吾何以為兹神解耶潮俗尚鬼竟嘖嘖為美談亦司風化者之憂夫平臺紀略總論臺灣治亂之局迥出人情意計之外其地方數千里其民幾數百萬其守土之官則文有道有府有縣令大小佐貳雜職若干員武有總兵副將㕘將遊擊守備大小弁目若干員其額兵七千有竒糧儲器甲舟車足備又當國家全盛金甌靡缺而朱一貴以餵鴨小夫歘焉倡亂不旬日間全郡陷沒此豈智能所及料歟太平日久文恬武嬉兵有名而無人民逸居而無教官吏孳孳以為利藪沈湎樗蒱連宵達曙本實先撥賊未至而衆心已離雖欲不敗弗可得已然鹿耳鯤身夙稱天險鄭氏一踞其間遂厯三世國家圖之數十年費錢糧幾百千萬而後能收之今不動聲色七日恢復巨魁就擒孽從授首即使孫吳復生亦未敢望功成若斯之速也良由聖祖仁皇帝徳福齊天神威逺震將卒用命海若效靈是以摧陷廓清不勞而邊疆底定諭㫖遙頒白叟黄童無不感激流涕蓋至仁厚澤淪浹人心者深也諸臣或運籌帷幄出力疆塲克敵致果功在社稷欲以鼓勵將來收千秋百歳用人之效則不得以其為日無幾少之矣亂不久禍不深削平者之績不大此衰世之言也賞罰明則民易使今日之酬勲他年之龜鑑知此説者其知未雨綢繆之道乎臺灣海外天險較内地更不可緩而此日之臺灣較十年二十年以前又更不可緩前此臺灣止府治百餘里鳳山諸羅皆毒惡瘴地令其邑者尚不敢至今則南盡郎嬌北窮淡水雞籠以上千五百里人民趨若騖矣前此大山之麓人莫敢近以為野番嗜殺今則羣入深山雜耕番地雖殺不畏甚至傀儡内山臺灣山後蛤仔難崇爻卑南覔等社亦有漢人敢至其地與之貿易生聚日繁漸廓漸逺雖厲禁不能使止也地大民稠則綢繆不可不密今郡治有水陸兵五千餘人足供調遣鳳山南路一營以四五百里山海奥區民番錯雜之所下淡水郎嬌盜賊出沒之地而委之一營八百九十名之兵固已難矣諸羅地方千餘里淡水營守備僻處天末自八里岔以下尚八九百里下加冬笨港斗六門半線皆奸宄縱横之區沿海口㟁皆當防汛戍守近山一帶又有野番出沒以八九百里險阻叢雜之邊地而委之北路一營八百九十名之兵聚不足以及逺散不足以樹威此杞人所終夜思而不能寐者也臺民好為盜賊不因饑寒方慶削平又圖復起去嵗平臺大定之後尚有布散流言嘯聚巖谷復謀作亂者數次屢經撲滅嵗餘始殄而王忠一賊伏匿深山至我皇上即位乃克就縛可見地方廣大搜捕弗周雖平臺僅在七日而拔盡根株東擒西勦亦有兩載艱難欲為謀善後之策非添兵設官經營措置不可也以愚管見劃諸羅縣地而兩之於半線以上另設一縣管轄六百里雖錢糧無多而合之番餉嵗徵銀九千餘兩草萊一闢貢賦日増數年間巍然大邑也半線縣治設守備一營兵五百淡水八里岔設巡檢一員佐半線縣令之所不及羅漢門素為賊藪於内門設千總一員兵三百下淡水新園設守備一營兵五百郎嬌極南僻逺為逸盜竄伏之區亦設千總一員兵三百駐劄其地使千餘里幅員聲息相通又擇實心任事之員為臺民培元氣冦亂風災大兵大疫而後民之憔悴極矣然土沃而出産多但勿加之刻剝二三年可復其故惟化導整齊之均賦役平訟獄設義學興教化奬孝弟力田之彦行保甲民兵之法聴開墾以盡地力建城池以資守禦此亦尋常設施耳而以實心行實政自覺月異而嵗不同一年而民氣可静二年而疆圉可固三年而禮讓可興而生番化為熟番熟番化為人民而全臺不久安長治吾不信也顧或謂臺灣海外不宜闢地聚民是亦有説但今民人已數百萬不能盡驅回籍必當因其勢而利導約束之使歸善良則多多益善從來疆境既開有日闢無日蹙氣運使然即欲委而棄之必有從而取之如澎湖南澳皆為海外荒陬明初江夏侯周徳興皆嘗遷其民而墟其地其後皆為賊窠閩廣罷敝乃設兵戍守迄今皆為重鎮臺灣古無人知明中葉乃知之而島夷盜賊後先竊踞至為邊患比設郡縣遂成樂郊由此觀之可見有地不可無人經營疆理則為户口貢賦之區廢置空虚則為盜賊禍亂之所臺灣山髙土肥最利墾闢利之所在人所必趨不歸之民則歸之蕃歸之賊即使内賊不生野番不作又恐寇自外來將有日本荷蘭之患不可不早為綢繆者也閒居無事燕雀處堂一旦事來噬臍何及前轍未逺可不為寒心哉殉難諸臣雖功過不一然大節炳然足以増光宇宙褒其後而略其先崇奬義烈用慰忠魂亦因以為鑒可也粤中風聞臺灣事論連日風聞臺灣復有小警北路土番作孽南路客子竪旗同謀拒敵官兵此異事也南北路相去遙逺民番情性不相聨屬何以北路土番不軌而南路客子即肯竪旗遙應或者起釁之處不在土番而在北路客子所以南路竪旗似因北路官兵討逆未先慰安無罪訛傳惶惑之所致也臺灣土番有生熟二種其深居内山未服教化者為生番皆以鹿皮蔽體耕山食芋弓矢鏢鎗是其所長但止能穿林飛箐暗射殺人不敢公然出至平地與官兵對敵且性畏砲火轟然一聲抱頭逺遁此生番之不足為慮也其雜居平地遵法服役者為熟番相安耕鑿與民無異惟長髪剪髪穿耳刺嘴服飾之類有不同耳雖矢鏢便利而各社言語不通里門之外視若秦越非有漢民指揮迫嚇其勢亦離而不合但除去莠民一振軍威則番害自息此熟番之不足為慮也廣東潮惠人民在臺種地傭工謂之客子所居庄曰客庄人衆不下數十萬皆無妻孥時聞强悍然其志在力田謀生不敢稍萌異念往年渡禁稍寛皆於嵗終賣穀還粤置産贍家春初又復之臺嵗以為常辛丑朱一貴作亂南路客子團結鄉壯奉大清皇帝萬嵗牌與賊拒戰䝉賜義民銀兩功加職銜墨瀋未乾豈肯自為叛亂愚意北路起釁必繫一二無知客子作奸拒捕自料法網難逃誑誘土蕃混擾分罪造出盡勦客子之謡言傳播煽惑使在臺客子畏死惶亂羣相響應是以南路無知有竪旗同謀之舉但當開誠布公慰諭無辜客民各安生業止戮罪首附和之人以儆將來其餘並免株連不必自懐疑畏竊計臺平以來方經十載瘡痍甫起既非作亂之日況當國威方盛武備正强皇上深仁厚澤淪浹人心極島遐荒感激愛戴雖在至愚不肖亦無忍為從叛之理不過二三莠民食飽福薄自尋死路此輩惟俟竿首藁街其他何能為哉今在臺文武各官出兵勦捕茍稍假以便宜勿拘牽丈義過為掣肘旬日之内自可立見撲平按法行誅一勞永逸不足煩當宁逺念也惟是海外巗疆五方雜處狼子野心賢愚參半似不可無善後之策曲突徙薪綢繆未雨亦盛平所不廢乎有留心經理前席願聞者請正冠肅容為之談笑而道之粤夷論粤東居夷非計也自明嘉靖間割澳門畀紅夷種類不一源源而至築城樓設砲臺蜂房蝟聚以長其子孫奄有斯土廣州香山郊闗之外遂為鬼國異域之區矣紅毛乃西島番總名其中有荷蘭佛蘭西大西洋小西洋英圭黎干絲蠟諸國皆兇狡異常到處窺覘圖謀人國如噶囉吧本巫來由地方緣與紅夷交易遂被佔踞為紅夷市舶之所呂宋亦巫來由分族緣國人習天主教遂被西洋佔奪為市舶之所今天主教盛行於中國湖廣河南江西福建廣西無處無之雍正元年浙閩總督滿保以西洋人行教惑衆大為地方之害請將各省天主堂改作書院義學各省西洋人俱送澳門俟有便船歸國廣東督撫市恩奏請夷人老病不願回者聴其在省天主堂居住不許招致本地男婦行教誦經違者治罪逐回功令煌煌曾幾何日今省城天主堂八處招集一萬餘人矣又有女天主堂亦八處招集二千餘人矣羞辱中國傷風敗化凡有人心罔不切齒此豈待教而後誅之乎萬里經商本為求財無故而輕數百千萬之銀錢買人歸附此其意欲何為哉今日萬人明日萬人不胥全省而買遍不止豈尚可掩耳閉目陽為不知而不問先民有言防微杜漸涓涓不息將為江河而況狂瀾四溢人心蕩漾在省郡者既實繁有徒在澳門者又居然天險内外交通銃砲非常脱有前此呂宋噶囉吧之謀不知何以待之今聖徳方盛威靈暨訖於遐荒自萬萬無所容其癡想然曲突徙薪亦有心者所宜熟籌也鹿洲初集巻十一
