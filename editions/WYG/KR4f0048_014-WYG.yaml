body:
  text: 鹿洲初集巻十四廣州府知府藍鼎元撰考經學考六經聖人經世之書也有天下國家身心性命之人皆不可一日廢者也為治而不本六經必流為􅆿名法術雜霸小補之治為學而不本六經必流為異端邪說支離固陋之學故自古今以來名為儒者無不以窮經為要然經有五有六有九有十三之稱何昉乎致堂胡氏曰孔孟之門經無五六之稱其後世分禮樂為六合為五歟余謂稱五經自漢武帝置五經博士始也稱六經則莊子天運篇已有之其始于戰國可知也漢儒變其說曰六藝董子所謂簡六藝以贍養之史遷所謂六藝於治一者皆經也禮樂何以可合言漢文帝時竇公獻樂書乃周官大宗伯之司樂章則固在周禮中也河間獻王與毛生等作樂記一篇其後又在禮記四十九篇之中是以或五或六任乎稱者之分合耳九經之名始于後漢至後唐明宗刻九經板印賣之自是始廣其傳十三經之名始于唐貞觀之世即今所傳之十三經無疑也說經之家漢儒為最至宋而指歸乃定易有連山有歸藏連山作于夏其亡已久隋劉炫偽造以獻被訟削籍歸藏作于殷漢初已亡晉時忽有之惟載卜筮鄭氏夾漈尊信之則好奇之過也周易文王周公孔子之書故其傳至千秋不廢漢時說易者分為三家一曰田何之易乃商瞿受於孔子六傳至何而大興何三傳至施讐孟喜梁丘賀由是有施孟梁丘之學一曰焦贛之易無師授自言得之隠者第述陰陽災異不類聖人之經京房習之别為京氏學一曰費直之易亦無師授始以彖象文言雜入卦中東京荀劉馬鄭皆傳其學康成註之王弼最後掃去象占之學弼註出而餘家皆廢然雜以異端之說啓魏晉𤣥虚之弊范甯謂其罪深于桀紂也唐孔穎達作正義以弼為本李鼎祚集觧排弼而宗康成其後郭京陸希聲胡瑗皇甫泌蘇軾等解易者不下百十家朱子謂秦漢以來攷象辭者泥于術數而不得其𢎞通簡易之法談義理者淪于空寂而不適乎仁義中正之歸因時立教以承三聖伊川先生易傳而已然世謂伊川之易精于義理而略于卜筮於是言象數者宗康節至朱子作本義啓䝉兼二家之說而易學始大備焉書有古文今文今文伏生所授數傳而至歐陽高謂之歐陽之學又有夏侯勝及勝子建為大小夏侯之學三家並行至東京而歐陽特盛古文得之孔壁中經孔安國編定以巫蠱事起不得列學宫至晉梅賾上之唐衞包合古今文為一而書始全然蔡九峯謂今文多艱澀古文反平易疑安國之序不類西京文字朱子亦疑之歐陽公日本刀歌有云徐福行時書未焚逸書百篇今尚存令嚴不許傳中國天下無人識古文疑此書今在日本國此亦近於好奇未可據為定論也陸德明孔穎達蘇子瞻等所作書註疏解不下數十家獨蔡九峯集傳折衷衆說就正朱子自明迄今皆用之漢初言詩者亦有四家魯人申公訓詁為魯詩齊人轅固生為齊詩燕人韓嬰為韓詩趙人毛萇獨云傳自子夏為毛詩先儒亦謂詩序子夏所作而毛氏衞敬仲又加潤色者鄭衆賈逵馬融並作毛詩傳鄭康成作毛詩牋何𦙍全緩又註之齊詩亡于漢末魯詩亡于西晉韓詩雖存無有傳者惟毛詩鄭牋獨立學宫朱子廢小序作集註後人雖遺議紛紛然終不可易也春秋漢初有公羊穀梁鄒氏夾氏四家並行至王莽之亂鄒夾俱亡獨公穀立于學宫左氏之書最晚出久乃大盛賈逵服䖍並為訓解至晉杜預又註之與公羊何休註穀梁范甯註俱立學宫自是三傳並行而諸儒多宗左氏獨朱子謂左氏考事頗精只是不知大義專去小處理會公穀考事甚疎然義理却精二人乃經生傳聞不曾見國史漢唐以來言春秋者大抵考傳而不知經至胡文定公作春秋傳按左氏之義取公穀之精採孟子以下莊周董仲舒王通邵堯夫二程橫渠之說以潤色之聖人筆削褒誅之旨至是大明雖中間亦不免有牽强處然議論正大今貢舉取士必宗之則亦無以易矣漢初未有儀禮之名始于高堂生十七篇朱子疑學者見其中有儀有禮遂合而名之嘗曰儀禮禮之根本又曰儀禮經也禮記傳也鄭康成作儀禮註黃慶李孟悊為疏唐賈公彥刪二疏而自為之然先儒多苦儀禮難讀張淳云如劉歆所言則高堂生所得獨為士禮今儀禮乃有天子諸侯大夫之禮疑非高堂生書但篇數偶同朱子謂淳不深攷劉說所訂之誤又不察所謂士禮者特略舉首篇以名之其曰推而致于天子蓋專指冠婚䘮祭而言若燕射朝聘則士豈有是禮而可推耶然則儀禮之為高堂生無疑也周禮一書起于漢武帝時河閒獻王得周官五篇失冬官募以千金不得乃取考工記補之至劉歆校秘書始得序列多為諸儒所擯斥何休謂為六國隂謀之書惟杜子春能通其義鄭衆鄭興皆讀之康成獨以為周公致太平之迹故其學遂行于世論者以王莽安石一再用之而亂天下疑非周公之書五峯胡氏辯之尤力而朱子稱其廣大精宻中間細碎處雖可疑然非聖人亦做不得則伊川所謂有關睢麟趾之意然後可以行周官之法度抑亦理有固然而不必以莽安石為周禮累也禮記出于漢儒所輯錄其書多雜而不純始自河間獻王所獻劉向校定戴德刪為八十五篇所謂大戴禮也戴聖又損益為四十六篇為小戴禮馬融增月令明堂位樂記總四十九篇今大學中庸入于四書所存者四十七耳鄭康成王肅皇甫侃熊安生孔穎達衞湜之徒註疏不一而學者宗陳澔恨其書未經聖人之筆削則所望於後賢者不僅在註疏也論語漢初有齊魯之說傳齊論者王吉貢禹等傳魯論者龔奮夏侯勝等至張禹始合為一刪問王知道兩篇孔安國為之傳諸儒註疏訓解不可枚舉惟鄭康成何晏立于國學後世以問王知道二篇不見為憾然聖經豈禹所能刪必二篇出漢儒之偽作故不傳也孟子始註於趙岐而揚雄韓退之以及伊川橫渠等解釋不下數十家然自朱子集註出而百家註疏論語孟子者至是始集大成雖有王充之刺孟馮休之刪孟司馬溫公之疑孟蘇子瞻之辨說皆無損于日月之光而陸筠之翼孟虞允文之尊孟併亦可以不煩也孝經遭秦火之後為河間人顔芝所藏漢初芝子貞獻之凡十八章長孫氏博士江翁后倉翼奉張禹皆名其學又有古文孝經與尚書同出而長孫氏有閨門一章其餘大較相似又有衍出三章合為二十二章孔安國為之傳至劉向以顔本比古文除其繁惑以十八篇為定鄭氏馬融並為之註鄭氏或云康成其立義與康成所註他書不同梁時孔鄭二家並立學宫唐明皇復註之元行冲為疏宋邢昺作孝經正義朱子作孝經刋誤然觀其跋後數言則當世之疑者甚多而語錄又云疑非聖人之言則以其說得不親切但言孝之效如此因有欲掇他書發明其旨别為外傳之意爾雅一書不知始于何時據郭璞序但稱興于中古隆于漢氏至唐陸德明作釋文始謂釋詁為周公所作其說蓋本于魏人張揖所上廣雅表言周公制禮以道天下著爾雅一篇以釋其義餘篇或言仲尼所增或言子夏所益或言叔孫通梁文所補解家相傳疑莫能辨舊有劉歆樊光李巡孫炎之學今惟郭璞註邢昺疏行于世隋唐以來此書不課於舉子韓退之以古文名世尚以註蟲魚為不切則知誦習者寡矣宋初稍稍出後有以爾雅問題者以能辨鼠豹不識蟛蜞為對驚嘆博聞陸佃為爾雅新義自謂可使郭璞擁篲清道跋望塵躅然大率不出王氏之學與劉貢父不撤薑食三牛二鹿之語無以相過其為玩物䘮志也甚矣要而言之易書詩春秋俱經聖人手定論語孟子孔孟之徒所記述後聖有作亦等游夏之一辭莫贊詩集註有廢序之疑胡氏傳有牽強之處儒者吹毛求疵或好論說以自鳴一家固亦聖人所弗禁然度德量力保無遺議而欲以一偏之識試蠡測之技徒見其勞而罔功為紫陽文定之罪人則亦可以不必也三禮之書多出漢儒所附益其義理未盡粹精言詞篇章一望蕪雜不能不有待于好學深思之士定其指歸刪其繁惑無使綜彚不倫庶幾有合乎周公孔子之精意夫亦吾黨之責也孝經雖未必曾子所為然其書闗係甚大必不可廢採輯古今大義嘉言推而廣之發明至德要道之旨為曾子之功臣可耳公羊穀梁皆傳也而列于經此推尊之無謂者則亦仍傳之而已爾雅決非周公孔子之書所謂叔孫通梁文者近是此乃字釋小學列之于經無益於身心性命天下國家之故余以為可廢已甚歸之字說音韻篆𨽻說文之流爲學者游藝覽觀之一助足矣好古無識而為古人所愚亦非古人所甚願也史學考古之為史者有專官班馬皆世其業故其書出一人之手成一家之言自唐太宗命廷臣共為之後世因為成例意見錯出言人人殊而其書踳駮不可問矣古之作史者以春秋編年為正體自司馬遷創紀傳後世宗之蕭梁間又特起一例曰實錄雜取編年紀傳之法而為之則以備史官之採擇無制作之意不足道也編年最古所載一國治亂事最詳而人以紀傳便于披閱號為正史則有不可解者矣今所傳為正史者二十一家則皆紀傳之體祖司馬氏史記者也史才以遷為第一後世著述之士皆莫能及朱子曰遷才高識亦高但麄率則衷于道言之東萊稱太史公指意深遠寄興悠長微而顯絶而續正而變若魚龍變化不可蹤跡是其行文之妙固亦有然者也班固譏遷先黃老而後六經退處士而進奸雄崇勢利而羞貧賤此誠遷之所短然當其時武帝窮奢極侈海内凋敝反不如文景尚黃老人主恭儉天下饒富也武帝用法刻深而當刑者以貨免遷遭禍家貧無財自贖交游莫救卒陷腐刑蓋其意有所感憤故其言不無過當而能推尊孔子序列世家譏聚斂而終平準則亦未可輕議者乎遷没時史記尚少十篇褚先生少孫補之然景紀疏略武紀全錄封禪書三王世家但述封拜策辭禮樂書謄荀子禮論河閒王樂記傅靳列傳與漢書同餘皆猥𤨏不足道則不及遷書遠甚孟堅陽薄子長而隂實宗之所著漢書自高祖至武帝盡用史記自昭至平則資于賈逵劉歆其八表天文志則妹昭踵成之昔人謂固書皆因遷及王商揚雄歆向舊文潤色之中間有冗𤨏處由商之才不及數子耳鄭夾漈極詆孟堅謂全無學術專事剽竊又云遷之於固如龍之於猪則抑班太甚史所重在剪裁褒貶不以無所依據為高而或又謂漢書制作之工如英莖咸韶音節超詣後之為史者莫能及其髣髴是以諸史棄遷而宗固劉知幾之徒尊班而抑馬則又推崇過甚不知孟堅之史僅可為子長之續而紛紛議論皆未得其平也范蔚宗後漢書自謂體大思精方孟堅而無媿蓋類次齊整用律精深馬班以後誠宜位置一席但見識有限體致局弱其序論欲于班固之上增華積靡鏤貼錦綺論後作贊附贅懸疣自以為筆勢放縱實天下之奇作則宋齊間文字風氣日降無如何也世譏其創立后紀及採風俗通中王喬抱朴子中左慈等詭譎事列之于傳抑節義之董宣于酷吏升忍恥之蔡琰于列女則踳駮亦所不免哉陳壽三國志叙事高簡有法張華王通皆善之但帝魏寇漢大綱顚倒因父髠故妄短武侯又以求丁氏米弗獲不為儀廙立傳則亦等之魏收穢史不足為君子觀也昔人謂三國志當更修定最為確論鄭知幾陳亮皆有志未成廬陵貢士蕭常為續後漢書起昭烈終少帝炎興而止既正其名又擇註文之善者併書之惜乎壽疏略于前使常無所藉手發揮于後今其書不傳則亦壽掩抑漢事之過也晉書隋書房喬魏徵等總其事合褚遂良長孫無忌于志寜李淳風顔師古孔穎達李延壽等共為之隨其學術所長分授區處各當其用類例出于敬播天文律歴淳風專之宣武紀陸機王羲之傳論太宗所自為隋書序論皆徵之作所以晉隋二志高于古今然晉書猶取沈約誕誣之言雜采語林世說幽明錄搜神記詭異謬妄之語而隋書則鄭夾漈稱其極有倫理本末兼明可以無憾遷固以來莫能及也沈約撰宋書以何承天書為本旁採徐爰之說頗為精詳但本志兼載魏晉其體煩雜非復前人比又喜造奇說以誣前代創立符瑞一志荒誕不經無益甚矣蕭子顯撰南齊書天文户口莫能詳也其為文喜自馳騁更改破析刻雕藻繢之變尤多風斯下矣姚思廉撰梁陳二書以繼乃父未成之志雖同事者有魏徵然徵惟著總論筆削序次皆出思廉思廉父名察仕陳時即為此書經三世傳父子更數十歲而後成成又久不顯至宋始列于學者蓋其難也後魏書成于魏收直借史以為酬恩報怨之具自謂舉之則使上天按之則使入地其良心不存久矣爾朱之惡可減何傳不可以為佳穢史之稱千載不易其後齊亡竟遭發塜棄骸之慘劉知幾謂其隂慝所致信夫隋文帝命魏澹等更撰魏書九十二巻皆不傳而收書獨行于世則澹等文章之陋也李百藥撰北齊書乃因父德林所撰述續成以獻但其避唐諱不書世祖世宗之類議者少之令狐德棻撰周書因蘇綽牛𢎞之舊務清言多非實錄李延壽撰南史北史刪煩補闕叙事簡勁司馬溫公所稱佳史者也然好述妖異兆祥謡䜟特為繁猥則其所不足耳舊唐書出于石晉宰相劉昫因韋述舊史增益之繁略不均是非失實甚以韓愈文章為大紕繆至宋仁宗乃命廷臣刪定之歐陽修撰紀志宋祁撰列傳自言事增于前文省于舊而議者謂永叔學春秋每務褒貶子京惟刻意文章用字多奇澀復采雜說往往牴牾則新唐書不出一手亦未為盡善也歐陽修五代史深得春秋之法褒貶謹嚴依稀子長一體但天文不載變異韓通不為立傳亦微疵也宋史立傳惟計官階叙述止詳遷擢序道學則詮次失倫述盜賊則繁猥無紀濫漫紛沓莫此為甚遼史失之蕪雜承訛襲舛不可勝窮揭傒斯有心術宜正之規故所為金史簡質殊甚非宋濂之元史忌諱不明所可比儗者也要而言之史家之學前莫善於子長後則推夫永叔蔚宗抱負遠遜孟堅其他數子得失參半姑以備一朝之事蹟雖極穢如魏收未若陳壽三國志之三綱淪斁冠履倒置讀其書而不痛憤必其人已無惻隠羞惡是非之心甘為亂臣賊子而無疑者也宋史靡蔓已甚巻帙繁多如邸抄雜錄有待採擇修定未可公然命之曰史也邵氏𢎞簡錄剪截枯槁如拙匠初學塑雕略似人形而聲音笑貌精神意氣槩乎未之有焉世人畏宋史繁浩不得不趨邵氏之簡便亦出于無可奈何也余謂三國志宋史二書當更新修定若畏難茍且以俟後人後人又俟之後人不亦吾徒之恥乎抑又論之編年之史本于春秋左氏洓水司馬溫公祖述其法輯成資治通鑑一書治亂興亡瞭如指掌而義例未精予奪失當紫陽朱子憂之因作為通鑑綱目大書以提要分註以備言表年著統起威烈終五季千三百六十年間義精事核卓乎可繼春秋紹先聖筆削之旨元儒金履祥斷自唐虞為補前編明憲宗命儒臣商輅等續宋元以成後紀萬歴中渭上南軒又雜采宓羲以來核而可信者列于前編之首可謂至詳且備獨有明一代闕如焉修補釐定繼往開來是亦吾徒之責也夫歴代歴法考古者聖王仰觀俯察敬天勤民於是有治歴之法分周天躔度置閏月定四時成歲使民有所準節以各遂其生出入作息農桑畜牧諸務無差忒焉故自開闢以來歴法至今不廢軒轅黃帝始命大撓作甲子命羲和占日常儀占月車區占星氣𨽻首理算數命容成造蓋天儀著周天歴度作調歴以建寅春正月為歲首復迎日推䇿作十六神歴積餘分以置閏此古今治歴之祖也少昊之衰九黎亂德顓頊乃命南正重司天北正黎司地以治神人萬物有序民安其生爰及帝嚳式序三辰堯命羲和治歴象授人時東作南訛西成朔易分而理之以閏月定四時成歲舜在璿璣玉衡以齊七政洪範五紀一曰歲二曰月三曰日四曰星辰五曰歴數成周大司徒以土圭之法測土深正日景以求地中馮相氏掌歲月辰日星之位辨其叙事以會天位保章氏志日月星辰之變動以觀天下之遷辨其吉凶秦火以後三代儀器蕩然無存欲求古者治歴之法其詳不可得聞也漢歴凡五變而司馬遷之太初歴本于黃鐘晦朔弦望序皆不忒唐歴凡八變而僧一行之大衍歴本于蓍策章蔀紀元皆與易合元郭守敬許衡共成授時歴測景驗氣定為歲差其法頗精古今稱善歴者此三家為傑出而三家之中前輩以授時為善謂其測候日月星辰消息運行之變專主晷景為最密也古今改歴不下數十家自黃帝迄秦凡六改漢凡五改下迄隋末十三改由唐迄周十六改宋十八改金熙宗迄元末凡三改蓋日月有盈縮朓朒星辰有遲留伏逆出入于二道之間約七十年而差一度每歲差一分四五十秒年久數盈漸差漸遠有不容不改者爾嘗考堯時冬至昏昂中日在虚七度躔元枵之子至明嘉靖間冬至昏營室中日在箕三度躔析木之寅計去堯三千九百餘年而差者五十度矣若執滯不改將晦朔弦望失其節分至啓閉乖其期何以行令訓民哉漢鄧平改歴洛下閎謂百年後當差一度晉虞喜立歲差之法定以五十年久而驗之弗合也何承天以百年劉焯以七十五年僧一行以八十三年久而驗之又弗合也宋統天歴則六十七年前輩謂邵堯夫差法冠絶古今却于日月交感之際以隂陽盈虧求之元郭守敬許衡定以六十六年有奇而退一度上考往古則每百年長一下驗將來則每百年消一前輩又謂授時之制度越前代至明大統歴猶仍其舊洪武中博士元統請以洪武十七年甲子歲冬至為歴元雖不用授時消長之法大約名異而實同未有以易之也然行之既久仍又弗合如正統十四年己巳朔二至之晷有晝夜六十一刻之文正德九年八月朔日食歴官報食八分六十七秒數俱不合而閩廣之地遂至食既起復時刻又安得同夫天道之可驗者莫顯于日月之交食而舛錯訛謬一至于此此鄭善夫華湘朱載堉邢雲路之徒所以嘵嘵不已也萬歴末年太僕少卿李之藻上西洋歴法述龎迪我龍化民等條陳歴算十四事皆中國天文歴志諸書所未嘗及崇禎間開設歴局尚書徐光啓薦李之藻共事徵西洋陪臣湯若望羅雅谷等供事歴局闡幽極微一破從前訛謬明社旋屋未及頒行我朝握符凝命八荒為宇西洋臣子得與朝㕘聚精會神晝夜推測一時象緯歴算之學迥出尋常今所頒行時憲歴誠千古以來盡善無弊者也前輩謂漢自太初出而一十七家之歴皆正唐自大衍出而二十三家之歴盡廢兹本朝時憲歴出而上下百家俱不足言矣夫西洋習天主一教惑世誣民不可以令而用其長以治歴則班孟堅所謂專門之裔精算之士者仰見我國家隨材器使知人善任度越前王煌煌乎文治之盛也抑聞之歴有理有數古今明歴數不少而明歴理者極難朱子亦曰歴不能無差今之學歴者但知歴法不知歴理蓋舍理以求數雖窮極微秒必有不能盡合者君子用歴亦究其理而已數學靈臺掌之非有大人之事者所暇及也錢幣考人民之生資百物以為用而農工藝業各專所有不能相通聖王於是以適用之物制為貨幣以權之有無相濟貴賤相資天下無一物之不足所謂財者生民之大命自太昊氏以來即有此矣太昊高陽謂之金有熊高辛謂之貨陶唐氏謂之泉商人齊人謂之布齊人莒人謂之刀虞夏商之幣金為三品或黃或白或赤或錢或布或刀或龜貝又以珠玉為上幣黃金為中幣刀布為下幣然珠玉黃金得之為難權輕重通貧富而可以常行者惟錢而已故九府圜法自太公以來未之有改也九府即周禮所載太府玉府内府外府泉府天府職内職幣職金九官是也圜謂均而通也金計斤布帛計疋錢輕重以銖凡貨物出入以圜法均而通之故貨寶于金利于刀流于泉布于布束于帛金者言其質刀者言其器布帛言其用泉言其形古錢形如篆泉字後世易以錢字故泉之文借為泉水之泉取流行之意焉周景王時患錢輕更鑄大錢重十二銖文曰寶貨錢之有文自此始秦作八銖錢文曰半兩而珠玉龜貝銀錫之屬為器飾寶藏不為幣漢興令民鑄莢錢薄如榆莢米至石萬錢文帝時更鑄四銖錢除盜鑄令武帝建元元年行三銖錢五年罷三銖鑄五銖錢元鼎二年鑄赤仄錢以赤銅為其郭也未幾廢仍行五銖王莽之亂鑄大錢十二銖文曰大錢五十又造契刀錯刀既而以劉字有金刀皆罷之契刀有環如大錢身形如刀長二寸文曰契刀五百錯刀以黃金錯其文曰一刀直五十錯刻字也而更作金銀龜貝錢布之品令敢挾五銖錢者投四裔於是農商失業食貨俱廢建武間允馬援之請仍鑄五銖錢以第五倫為督鑄掾昭烈入成都鑄直百錢重四銖文曰直百孫權鑄大錢一當五百又鑄當千錢民間患之晉初仍用五銖錢元帝渡江用孫氏舊錢輕重雜行大者曰比輪中者曰四文吳興沈充又鑄小錢謂之沈郎錢宋文帝仍鑄四銖議者以國用不足欲禁私銅范泰諫止之其後有二銖錢無輪郭不磨剪鑿者謂之來子尤輕薄者謂之荇葉沈慶之啓通私鑄錢貨亂改一千錢長不盈三寸大小稱是謂之鵞眼錢劣于此者謂之綖環錢入水不沈隨手破碎斗米一萬至萬錢不盈掬明帝泰始初乃禁之梁武帝鑄女錢徑寸五銖無輪郭郡縣皆通用又有太平定平稚錢三吳行之又有對文錢豐貨錢謂之男錢言婦人佩之則生男也普通中盡罷銅錢鑄鐵錢人以鐵易得私鑄更多所在山積交易載以車不復計數陳初始廢之改鑄五銖宣帝大建中鑄大貨六銖以一當五銖之十民以為不便嶺南諸州多以米布交易俱不用錢隋文帝更鑄新錢背面肉好皆有周郭文曰五銖又于揚州并州鄂州益州各立五罏鑄錢奸猾愈多錢益輕薄濫惡大業以後或剪鐵葉裁皮糊紙以為錢相雜用之唐武德四年鑄開通元寶錢每一千重六斤四兩得輕重大小之中其文歐陽詢書時稱其工先上後下次左後右讀之自上及左迴環可通流俗謂之開元通寶錢肅宗時以第五琦請鑄乾元重寶錢憲宗以錢少禁用銅器武宗廢浮屠法李郁彥請以銅像鐘磬鑪鐸皆歸巡院鑄錢周世宗令民間銅器佛像悉輸官給其直謂侍臣曰卿等勿以毁佛為疑佛志在利人雖頭目猶捨以布施若朕身可以濟民亦不惜也宋初錢文曰宋元通寶太宗時親書淳化元寶作眞行草三體自後每改元必更鑄以年號元寶為文仁宗中改號寶元文當曰寶元元寶詔學士議俄特命以皇宋通寶為文慶歴後復冠以年號神宗中皮公弼請鑄折二錢未幾又請鑄鐵折二錢皆從之徽宗令陜西鑄折十銅錢大觀中改為當三孝宗鑄當二小平錢寧宗即荆州鑄當五大錢皆不如五銖之便故自元明以來不可易也楮幣起于唐憲宗時飛錢合券特以通商賈之厚齎貿易者蓋執券以取錢而非以券引為錢也宋真宗時張詠鎭蜀設質劑之法一交一緡以三年為一界而換之六十五年為二十二界謂之交子高宗時侍郎錢端禮造會子内外流轉其合發官錢並許兊會子輸左藏庫邱氏曰宋朝交子至是更名會子又謂之錢引謂之關子謂之關會其實則一蓋直以紙為錢矣金循宋四川交子法置交鈔自一貫至十貫五等謂之大鈔自一百至七百五等謂之小鈔以七年為限納舊易新其後不拘年數字有昏者方換之元世祖始造交鈔以絲為本每銀五十兩易絲鈔一千兩後又造中統元寶鈔行之既久物價騰踊民用匱乏至以鈔十錠易斗粟不可得明時猶以銅錢及鈔相兼行使而錢之弊在于偽鈔之弊在于多則以其用紙為之所費之直不過三五錢而以售人千錢之物宜其用之不能久也錢法貴得其中秦時八銖失之太重漢初榆莢失之太輕惟五銖為最善五銖之後或為赤仄為當千為鵞眼綖環為荇葉不知幾變惟唐之開元為最善夫重錢之患在于難用而難用為累淺輕錢之患在于盜鑄而盜鑄為禍深自古以來論錢法者多矣惟南齊孔顗所謂不愛銅不惜工二語誠萬世鑄錢不易之要道也銅無所惜工無所愛則其錢之為錢體質厚而肉好適均製作工而輪郭周正本多而費重雖驅之使盜鑄亦不為矣瓊山邱氏欲拘盜鑄之徒以為工收新造之錢以為銅本孔覬之說别為一種新錢以新天下之耳目革天下之宿弊非無見也漢法非上林三官錢不行崔沔謂貴以通貨利不在多余謂官錢多則私鑄自息惟其流布不廣故奸民得因以為利我國家錢法盡善體質厚重磨礪精工宜其行之無滯而近局之地或壅塞而不流遥逺之處或流通而不足如閩廣江浙等省皆苦錢貴雲南又苦錢賤欲將滇銅購運則慮道遠費繁似當于湖南特設錢官開罏鼓鑄以銷滇南之銅裕江浙等省之用廣東銅礦亦可開採即于閩廣之交命官開罏併買洋銅鼓鑄以裕沿海各省之用部頒錢文體式無使參差選方正清望之臣領之如第五倫為督錢掾長安無奸巧劉晏第五琦領鑄錢使而江淮政平任得其人何奸弊之足患民殷國富海宇䝉樂利之休其為利也溥矣潮州風俗考潮郡依山附海民有雜霸之風性情勁悍習尚紛囂其大較也蘇子瞻作昌黎廟碑謂潮之士皆篤于文行延及齊民號稱易治當時樸陋初開旋登彬雅海濱鄒魯之稱所由來乎歴年既多流風日下文士漸趨浮華習奔競先名後實而鄒魯為之一變矣武士恣睢倖擁節旄刻剝富民摧殘桑梓衆皆欣而耀之充健兒結黨類橫行市里行伍貴于詩書而鄒魯為之一變矣不農不秀竄身公門鄉民獄訟恣其魚肉遂至煬竈藉叢威福橫于士夫而鄒魯為之一變矣行伍之餘流為闖棍似俠非俠瞋目街衢杯酒可代殺人一呼而聞百諾胥役之餘流為衙儈為訟師間有衿監靡然慕傚而刁訟之風熾不可遏矣鬻産告爭賣妻告奪丐屍權為父命蹻跖舉作賓賢樓閣空中千奇百怪至於水落石出鷸蚌俱傷尚懵然不知訟師之害己其亦可憐甚矣既不懷刑遂輕憲網而有包侵國賦抗拒征輸積逋連年妄希肆赦負氣喜爭好勇尚鬬睚眦小嫌即率所親而至以刀兵相格如臨大敵强者凌弱衆者暴寡而歃血拜盟之風村村倣傚多以豪爽悞致殺人因或藉命抄掠自殺圖賴視為奇貨投繯飲鴆刎頸沈河曾不少顧惜焉世家大族輕蔑孤姓呵叱若僮僕之不如及其積糞成家交遊恐後婚媾論財弗遴坦腹雖有賈董韓歐未可與素封者子較一日短長也好酣歌新聲度曲燈宵月夜傅粉嬉遊咿咿嗚嗚雜以絲竹管絃之和南音土風聲調迥别千金買笑視同泥沙遂有遊妓蕩婦駕一葉以當青樓又或締戲蜑婦風流自詡廉恥道喪未有甚於斯也羣聚酣飲晝宵沈湎無貴無賤見賭則殉千金之宅萬金之產刻燭方寸揭以授之他家而有所不吝輿夫菜傭襦袴蕩滌至于赤身沍寒衣蒲向火紙牌在手不忍棄置大抵士庶之家十人九賭兵役之家九人十賭通都僻壤無處無之蓋習俗之浸淫久矣賭博之餘流為盜賊攘雞盜牛穿窬胠篋謂卑卑未足比數也截途剽剝取其貨而劃其膚足底龜紋曰防追捕或則操舟溪河禦人于郊關之内結隊出海攘客于重洋之外又或入山招匪盜礦砂金銀銅鐵鉛錫擅為私家之故物逞强相奪霸踞壟口流毒地方為害靡有涯焉酷信青烏家之說謂富貴出自墳墓沈迷風水爭訟盈庭椎埋盜骨凶惡無所不至而程大平鎮相尚屢遷葬後數年必發塜洗骸睇瞻凶吉至數百年遠祖猶然洗視不休雖讀書明理者亦恬不自覺其非則貪癡之陷溺然也信巫覡不重醫藥風寒暑濕動云命運衰低衝犯鬼物三牲酒果鼓角喧天富者連日貧者半晡士大夫家亦然耳罔極之喪置酒召客延僧禮䜟開𡨕路打地獄云為死者減罪資福雖有賢良方正之親亦必文致以剉磨舂燒之罪告哀於佛自以為孝不知其為大逆不孝之甚者高堂無菽水之歡而齋僧布施盈千累百生死之交一錢推刃同胞骨肉半畝訟庭獨捨田入寺千頃不以為多建刹泥金萬鎰猶以為歉世風至此可痛極矣自昌黎公貶謫無聊偶與大顚一接僧徒藉為口實謬擬三書甚至肖形廟壁誣以折腰拜服之狀士大夫不知忿恚隨聲附和以為實然共尊大顚為祖師甚者凡遇秃厮皆呼師父不思此何人也而師之父之所謂人心不死者安在乎佞佛之餘流為好怪石或能言樹或能靈厠間古柩亦神亦仙酒肉香紙男婦趨若狂焉於是有白蓮教天主教無為教又有後天一教獨闢新奇男稱仙公女稱仙姑書符呪水治病求嗣寡婦見夫悶香迷藥毒流遠近其敗壞風俗不可言也鬼怪盛而淫邪興廟祀多而迎神賽會一年且居其半梨園婆娑無日無之放燈結綵火樹銀花舉國喧闐晝夜無間擁木偶以遨於道飾裝人物肖古圖畫窮工極巧即以誇于中原可也婦女入廟燒香朔望充斥然皆中年以上者及歲時應節踏青歩月觀劇賞燈少艾結羣直排守令之闥擁擠公堂沸若鼎溢遨遊寺觀跳呌無忌不復知人間有男女之别矣海濱之婦或捕魚蝦拾蛤蠣以資生計山城閨閤日陟岡巒樵蘇為業蓬頭赤脚多力善耕雖昧踰閫之戒然瘠土民勞亦其勢然也秀妍頑蠢諸邑不同霜貞勁節比比皆是歌黃鵠殉所天陷賊濺血視死如飴誰謂巾幗塲中遂無乾坤柱礎哉下户惡習慕富憎貧貌寢非甘糟糠弗願良人朝出蹇修夕來則不當以人類目之者也總之風俗因時變遷亦隨長上為轉移彰善癉惡樹之風聲實有不疾而速不行而至者唐虞之世司徒教以人倫夏后孟春遒人以木鐸徇于路豈好勞哉我國家重熙累洽聖祖仁皇帝六十載德盛化神生民未有皇上宵衣旰食惓惓以民生風俗為首務聖諭廣訓一書為天地立心生民立命為往聖繼絶學萬世開太平雖使堯舜復起亦無以易守令小臣何幸身親見之自奉諭訓以來海澨山陬共仰蕩平正直之王路每當城鄉市鎭朔望宣講父老扶杖而觀童兒翹首以聽歡欣蹈舞共興于孝弟仁讓之風潛消其獷悍囂凌之習日新月異漸幾淳美向之耰鋤徳色箕帚詬誶好貨財私妻子不顧父母之養者今則肥甘娛老處處皆然刲股和藥廬墓為哀海潮揭饒之間不可勝數也知兄友弟恭之為美雖未必皆眞情篤摯而一錢尺土胞乳操戈亦駸駸乎鮮矣則敦孝弟以重人倫之諭㫖為之發䝉振落也營宫室必先祠堂明宗法繼絶嗣重祀田鄰省鄉親望門投宿罔有所靳歲時戚屬樽酒言歡率以為常其於宗族鄉黨雖未必盡皆雍睦盡息爭訟亦庶幾有遵道之意焉農力于耕女勤于織高山亦種禾苗薯芋生于崖澗程繭潮紗潮毯麻葛諸布流行海内服食器用亦稍以驕奢為戒若夫一攉千金傾家結客則十一邑中未見有其人也工不甚巧而業則專商競刀錐航海者衆福建臺灣寧波上海交廣海南日本諸番視若户庭行險逐末雖非中道而志定于謀生靡有非分之叵測重農桑尚節儉務本業涵濡於聖訓者深矣曉事耆耉含哺嬉遊牆隂樹下說古談今講法律以儆愚頑者有之父戒其子兄勉其弟勿干法網各保身家訓子弟以禁非為者有之宵匪竄投鄉閭側目畸人入境里社驚惶誡匿逃以免株連者有之一朝之忿忘身以及其親兩口檳榔登時解釋其有深讐宿憾亦可杯酒言消邇者命案已少其十之六七解讐忿以重身命者有之明季士大夫驕横太甚雷轟虎虓莫之敢攖及乎亂離之後摧殘剝落小卒賤𨽻皆得易而侮之儒冠辱于泥塗迂腐供其談笑俗不重士士亦遂不自重同流合汙不可問矣聖諭慇慇士習遍方州而隆學校優其禮貌養其廉恥有司以澹臺為貴士子羞奔競勵名節非公不至長吏之庭即有一二儈習未除嗜訟結蠧皆為鄉曲所不容避匿他郡赧還故土矣曩時潮士好以禪學為詩文貝葉梵音傾心高妙昌黎原道而後莫有以道為言者郭鄭二子郭叔雲字子從鄭南升字文振從學紫陽雖著述不傳于世已為嶺南絶響他若中離黃岡或從姚江講學或遊白沙之門其學以良知致虚為要不外陽儒隂墨之宗旨道其所道非吾所謂道也自是而後高者習為雕蟲卑者沈于制義茫然不知正心誠意為何物子臣弟友為何事濂洛關閩為何人弋獲科第而已矣今則棉陽士子濟濟以聖賢自期待朔望衣冠而拜先儒飭躬勵行而講正學妖書邪教殄滅廓清不特儒佛之介辨之甚明且於朱陸異同言之歴歴海陽學者亦多志道幸黃冠之消亡冀緇流之歇絶謂安得邑之寺盡如一邑之觀澄海遊僧鴟張說法一朝就縛士林稱快揭陽普寧程鄉惠來諸邑皆知程朱之正傳不為異端所搖惑斯則經正民興吾道昌明之一大元會也文風之盛冠于嶺南三陽一鄉澄海饒平竟有經經緯史矩矱先正公然與江浙爭雄者即以科名而論亦當百粤之半言忠言孝言禮言讓儒門恥於爭奪風尚為之日躋則聖諭所謂黜異端崇正學者蓋已服膺親切而明禮讓以厚風俗亦毅然油然庶幾欲求無悖於煌煌大訓哉曩時健訟成習刁誣甲于寰區潮陽詞狀日投一千八百楮海陽揭陽五七百楮其他或三四百或一二百多寡不同未有在百以内者今已各減其十之八訟師藏頭靡耳有散而之四方者聖諭再迪數時誣告可以盡息而善良咸歌樂利也曩時竊刼盜賊從橫遍野水陸皆戒心之地今則狐鼠革面郡邑俱已肅清行旅恬於戴星夜户可以不閉保甲之效亦既彰彰若此矣曩時逋賦成風紳衿大豪較小民為更甚是以捐籍雍膠亦甲天南諸邑監生多者至二千人次者千餘人最下亦數百人恃護符撻催差捨命催科不能完十分之五六今則紳士皆踴躍輸將急公以為民望本年糧米如普澄惠埔平鎮諸邑或入秋即已通完或冬臘並可廓清海揭程饒皆在九分以上雖以潮陽之積逋難追亦于十月之内清至八分有奇比及奏銷報最綽綽此從來未有之事皆由聖諭深切著明有以大發其羞惡之心天良一動嚮化如流以至此也向來惡俗洗滌凈盡者有三曰賭博曰私宰曰盟歃賭博之弊㧞根塞源造售賭具者無有矣私宰之輩投刀改業即以一金市一臠牛肉無有矣盟歃之儔雪消見晛併强宗闖俠好勇鬬狠之風亦大為斂戢矣遊娼戲婦咸逐出境私蜑外淫並為厲禁蕩舟沈湎歌舞嬉遊皆自知羞愧焉惟喪事供佛飯僧信巫尚鬼遷塜洗骸賽會燒香遊燈好戲重富輕貧趨炎附熱此則習俗所未盡蠲者力行聖諭仁漸義摩沐浴于道徳齊禮之中有不囘心嚮道以幾時雍風動之化無是理也敬錄聖諭廣訓書永埀方策以為移風易俗之心傳俾千秋百世為司牧者知所準則焉鹿洲初集卷十四
