body:
  text: 鹿洲初集卷一廣州府知府藍鼎元撰書上陳大中丞請修明史綱目書國有史官助賞罰者也前事不忘後事之師若勝國史尤為殷鑒史所重在褒貶是非非止記事記言作行狀日録已也是以垂法戒昭勸懲誅亂賊于既死表芳徽於千載故曰一字之褒榮於華衮一字之貶嚴於鈇鉞古之史不一家司馬子長創本紀列傳書表諸體班氏父子仍之易書為志歷代作者自范蔚宗以下皆祖馬班而史才史筆逺不及矣洓水司馬溫公本春秋編年之法輯成資治通鑑治亂興亡瞭如指掌而義例未精豫奪不無失當紫陽朱子因之作為通鑑綱目大書以提要分注以備言表年著統起威烈終五季千三百六十年間義精事核卓乎可繼春秋紹先聖筆削之㫖元儒金仁山斷自唐虞為補前編明憲宗命儒臣商輅等續宋元以成後紀萬厯中渭上南軒又雜采宓羲以來核而可信者列於前編之首可謂至詳且備獨有明一代闕如也我皇上𢎞開史局命諸臣纂修明史經歷多年草野愚生不登館閣無由披覽一二茫然弗知其體裁太抵逺紹馬班為二十一史之續竊不自量欲進一言以為有明一代綱目不可不宗紫陽而修而繼之當髙帝奠鼎金陵肇造區夏天錫智勇經營𢎞逺比及仁宣之世綱舉目張頗稱願治英宗北狩南內奪門社稷宗廟殆哉岌乎孝宗君臣兢兢業業海內乂安為有明列辟之冠其餘不足觀矣閹寺執柄于中權奸蒙蔽于外大禮聚訟三案紛爭客魏造妖縉紳慘毒兵虛餉匱盜賊蜂起綿延至於懷宗則雖有善者無可如何然身殉社稷猶不失亡國之正也若開國繼體之初而有建文遜國之事尤世運之丁極否攘奪起自一家忠良殄其噍類天地晦𡨕三綱淪斁不幸其身多歷年所又不幸其傳諸子孫世數久長使當時附和倡亂反顔事仇之輩得全其稱功頌德文飾其事以靖難之名而二三百年莫敢有昌言正論扶天理而植綱常斯亦古今第一恨事也則有明綱目之作烏可已乎二百七十年中命令之施綱紀之布民生國體安危休戚之所係不為大書特書振千秋之衮鉞開萬古之聾瞶有世道人心之責者其何能不扼腕三歎也生懷此已久而力不逮志既苦勞筋餓膚不能一日安其身於明窗靜几之下又以徴信書籍須充棟汗牛食貧不克自致每思及此終夜憮然恨不得當世有力大君子留心此道者為之執鞭供筆削校讐之役幸際執事於今日可謂千載而一時執事剛方正直胸境無偏私之纍復當寬大不諱之朝是是非非無所牽掣可以春秋之直道行之任撫循閩疆之重順風而呼可謂貧無其力乎敢請動支無礙錢糧開館纂修廣求明代書籍以備徴信擇淹通有才識心術醇正之士一二人與生共事執事綜其大成補百代之缺缺豐功偉業與紫陽並不朽矣執事冰蘗之操非人所及每秩滿遷官必將所積羡餘呈進內帑區區修史之費諒無介懷以貫朽無用之財為不朽事業之用九重聞知以為所進於上者多也草野愚生罔識忌諱惟執事諒察上車學憲請補漳浦縣鄉賢書鄉賢之有祠古所謂鄉先生沒而祭於社者也至今日而直道泯矣宋教授黃灝曰凡祀于學不以功德名位諸不在六藝之科不知父子君臣夫婦朋友之義不知正心誠意修身謹獨之學者咸不在列蓋祀典若斯之嚴也今則不然子孫之貧富貴賤即祖宗之賢否進退雖有庸碌不顧名節一子富貴盡蓋前愆金帛之布置吏胥之慫恿當事以為賢則從而祀之鄉之人無如何也不幸子孫式微將伯無力即忠貞垂天壤學行冠古今終不能分賢祠之爼豆前輩謂今鄉賢為有力者祠堂嗚呼不其然乎漳浦鄉賢祠祀唐潘存實宋髙登陳景肅楊仕訓以下五十六人文章氣節理學經濟忠孝隱逸之彥亦既彬彬可觀較他郡邑為獨盛中間或有富貴幸邀名浮於實者亦不過一二人無大剌謬較他郡邑賢祠之濫收則又相去霄壤不可謂非學校之幸也惟是子孫式微將伯無力忠貞垂天壤學行冠古今而不能分賢祠之爼豆者亦往往有之不惟有之且指不勝屈非生斯土與官斯土者之責乎理學宜祀也則有若宋蔡蒙齊元鼎明陳布衣真晟元鼎當五季衰亂隱居不仕講學大帽山麓生徒至者千人所著語孟講義大學中庸九經解洪範會元等書朱文公扁其祠曰立志聖賢真晟學問純粹嘗詣闕上書請補正學上程朱正學纂要作心圖二一著聖人心與天同運次著學者心法天之運與周子太極圖說相發明又作正教正考會通規制詳密學士張元楨曰斯道自程朱以來惟先生得其真吳許二子亦未是卒後四十年舉祀鎮海鄉祠今衛廢祠沒浦邑生長之鄉鄉祠并乏其主此不可不補者也忠烈宜祀也則有若宋陳格明周宗起涂仲吉陳格為宋海舟監簿帝昺既亡從容死難於崖山有忠義六詠兄植斂袍笏招魂葬之周宗起洪武進士任寺丞建文帝之難父子俱投琴川死涂仲吉以太學諸生聞黃道周詔獄不憚數千里伏闕申救忤旨廷杖至百下錦衣衛究鞫苦楚萬端桚其指盡折不少挫懷宗感悟與道周俱論戍尋赦歸明亡不食十餘日嘔血而死著書立說有功後學宜祀也則有若江晉雲環環為平湖令廉能著聲為御史方正謇直所著詩經衍義一書為士林所宗有裨後學甚大浦邑雲霄朱子祠土人私議以晉雲配享蓋佩服其書不忍忘所自也經明行修直言敢諫宜祀也則有若陳汶輝何楷汶輝元末隱居明太祖屢徴不至比之伊吕孔明及天下既定以經明行修應詔授給事中終大理少卿奏除吳松征稅辨劉基徐逹之見疑李善長周德興之被謗復疏請法程皓所陳十事山東張廉使某鞭笞內戚太祖欲處以大辟汶輝力爭封還御旨帝怒遣指揮押赴刑部至金水橋賦詩投水死太祖悼之殺指揮製文祭焉何楷天啓進士以魏忠賢擅權不謁選而歸講學紫芝書院崇禎時為諫官劾撫臣楊一鵬按臣吳振纓輔臣溫體仁王應熊又疏禁止內操及慎刑八議楊嗣昌奪情楷與黃道周林蘭友劉同升趙士春先後糾參長安謂之奪情五諫楷執法不避權貴遷南禮部丁內艱歸鎮海學宫傾頽楷更新之平生好學不倦淹博為黃道周所推服著孝經易經訓詁詩經世本春秋繹等書居官廉能知人造士宜祀也則有若蔡思充林宰思充為東陽令廉名大著有不取民間一寸絲之頌拔倪元璐于稚齡卒為名臣在太常時以議許世子不嘗藥忤璫告歸尋起刑部多所平反極陳科場關節蘆州蕪關數大案辭義激烈終工部尚書事親孝與人恕而臨大節決大議確然不可拔沒而人思之林宰為四川布政使政聲大震樊龍樊虎之變親援桴鼓以勵將士召女土司秦良玉設計擒之分典鄉會試得鄒之麟劉之鳳耿如杞林贄等皆一代名豪識馬世竒於童子中時稱冰鑑以兵部侍郎致仕居鄉善行尤多有販夫以同儕待宰宰亦笑受之雅量髙致時人莫及也骨鯁性成臨大節而不可奪宜祀也則有若盧化鰲林銘球黃易化鰲為縣令以執法忤湯賓尹而賓尹重之升吏部主事文震孟推其徑節而魏璫忌之與楊漣左光斗等二十七人同下詔獄削籍歸崇禎初録用東林諸君子起復原職升文選郎中以病乞休林銘球為御史彈劾大閹王坤薦起黃道周論救魏呈潤治勳戚不法者糾總督梁廷棟直聲震朝野按楚特參岷王長史貪虐不法狀為王反訐幾陷不測黃易順治進士授歸化令冰蘗自矢禦藩商去悍辨赫赫有廉能聲耿精忠反易大書署壁云一日在天地之間取義成仁無負所學無負所志百年存忠孝之念致身竭力不忘乎親不忘乎君遂削髮變姓名從間道入粵粵東繼叛潛迹江右聞大師入閩乃詣康親王王嘉其忠疏聞于朝方奉㫖議叙而遽疾卒贈按察司僉事賜祭葬祀歸化名宦焉是十三君子者方輿之砥柱暗室之明燈非徒一鄉之賢天下之賢也或載國史或載理學源流或載省志郡志邑志非鼎元一人之私言天下之公言也鄉先生可祭于社與黃灝所云祀典正自有合而明禋久缺或二三百年或百十年莫有過而問者謂秉彞好德人心同然其誰信之今之從祀者既不必如灝所云如灝所云又以子孫之故不得從祀九原有知能無抱恨于燕詒哉夫顯微闡幽維持風教官斯土者之責也表揚前哲獻納芻蕘生斯土者之責也上下各有専責原不必問諸其子孫其子孫之式微者中絶者固無爼豆之想其子孫之稍能自立而有志者或以學校祀典聽之公論不敢布賂營求以汚其宗祖是正人君子終無舉祀於鄉之日也漳浦黃石齊先生祀典尚遲至今幸蒙執事表彰忠節舉祀鄉祠諸君子或為石齊前輩或與石齊共事為所推服或舍命相救與石齊同患難則與石齊同歆爼豆亦事之不可已者也但今一旦而補十三人未免驚世駭俗且近來陋規文書經歷之處各衙門胥役俱有需索今一旦而補十三人上下無一錢之獲其勢亦決不可行草野愚生惟有姑存此論而已矣然天下非常之事惟非常人能為之祀典不當一人已覺其多名教有光百人猶以為少或就中斟酌擇其無後者將泯沒者而先祀之俯仰今昔鼎元益痛心三人也周宗起當燕王篡逆之時父子俱投琴川死是方孝孺黃觀之流亞也縣志載宗起事實竟不能詳但云史逸其名鄉無傳祀室廬墳墓尚在檺潭其子既忠且孝併不能舉其名氏則自今以往百年十年安知不併琴川之事而泯滅之精忠貫日兩世捐軀其報如此此忠臣孝子所慟哭流涕者也江環詩經衍義一書闡紫陽之精藴閩人應制舉者莫不奉為正宗今縣志併逸其傳止著書門類附載一筆而已鼎元再三博訪文獻求其軼事杳不可得近始於莆尾江氏家乘得其涖平湖試御史建國本救纍臣數事其平日鏤心嘔血著成一書幸已風行海內又不幸不得一賢子孫能傳其事未百餘年風流歇絶載筆君子又不留心考究郡邑志乘遂致闕略倘不及今表揚後之人其孰能知之乘人之車食人之祿且有全軀保妻子者涂仲吉藐然諸生又在數千里外伏闕陳言自蹈湯火至於廷杖折指不少挫衄較之髙登陳東其難更甚論救石齊兩疏淋漓切直忠肝義膽照耀寰區此尤古今之竒人可以愧凡為臣者昔與石齊同患難今不得與石齊共歆饗亦事之深可痛者也以周宗起江環涂仲吉三人之彪炳宇宙尚且寂寂無傳幾於泯沒則輕塵弱草之論將灰為善者之心顯微闡幽維持風教寧非今日之急務乎必不得已擇其將泯沒者而先祀之則此三人確乎不可易矣蔡蒙齊陳布衣二先生非時代所能泯沒陳汶輝何楷盧化鰲林銘球等諸先生國史鋪張亦可無慮泯沒然祀典有缺終留一方之遺憾今日幸遇執事不可謂非千載一時也天下非常之事惟非常人能為之舉動無私心合天理而當人情即日補百賢不虞其驚世而駭俗况僅僅此十三人哉鼎元為世道人心計懼先哲之懿行湮沒不彰不揣固陋妄獻芻蕘字多繁冗詞不雅馴伏惟執事勿吝覽觀酌其可行者而表章之庶無失鄉先生祭社之義史遷所謂伯夷叔齊雖賢得夫子而名益彰鼎元將為十三先生拜髙厚之賜矣上宋觀察請修漳州府志書竊惟古今不能一日無治亂是非沿革損益之端則不可一日無史天下不能使一方無治亂是非沿革損益之事則不可一方無志故夫郡邑之有志亦猶國之有史也鑒於國史而知往古興亡得失之故觀於郡邑之志而知一方風俗之淳漓民生之利病疆域之大小山川形勢之要害户口田賦兵防學校之盛衰前後有司之賢否忠孝節烈理學經濟髙人逸士之屈伸消長較若列眉是以一方之士一方之長需夫郡邑之志也比之國史為尤甚漳州郡志自萬厯後無增修者舊本亦散佚不可得故漳士多白首未寓目焉鼎元於甲申初夏在學使宫坊沈公官署始見抄本殘缺蕪穢烏焉魚魯翻閲未終掩卷三歎爾時欲進一言而學政繁多輶軒奔走於道路未敢唘口復念纂修國史者史臣之事也增修郡志者司牧之職也責有所屬而任各有専重也然則孰為一方之司牧將非觀察與刺史乎觀察刺史所以教養一方之吏民者也教之則宜使之知所觀感養之則宜存其因革盛衰興利去弊之由郡志不修而欲化民成俗使人慕善而戒惡也難矣故觀察刺史之宜修郡志也比之史臣修國史為尤甚且漳自萬厯以後文章氣節理學經濟之儒比肩而起若周綿貞黃石齊林浴元陳平人亶州何黃如諸先生國史猶能鋪張梗槩以昭示將來而本州獨闕焉尤非所以表明教化廣勵人心之道也鼎元不敏竊謂吾漳郡志之宜修比之他郡為尤甚苐史才史筆自古難之非當世之巨公宗匠不能留心於此而非當世之巨公宗匠亦不能操筆削之柄所以聽其蕪穢殘缺而有待於今日也執事以雕龍繡虎之才生名宰相之家日承冢宰公庭訓五車二酉之書固已幼而學之自膺簡命來巡海邦未數月而汀漳之民皆言執事之善於養人利弊無不悉也善於教人勸懲無不周也孰不踴躍激厲以自奮於今然鑒於古者猶有闕也則郡志之增修舍此時其何待乎今設或告執事曰有一人於此耳目聾瞶手足痿痺心痗腹瘕中有蛔聚良醫見而憫之為之藥以調劑之手足腹心之疾皆去獨去其耳目之聾瞶而不為之所執事且以為何如醫也今夫郡志是一郡之耳目也執事下車以來手足腹心之疾皆治之矣而耳目之司曾不加意漳士民必且咨嗟嘆惋謂遇巨公宗匠而亦猶然苟安則有終於聾瞶而已矣士君子居得為之時遇不得不為之盛事進退前古昭垂來葉非獨有裨一方亦且聲施於不朽此蓋曠世遭逢難以多得者也必欲讓大美於後人竊為執事惜之請擇縉紳先生山林遺逸及多士之博洽者分理其事各抒聞見執事總其成進退而筆削之以作史之三長成一郡之志書易易耳鼎元年少狂妄亦知出位之謀近于杞人之憂但上書言事古之人有行之昌黎南豐睂山父子皆自薦拔以求進用慷慨激昻言之亹亹忘倦况鼎元於世無所求而汲汲以陳者又皆世道人心之所係是以冒昧而忘其僭越之罪焉上張大中丞書伏自去冬拜别函丈已經十旬山川遼逺未嘗肅柬問候疏慢之罪莫可名言二月二十六日承辱書召鼎元即赴三山三月九日又承來書十一日蒙本郡太守敦促起行十二日又接巡捕官傳諭待鼎兀甚急鼎元何人感愧交集深惟執事以中州大儒倡絶學於海表九郡一州之士望門牆而不得入者何可勝數鼎元漳江小子鹿鹿無有寸長侍側一載回家未及四月又蒙屢次徴召固宜聞命即行疾走七八百里猶恐其後也然而事有所難欲陳於長者之前則有瑣屑冒瀆之罪默而不言又有違命之愆若執事肯加寬恕略賜觀覽知其實有隱衷非敢有所希冀則請得而言之鼎元幼喪父賴祖父母及寡母黽勉提攜以至今日今大父年八十有九大母年八十有二去日苦多此境豈能長得况自髙曾以來世以詩書為産業堂上有耄耋之親郭外無升斗之田筆耕舌耨尚不足以供菽水豈容逺適他鄉以饔飱細事貽老祖之憂哉且所憂者尚不止此鼎元有弟已長而未成人有妹愆期而不能嫁每思及此中夜起立况乎老人善憂安能一刻或忘加以先君之柩歷年既多未歸於土凄風苦雨之秋淚未嘗不澘澘下也夫鼎元雖不才頗知義利之辨苟為非義之獲雖千金在前不以易吾素豈肯妄受人憐有所希冀者哉所以孶孶汲汲筆耕舌耨者亦自竭其力以奉其親無一毫願外之意也少時狂妄喜為文詞自日侍執事細觀先儒之書始知聖賢之道終身行之而不窮然其最切者不外人倫日用之間父慈子孝兄友弟恭皆是道也今也有九旬之祖而不能養有久停之柩而不能葬有愆期之弟妹而不能為之所自逃其身於七八百里之外以博美衣豐食即使學問宏博推倒一世執事亦何取乎此等人耶昔唐陽城為國子司業引諸生教之曰凡學者所以學為忠與孝也諸生有久不省親者乎明日謁城還養者二十輩有三年不歸侍者斥之鼎元今日所以躊蹰再四欲行不能明知違命而不敢顧正深體執事之心者也不然鼎元蓬茅下士耳以大儒開府之尊忘分而教誨之豈不為榮又有萬卷足以供探討良友足以資講習豈不為快客歲追隨獨蒙格外顧盼恩禮之隆常往來於胸中而不能去豈忍久離左右者今且勉强經營若得苟完一二即疾趨赴省恭承至教固所願耳平生恥言家事雖親故有問未嘗一答曩侍執事一年亦不敢稍露毫末者蓋恐形迹之間似乎有所希冀也今承不棄徴召再三若復默默無言則恐執事不知其所以違命之故將責以自暴自棄之罪故敢竭其愚衷伏惟俯垂鑒諒焉與友人論浙尼書天下尼僧惟浙中最盛即杭嘉湖三府已不下數十萬人其係本人自願出家無十分之一也皆因少時父母貧寒為老尼所惑鬻與為徒洎乎長大不能自脫而凡為尼者又皆多購致閨女欲使教門興旺長養禁錮終其身無婚姻之日夫人情不甚相逺男欲婚而女欲嫁雖在聖賢必不能易今無故驅此數十萬人長吁短歎於清冷寂寞之中即使果守戒律盡屬氷清玉潔其怨氣已足以干天地之和召水旱之災况其踰間蕩檢多有不可問乎文王發政必先鰥寡內無怨女外無曠夫斯盛王之治爾士君子居宰相之位則必思燮理隂陽任民牧之官則必圖移風易俗豈得以為迂逺而不切事情哉愚嘗過蘇杭之間見街巷標榜下胎神藥絶孕竒方不勝驚歎謂風俗之壞何為一至此極市人為余言皆為蘭若尼僧而設然則蘭若之名乃青樓之别號也以此蘭若之人往來士庶人家小則耗人財物大則辱人家聲其為風俗之害可勝言耶足下今日有世道人心之責諒不忍漠然視之發政施仁遂彼室家之大願知髙明必有以處此矣論海洋弭捕盜賊書國家東南環海萬里汪洋舟楫利涉為民生之大利其間宵匪潛伏出沒行劫亦為方隅之隱憂盛京一帶澚岸向來為洋盜避風之所今旅順口水師足資彈壓山東洋面冷落非賊所戀一年之間不過偶一二至江浙閩廣則自二三月至九月皆盜艘劫掠之時今天下太平非有所謂巨賊不過一二無賴饑寒逼身犯法潛逃寄口腹于烟波浩蕩之際而往往不能廓清歲歲為商民之患則以商船不能禦敵而哨船不能遇賊之故也原賊之起其初甚微止一二人密約三五人潛至港口窺伺小艇附岸徑跳登舟露刃脅舟人駕出外港遇有略大之漁船則詐稱買魚又跳而上再集匪類至十餘人便敢公然行劫此粵東所謂踏斗者也出遇商船則亂流以截之稍近則大呼落帆商自度無炮火軍械不能禦敵又船身重滯難以走脫聞聲落帆惟恐稍緩相顧屏息俟賊登舟捆縶賊或收其財物將船放回或連船劫駕他往雖不願從亦暫相依以冀旦晚劫換一入其黨則與之化日久日多遂分為一二船勢漸以大此等小輩無他伎倆但使商船勿即惶恐下帆又有炮械可以禦敵賊亦何能為乎愚以為商船皆有身家斷不敢思為匪以自喪其身家性命而且一船下水必有族鄰鄉保具結地方官查驗烙號給與護船牌照方敢出外貿易此等有根有據之人豈不可信而必禁擕鎗炮使拱手聽命於賊若以族鄰保結不足憑則不應給與牌照既可給與牌照則可聽其隨帶防船器械倘得請㫖勿為拘牽弛商船軍器之禁則不出數月洋盜盡為餓殍未有不散夥回家者也哨船之不能遇賊皆謂萬頃渺茫從何捕起風濤險惡性命可虞不知賊船在近不在逺沿邊島澚偏僻可以停泊之區試往搜捕百不失一蓋彼雖名為賊未嘗不自愛其生陡遇颶風未嘗不自憂覆溺各省匪類性雖不同然皆必有垵墺可避颱颶乃能徐俟商舶之往來必待天朗風和乃敢駕駛出洋以行劫其貪生惜死之心同則哨緝之方堵截之候無不同也向來各省巡哨實心者少閩海經臺灣變亂有懲羮吹虀之思稍異從前積習其他不過奉行故事而已每欲出巡必預張聲勢揚斾徐行一二月未離江干又于舟中旦暮鼓樂舉炮作威是何異呼賊船而使之避也若使巡哨官兵密坐商船以出勿張旗幟勿鼓樂舉炮作威遇賊船嚮邇可追即追不可則佯為遜避之狀以堅其來挽舵爭據上風上風一得賊已在我胯下我則橫逼賊船如魚比目並肩不離順風施放炮火百發百中兩船既合火罐火藥桶一齊拋擊雖百賊亦可禽也所有銀錢貨物盡賞士卒勿許將辨自私自利首功兵丁拔補把總將辨以次升遷無得掩抑則將士之功名財利俱在賊船將不遑寢食以思出哨也抑愚聞在洋之盜十犯九廣則弭盜之法尤宜加意於粵東粵俗悍鷙貪頑不必財物豐多但殺一人可得銀五錢則欣然以為勝屠一豕自潮州沿海而下千有餘里半以攘奪為生涯水務習熟往來如飛而廣惠肇髙深山聚處之民往往集衆操戈載大纛以出剽掠富商大賈地方官不敢過問或家人衙役為其所擒黥面馘耳亦佯為不知而姑息焉彼此相蒙幸免盜案參罰將來流毒不知其何所届此則杞人之隱憂詎可以其天涯絶域置為荒逺而不足介意哉海洋相通無此疆彼界之殊朝粵暮閩半月之間可以周歷七省防範驅除萬難稍緩愚所以敢抒狂臆願與七省商民慶萬里澄波之頌也論邊省苖蠻事宜書楚蜀滇黔兩粵之閒土民雜處曰苖曰猺曰獞曰犵狫皆苖蠻之種類也其深藏山谷不籍有司者為生苖附近郡邑輸納丁糧者為熟苖熟苖與良民無異但性頑嗜殺或與漢民有睚眦輒乘夜率衆環其屋焚而屠之白晝出鄉井五里則惴惴憂其不還是以亦畏漢民而尤懼官長此可以教化施恩法令馴服者也但土民之頑順惟視土司土司多𡨕頑不法坐縱其行凶殺奪而因以為利即使事跡敗露大吏督責無參罰處分之加乎其身是以無所忌憚而敢于無所不為也苖民受土司荼毒更極可憐無官民之禮而有萬世奴僕之勢子女財帛總非本人所自有愚聞黔省土司一年四小派三年一大𣲖小派計錢大派計兩土民歲輸土徭較漢民丁糧加多十倍土司一日為子娶婦則土民三載不敢婚姻土民一人犯罪土司縳而殺之其被殺者之族尚當斂銀以奉土司六十兩四十兩不等最下亦二十四兩名曰玷刀銀種種朘削無可告訴聞昔年有闔村離散呈請地方大吏改土籍歸流官管轄遂有更生之慶曾未幾時而土司輦賂關說又復改還土屬丁壯舉家屠戮妻子沒賣為奴其他土部不得不吞聲飲泣忍受摧殘然其望見天日願如漢民沾被皇恩則千萬人如一心四五省如一轍也愚以為苖猺獞黎均屬朝廷赤子當與漢民一例軫恤教化惟在地方大小吏加意綏輯使知孝弟禮讓奉公守法自然不敢行凶殺奪倘土司暴虐太甚或其民有行凶殺奪俱將該土司照漢官事例參罰處分苐漢官有罰俸降級革職而土司無俸可罰無級可降革職則子孫承襲仍舊為太土司得以暴虐其民愚以為惟有削土之一法可令土司畏慎請題定削土則例照所犯重輕削奪村落里數以當罰俸降級所犯重大至革職者相其逺近强弱可以改土為流即將土地人民歸州縣官管轄勿許承襲併土民有不甘受土司毒虐願呈改土籍為漢民者亦順民情改歸州縣其深山窮谷流官威法所不及之處則將所削之土分立本人子弟為衆土司使其地小勢分事權不一而不能為害將來教化日深皆可漸為漢民至山中生苖責成附近土司招徠嚮化一體恩撫如此數年之閒生苖可化為熟苖熟苖可化為良善不特五六省地方享寧靜和平之福而自唐虞以來僅傳七旬舞干一格者至我皇上而悉為衣冠禮義户口貢賦之區此日之堯舜賢於唐虞逺矣鹿洲初集卷一
